<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>瑪麗安中控台 (Admin)</title>
    <style>
        :root {
            --primary-color: #ffd700;
            /* 🚀 調整為護眼且專業的深海石板藍，取代原本緊張的暗紅色 */
            --bg-dark: #0f172a; 
            --card-bg: rgba(30, 41, 59, 0.85); 
        }

        body {
            margin: 0; padding: 0; font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background: radial-gradient(circle at center, #1e293b 0%, var(--bg-dark) 100%);
            height: 100vh; display: flex; align-items: center; justify-content: center;
            color: white; overflow: hidden;
        }

        /* 🚀 頂部導航按鈕群 (移出卡片外，固定於螢幕頂部) */
        .top-nav { 
            position: fixed; /* 固定在螢幕上方 */
            top: max(15px, env(safe-area-inset-top)); 
            left: 15px; 
            right: 15px; 
            display: flex; 
            justify-content: space-between; 
            z-index: 100; 
        }
        .nav-btn { 
            cursor: pointer; color: #fff; font-size: 15px; font-weight: bold; 
            transition: 0.2s; border: 1px solid rgba(255,255,255,0.25); 
            padding: 10px 16px; border-radius: 12px; background: rgba(255,255,255,0.1); 
            backdrop-filter: blur(10px); box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            letter-spacing: 1px;
        }
        .nav-btn:active { transform: scale(0.9); background: rgba(255,255,255,0.2); }

        .container {
            position: relative; background: var(--card-bg); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            padding: 35px 20px; border-radius: 35px; border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6), inset 0 0 20px rgba(255, 255, 255, 0.05);
            text-align: center; max-width: 420px; width: 90%; animation: fadeIn 0.8s ease-out;
            transition: all 0.3s ease; box-sizing: border-box; max-height: 85vh; overflow-y: auto;
            margin-top: 20px; /* 避開頂部按鈕 */
        }
        
        .container::-webkit-scrollbar { display: none; }

        /* 👑 Logo 與標題樣式 */
        .logo-wrapper { position: relative; width: 110px; height: 110px; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; }
        .pulse-ring { position: absolute; width: 100%; height: 100%; border-radius: 50%; border: 4px solid #ffd700; animation: pulse 2s infinite; }
        h1 { font-size: 2.2em; margin: 10px 0; letter-spacing: 2px; background: linear-gradient(to bottom, #ffd700, #f39c12); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .subtitle { font-size: 1.1em; color: #cbd5e1; margin-bottom: 25px; font-weight: bold; letter-spacing: 1px; }

        /* 🟢 感應狀態 Bar */
        .status-badge { display: inline-flex; align-items: center; background: rgba(0, 0, 0, 0.5); padding: 12px 24px; border-radius: 100px; border: 1px solid rgba(255, 215, 0, 0.3); transition: all 0.3s; }
        .status-dot { width: 12px; height: 12px; background: #22c55e; border-radius: 50%; margin-right: 12px; box-shadow: 0 0 10px #22c55e; animation: blink 1.5s infinite; }
        #msg { margin: 0; font-weight: bold; letter-spacing: 1px; color: white; font-size: 15px; }

        /* 👨‍🏫 學生操作面板 (放大字體) */
        #action-ui { display: none; animation: fadeIn 0.4s ease-out; }
        .stu-name { font-size: 30px; font-weight: 900; margin: 0 0 5px 0; color: white; letter-spacing: 2px;}
        .stu-points { font-size: 50px; font-weight: 900; color: #2ecc71; margin: 0 0 5px 0; text-shadow: 0 0 15px rgba(46, 204, 113, 0.4); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);}
        
        /* 📝 點數明細按鈕 */
        .history-btn { font-size: 15px; color: #cbd5e1; text-decoration: underline; cursor: pointer; display: inline-block; margin-bottom: 25px; transition: 0.2s; padding: 5px 15px; }
        .history-btn:hover { color: #ffd700; }

        /* 🎛️ 加扣分控制台 */
        .control-panel { background: rgba(0,0,0,0.3); border-radius: 25px; padding: 25px 20px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .panel-title { font-weight: bold; margin: 0 0 15px 0; font-size: 17px; letter-spacing: 1px; text-align: left; }
        
        .btn-flex-row { display: flex; justify-content: center; gap: 10px; margin-bottom: 15px; }
        .btn-action { flex: 1; padding: 15px 0; border-radius: 14px; border: none; font-size: 18px; font-weight: 900; cursor: pointer; transition: 0.2s; color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .btn-action:active { transform: scale(0.95); box-shadow: none; }
        
        .btn-green { background: linear-gradient(135deg, #27ae60, #2ecc71); }
        .btn-gray { background: #64748b; }
        .btn-red { background: linear-gradient(135deg, #c0392b, #e74c3c); }
        
        .custom-input-group { display: flex; gap: 10px; }
        .custom-input { flex: 1; padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.5); color: white; font-size: 18px; text-align: center; }
        .custom-input::placeholder { color: #94a3b8; }

        .btn-return { background: transparent; border: 1px solid #94a3b8; color: #e2e8f0; padding: 15px; border-radius: 15px; cursor: pointer; transition: 0.2s; font-weight: bold; font-size: 18px; }
        .btn-return:active { background: rgba(255,255,255,0.1); color: white; transform: scale(0.95); }

        /* 📋 彈窗共用設定 */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 10000; align-items: center; justify-content: center; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }
        .modal-content { background: rgba(15, 23, 42, 0.95); width: 90%; max-width: 450px; max-height: 85vh; border-radius: 30px; padding: 30px 25px; text-align: left; border: 1px solid rgba(255, 215, 0, 0.3); box-shadow: 0 15px 40px rgba(0,0,0,0.8); display: flex; flex-direction: column; box-sizing: border-box; }
        .modal-title { text-align: center; color: #ffd700; margin-top: 0; margin-bottom: 20px; font-size: 22px; font-weight: 900; letter-spacing: 1px; }
        .modal-scroll-area { overflow-y: auto; padding-right: 5px; flex: 1; }
        .modal-scroll-area::-webkit-scrollbar { display: none; }

        /* 📝 點數明細清單 */
        .log-row { display: flex; justify-content: space-between; padding: 15px 0; border-bottom: 1px dashed rgba(255,255,255,0.1); font-size: 16px; color: #f8fafc; }
        .log-time { color: #94a3b8; font-size: 13px; margin-right: 10px; }
        .log-plus { color: #2ecc71 !important; font-weight: bold; }
        .log-minus { color: #e74c3c !important; font-weight: bold; }

        /* 🚀 全校進度手風琴 (Accordion) UI */
        .class-group { background: rgba(0,0,0,0.3); border-radius: 18px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 15px; overflow: hidden; transition: 0.3s; }
        .class-header { padding: 18px 20px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-weight: 900; color: #fff; background: rgba(255,255,255,0.05); font-size: 18px; }
        .class-header:active { background: rgba(255,255,255,0.1); }
        .class-unit { font-size: 14px; color: #f1c40f; font-weight: bold; }
        
        .class-body { display: none; padding: 0 18px 18px 18px; background: rgba(0,0,0,0.2); }
        .class-group.active .class-body { display: block; animation: fadeIn 0.3s; }
        .class-group.active .class-header { border-bottom: 1px solid rgba(255,255,255,0.1); background: rgba(255,215,0,0.1); }

        .stu-row { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px dashed rgba(255,255,255,0.05); }
        .stu-row:last-child { border-bottom: none; }
        .s-name { font-size: 16px; font-weight: bold; color: #e2e8f0; }
        .s-count { font-size: 15px; font-weight: 900; padding: 6px 12px; border-radius: 8px; }
        .c-danger { background: rgba(231,76,60,0.2); color: #e74c3c; border: 1px solid #e74c3c; }
        .c-safe { background: rgba(46,204,113,0.2); color: #2ecc71; border: 1px solid #2ecc71; }
        .c-good { background: rgba(241,196,15,0.2); color: #f1c40f; border: 1px solid #f1c40f; }

        @keyframes pulse { 0% { transform: scale(1); opacity: 0.8; } 70% { transform: scale(1.3); opacity: 0; } 100% { transform: scale(1); opacity: 0; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        @keyframes spin { to { transform: rotate(360deg); } }

        .loading .pulse-ring { border-top-color: white; animation: spin 1s linear infinite; }
        .loading .status-dot { background: #ffd700; box-shadow: 0 0 10px #ffd700; animation: none; }
        .error .status-dot { background: #e74c3c; box-shadow: 0 0 10px #e74c3c; animation: none; }

        /* =======================================================
           🚀 平板與大螢幕自動適應 (Responsive Design)
           ======================================================= */
        @media (min-width: 768px) {
            /* 1. 頂部導航按鈕放大 */
            .top-nav { top: 25px; left: 40px; right: 40px; }
            .nav-btn { font-size: 18px; padding: 14px 24px; border-radius: 14px; }
            
            /* 2. 主容器與掃描首頁放大 */
            .container { max-width: 550px; padding: 50px 40px; margin-top: 0; }
            .logo-wrapper { width: 140px; height: 140px; margin-bottom: 30px; }
            .logo-wrapper img { width: 110px !important; }
            h1 { font-size: 3em; }
            .subtitle { font-size: 1.4em; }
            .status-badge { padding: 15px 30px; }
            #msg { font-size: 18px; }
            
            /* 3. 學生操作面板放大 */
            .stu-name { font-size: 40px; margin-bottom: 10px; }
            .stu-points { font-size: 70px; margin-bottom: 15px; }
            .history-btn { font-size: 18px; margin-bottom: 30px; }
            
            /* 4. 加扣分控制台放大 */
            .control-panel { padding: 30px; border-radius: 25px; }
            .panel-title { font-size: 20px; margin-bottom: 18px; }
            .btn-action { font-size: 24px; padding: 18px 0; border-radius: 16px; }
            .custom-input { font-size: 22px; padding: 15px; border-radius: 14px; }
            .custom-input-group .btn-action { flex: 0.4; } 
            
            /* 下方返回按鈕 */
            .btn-return { font-size: 22px; padding: 20px; border-radius: 16px; }
            
            /* 5. 點數明細與班級進度彈窗放大 */
            .modal-content { max-width: 600px; padding: 40px; border-radius: 35px; }
            .modal-title { font-size: 28px; margin-bottom: 25px; }
            .log-row { font-size: 20px; padding: 18px 0; }
            .log-time { font-size: 16px; }
            
            /* 6. 手風琴班級進度放大 */
            .class-header { padding: 20px 25px; font-size: 22px; }
            .class-unit { font-size: 18px; }
            .stu-row { padding: 16px 0; }
            .s-name { font-size: 20px; }
            .s-count { font-size: 18px; padding: 6px 15px; }
        }
    </style>
</head>
<body>

    <div id="unauth-mask" style="position:fixed; inset:0; background:#050000; z-index:9999; display:none; flex-direction:column; align-items:center; justify-content:center; color:#e74c3c;">
        <h1 style="font-size:60px; margin:0; background:none; -webkit-text-fill-color: #e74c3c;">⛔</h1>
        <h2 style="letter-spacing: 2px;">未經授權的存取</h2>
        <p style="color:#7f8c8d;">請使用教師專用 NFC 卡感應進入</p>
    </div>

    <div class="top-nav" id="top-nav">
        <div class="nav-btn" onclick="openProgressModal()">📊 班級進度</div>
        <div class="nav-btn" onclick="adminLogout()">🔒 登出</div>
    </div>

    <div class="container" id="mainCard">
        
        <div id="scan-ui">
            <div class="logo-wrapper">
                <div class="pulse-ring" id="ring"></div>
                <img src="https://cdn.jsdelivr.net/gh/damienkuo123/marian-app@main/assets/logo.webp" style="width:80px; margin: 0 auto; display: block; filter: drop-shadow(0 0 10px rgba(255,215,0,0.3));">
            </div>
            <h1>教師中控台</h1>
            <p class="subtitle">專屬管理員權限</p>
            
            <div class="status-badge" id="statusBadge">
                <div class="status-dot"></div>
                <p id="msg">系統就緒，請感應學生卡</p>
            </div>
        </div>

        <div id="action-ui">
            <h2 class="stu-name" id="stu-name">-</h2>
            <div class="stu-points" id="stu-points">0 PTS</div>
            
            <span class="history-btn" onclick="toggleLogs(true)">點數明細 ⓘ</span>
            
            <div class="control-panel">
                <p class="panel-title" style="color:#2ecc71;">▲ 獎勵加分</p>
                <div class="btn-flex-row">
                    <button class="btn-action btn-green" onclick="send(10, this)">+ 10</button>
                    <button class="btn-action btn-green" onclick="send(50, this)">+ 50</button>
                    <button class="btn-action btn-green" onclick="send(100, this)">+ 100</button>
                </div>
                <div class="custom-input-group">
                    <input type="number" id="customAdd" class="custom-input" placeholder="數值">
                    <button class="btn-action btn-green" style="flex:0.6; padding:10px;" onclick="handleAdd(this)">執行</button>
                </div>

                <hr style="border: 0.5px dashed rgba(255,255,255,0.1); margin: 25px 0;">

                <p class="panel-title" style="color:#e74c3c;">▼ 扣分懲罰</p>
                <div class="btn-flex-row">
                    <button class="btn-action btn-gray" onclick="send(-10, this)">- 10</button>
                    <button class="btn-action btn-gray" onclick="send(-50, this)">- 50</button>
                    <button class="btn-action btn-gray" onclick="send(-100, this)">- 100</button>
                </div>
                <div class="custom-input-group">
                    <input type="number" id="customMinus" class="custom-input" placeholder="數值">
                    <button class="btn-action btn-red" style="flex:0.6; padding:10px;" onclick="handleMinus(this)">執行</button>
                </div>
            </div>
            
            <div style="display: flex; gap: 10px;">
                <button class="btn-return" style="flex:1;" onclick="resetScanner()">🔙 繼續掃描</button>
                <button class="btn-return" style="flex:1; border-color:#3498db; color:#3498db;" onclick="window.location.href='dashboard.html?id=' + currentStudentId + '&view=true'">👀 學生主頁</button>
            </div>
        </div>

        <input type="text" id="scanner" inputmode="none" autofocus style="opacity: 0; position: absolute; top: -100px;">
    </div>

    <div id="logModal" class="modal-overlay" onclick="toggleLogs(false)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3 class="modal-title">📝 最近點數紀錄</h3>
            <div id="log-container" class="modal-scroll-area"></div>
            <button class="btn-action btn-gray" style="margin-top: 15px; padding: 15px;" onclick="toggleLogs(false)">關閉</button>
        </div>
    </div>

    <div id="progressModal" class="modal-overlay" onclick="closeProgressModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3 class="modal-title">📊 各班口說進度</h3>
            <div id="progress-container" class="modal-scroll-area">
                </div>
            <button class="btn-action btn-gray" style="margin-top: 15px; padding: 15px;" onclick="closeProgressModal()">關閉</button>
        </div>
    </div>

    <script>
        // ⚠️ 記得替換為你的 GAS 網址！
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyWm-WnRO5h3dliEPR36Cq1hCf5DgM4GIgJqXVUREclhtYOHjxq9DptApmQPkU5p5Ys/exec";
        
        const params = new URLSearchParams(window.location.search);
        
        // ⏳ 設定授權有效期限：這裡設為 2 小時
        const AUTH_EXPIRE_MS = 2 * 60 * 60 * 1000; 

        if (params.get('secret')) {
            localStorage.setItem('marian_auth', params.get('secret'));
            localStorage.setItem('marian_auth_time', Date.now().toString()); 
            window.history.replaceState(null, null, 'admin.html');
        }

        const authTime = localStorage.getItem('marian_auth_time');
        if (authTime && (Date.now() - parseInt(authTime) > AUTH_EXPIRE_MS)) {
            localStorage.removeItem('marian_auth');
            localStorage.removeItem('marian_auth_time');
            alert("⏳ 安全防護：管理員登入已過期，請重新感應教師卡！");
        }

        const ADMIN_SECRET = localStorage.getItem('marian_auth');
        if (ADMIN_SECRET !== "marian2026") {
            document.getElementById('unauth-mask').style.display = 'flex';
        }

        function adminLogout() {
            if (confirm("確定要登出中控台嗎？登出後需重新感應教師卡。")) {
                localStorage.removeItem('marian_auth');
                localStorage.removeItem('marian_auth_time');
                window.location.reload(); 
            }
        }

        let currentStudentId = null;
        let currentPointsValue = 0; 

        const scanner = document.getElementById('scanner');
        const card = document.getElementById('mainCard');
        const msg = document.getElementById('msg');
        const scanUI = document.getElementById('scan-ui');
        const actionUI = document.getElementById('action-ui');

        const TARGET_ID = params.get('id');
        if (TARGET_ID) {
            currentStudentId = TARGET_ID;
            window.history.replaceState(null, null, 'admin.html');
            card.className = 'container loading';
            msg.innerText = "⏳ 讀取學生資料中...";
            msg.style.color = "#ffd700";
            loadStudentData(currentStudentId);
        }

        let scanTimer;
        
        setInterval(() => {
            const active = document.activeElement;
            if (active.tagName !== 'INPUT' && active.tagName !== 'TEXTAREA') {
                scanner.focus();
            }
        }, 1000);

        scanner.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                clearTimeout(scanTimer);
                const finalID = scanner.value.trim();
                if (finalID.length >= 6) fetchStudent(finalID);
                scanner.value = "";
            }
        });

        scanner.addEventListener('input', function() {
            clearTimeout(scanTimer);
            scanTimer = setTimeout(() => {
                const finalID = scanner.value.trim();
                if (finalID.length >= 6) {
                    fetchStudent(finalID);
                    scanner.value = "";
                }
            }, 200);
        });

        // 🚀 終極優化：只發送一次 API！直接傳送 cardId 給極速版後端
        function fetchStudent(cardId) {
            if (actionUI.style.display === 'block') return;
            
            card.className = 'container loading';
            msg.innerText = "⏳ 讀取學生資料中...";
            msg.style.color = "#ffd700";

            fetch(`${GAS_URL}?action=get_admin_student_data&cardId=${encodeURIComponent(cardId)}&secret=${ADMIN_SECRET}`)
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        currentStudentId = data.uid;
                        renderAdminUI(data); 
                    } else {
                        showError("❌ 查無此學生");
                    }
                })
                .catch(err => showError("⚠️ 網路連線異常"));
        }

        // 🚀 URL 帶有 ID 進入時
        function loadStudentData(uid) {
            fetch(`${GAS_URL}?action=get_admin_student_data&id=${uid}&secret=${ADMIN_SECRET}`)
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        renderAdminUI(data); 
                    } else {
                        showError("❌ 無法讀取資料");
                    }
                })
                .catch(err => showError("⚠️ 網路連線異常"));
        }

        function renderAdminUI(data) {
            card.className = 'container';
            scanUI.style.display = 'none';
            actionUI.style.display = 'block';
            document.getElementById('top-nav').style.display = 'none'; 
            
            document.getElementById('stu-name').innerText = data.studentName;
            
            currentPointsValue = Number(data.currentPoints);
            document.getElementById('stu-points').innerText = `${currentPointsValue} PTS`;

            const logContainer = document.getElementById('log-container');
            if (!data.recentLogs || data.recentLogs.length === 0) {
                logContainer.innerHTML = `<p style="text-align:center; color:#7f8c8d;">尚無紀錄</p>`;
            } else {
                logContainer.innerHTML = data.recentLogs.map(log => {
                    let valClass = log.val >= 0 ? "log-plus" : "log-minus";
                    let valText = log.val >= 0 ? `+${log.val}` : log.val;
                    return `
                    <div class="log-row">
                        <span><span class="log-time">${log.time}</span> ${log.reason || '系統變更'}</span>
                        <span class="${valClass}">${valText} 點</span>
                    </div>`;
                }).join('');
            }
        }

        function toggleLogs(show) { document.getElementById('logModal').style.display = show ? 'flex' : 'none'; }

        function openProgressModal() {
            const modal = document.getElementById('progressModal');
            const container = document.getElementById('progress-container');
            modal.style.display = 'flex';
            container.innerHTML = '<p style="text-align:center; color:#ffd700; margin-top:20px;">⏳ 正在彙調整全校資料...</p>';

            fetch(`${GAS_URL}?action=get_all_progress&secret=${ADMIN_SECRET}`)
                .then(res => res.json())
                .then(data => {
                    if (data.error) { container.innerHTML = `<p style="color:#e74c3c; text-align:center;">${data.error}</p>`; return; }
                    
                    let html = '';
                    for (const classId in data) {
                        const classInfo = data[classId];
                        
                        classInfo.students.sort((a, b) => a.count - b.count);
                        
                        let stuHtml = classInfo.students.map(s => {
                            let badgeClass = "c-safe"; let icon = "✅";
                            if (s.count < 5) { badgeClass = "c-danger"; icon = "⚠️"; }
                            else if (s.count >= 10) { badgeClass = "c-good"; icon = "🔥"; }

                            return `
                            <div class="stu-row">
                                <span class="s-name">${s.name}</span>
                                <span class="s-count ${badgeClass}">${icon} ${s.count} 次</span>
                            </div>`;
                        }).join('');

                        html += `
                        <div class="class-group" onclick="this.classList.toggle('active')">
                            <div class="class-header">
                                <span>🏷️ ${classId}</span>
                                <span class="class-unit">${classInfo.unit} ▾</span>
                            </div>
                            <div class="class-body">
                                ${stuHtml}
                            </div>
                        </div>`;
                    }
                    container.innerHTML = html || '<p style="text-align:center; color:#7f8c8d;">目前尚無班級資料</p>';
                })
                .catch(err => {
                    container.innerHTML = '<p style="text-align:center; color:#e74c3c;">⚠️ 連線失敗</p>';
                });
        }

        function closeProgressModal() { document.getElementById('progressModal').style.display = 'none'; }

        function send(val, btnElement) {
            if (!currentStudentId) return;
            if (val >= 101 && !confirm(`確定要一次給予 ${val} 點嗎？`)) return;
            if (val <= -101 && !confirm(`確定要一次扣除 ${Math.abs(val)} 點嗎？`)) return;

            const allBtns = document.querySelectorAll('.btn-action');
            allBtns.forEach(b => { b.style.pointerEvents = 'none'; b.style.opacity = '0.5'; });
            
            const originalText = btnElement.innerText;
            btnElement.innerText = "⏳";

            fetch(`${GAS_URL}?action=admin_add_points&id=${currentStudentId}&val=${val}&secret=${ADMIN_SECRET}`)
                .then(res => res.json())
                .then(resData => {
                    currentPointsValue += val;
                    const ptsEl = document.getElementById('stu-points');
                    ptsEl.innerText = `${currentPointsValue} PTS`;
                    
                    ptsEl.style.transform = "scale(1.3)";
                    setTimeout(() => ptsEl.style.transform = "scale(1)", 300);

                    loadStudentData(currentStudentId);

                    allBtns.forEach(b => { b.style.pointerEvents = 'auto'; b.style.opacity = '1'; });
                    btnElement.innerText = originalText;
                })
                .catch(err => {
                    alert("加扣分失敗，請檢查網路！");
                    allBtns.forEach(b => { b.style.pointerEvents = 'auto'; b.style.opacity = '1'; });
                    btnElement.innerText = originalText;
                });
        }

        function handleAdd(btnElement) {
            const inputVal = document.getElementById('customAdd').value;
            const val = parseInt(inputVal);
            if (!isNaN(val) && val > 0) {
                send(val, btnElement);
                document.getElementById('customAdd').value = '';
            }
        }

        function handleMinus(btnElement) {
            const inputVal = document.getElementById('customMinus').value;
            const val = parseInt(inputVal);
            if (!isNaN(val) && val > 0) {
                send(-val, btnElement);
                document.getElementById('customMinus').value = '';
            }
        }

        function resetScanner() {
            currentStudentId = null;
            actionUI.style.display = 'none';
            scanUI.style.display = 'block';
            document.getElementById('top-nav').style.display = 'flex'; 
            card.className = 'container';
            msg.innerText = "🟢 系統就緒，請感應學生卡";
            msg.style.color = "white";
            window.history.replaceState(null, null, 'admin.html');
            
            scanner.focus();
        }

        function showError(errorText) {
            card.className = 'container error';
            msg.innerText = errorText;
            msg.style.color = "#e74c3c";
            setTimeout(() => {
                if (actionUI.style.display !== 'block') {
                    card.className = 'container';
                    msg.innerText = "🟢 系統就緒，請感應學生卡";
                    msg.style.color = "white";
                }
            }, 2500);
        }
    </script>
</body>
</html>
