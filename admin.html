<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>瑪麗安中控台 (Admin)</title>
    <style>
        :root {
            /* 🔴 管理員專屬色調：酒紅與奢華金 */
            --primary-color: #ffd700;
            --bg-dark: #1a0505;
            --card-bg: rgba(50, 15, 15, 0.75); 
        }

        body {
            margin: 0; padding: 0; font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background: radial-gradient(circle at center, #3f0f14 0%, var(--bg-dark) 100%);
            height: 100vh; display: flex; align-items: center; justify-content: center;
            color: white; overflow: hidden;
        }

        /* 🔮 玻璃外殼卡片 (完美繼承 index.html) */
        .container {
            position: relative; background: var(--card-bg); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            padding: 50px 30px; border-radius: 40px; border: 1px solid rgba(255, 215, 0, 0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(255, 215, 0, 0.05);
            text-align: center; max-width: 400px; width: 90%; animation: fadeIn 0.8s ease-out;
            transition: all 0.3s ease;
        }

        /* 🍎 Logo 與 動態光環 */
        .logo-wrapper {
            position: relative; width: 120px; height: 120px; margin: 0 auto 30px;
            display: flex; align-items: center; justify-content: center;
        }
        .pulse-ring {
            position: absolute; width: 100%; height: 100%; border-radius: 50%;
            border: 4px solid var(--primary-color); animation: pulse 2s infinite;
        }

        /* 標題與文字 */
        h1 {
            font-size: 2.2em; margin: 10px 0; letter-spacing: 2px;
            background: linear-gradient(to bottom, #ffd700, #f39c12);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .subtitle { font-size: 1.1em; color: #e0a800; margin-bottom: 30px; font-weight: bold; letter-spacing: 1px; }

        /* 狀態提示框 (繼承 index.html) */
        .status-badge {
            display: inline-flex; align-items: center; background: rgba(0, 0, 0, 0.4);
            padding: 12px 24px; border-radius: 100px; border: 1px solid rgba(255, 215, 0, 0.2);
            transition: all 0.3s;
        }
        .status-dot {
            width: 10px; height: 10px; background: #22c55e; border-radius: 50%;
            margin-right: 12px; box-shadow: 0 0 10px #22c55e; animation: blink 1.5s infinite;
        }
        #msg { margin: 0; font-weight: bold; letter-spacing: 1px; color: white; }

        /* =======================================================
           👨‍🏫 管理員專屬：學生操作面板 (取代掃描 UI)
           ======================================================= */
        #action-ui { display: none; animation: fadeIn 0.4s ease-out; }
        .stu-name { font-size: 28px; font-weight: 900; margin: 0 0 5px 0; color: white; letter-spacing: 1px;}
        .stu-points { font-size: 45px; font-weight: 900; color: #2ecc71; margin: 0 0 25px 0; text-shadow: 0 0 15px rgba(46, 204, 113, 0.4); transition: 0.3s;}

        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px; }
        .btn-action { padding: 15px; border-radius: 15px; border: none; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s; color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .btn-action:active { transform: scale(0.95); box-shadow: none; }
        .btn-add { background: linear-gradient(135deg, #27ae60, #2ecc71); }
        .btn-minus { background: linear-gradient(135deg, #c0392b, #e74c3c); }
        
        .custom-input-group { display: flex; gap: 10px; margin-bottom: 25px; }
        .custom-input { flex: 1; padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.3); background: rgba(0,0,0,0.4); color: white; font-size: 16px; text-align: center; }
        .custom-input::placeholder { color: #95a5a6; }

        .btn-return { background: transparent; border: 1px solid #95a5a6; color: #bdc3c7; padding: 10px 20px; border-radius: 10px; cursor: pointer; transition: 0.2s; }
        .btn-return:hover { background: rgba(255,255,255,0.1); color: white; }

        /* =======================================================
           ✨ 動畫效果 (完美繼承)
           ======================================================= */
        @keyframes pulse { 0% { transform: scale(1); opacity: 0.8; } 70% { transform: scale(1.3); opacity: 0; } 100% { transform: scale(1); opacity: 0; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* 載入中與錯誤狀態的提示燈變色 */
        .loading .pulse-ring { border-top-color: white; animation: spin 1s linear infinite; }
        .loading .status-dot { background: var(--primary-color); box-shadow: 0 0 10px var(--primary-color); animation: none; }
        .error .status-dot { background: #e74c3c; box-shadow: 0 0 10px #e74c3c; animation: none; }
    </style>
</head>
<body>

    <div id="unauth-mask" style="position:fixed; inset:0; background:#050000; z-index:9999; display:none; flex-direction:column; align-items:center; justify-content:center; color:#e74c3c;">
        <h1 style="font-size:60px; margin:0; background:none; -webkit-text-fill-color: #e74c3c;">⛔</h1>
        <h2 style="letter-spacing: 2px;">未經授權的存取</h2>
        <p style="color:#7f8c8d;">請使用教師專用 NFC 卡感應進入</p>
    </div>

    <div class="container" id="mainCard">
        
        <div id="scan-ui">
            <div class="logo-wrapper">
                <div class="pulse-ring" id="ring"></div>
                <img src="https://cdn.jsdelivr.net/gh/damienkuo123/marian-app@main/assets/logo.webp" style="width:90px; margin: 0 auto; display: block; filter: drop-shadow(0 0 10px rgba(255,215,0,0.3));">
            </div>
            <h1>瑪麗安中控台</h1>
            <p class="subtitle">教師專屬管理權限</p>
            
            <div class="status-badge" id="statusBadge">
                <div class="status-dot"></div>
                <p id="msg">🟢 系統就緒，請感應學生卡</p>
            </div>
        </div>

        <div id="action-ui">
            <h2 class="stu-name" id="stu-name">-</h2>
            <div class="stu-points" id="stu-points">0 PTS</div>
            
            <div class="btn-grid">
                <button class="btn-action btn-add" onclick="modifyPoints(50)">+ 50</button>
                <button class="btn-action btn-add" onclick="modifyPoints(10)">+ 10</button>
                <button class="btn-action btn-minus" onclick="modifyPoints(-50)">- 50</button>
                <button class="btn-action btn-minus" onclick="modifyPoints(-10)">- 10</button>
            </div>
            
            <div class="custom-input-group">
                <input type="number" id="custom-val" class="custom-input" placeholder="輸入自訂數值">
                <button class="btn-action btn-add" style="flex:0.8;" onclick="modifyCustomPoints()">執行</button>
            </div>
            
            <div class="custom-input-group">
                <input type="number" id="custom-val" class="custom-input" placeholder="輸入自訂數值">
                <button class="btn-action btn-add" style="flex:0.8;" onclick="modifyCustomPoints()">執行</button>
            </div>
            
            <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                <button class="btn-return" style="flex:1;" onclick="resetScanner()">🔙 繼續掃描</button>
                <button class="btn-return" style="flex:1; border-color: #3498db; color: #3498db;" onclick="window.location.href='dashboard.html?id=' + currentStudentId + '&view=true'">👀 查看學生主頁</button>
            </div>
        </div>

        <input type="text" id="scanner" autofocus style="opacity: 0; position: absolute; top: -100px;">
    </div>

    <script>
        // ⚠️ 記得替換為你的 GAS 網址！
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyWm-WnRO5h3dliEPR36Cq1hCf5DgM4GIgJqXVUREclhtYOHjxq9DptApmQPkU5p5Ys/exec";
        
        const params = new URLSearchParams(window.location.search);
        
        // 🛡️ 1. 記憶老師身分 (老師掃自己的卡時觸發)
        if (params.get('secret')) {
            localStorage.setItem('marian_auth', params.get('secret'));
            // 淨化網址，把密碼藏起來，學生偷看手機也看不到密碼！
            window.history.replaceState(null, null, 'admin.html');
        }

        const ADMIN_SECRET = localStorage.getItem('marian_auth');
        if (ADMIN_SECRET !== "marian2026") {
            document.getElementById('unauth-mask').style.display = 'flex';
        }

        let currentStudentId = null;
        const scanner = document.getElementById('scanner');
        const card = document.getElementById('mainCard');
        const msg = document.getElementById('msg');
        const scanUI = document.getElementById('scan-ui');
        const actionUI = document.getElementById('action-ui');

        // 🚀 2. 接收瞬間傳送 (手機 NFC 掃描學生卡時觸發)
        const TARGET_ID = params.get('id');
        if (TARGET_ID) {
            currentStudentId = TARGET_ID;
            
            // 為了網址乾淨，把 id 也抹掉，這樣重新整理才不會卡住
            window.history.replaceState(null, null, 'admin.html');
            
            // 切換為載入 UI
            card.className = 'container loading';
            msg.innerText = "⏳ 讀取學生資料中...";
            msg.style.color = "#ffd700";
            
            // 直接跳過查卡號步驟，呼叫載入點數函數！
            loadStudentData(currentStudentId);
        }

        let scanTimer;

        // 焦點鎖定 (保留給外接 USB 掃描器使用)
        document.addEventListener('click', () => scanner.focus());
        setInterval(() => scanner.focus(), 1000);
        

        // 🚀 雙重觸發攔截器 (Enter 與 停頓)
        scanner.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                clearTimeout(scanTimer);
                const finalID = scanner.value.trim();
                if (finalID.length >= 6) fetchStudent(finalID);
                scanner.value = "";
            }
        });

        scanner.addEventListener('input', function() {
            clearTimeout(scanTimer);
            scanTimer = setTimeout(() => {
                const finalID = scanner.value.trim();
                if (finalID.length >= 6) {
                    fetchStudent(finalID);
                    scanner.value = "";
                }
            }, 200);
        });

        // 🔍 第一步：查卡號並獲取資料
        function fetchStudent(cardId) {
            if (actionUI.style.display === 'block') return; // 防呆：如果正在加分畫面，忽略新的掃描
            
            // UI 切換為載入中 (繼承 index.html 特效)
            card.className = 'container loading';
            msg.innerText = "⏳ 讀取學生資料中...";
            msg.style.color = "#ffd700";

            fetch(`${GAS_URL}?action=verify_card&cardId=${encodeURIComponent(cardId)}`)
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        currentStudentId = data.uid;
                        loadStudentData(currentStudentId);
                    } else {
                        showError("❌ 查無此學生");
                    }
                })
                .catch(err => showError("⚠️ 網路連線異常"));
        }

        // 📊 第二步：載入點數與姓名，切換操作面板
        function loadStudentData(uid) {
            fetch(`${GAS_URL}?action=get_dashboard_data&id=${uid}&secret=${ADMIN_SECRET}`)
                .then(res => res.json())
                .then(data => {
                    // 切換至學生操作 UI
                    card.className = 'container';
                    scanUI.style.display = 'none';
                    actionUI.style.display = 'block';
                    
                    document.getElementById('stu-name').innerText = data.studentName;
                    document.getElementById('stu-points').innerText = `${data.currentPoints} PTS`;
                })
                .catch(err => showError("⚠️ 無法讀取資料"));
        }

        // 💰 第三步：執行加扣分
        function modifyPoints(val) {
            if (!currentStudentId) return;
            if (val >= 101 && !confirm(`確定要一次給予 ${val} 點嗎？`)) return;
            if (val <= -101 && !confirm(`確定要一次扣除 ${Math.abs(val)} 點嗎？`)) return;

            const btns = document.querySelectorAll('.btn-action');
            btns.forEach(b => b.style.pointerEvents = 'none');

            // 呼叫 GAS 加扣分 API，附上鑰匙
            fetch(`${GAS_URL}?action=admin_add_points&id=${currentStudentId}&val=${val}&secret=${ADMIN_SECRET}`)
                .then(res => res.json())
                .then(resData => {
                    // 重新載入最新點數
                    loadStudentData(currentStudentId);
                    btns.forEach(b => b.style.pointerEvents = 'auto');
                    
                    // 數字彈跳特效
                    const ptsEl = document.getElementById('stu-points');
                    ptsEl.style.transform = "scale(1.2)";
                    setTimeout(() => ptsEl.style.transform = "scale(1)", 300);
                })
                .catch(err => {
                    alert("加扣分失敗，請檢查網路！");
                    btns.forEach(b => b.style.pointerEvents = 'auto');
                });
        }

        function modifyCustomPoints() {
            const inputVal = document.getElementById('custom-val').value;
            const val = parseInt(inputVal);
            if (!isNaN(val) && val !== 0) {
                modifyPoints(val);
                document.getElementById('custom-val').value = '';
            }
        }

        // 🔄 重新準備掃描下一個學生
        function resetScanner() {
            currentStudentId = null;
            actionUI.style.display = 'none';
            scanUI.style.display = 'block';
            
            // 恢復待命 UI
            card.className = 'container';
            msg.innerText = "🟢 系統就緒，請感應學生卡";
            msg.style.color = "white";
            
            // 🚀 確保網址是乾淨的，不會影響下次掃描
            window.history.replaceState(null, null, 'admin.html');
            
            scanner.focus();
        }

        function showError(errorText) {
            card.className = 'container error';
            msg.innerText = errorText;
            msg.style.color = "#e74c3c";
            setTimeout(() => {
                if (actionUI.style.display !== 'block') {
                    card.className = 'container';
                    msg.innerText = "🟢 系統就緒，請感應學生卡";
                    msg.style.color = "white";
                }
            }, 2500);
        }
    </script>
</body>
</html>
