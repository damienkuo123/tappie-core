<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
  <title>瑪麗安口說挑戰室</title>
  <style>
    :root { --primary-blue: #0066cc; --marian-yellow: #ff9900; --marian-red: #d63031; --marian-green: #27ae60; --dark-gray: #2d3436; }
    body { font-family: -apple-system, sans-serif; text-align: center; padding: 20px; background: #eaeff2; margin: 0; user-select: none; -webkit-user-select: none; -webkit-touch-callout: none; }
    .card { background: white; padding: 25px; border-radius: 28px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); max-width: 400px; margin: 10px auto; border: 1px solid #ddd; }
    #record-btn { background: var(--marian-red); width: 110px; height: 110px; border-radius: 50%; border: 8px solid white; font-size: 45px; box-shadow: 0 6px 15px rgba(214, 48, 49, 0.4); margin: 20px auto; cursor: pointer; display: none; outline: none; }
    #record-btn.active { transform: scale(0.95); background: #333; animation: pulse 1s infinite; }
    @keyframes pulse { 0% { box-shadow: 0 0 0 0px rgba(214, 48, 49, 0.4); } 100% { box-shadow: 0 0 0 20px rgba(214, 48, 49, 0); } }
    .btn-play { background: var(--primary-blue); width: 45px; height: 45px; border-radius: 50%; border: none; color: white; font-size: 20px; cursor: pointer; margin-left: 10px; vertical-align: middle; box-shadow: 0 3px 6px rgba(0,0,0,0.1); }
    .btn { padding: 12px 25px; border-radius: 12px; font-weight: bold; border: none; cursor: pointer; color: white; margin: 5px; box-shadow: 0 4px 0 rgba(0,0,0,0.2); }
    .btn-nav { background: #4b6584; border-bottom: 4px solid #2c3e50; }
    .btn-nav:disabled { background: #ccc; border-bottom: none; }
    .btn-finish { width: 100%; font-size: 22px; padding: 20px; margin-top: 20px; border-bottom: 5px solid rgba(0,0,0,0.2); transition: 0.3s; }
    .btn-finish:disabled { background: #636e72 !important; cursor: not-allowed; border-bottom: none; opacity: 0.7; }
    .progress-bar { width: 100%; background: #dfe6e9; height: 12px; border-radius: 6px; margin-bottom: 20px; overflow: hidden; border: 1px solid #ccc; }
    .progress-fill { background: var(--primary-blue); height: 100%; width: 0%; transition: 0.5s; }
    table { width: 100%; border-collapse: collapse; margin-top: 15px; background: #fff; border-radius: 10px; overflow: hidden; }
    td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
    .score-badge { float: right; font-weight: bold; color: var(--primary-blue); font-size: 18px; }
    .btn-re { background: var(--marian-red); font-size: 13px; padding: 6px 12px; border-radius: 8px; color: white; border: none; cursor: pointer; font-weight: bold; }
    #zh-display { font-size: 20px; color: #7f8c8d; margin: -10px 0 20px 0; font-weight: bold; }

      /* ⚔️ 史詩戰場 3.0：絕對顯影與層級鎖定 */
    #battle-arena { 
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
      background: radial-gradient(circle, #1a2a3a 0%, #000 100%); 
      z-index: 2000; color: white; display: none; overflow: hidden; 
      flex-direction: column; justify-content: space-between; padding: 4vh 15px; box-sizing: border-box;
    }
  
    /* 能量對抗線 */
    #arena-divide-line {
      position: absolute; left: 0; width: 100%; height: 3px;
      background: linear-gradient(90deg, transparent, #ffd700, transparent);
      top: 38%; z-index: 2; box-shadow: 0 0 15px #ffd700;
      transform: scaleX(0); transition: 0.8s;
    }
    .battle-ready #arena-divide-line { transform: scaleX(1); }
  
    /* 🦸 英雄立繪容器 (置於文字後方) */
    .vs-container {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 1; /* 關鍵：設為 1，文字 UI 設為 10 */
    }
  
    .vs-hero {
      position: absolute; width: 80%; height: 50vh; 
      background-size: contain; background-repeat: no-repeat;
      transition: 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      opacity: 0;
    }
  
    #vs-host { bottom: 0; left: -10%; background-position: left bottom; transform: translateX(-100%); }
    #vs-guest { top: calc(38% - 48vh); right: -10%; background-position: right bottom; transform: translateX(100%); }
  
    .battle-ready #vs-host { transform: translateX(0); opacity: 0.5; }
    .battle-ready #vs-guest { transform: translateX(0); opacity: 0.5; }
  
    /* 中央 VS 圖標 */
    .vs-mid {
      position: absolute; left: 50%; top: 38%;
      transform: translate(-50%, -50%) scale(0); transition: 0.5s 0.8s;
      z-index: 3; width: 60px; height: 60px; background: #d63031;
      border: 3px solid #ffd700; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; font-weight: 900; color: white; opacity: 0;
    }
    .battle-ready .vs-mid { transform: translate(-50%, -50%) scale(1); opacity: 1; }
  
    /* 確保原本的 UI 浮在立繪上面 */
    .arena-section, .stage-zone, #battle-controls { position: relative; z-index: 10; pointer-events: auto; }
  </style>
</head>
<body>

<div class="card" id="main-card">
  <div id="progress-container" class="progress-bar" style="display:none;"><div id="progress-fill" class="progress-fill"></div></div>
  <div id="setup-zone">
    <h2 id="title-text" style="color:var(--primary-blue);">🎙️ 瑪麗安口說挑戰</h2>
    <p id="info-text">正在開啟麥克風...</p>
    <button class="btn" style="background:var(--primary-blue); font-size: 22px; padding: 18px 40px; border-bottom: 4px solid #003366;" id="start-btn" style="display:none;">開始挑戰</button>
  </div>
  <div id="studio" style="display:none;">
    <p style="color:var(--primary-blue); font-weight:bold;">第 <span id="idx-display">1</span> / <span id="total-display">0</span> 題</p>
    <div style="display: flex; align-items: center; justify-content: center; margin: 15px 0;">
      <h1 id="word-display" style="font-size: 46px; color:#0d47a1; margin: 0; text-shadow: 1px 1px 0 #fff;">載入中...</h1>
      <button id="play-btn" class="btn-play">🔊</button>
    </div>
    <div id="zh-display"></div>
    <button type="button" id="record-btn" oncontextmenu="return false;">🎤</button>
    <p id="status" style="font-weight:bold; color:#636e72;">按住錄音，放開打分</p>
    <div id="feedback" style="font-size: 26px; font-weight: 800; color: var(--marian-green); margin-top: 10px;"></div>
    <div style="margin-top: 30px; display:flex; justify-content:center;">
      <button class="btn btn-nav" id="prev-btn">◀ 上一題</button>
      <button class="btn btn-nav" id="next-btn">下一題 ▶</button>
      <button class="btn btn-nav" id="back-summary-btn" style="display:none; background:var(--marian-green); border-bottom:4px solid #1e8449;">返回結算頁</button>
    </div>
  </div>
  <div id="summary" style="display:none;">
    <h2 id="summary-title" style="color:var(--primary-blue); margin-bottom:5px;">學習總結</h2>
    <div id="score-zone">
      <p style="margin:0; color:#636e72;">平均分數</p>
      <div style="font-size: 64px; font-weight: 900; color:var(--marian-red);" id="total-avg">0</div>
      <p id="reward-hint" style="font-size: 18px; font-weight: bold; padding: 10px; border-radius: 10px;"></p>
    </div>
    <table id="word-list"></table>
    <button class="btn btn-finish" id="submit-btn" disabled>完成挑戰並領獎</button>
    <p id="lock-msg" style="color:var(--marian-red); font-size:14px; margin-top:10px; font-weight:bold;"></p>
  </div>
</div>

<div id="battle-portal-overlay" style="display:none;">
  <div class="portal-box">
    <h2 style="color:var(--gold); margin-top:0;">⚔️ 傳送至戰場</h2>
    <div class="portal-timer" id="portal-countdown">60</div>
    <div id="vs-names-portal" style="color:white; font-weight:bold; margin-bottom:15px;">載入對手資訊...</div>
    <button class="btn" style="background:var(--marian-green); width:100%; font-size:20px;" onclick="portalJump()">🚀 立即進入</button>
  </div>
</div>

<div id="battle-arena">
  <div id="arena-divide-line"></div>
  <div class="vs-container">
    <div id="vs-host" class="vs-hero"></div>
    <div class="vs-mid">VS</div>
    <div id="vs-guest" class="vs-hero"></div>
  </div>

  <div class="arena-section opponent-zone">
    <div style="font-size:12px; color:#aaa; font-weight:bold; letter-spacing:2px;">對手 OPPONENT</div>
    <div id="op-name" class="arena-p-name" style="color:var(--marian-red);">連線中...</div>
    <div id="op-rounds" style="display:flex; justify-content:center; gap:8px;"></div>
  </div>

  <div class="arena-section stage-zone">
    <div id="round-num" style="color:#aaa; font-size: 16px; font-weight:bold;">第 1 局 / 先得 5 分獲勝</div>
    <h1 id="target-word" style="font-size:11vw; margin:10px 0; text-shadow:0 0 20px #000;">戰鬥準備...</h1>
    <div id="battle-timer" style="font-size:15vw; font-weight:900; color:var(--gold); min-height:80px;">60</div>
    <p id="battle-info" style="color:#888;">正在等待雙方就緒...</p>
  </div>

  <div class="arena-section player-zone">
    <div id="my-rounds" style="display:flex; justify-content:center; gap:8px; margin-bottom:5px;"></div>
    <div id="my-name" class="arena-p-name" style="color:var(--marian-green);">YOU</div>
    <div style="font-size:12px; color:#aaa; font-weight:bold;">玩家 PLAYER</div>
    <div id="battle-controls">
      <button id="battle-record-btn" oncontextmenu="return false;">🎤</button>
    </div>
  </div>
</div>

<div id="impact-overlay">
  <div style="font-size:24px; color:#aaa; font-weight:bold; margin-bottom:10px;" id="impact-title">局數結算</div>
  <h1 id="impact-result" style="font-size:64px; text-shadow:0 0 30px #fff; margin:0; line-height:1.2;">獲勝！</h1>
  <div style="font-size:56px; margin:30px 0; font-weight:900; display:flex; align-items:center; justify-content:center; gap:20px;">
    <span id="impact-my-score" style="color:var(--marian-green);">0</span> 
    <span style="font-size:30px; color:#888;">VS</span> 
    <span id="impact-op-score" style="color:var(--marian-red);">0</span>
  </div>
  <p id="impact-subtitle" style="font-size:18px; color:#ccc;"></p>
</div>

<script>
  // 🔗 您的最新專用 GAS 網址
  const GAS_URL = "https://script.google.com/macros/s/AKfycbyWm-WnRO5h3dliEPR36Cq1hCf5DgM4GIgJqXVUREclhtYOHjxq9DptApmQPkU5p5Ys/exec";
  const params = new URLSearchParams(window.location.search);
  const STUDENT_ID = params.get('id') || "S001";
  const TARGET_UNIT = params.get('unit') || "";
  const MODE = params.get('mode') || "challenge";
  const ROOM_ID = params.get('roomId');

  // 全域變數宣告
  let stream, mediaRecorder, chunks = [], quizData = [], scores = [], currentIndex = 0, isReReading = false;
  let audioContext, analyser, dataArray, source, gradingInterval;
  let maxVolume = 0;

  // 對戰室專用變數
  let battleQuizArr = [], currentBattleRound = 0;
  let readyTimer = null, currentLimitTimer = null, waitOpTimer = null, syncTimer = null; 
  let myTotalWins = 0, opTotalWins = 0;
  let roundSubmitted = false, isChecking = false, opponentWaitTimer = null;

  function normalizeStr(val) { if (!val) return ""; return String(val).replace(/(%20|\s)+/ig, "").toUpperCase(); }

  // 📝 儲存原版啟動邏輯
  const originalOnload = async () => {
    if(MODE === 'review') document.getElementById('title-text').innerText = "📖 自由練習模式";
    try {
      stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      audioContext = new (window.AudioContext || window.webkitAudioContext)();
      analyser = audioContext.createAnalyser();
      source = audioContext.createMediaStreamSource(stream);
      source.connect(analyser);
      analyser.fftSize = 256;
      dataArray = new Uint8Array(analyser.frequencyBinCount);

      document.getElementById('info-text').innerText = "麥克風已就緒";
      document.getElementById('start-btn').style.display = 'inline-block';
    } catch (e) { alert("請開啟麥克風權限"); }
  };

  // 🚪 核心路由入口
  window.onload = async () => {
    if (MODE === 'battle' && ROOM_ID) {
      try {
        stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        // ... (音訊初始化代碼保持原本的) ...
        
        document.getElementById('main-card').style.display = 'none';
        
        // 🚀 修復：先顯示傳送門倒數
        const portal = document.getElementById('battle-portal-overlay');
        portal.style.display = 'flex';
        let pCount = 60;
        const pTimer = setInterval(() => {
          pCount--;
          document.getElementById('portal-countdown').innerText = pCount;
          if(pCount <= 0) { clearInterval(pTimer); location.reload(); }
        }, 1000);

        // 🚀 去抓對戰數據與圖片
        fetch(`${GAS_URL}?action=get_battle_status&roomId=${ROOM_ID}&t=${new Date().getTime()}`)
          .then(res => res.json()).then(data => {
            document.getElementById('vs-names-portal').innerText = `${data.hostName} VS ${data.guestName}`;
            
            // 塞圖片到戰場容器
            if(data.hostImg) document.getElementById('vs-host').style.backgroundImage = `url('${data.hostImg}')`;
            if(data.guestImg) document.getElementById('vs-guest').style.backgroundImage = `url('${data.guestImg}')`;
            if(data.guestId === "AI_BOT") document.getElementById('vs-guest').style.backgroundImage = `url('https://cdn-icons-png.flaticon.com/512/4712/4712139.png')`;
          });

        // 點擊立即傳送後的操作
        window.portalJump = () => {
          clearInterval(pTimer);
          portal.style.display = 'none';
          document.getElementById('battle-arena').style.display = 'flex';
          // 啟動立繪滑入動畫
          setTimeout(() => { document.getElementById('battle-arena').classList.add('vs-active'); }, 200);
          fetchBattleDataAndStart(ROOM_ID);
        };

      } catch(err) { alert("請開啟麥克風權限才能對戰！"); }
    } else {
      await originalOnload();
    }
  };

  // =======================================================
  // 🔒 原版練習功能
  // =======================================================
  document.getElementById('start-btn').onclick = () => {
    document.getElementById('info-text').innerText = "正在載入題目...";
    fetch(`${GAS_URL}?id=${STUDENT_ID}&action=get_data&unit=${encodeURIComponent(TARGET_UNIT)}`)
      .then(res => res.json()).then(data => {
        if (!data.words || data.words.length === 0) { alert("題目為空"); return; }
        quizData = data.words; scores = new Array(quizData.length).fill(null);
        document.getElementById('total-display').innerText = quizData.length;
        document.getElementById('setup-zone').style.display = 'none';
        document.getElementById('progress-container').style.display = 'block';
        document.getElementById('studio').style.display = 'block';
        renderWord();
      }).catch(err => { alert("連線失敗！"); });
  };

  function renderWord() {
    const current = quizData[currentIndex];
    document.getElementById('idx-display').innerText = currentIndex + 1;
    document.getElementById('word-display').innerText = current.en;
    document.getElementById('zh-display').innerText = current.zh;
    document.getElementById('feedback').innerText = scores[currentIndex] !== null ? "得分：" + scores[currentIndex] : "";
    document.getElementById('record-btn').style.display = 'block';
    document.getElementById('progress-fill').style.width = (((currentIndex + 1) / quizData.length) * 100) + "%";
    if (isReReading) {
      document.getElementById('prev-btn').style.display = 'none';
      document.getElementById('next-btn').style.display = 'none';
      document.getElementById('back-summary-btn').style.display = 'inline-block';
    } else {
      document.getElementById('prev-btn').style.display = 'inline-block';
      document.getElementById('next-btn').style.display = 'inline-block';
      document.getElementById('back-summary-btn').style.display = 'none';
      document.getElementById('prev-btn').disabled = currentIndex === 0;
      document.getElementById('next-btn').innerText = currentIndex === quizData.length - 1 ? "查看結算" : "下一題 ▶";
    }
  }

  const rb = document.getElementById('record-btn');
  if(rb) {
    rb.onpointerdown = (e) => {
      e.preventDefault(); document.getElementById('feedback').innerHTML = ""; maxVolume = 0; chunks = [];
      mediaRecorder = new MediaRecorder(stream);
      mediaRecorder.ondataavailable = ev => chunks.push(ev.data);
      mediaRecorder.start(); rb.classList.add('active');
      document.getElementById('status').innerText = "正在錄音...";
      const checkVol = () => { if (mediaRecorder.state === "recording") { analyser.getByteFrequencyData(dataArray); let v = 0; for (let i = 0; i < dataArray.length; i++) v += dataArray[i]; if ((v / dataArray.length) > maxVolume) maxVolume = (v / dataArray.length); requestAnimationFrame(checkVol); } }; checkVol();
    };
    rb.onpointerup = () => {
      if (!mediaRecorder || mediaRecorder.state !== "recording") return;
      mediaRecorder.stop(); rb.classList.remove('active');
      if (maxVolume < 30) { document.getElementById('status').innerText = "太小聲了！"; return; }
      let dots = 0; gradingInterval = setInterval(() => { dots = (dots + 1) % 4; document.getElementById('status').innerText = "老師評分中" + ".".repeat(dots); }, 400);
      mediaRecorder.onstop = () => {
        const reader = new FileReader(); reader.readAsDataURL(new Blob(chunks, { type: 'audio/webm' }));
        reader.onloadend = () => {
          const base64 = reader.result.split(',')[1];
          fetch(`${GAS_URL}?action=evaluate_speech&word=${encodeURIComponent(quizData[currentIndex].en)}`, { method: 'POST', body: base64 })
            .then(res => res.json()).then(data => {
              clearInterval(gradingInterval); scores[currentIndex] = data.score;
              if(!window.feedbacks) window.feedbacks = []; window.feedbacks[currentIndex] = data.feedback;
              document.getElementById('feedback').innerHTML = `得分：${data.score}<br><small>${data.feedback}</small>`;
              document.getElementById('status').innerText = "按住錄音，放開打分";
            }).catch(() => { clearInterval(gradingInterval); document.getElementById('status').innerText = "評分失敗"; });
        };
      };
    };
  }

  document.getElementById('play-btn').onclick = () => { window.speechSynthesis.cancel(); const msg = new SpeechSynthesisUtterance(quizData[currentIndex].en); msg.lang = 'en-US'; window.speechSynthesis.speak(msg); };
  document.getElementById('prev-btn').onclick = () => { if(currentIndex > 0){ currentIndex--; renderWord(); } };
  document.getElementById('next-btn').onclick = () => { if (currentIndex < quizData.length - 1) { currentIndex++; renderWord(); } else { showSummary(); } };
  document.getElementById('back-summary-btn').onclick = () => { isReReading = false; showSummary(); };

  function showSummary() {
    document.getElementById('studio').style.display = 'none';
    document.getElementById('summary').style.display = 'block';
    let sum = 0, count = 0;
    const list = document.getElementById('word-list');
    list.innerHTML = "";

    quizData.forEach((item, i) => {
      let s = scores[i] || 0;
      let f = (window.feedbacks && window.feedbacks[i]) ? window.feedbacks[i] : "尚未錄音";
      sum += s; count++;
      // 🛡️ 恢復清單中的詳細回饋與顏色
      list.innerHTML += `<tr><td><b style="color:#0d47a1">${item.en}</b><br><span style="color:#7f8c8d; font-size:14px">${item.zh}</span><br><p style="margin:5px 0; font-size:13px; color:#e67e22;">💡 ${f}</p><button class="btn-re" onclick="reRead(${i})">🔄 重唸</button></td><td><span class="score-badge">${s} 分</span></td></tr>`;
    });

    const avg = Math.round(sum / count);
    document.getElementById('total-avg').innerText = avg;

    const submitBtn = document.getElementById('submit-btn');
    const lockMsg = document.getElementById('lock-msg');
    const rewardHint = document.getElementById('reward-hint');

    if (MODE === 'review') {
      submitBtn.disabled = false;
      submitBtn.style.backgroundColor = "var(--marian-green)";
      submitBtn.innerText = "完成練習";
      document.getElementById('score-zone').style.display = "none";
      rewardHint.innerText = "練習模式不計入點數";
      lockMsg.innerText = "";
    } else {
      document.getElementById('score-zone').style.display = "block";
      if (avg >= 70) {
        submitBtn.disabled = false;
        submitBtn.style.backgroundColor = "#27ae60"; // 恢復及格綠
        lockMsg.innerText = "";
        let reward = avg >= 90 ? 50 : (avg >= 80 ? 30 : 10);
        rewardHint.innerText = `🎁 可獲得：${reward} 點`; // 恢復點數預告
      } else {
        submitBtn.disabled = true;
        submitBtn.style.backgroundColor = "#636e72"; // 恢復不及格灰
        lockMsg.innerText = "❌ 平均需達 70 分才能領獎"; // 恢復警告
        rewardHint.innerText = "";
      }
    }
  }
  function reRead(i) { currentIndex = i; isReReading = true; document.getElementById('summary').style.display = 'none'; document.getElementById('studio').style.display = 'block'; renderWord(); }
  document.getElementById('submit-btn').onclick = () => {
    const avg = parseInt(document.getElementById('total-avg').innerText);
    fetch(`${GAS_URL}?id=${STUDENT_ID}&action=add_score&score=${avg}&mode=${MODE}`)
      .then(() => { 
        // 🛡️ 恢復原本溫暖的提示文字
        alert(MODE === 'review' ? "👍 練習辛苦了！" : "🎉 挑戰完成！"); 
        window.location.href = `${GAS_URL}?id=${STUDENT_ID}`; 
      });
  };

  // =======================================================
  // ⚔️ 對戰室外掛引擎
  // =======================================================
  function fetchBattleDataAndStart(roomId) {
    fetch(`${GAS_URL}?action=get_battle_status&roomId=${roomId}&t=${new Date().getTime()}`)
      .then(res => res.json()).then(data => {
        if(data.status === "NotFound") { alert("房間失效"); window.location.href = `${GAS_URL}?id=${STUDENT_ID}`; return; }
        battleQuizArr = data.quiz; 
        initArena(roomId);
      });
  }

  function initArena(roomId) {
    currentBattleRound = 0;
    document.getElementById('target-word').innerText = "戰場同步中...";
    document.getElementById('battle-timer').innerText = "60";
    // 🛡️ 偵探修正：同步時就顯示規則
    document.getElementById('round-num').innerText = "規則：先得 5 分者勝";
    document.getElementById('battle-info').innerText = "正在等待雙方就緒...";
    document.getElementById('battle-controls').style.visibility = 'hidden';
    
    fetch(`${GAS_URL}?action=arena_ready&id=${STUDENT_ID}&roomId=${roomId}&t=${new Date().getTime()}`)
      .then(() => {
        let waitCount = 60;
        if(syncTimer) clearInterval(syncTimer);
        syncTimer = setInterval(() => {
          waitCount--;
          document.getElementById('battle-timer').innerText = waitCount;
          fetch(`${GAS_URL}?action=get_battle_status&roomId=${roomId}&t=${new Date().getTime()}`)
            .then(res => res.json()).then(data => {
              if (data.hostScores.length > 0 && data.guestScores.length > 0) {
                clearInterval(syncTimer);
                updateArenaUI(roomId, true); 
                startRoundCountdown(roomId);
              }
              if (data.status === "Canceled") { clearInterval(syncTimer); alert("對戰取消"); window.location.href = `${GAS_URL}?id=${STUDENT_ID}`; }
            });
          if (waitCount <= 0) { clearInterval(syncTimer); alert("等待超時"); window.location.href = `${GAS_URL}?id=${STUDENT_ID}`; }
        }, 2000);
      });
  }

  function updateArenaUI(roomId, isInit = false) {
    fetch(`${GAS_URL}?action=get_battle_status&roomId=${roomId}&t=${new Date().getTime()}`)
      .then(res => res.json()).then(data => {
        // 1. 設定名字
        const isMeHost = (normalizeStr(STUDENT_ID) === normalizeStr(data.hostId));
        document.getElementById('my-name').innerText = isMeHost ? data.hostName : (data.guestName || "挑戰者");
        document.getElementById('op-name').innerText = isMeHost ? (data.guestName || "對手") : data.hostName;

        // 2. 🚀 注入圖片 (使用後端回傳的 hostImg / guestImg)
        const hostHero = document.getElementById('vs-host');
        const guestHero = document.getElementById('vs-guest');
        
        if(data.hostImg) hostHero.style.backgroundImage = `url('${data.hostImg}')`;
        if(data.guestImg) guestHero.style.backgroundImage = `url('${data.guestImg}')`;
        
        // AI 特殊頭像補位
        if (data.guestId === "AI_BOT") guestHero.style.backgroundImage = `url('https://cdn-icons-png.flaticon.com/512/4712/4712139.png')`;

        // 3. 啟動視覺動畫
        document.getElementById('battle-arena').classList.add('battle-ready');

        // 4. 更新分數點點 (維持原本邏輯)
        const hS = data.hostScores.filter(s => s !== -1);
        const gS = data.guestScores.filter(s => s !== -1);
        myTotalWins = 0; opTotalWins = 0;
        const commonLen = Math.min(hS.length, gS.length);
        for(let i=0; i < commonLen; i++) { 
           if(hS[i] > gS[i]) isMeHost ? myTotalWins++ : opTotalWins++; 
           else if(gS[i] > hS[i]) isMeHost ? opTotalWins++ : myTotalWins++; 
        }
        document.getElementById('my-rounds').innerHTML = renderDots(myTotalWins, true);
        document.getElementById('op-rounds').innerHTML = renderDots(opTotalWins, false);
      });
  }

  function renderDots(wins, isMe) {
    let html = ''; const winClass = isMe ? 'dot-me' : 'dot-op';
    for(let i=0; i<5; i++) { html += `<div class="round-dot ${i < wins ? winClass : ''}"></div>`; } 
    return html;
  }

  function startRoundCountdown(roomId) {
    if(readyTimer) clearInterval(readyTimer);
    if(currentLimitTimer) clearInterval(currentLimitTimer);
    if(waitOpTimer) clearInterval(waitOpTimer);
    
    // 如果打到 10 題還沒分出勝負（雖然機率極低），強制結束
    if (currentBattleRound >= 10) { 
       setTimeout(() => { showImpactOverlay(myTotalWins, opTotalWins, true); setTimeout(() => window.location.href = `${GAS_URL}?id=${STUDENT_ID}`, 5000); }, 1000);
       return; 
    }
    
    let count = 3; roundSubmitted = false;
    // 🛡️ 偵探修正：標題改為更直觀的進度顯示
    document.getElementById('round-num').innerText = `第 ${currentBattleRound + 1} 局 / 先得 5 分獲勝`;
    document.getElementById('target-word').innerText = "READY?";
    document.getElementById('battle-timer').innerText = "";
    document.getElementById('battle-controls').style.visibility = 'hidden';
    
    readyTimer = setInterval(() => {
      document.getElementById('battle-timer').innerText = count;
      count--;
      if (count < 0) {
        clearInterval(readyTimer);
        document.getElementById('target-word').innerText = battleQuizArr[currentBattleRound].en;
        document.getElementById('battle-timer').innerText = "";
        document.getElementById('battle-controls').style.visibility = 'visible';
        document.getElementById('battle-info').innerText = "限時 10 秒發動攻擊！";
        startRecordingBattle(roomId);
      }
    }, 1000);
  }

  function startRecordingBattle(roomId) {
    let limit = 10;
    document.getElementById('battle-timer').innerText = limit;
    if(currentLimitTimer) clearInterval(currentLimitTimer);
    currentLimitTimer = setInterval(() => {
      limit--;
      if (limit > 0) document.getElementById('battle-timer').innerText = limit;
      else {
        clearInterval(currentLimitTimer);
        if (!roundSubmitted) { roundSubmitted = true; if (mediaRecorder && mediaRecorder.state === "recording") mediaRecorder.stop(); submitBattleScore(roomId, 0); }
      }
    }, 1000);
  }

  const battleBtn = document.getElementById('battle-record-btn');
  if(battleBtn) {
    battleBtn.onpointerdown = (e) => {
      if (roundSubmitted) return;
      e.preventDefault(); maxVolume = 0; chunks = [];
      mediaRecorder = new MediaRecorder(stream);
      mediaRecorder.ondataavailable = ev => chunks.push(ev.data);
      mediaRecorder.start(); battleBtn.classList.add('active');
      const check = () => { if (mediaRecorder && mediaRecorder.state === "recording") { analyser.getByteFrequencyData(dataArray); let v = 0; for(let i=0; i<dataArray.length; i++) v += dataArray[i]; if((v/dataArray.length) > maxVolume) maxVolume = v/dataArray.length; requestAnimationFrame(check); } }; check();
    };
    battleBtn.onpointerup = () => {
      if (roundSubmitted || !mediaRecorder || mediaRecorder.state !== "recording") return;
      roundSubmitted = true; clearInterval(currentLimitTimer);
      mediaRecorder.stop(); battleBtn.classList.remove('active');
      mediaRecorder.onstop = () => {
        const r = new FileReader(); r.readAsDataURL(new Blob(chunks, { type: 'audio/webm' }));
        r.onloadend = () => {
          fetch(`${GAS_URL}?action=evaluate_speech_battle&word=${encodeURIComponent(battleQuizArr[currentBattleRound].en)}`, { method: 'POST', body: r.result.split(',')[1] })
            .then(res => res.json()).then(data => submitBattleScore(ROOM_ID, data.score)).catch(() => submitBattleScore(ROOM_ID, 0));
        };
      };
    };
  }

  function submitBattleScore(roomId, score) {
    document.getElementById('battle-info').innerText = `得分：${score}，等待對手...`;
    document.getElementById('battle-controls').style.visibility = 'hidden';
    fetch(`${GAS_URL}?action=submit_battle_score&id=${STUDENT_ID}&roomId=${roomId}&score=${score}&t=${new Date().getTime()}`)
      .then(() => { if(waitOpTimer) clearInterval(waitOpTimer); waitOpTimer = setInterval(() => checkBoth(roomId), 2000); });
  }

  function checkBoth(roomId) {
    if(isChecking) return; isChecking = true;
    fetch(`${GAS_URL}?action=get_battle_status&roomId=${roomId}&t=${new Date().getTime()}`)
      .then(res => res.json()).then(data => {
        const hS = data.hostScores.filter(s => s !== -1);
        const gS = data.guestScores.filter(s => s !== -1);
        if (hS.length > currentBattleRound && gS.length > currentBattleRound) {
          clearInterval(waitOpTimer);
          
          // 🛡️ 修復：受傷震動邏輯 (根據身分)
          const hostHero = document.getElementById('vs-host');
          const guestHero = document.getElementById('vs-guest');
          
          hostHero.classList.remove('take-damage');
          guestHero.classList.remove('take-damage');

          if (hS[currentBattleRound] > gS[currentBattleRound]) {
            guestHero.classList.add('take-damage'); // Host 勝，Guest 震動
          } else if (gS[currentBattleRound] > hS[currentBattleRound]) {
            hostHero.classList.add('take-damage'); // Guest 勝，Host 震動
          }

          myTotalWins = 0; opTotalWins = 0;
          for(let i=0; i <= currentBattleRound; i++) {
              if(hS[i] > gS[i]) myTotalWins++; // 簡化計算，這裡先計算 Host 勝場
          }
          const isFinal = (myTotalWins >= 5 || opTotalWins >= 5 || currentBattleRound >= 9);
          
          // 🛡️ 修復：顯示對戰結果彈窗，並控制隱藏練習模式卡片
          const meHost = (normalizeStr(STUDENT_ID) === normalizeStr(data.hostId));
          const myS = meHost ? hS[currentBattleRound] : gS[currentBattleRound];
          const opScore = meHost ? gS[currentBattleRound] : hS[currentBattleRound];
          
          // 先讓練習卡片隱藏，防止衝突
          document.getElementById('studio').style.display = 'none';
          document.getElementById('impact-overlay').style.display = 'none'; // 先重置

          showImpactOverlay(myS, opScore, isFinal);

          setTimeout(() => {
            document.getElementById('impact-overlay').style.display = 'none !important'; // 隱藏結果彈窗
            document.getElementById('my-rounds').innerHTML = renderDots(myTotalWins, true);
            document.getElementById('op-rounds').innerHTML = renderDots(opTotalWins, false);
            
            if (isFinal) { 
                setTimeout(() => window.location.href = `${GAS_URL}?id=${STUDENT_ID}`, 2500); 
            } else { 
                currentBattleRound++; startRoundCountdown(roomId); 
            }
          }, 3500);
        }
        isChecking = false;
      }).catch(() => isChecking = false);
  }

  function showImpactOverlay(myNum, opNum, isFinal) {
    const o = document.getElementById('impact-overlay');
    document.getElementById('impact-my-score').innerText = myNum;
    document.getElementById('impact-op-score').innerText = opNum;
    document.getElementById('impact-title').innerText = isFinal ? "最終結算" : "單局結果";
    
    let t = "", c = "";
    if (myNum > opNum) { 
      // 🕵️ 偵探新增：獲勝獎勵動態文字
      let rewardText = "10 點";
      const opponentName = document.getElementById('op-name').innerText;
      
      if (opponentName === "初階Ai") rewardText = "0 點";
      else if (opponentName === "中階Ai") rewardText = "10 點";
      else if (opponentName === "高階Ai") rewardText = "20 點";
      
      t = isFinal ? `🏆 挑戰成功！獲得 ${rewardText}` : "獲勝！"; 
      c = "#27ae60"; 
    }
    else if (myNum < opNum) { t = isFinal ? "☠️ 挑戰失敗" : "敗北..."; c = "#e74c3c"; }
    else { t = "平手"; c = "#ffd700"; }
    
    const r = document.getElementById('impact-result'); 
    r.innerText = t; 
    r.style.color = c;
    o.style.display = 'flex';
  }
  // =======================================================
  // 🚀 瑪麗安「全域刷卡攔截器」：解決學生中途離開、隨時換人問題
  // =======================================================
  let nfcBuffer = "";
  document.addEventListener('keydown', function(e) {
    // 判斷是否為數字鍵 (YP210 噴出的通常是數字)
    if (!isNaN(e.key)) {
      nfcBuffer += e.key;
    }

    // 當讀卡機噴完 ID 帶入 Enter 時觸發
    if (e.key === 'Enter') {
      if (nfcBuffer.length > 3) { // 確保不是誤觸
        console.log("偵測到學生刷卡，準備強制跳轉：" + nfcBuffer);
        
        // 強制跳轉回你的 GAS 跳板，由 GAS 重新查表
        // 注意：這裡必須使用你的 GAS 完整連結
        const gatekeeperUrl = "https://script.google.com/macros/s/AKfycbyWm-WnRO5h3dliEPR36Cq1hCf5DgM4GIgJqXVUREclhtYOHjxq9DptApmQPkU5p5Ys/exec";
        
        // 動作：直接把目前的網頁換掉，帶入 cardId 參數
        window.location.href = gatekeeperUrl + "?cardId=" + nfcBuffer;
      }
      nfcBuffer = ""; // 清空緩衝區
    }
  });

  // 💡 小提醒：如果 3 分鐘沒人動，自動回到「請刷卡」入口畫面 (選配)
  let idleTimer;
  const resetIdleTimer = () => {
    clearTimeout(idleTimer);
    // 180000 毫秒 = 3 分鐘
    idleTimer = setTimeout(() => {
      window.location.href = "https://script.google.com/macros/s/AKfycbyWm-WnRO5h3dliEPR36Cq1hCf5DgM4GIgJqXVUREclhtYOHjxq9DptApmQPkU5p5Ys/exec";
    }, 180000);
  };
  document.addEventListener('touchstart', resetIdleTimer);
  document.addEventListener('mousedown', resetIdleTimer);
  resetIdleTimer();
</script>
