<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
  <title>瑪麗安口說挑戰室</title>
  <style>
    :root { --primary-blue: #0056b3; --marian-yellow: #ff9900; --marian-red: #d63031; --marian-green: #27ae60; }
    body { font-family: -apple-system, sans-serif; text-align: center; padding: 20px; background: #eaeff2; margin: 0; user-select: none; -webkit-user-select: none; -webkit-touch-callout: none; }
    .card { background: white; padding: 25px; border-radius: 28px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); max-width: 400px; margin: 10px auto; border: 1px solid #ddd; }
    
    #record-btn { 
      background: var(--marian-red); width: 110px; height: 110px; border-radius: 50%; 
      border: 6px solid white; font-size: 45px; box-shadow: 0 6px 15px rgba(0,0,0,0.3); 
      margin: 20px auto; cursor: pointer; display: none; outline: none;
      user-select: none; -webkit-user-select: none; -webkit-touch-callout: none;
    }
    #record-btn.active { transform: scale(0.95); background: #333; animation: pulse 1s infinite; }
    @keyframes pulse { 0% { box-shadow: 0 0 0 0px rgba(214, 48, 49, 0.4); } 100% { box-shadow: 0 0 0 20px rgba(214, 48, 49, 0); } }
    
    .btn { padding: 12px 25px; border-radius: 12px; font-weight: bold; border: none; cursor: pointer; color: white; margin: 5px; box-shadow: 0 3px 0 rgba(0,0,0,0.1); }
    .btn-nav { background: #4b6584; border-bottom: 3px solid #2d3436; }
    .btn-finish { width: 100%; font-size: 22px; padding: 20px; margin-top: 20px; border-bottom: 5px solid rgba(0,0,0,0.2); transition: 0.3s; }
    .btn-finish:disabled { background: #636e72 !important; cursor: not-allowed; border-bottom: none; opacity: 0.7; }
    
    .progress-bar { width: 100%; background: #dfe6e9; height: 12px; border-radius: 6px; margin-bottom: 20px; overflow: hidden; border: 1px solid #ccc; }
    .progress-fill { background: var(--primary-blue); height: 100%; width: 0%; transition: 0.5s; }
    
    table { width: 100%; border-collapse: collapse; margin-top: 15px; background: #fff; border-radius: 10px; }
    td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
    .score-badge { float: right; font-weight: bold; color: var(--primary-blue); font-size: 18px; }
    .btn-re { background: var(--marian-red); font-size: 13px; padding: 6px 12px; border-radius: 8px; color: white; border: none; cursor: pointer; }
  </style>
</head>
<body>

<div class="card">
  <div id="progress-container" class="progress-bar" style="display:none;"><div id="progress-fill" class="progress-fill"></div></div>

  <div id="setup-zone">
    <h2 style="color:var(--primary-blue);">🎙️ 瑪麗安口說挑戰</h2>
    <p id="info-text">準備好要開始了嗎？</p>
    <button class="btn" style="background:var(--primary-blue); font-size: 22px; padding: 18px 40px;" id="start-btn" style="display:none;">開始挑戰</button>
  </div>

  <div id="studio" style="display:none;">
    <p style="color:var(--primary-blue); font-weight:bold;">第 <span id="idx-display">1</span> / <span id="total-display">0</span> 題</p>
    <h1 id="word-display" style="font-size: 46px; color:#0d47a1; margin: 15px 0; text-shadow: 1px 1px 0 #fff;">載入中...</h1>
    <button type="button" id="record-btn" oncontextmenu="return false;">🎤</button>
    <p id="status" style="font-weight:bold; color:#636e72;">按住錄音，放開打分</p>
    <div id="feedback" style="font-size: 26px; font-weight: 800; color: var(--marian-green); margin-top: 10px;"></div>
    
    <div style="margin-top: 30px; display:flex; justify-content:center;">
      <button class="btn btn-nav" id="prev-btn">◀ 上一題</button>
      <button class="btn btn-nav" id="next-btn">下一題 ▶</button>
    </div>
  </div>

  <div id="summary" style="display:none;">
    <h2 style="color:var(--primary-blue); margin-bottom:5px;">學習總結</h2>
    <p style="margin:0; color:#636e72;">平均分數</p>
    <div style="font-size: 64px; font-weight: 900; color:var(--marian-red);" id="total-avg">0</div>
    <p id="reward-hint" style="font-size: 18px; font-weight: bold; padding: 10px; border-radius: 10px;"></p>
    
    <table id="word-list"></table>
    <button class="btn btn-finish" id="submit-btn" disabled>完成挑戰並領獎</button>
    <p id="lock-msg" style="color:var(--marian-red); font-size:14px; margin-top:10px; font-weight:bold;"></p>
  </div>
</div>

<script>
  const GAS_URL = "您的GAS部署網址"; 
  const STUDENT_ID = new URLSearchParams(window.location.search).get('id') || "S001";

  let stream, mediaRecorder, chunks = [], words = [], scores = [], currentIndex = 0, isReReading = false;

  window.onload = async () => {
    try {
      stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      document.getElementById('start-btn').style.display = 'inline-block';
    } catch (e) { alert("請開啟麥克風權限"); }
  };

  document.getElementById('start-btn').onclick = () => {
    fetch(`${GAS_URL}?id=${STUDENT_ID}&action=get_data`)
      .then(res => res.json()).then(data => {
        words = data.words;
        scores = new Array(words.length).fill(null);
        document.getElementById('total-display').innerText = words.length;
        document.getElementById('setup-zone').style.display = 'none';
        document.getElementById('progress-container').style.display = 'block';
        document.getElementById('studio').style.display = 'block';
        renderWord();
      });
  };

  function renderWord() {
    document.getElementById('idx-display').innerText = currentIndex + 1;
    document.getElementById('word-display').innerText = words[currentIndex];
    document.getElementById('feedback').innerText = scores[currentIndex] !== null ? "得分：" + scores[currentIndex] : "";
    document.getElementById('record-btn').style.display = 'block';
    const fill = ((currentIndex + 1) / words.length) * 100;
    document.getElementById('progress-fill').style.width = fill + "%";
    document.getElementById('prev-btn').disabled = currentIndex === 0;
    document.getElementById('next-btn').innerText = currentIndex === words.length - 1 ? "查看結算" : "下一題 ▶";
  }

  const rb = document.getElementById('record-btn');
  let startTime;
  rb.onpointerdown = (e) => {
    e.preventDefault();
    startTime = Date.now();
    chunks = [];
    mediaRecorder = new MediaRecorder(stream);
    mediaRecorder.ondataavailable = ev => chunks.push(ev.data);
    mediaRecorder.start();
    rb.classList.add('active');
    document.getElementById('status').innerText = "正在錄音...";
  };

  rb.onpointerup = () => {
    if (!mediaRecorder || mediaRecorder.state !== "recording") return;
    mediaRecorder.stop();
    rb.classList.remove('active');
    document.getElementById('status').innerText = "老師評分中...";
    mediaRecorder.onstop = () => {
      const reader = new FileReader();
      reader.readAsDataURL(new Blob(chunks, { type: 'audio/webm' }));
      reader.onloadend = () => {
        const base64 = reader.result.split(',')[1];
        fetch(`${GAS_URL}?action=evaluate_speech&word=${encodeURIComponent(words[currentIndex])}`, { method: 'POST', body: base64 })
          .then(res => res.json()).then(data => {
            scores[currentIndex] = data.score;
            document.getElementById('feedback').innerText = "得分：" + data.score;
            document.getElementById('status').innerText = "按住錄音，放開打分";
            if (isReReading) { setTimeout(showSummary, 1000); isReReading = false; }
          });
      };
    };
  };

  document.getElementById('prev-btn').onclick = () => { if(currentIndex > 0){ currentIndex--; renderWord(); } };
  document.getElementById('next-btn').onclick = () => {
    if (currentIndex < words.length - 1) { currentIndex++; renderWord(); } 
    else { showSummary(); }
  };

  function showSummary() {
    document.getElementById('studio').style.display = 'none';
    document.getElementById('summary').style.display = 'block';
    let sum = 0, count = 0;
    const list = document.getElementById('word-list');
    list.innerHTML = "";
    words.forEach((w, i) => {
      let s = scores[i] || 0;
      sum += s; count++;
      list.innerHTML += `<tr><td>${w}<br><button class="btn-re" onclick="reRead(${i})">🔄 重唸</button></td><td><span class="score-badge">${s} 分</span></td></tr>`;
    });
    const avg = Math.round(sum / count);
    document.getElementById('total-avg').innerText = avg;
    
    const submitBtn = document.getElementById('submit-btn');
    const rewardHint = document.getElementById('reward-hint');
    const lockMsg = document.getElementById('lock-msg');

    if (avg >= 70) {
      submitBtn.disabled = false;
      submitBtn.style.backgroundColor = "#27ae60";
      lockMsg.innerText = "";
      let reward = avg >= 90 ? 50 : (avg >= 80 ? 30 : 10);
      rewardHint.innerText = `🎁 可獲得點數：${reward} 點`;
      rewardHint.style.color = "#27ae60";
      rewardHint.style.background = "#e8f8f5";
    } else {
      submitBtn.disabled = true;
      submitBtn.style.backgroundColor = "#636e72";
      lockMsg.innerText = "❌ 平均需達 70 分才能領獎，請重唸低分題目";
      rewardHint.innerText = "尚未達標";
      rewardHint.style.color = "#d63031";
      rewardHint.style.background = "#fff5f5";
    }
  }

  function reRead(i) {
    currentIndex = i;
    isReReading = true;
    document.getElementById('summary').style.display = 'none';
    document.getElementById('studio').style.display = 'block';
    renderWord();
  }

  document.getElementById('submit-btn').onclick = () => {
    const avg = parseInt(document.getElementById('total-avg').innerText);
    document.getElementById('submit-btn').innerText = "正在儲存點數...";
    fetch(`${GAS_URL}?id=${STUDENT_ID}&action=add_score&score=${avg}`)
      .then(() => { alert("🎉 恭喜完成挑戰！點數已入帳。"); window.location.href = `${GAS_URL}?id=${STUDENT_ID}`; });
  };
</script>
</body>
</html>
