<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tappie Portal</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
  
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
    <meta name="apple-mobile-web-app-title" content="數位學習系統">
  
    <link rel="apple-touch-icon" href="/assets/app-icon.png">
    
    <style>
        :root {
            --primary-blue: #007bff;
            --marian-gold: #ffcc00;
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            overflow: hidden;
        }

        /* 玻璃外殼卡片 */
        .container {
            position: relative;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            padding: 60px 40px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            max-width: 400px;
            width: 90%;
            animation: fadeIn 0.8s ease-out;
        }

        /* 🍎 Logo 與 動態光環 */
        .logo-wrapper {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .pulse-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 4px solid var(--primary-blue);
            animation: pulse 2s infinite;
        }

        /* 標題與文字 */
        h1 {
            font-size: 2.5em;
            margin: 10px 0;
            letter-spacing: 2px;
            background: linear-gradient(to bottom, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 1.2em;
            color: #94a3b8;
            margin-bottom: 40px;
        }

        /* 狀態提示框 */
        .status-badge {
            display: inline-flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.3);
            padding: 12px 24px;
            border-radius: 100px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            background: #22c55e;
            border-radius: 50%;
            margin-right: 12px;
            box-shadow: 0 0 10px #22c55e;
            animation: blink 1.5s infinite;
        }

        #msg {
            margin: 0;
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* 動畫效果 */
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            70% { transform: scale(1.3); opacity: 0; }
            100% { transform: scale(1); opacity: 0; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* 進入系統時的旋轉特效 */
        .loading .pulse-ring {
            border-top-color: var(--marian-gold);
            animation: spin 1s linear infinite;
        }
        .loading .status-dot {
            background: var(--marian-gold);
            box-shadow: 0 0 10px var(--marian-gold);
            animation: none;
        }
        .error .status-dot {
            background: #e74c3c;
            box-shadow: 0 0 10px #e74c3c;
            animation: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* =======================================================
           🚀 平板與大螢幕自動適應 (Responsive Design)
           ======================================================= */
        @media (min-width: 768px) {
            .container {
                max-width: 550px; /* 卡片加寬 */
                padding: 80px 50px; /* 內距加大，呼吸感更強 */
                border-radius: 50px;
            }
            .logo-wrapper {
                width: 160px;
                height: 160px;
                margin-bottom: 40px;
            }
            .logo-wrapper img {
                width: 120px !important; /* Logo 放大 */
            }
            h1 {
                font-size: 3.5em; /* 標題放大 */
                margin-bottom: 15px;
            }
            .subtitle {
                font-size: 1.5em;
                margin-bottom: 50px;
            }
            .status-badge {
                padding: 18px 36px;
            }
            .status-dot {
                width: 14px;
                height: 14px;
                margin-right: 15px;
            }
            #msg {
                font-size: 20px; /* 狀態文字放大 */
            }
        }
    </style>
</head>
<body>

    <div id="dev-scanner-zone" style="display: none; position: fixed; top: 10px; right: 10px; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 12px; z-index: 99999; border: 1px solid #ffd700;">
        <p style="margin: 0 0 10px 0; color: #ffd700; font-size: 12px; font-weight: bold;">🛠️ 讀卡機模擬器</p>
        <input type="text" id="dev-sim-input" placeholder="貼上完整網址後按 Enter" style="width: 250px; padding: 8px; border-radius: 6px; border: none; outline: none; font-family: monospace;">
    </div>
    <div class="container" id="mainCard">
        <div class="logo-wrapper">
            <div class="pulse-ring" id="ring"></div>
            <img src="/assets/logo.webp" style="width:90px; margin: 0 auto; display: block;">
        </div>
        <h1>數位系統</h1>
        <p class="subtitle">Tappie</p>
        
        <div class="status-badge" id="statusBadge">
            <div class="status-dot"></div>
            <p id="msg">請感應學生卡</p>
        </div>

    </div>

    <script>
        // ⚠️ 記得替換為你的 GAS 網址！
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyWm-WnRO5h3dliEPR36Cq1hCf5DgM4GIgJqXVUREclhtYOHjxq9DptApmQPkU5p5Ys/exec";
        
        const msg = document.getElementById('msg');
        const card = document.getElementById('mainCard');

        // =======================================================
        // 🚀 終極無痕掃描系統 (SaaS 萬能萃取版)
        // =======================================================
        let rawBuffer = "";
        let lastPressTime = Date.now();

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault(); // 🚀 防止瀏覽器把輸入的網址當真而跳轉
            }

            const now = Date.now();
            
            // 讀卡機輸入極快，超過 100ms 的停頓視為手動干擾，清空重來
            if (now - lastPressTime > 100 && e.key !== 'Enter') {
                rawBuffer = "";
            }
            lastPressTime = now;

            if (e.key.length === 1) {
                rawBuffer += e.key;
            }

            // 🚀 核心修復：拔除長度限制，全權交由 Enter 鍵來結算，確保長網址完整讀取！
            if (e.key === 'Enter') {
                let inputStr = rawBuffer.trim();
                rawBuffer = ""; // 瞬間清空，準備下一發
                
                if (inputStr.length < 4) return;

                // 1. 切換至載入狀態 UI
                card.className = 'container loading';
                msg.innerText = "🚀 驗證資料中...";
                msg.style.color = "#ffcc00";

                // 🚀 萬能萃取器：從網址中精準挖出 uid 或 id
                let extractedUid = null;
                if (inputStr.includes("uid=")) {
                    extractedUid = inputStr.split("uid=")[1].split("&")[0];
                } else if (inputStr.includes("id=")) {
                    extractedUid = inputStr.split("id=")[1].split("&")[0];
                }

                if (extractedUid) {
                    // 🌟 狀況 A：新版網址卡！已經自帶校區與 ID，直接光速跳轉 Dashboard！
                    msg.innerText = "✅ 驗證成功，傳送中...";
                    msg.style.color = "#2ecc71";
                    setTimeout(() => {
                        window.location.href = `dashboard.html?id=${extractedUid}`;
                    }, 300);
                } else {
                    // 🌟 狀況 B：舊版純數字卡！需要連線去問 GAS 大腦
                    fetch(`${GAS_URL}?action=verify_card&cardId=${encodeURIComponent(inputStr)}`)
                        .then(res => res.json())
                        .then(data => {
                            if (data.success) {
                                msg.innerText = "✅ 驗證成功，傳送中...";
                                msg.style.color = "#2ecc71";
                                setTimeout(() => {
                                    window.location.href = `dashboard.html?id=${data.uid}`;
                                }, 300);
                            } else {
                                card.className = 'container error';
                                msg.innerText = "❌ 查無此卡，請重試";
                                msg.style.color = "#e74c3c";
                                setTimeout(resetUI, 2000);
                            }
                        })
                        .catch(err => {
                            card.className = 'container error';
                            msg.innerText = "⚠️ 網路異常，請重試";
                            msg.style.color = "#e74c3c";
                            setTimeout(resetUI, 2000);
                        });
                }
            }
        });

        function resetUI() {
            card.className = 'container';
            msg.innerText = "🟢 請感應學生卡";
            msg.style.color = "white";
        }

        // =======================================================
        // 🛠️ 開發者專用：讀卡機模擬器 (Simulator)
        // =======================================================
        
        // 1. 召喚咒語：在畫面空白處「連續點擊兩下」，就會呼叫出模擬器
        document.addEventListener('dblclick', function(e) {
            // 避免點到卡片內部也觸發
            if (!e.target.closest('#mainCard')) {
                const devZone = document.getElementById('dev-scanner-zone');
                devZone.style.display = devZone.style.display === 'none' ? 'block' : 'none';
                if (devZone.style.display === 'block') {
                    document.getElementById('dev-sim-input').focus();
                }
            }
        });

        // 2. 模擬發射：當你在輸入框按下 Enter 時，瞬間把字串「灌」進全域攔截器
        document.getElementById('dev-sim-input').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                const simulatedString = this.value.trim();
                if (!simulatedString) return;

                // 為了完美模擬「瞬間輸入完畢然後按下 Enter」的物理特性：
                // 我們直接把字串塞進 rawBuffer，然後強迫觸發一次長度檢查或 Enter 邏輯
                
                // 這裡我們借用原本寫好的擷取邏輯，直接執行！
                let extractedUid = null;
                if (simulatedString.includes("uid=")) {
                    extractedUid = simulatedString.split("uid=")[1].split("&")[0];
                } else if (simulatedString.includes("id=")) {
                    extractedUid = simulatedString.split("id=")[1].split("&")[0];
                } else {
                    // 如果只是一般字串
                    extractedUid = simulatedString;
                }

                // 視覺回饋
                card.className = 'container loading';
                msg.innerText = "🛠️ 模擬器攔截中...";
                msg.style.color = "#ffcc00";

                // 開始跳轉
                setTimeout(() => {
                    if (extractedUid && extractedUid.includes('-')) {
                        msg.innerText = "✅ 模擬萃取成功！";
                        msg.style.color = "#2ecc71";
                        setTimeout(() => {
                            window.location.href = `dashboard.html?id=${extractedUid}`;
                        }, 500);
                    } else {
                        alert("❌ 模擬器：這不是有效的新版網址卡格式！\n請貼上例如: https://www.tappieapp.com/tap.html?uid=TP01-S001");
                        resetUI();
                    }
                }, 500);

                this.value = ""; // 清空輸入框
            }
        });
    </script>
</body>
</html>
