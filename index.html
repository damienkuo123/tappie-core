<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <title>瑪麗安口說挑戰室</title>
  <style>
    :root { --primary-blue: #1e90ff; --marian-yellow: #ffa502; --marian-red: #ff4757; }
    body { font-family: -apple-system, sans-serif; text-align: center; padding: 20px; background: #f0f2f5; touch-action: none; }
    .card { background: white; padding: 30px; border-radius: 28px; box-shadow: 0 12px 40px rgba(0,0,0,0.12); max-width: 400px; margin: 0 auto; }
    #record-btn { background: var(--marian-red); width: 120px; height: 120px; border-radius: 50%; border: 8px solid white; font-size: 50px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); margin: 30px auto; touch-action: none; display: none; }
    #record-btn.active { transform: scale(0.9); background: #333; animation: pulse 1s infinite; }
    @keyframes pulse { 0% { box-shadow: 0 0 0 0px rgba(255, 71, 87, 0.4); } 100% { box-shadow: 0 0 0 20px rgba(255, 71, 87, 0); } }
    .btn-start { background: var(--primary-blue); color: white; padding: 20px 40px; border-radius: 18px; font-size: 20px; font-weight: bold; border: none; cursor: pointer; }
    #feedback { font-size: 24px; font-weight: bold; color: #2ed573; margin-top: 15px; }
  </style>
</head>
<body>

  <div class="card">
    <div id="setup-zone">
      <h2 style="color:var(--primary-blue);">歡迎來到口說挑戰！</h2>
      <p id="info-text">正在準備麥克風...</p>
      <button class="btn-start" id="start-btn" style="display:none;">我準備好了！</button>
    </div>

    <div id="studio" style="display:none;">
      <p style="color:var(--primary-blue); font-weight:bold;">🎙️ 第 <span id="idx">1</span>/10 題</p>
      <h1 id="word" style="font-size: 48px; color:#0d47a1; margin: 20px 0;">載入中...</h1>
      <button type="button" id="record-btn">🎤</button>
      <p id="status">按住錄音，放開評分</p>
      <div id="feedback"></div>
    </div>
  </div>

  <script>
    // --- ⚠️ 最終修正設定 ---
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxHkA5LmIqBVuMEkaT1IcOarqMuEtw7HBX-BplhvOiDw_XCGiksPQotRb0qwftm2Lub/exec"; 
    
    // 您的長金鑰
    const AZURE_KEY = "7GrGGySZJ7wxugw35x4xgYx5IzIP9pd6eZL2Pqy5GOo8FhEoJhyTJQQJ99CCAC3pKaRXJ3w3AAAYACOGiIOL";
    
    // 您的端點 (自動修剪結尾斜線以防 404)
    const AZURE_ENDPOINT = "https://eastasia.api.cognitive.microsoft.com";

    const params = new URLSearchParams(window.location.search);
    const STUDENT_ID = params.get('id') || "S001";

    let stream, mediaRecorder, chunks = [], words = [], idx = 0, total = 0;

    window.onload = async () => {
      try {
        stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        document.getElementById('info-text').innerText = "麥克風已就緒！";
        document.getElementById('start-btn').style.display = 'inline-block';
      } catch (e) {
        alert("無法開啟麥克風。");
      }
    };

    document.getElementById('start-btn').onclick = () => {
      document.getElementById('setup-zone').style.display = 'none';
      document.getElementById('studio').style.display = 'block';
      fetch(`${GAS_URL}?id=${STUDENT_ID}&action=get_data`)
        .then(res => res.json())
        .then(data => {
          words = data.words || ["Hello"];
          renderWord();
        });
    };

    function renderWord() {
      if (idx < words.length) {
        document.getElementById('idx').innerText = idx + 1;
        document.getElementById('word').innerText = words[idx];
        document.getElementById('record-btn').style.display = 'block';
        document.getElementById('feedback').innerText = "";
        document.getElementById('status').innerText = "按住錄音，放開評分";
      } else {
        finishChallenge();
      }
    }

    const rb = document.getElementById('record-btn');
    rb.onpointerdown = (e) => {
      e.preventDefault(); chunks = [];
      mediaRecorder = new MediaRecorder(stream);
      mediaRecorder.ondataavailable = ev => chunks.push(ev.data);
      mediaRecorder.start();
      rb.classList.add('active');
      document.getElementById('status').innerText = "正在錄音...";
    };

    rb.onpointerup = () => {
      if (!mediaRecorder || mediaRecorder.state !== "recording") return;
      mediaRecorder.stop();
      rb.classList.remove('active');
      document.getElementById('status').innerText = "AI 評分中...";
      
      mediaRecorder.onstop = async () => {
        const audioBlob = new Blob(chunks, { type: 'audio/webm' });
        const reader = new FileReader();
        reader.readAsArrayBuffer(audioBlob);
        reader.onloadend = async () => {
          try {
            const score = await evaluateAzure(reader.result, words[idx]);
            document.getElementById('feedback').innerText = "得分：" + Math.round(score);
            total += score; idx++;
            setTimeout(renderWord, 1200);
          } catch (e) {
            alert(e.message);
            document.getElementById('status').innerText = "請再試一次";
          }
        };
      };
    };

    async function evaluateAzure(arrayBuffer, text) {
      // 核心修正：自動確保網址中間只有一個斜線，解決 404 問題
      const baseUrl = AZURE_ENDPOINT.replace(/\/$/, ""); 
      const url = `${baseUrl}/speech/recognition/conversation/cognitiveservices/v1?language=en-US`;
      
      const pronParams = { 
        "ReferenceText": text, 
        "GradingSystem": "HundredMark", 
        "Granularity": "Phoneme", 
        "Dimension": "Comprehensive" 
      };

      const response = await fetch(url, {
        method: 'POST',
        headers: {
          'Ocp-Apim-Subscription-Key': AZURE_KEY,
          'Pronunciation-Assessment': btoa(unescape(encodeURIComponent(JSON.stringify(pronParams)))),
          'Content-Type': 'audio/webm; codecs=opus',
          'Accept': 'application/json'
        },
        body: arrayBuffer
      });

      if (!response.ok) {
        const status = response.status;
        const errText = await response.text();
        throw new Error(`微軟拒絕請求 (${status}): ${errText}`);
      }

      const resData = await response.json();
      if (resData.RecognitionStatus === "Success" && resData.NBest && resData.NBest.length > 0) {
        return resData.NBest[0].PronunciationAssessment.AccuracyScore;
      }
      throw new Error("AI 無法給分，請錄清楚一點。");
    }

    function finishChallenge() {
      const avg = Math.round(total / words.length);
      document.getElementById('studio').innerHTML = "<h3>挑戰完成！</h3>";
      fetch(`${GAS_URL}?id=${STUDENT_ID}&action=add_score&score=${avg}`)
        .then(() => {
          alert("🎉 挑戰完成！");
          window.location.href = `${GAS_URL}?id=${STUDENT_ID}`;
        });
    }
  </script>
</body>
</html>
