<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
  <title>瑪麗安口說挑戰室</title>
  <style>
    :root { --primary-blue: #0066cc; --marian-yellow: #ff9900; --marian-red: #d63031; --marian-green: #27ae60; --dark-gray: #2d3436; }
    body { font-family: -apple-system, sans-serif; text-align: center; padding: 20px; background: #eaeff2; margin: 0; user-select: none; -webkit-user-select: none; -webkit-touch-callout: none; }
    .card { background: white; padding: 25px; border-radius: 28px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); max-width: 400px; margin: 10px auto; border: 1px solid #ddd; }
    #record-btn { background: var(--marian-red); width: 110px; height: 110px; border-radius: 50%; border: 8px solid white; font-size: 45px; box-shadow: 0 6px 15px rgba(214, 48, 49, 0.4); margin: 20px auto; cursor: pointer; display: none; outline: none; }
    #record-btn.active { transform: scale(0.95); background: #333; animation: pulse 1s infinite; }
    @keyframes pulse { 0% { box-shadow: 0 0 0 0px rgba(214, 48, 49, 0.4); } 100% { box-shadow: 0 0 0 20px rgba(214, 48, 49, 0); } }
    .btn-play { background: var(--primary-blue); width: 45px; height: 45px; border-radius: 50%; border: none; color: white; font-size: 20px; cursor: pointer; margin-left: 10px; vertical-align: middle; box-shadow: 0 3px 6px rgba(0,0,0,0.1); }
    .btn { padding: 12px 25px; border-radius: 12px; font-weight: bold; border: none; cursor: pointer; color: white; margin: 5px; box-shadow: 0 4px 0 rgba(0,0,0,0.2); }
    .btn-nav { background: #4b6584; border-bottom: 4px solid #2c3e50; }
    .btn-nav:disabled { background: #ccc; border-bottom: none; }
    .btn-finish { width: 100%; font-size: 22px; padding: 20px; margin-top: 20px; border-bottom: 5px solid rgba(0,0,0,0.2); transition: 0.3s; }
    .btn-finish:disabled { background: #636e72 !important; cursor: not-allowed; border-bottom: none; opacity: 0.7; }
    .progress-bar { width: 100%; background: #dfe6e9; height: 12px; border-radius: 6px; margin-bottom: 20px; overflow: hidden; border: 1px solid #ccc; }
    .progress-fill { background: var(--primary-blue); height: 100%; width: 0%; transition: 0.5s; }
    table { width: 100%; border-collapse: collapse; margin-top: 15px; background: #fff; border-radius: 10px; overflow: hidden; }
    td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
    .score-badge { float: right; font-weight: bold; color: var(--primary-blue); font-size: 18px; }
    .btn-re { background: var(--marian-red); font-size: 13px; padding: 6px 12px; border-radius: 8px; color: white; border: none; cursor: pointer; font-weight: bold; }
    #zh-display { font-size: 20px; color: #7f8c8d; margin: -10px 0 20px 0; font-weight: bold; }

    /* ========================================= */
    /* 🚀 傳送門：全息對峙 Loading 畫面 (VS Clash) */
    /* ========================================= */
    #battle-portal-overlay {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background: radial-gradient(circle at center, #1c2331 0%, #050914 100%);
      z-index: 9999; flex-direction: column; align-items: center; justify-content: space-between; 
      padding: 40px 0; box-sizing: border-box; overflow: hidden;
    }
    
    /* 頂部倒數計時 */
    .portal-timer-modern {
      font-size: 24px; font-weight: 900; color: #f1c40f; text-shadow: 0 0 15px rgba(241,196,15,0.8);
      letter-spacing: 5px; z-index: 20;
    }

    /* 對戰區容器 (讓卡片可以在裡面重疊) */
    .portal-clash-container {
      position: relative; width: 100%; flex: 1; max-width: 600px; margin: 20px 0;
    }

    /* 卡片共用樣式 */
    .portal-card {
      position: absolute; width: 75vw; max-width: 320px; aspect-ratio: 2816/1271;
      border-radius: 12px; border: 3px solid rgba(255,255,255,0.8);
      background-size: cover; background-position: center;
      box-shadow: 0 20px 50px rgba(0,0,0,0.8);
      display: flex; align-items: flex-end; justify-content: center;
      opacity: 0; /* 初始隱藏，等待 JS 觸發飛入 */
    }

    /* 姓名條 (直接黏在卡片底部) */
    .portal-name-tag {
      background: rgba(0,0,0,0.85); color: white; padding: 6px 25px; font-size: 14px; font-weight: 900;
      letter-spacing: 2px; text-transform: uppercase; border-top-left-radius: 12px; border-top-right-radius: 12px;
      transform: translateY(3px); border: 1px solid rgba(255,255,255,0.3); border-bottom: none;
      backdrop-filter: blur(5px);
    }

    /* 對手卡片 (從右上角殺出) */
    .op-card {
      top: 15%; right: -100vw; transform: rotate(15deg); 
      border-color: #ff6b6b; box-shadow: 0 20px 50px rgba(0,0,0,0.8), 0 0 40px rgba(255,107,107,0.4);
    }
    
    /* 我方卡片 (從左下角殺出) */
    .my-card {
      bottom: 15%; left: -100vw; transform: rotate(-15deg); 
      border-color: #00d2d3; box-shadow: 0 20px 50px rgba(0,0,0,0.8), 0 0 40px rgba(0,210,211,0.4);
    }

    /* 🚀 雙卡飛入動畫 + 摩擦震動 (Friction) */
    .clash-in-op { animation: slide-in-op 0.4s cubic-bezier(0.1, 0.9, 0.2, 1) forwards, friction-op 0.15s 0.4s infinite alternate; }
    .clash-in-my { animation: slide-in-my 0.4s cubic-bezier(0.1, 0.9, 0.2, 1) forwards, friction-my 0.15s 0.4s infinite alternate; }

    @keyframes slide-in-op {
      0% { right: -100vw; top: -20%; transform: rotate(25deg) scale(1.2); opacity: 0; }
      100% { right: 5%; top: 20%; transform: rotate(8deg) scale(1); opacity: 1; }
    }
    @keyframes slide-in-my {
      0% { left: -100vw; bottom: -20%; transform: rotate(-25deg) scale(1.2); opacity: 0; }
      100% { left: 5%; bottom: 20%; transform: rotate(-8deg) scale(1); opacity: 1; }
    }

    /* 高頻摩擦震動 (製造力量抗衡的緊繃感) */
    @keyframes friction-op { to { transform: rotate(8.5deg) translate(-2px, 2px); filter: brightness(1.2); } }
    @keyframes friction-my { to { transform: rotate(-8.5deg) translate(2px, -2px); filter: brightness(1.2); } }

    /* ⚡ 中間的 VS 閃電特效 */
    .portal-vs-spark {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
      font-size: 90px; font-weight: 900; font-style: italic; color: #fff;
      text-shadow: 0 0 20px #f39c12, 0 0 40px #f1c40f, 0 0 80px #e67e22;
      z-index: 10; opacity: 0; pointer-events: none;
    }
    .spark-active { animation: vs-slam 0.4s 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards, vs-pulse 0.1s 0.7s infinite alternate; }
    
    @keyframes vs-slam { 0% { transform: translate(-50%, -50%) scale(5); opacity: 0; filter: blur(10px); } 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; filter: blur(0px); } }
    @keyframes vs-pulse { to { transform: translate(-50%, -50%) scale(1.05) skewX(-5deg); text-shadow: 0 0 30px #f39c12, 0 0 80px #fff; } }

    /* 🚀 現代化進入按鈕 */
    .portal-btn-hidden { opacity: 0; transform: translateY(30px); pointer-events: none; }
    .portal-btn-show { 
      opacity: 1; pointer-events: auto; transform: translateY(0); 
      transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .btn-cyber {
      background: linear-gradient(135deg, #00d2d3, #0fb9b1); color: white;
      font-size: 22px; font-weight: 900; letter-spacing: 4px; padding: 18px 50px;
      border: none; border-radius: 15px; cursor: pointer; outline: none;
      box-shadow: 0 10px 30px rgba(0, 210, 211, 0.5); position: relative; overflow: hidden;
      text-transform: uppercase;
    }
    /* 按鈕上的掃光特效 */
    .btn-cyber::after {
      content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
      transform: skewX(-25deg); animation: btn-sweep 2s infinite;
    }
    @keyframes btn-sweep { 0% { left: -100%; } 100% { left: 200%; } }
    .btn-cyber:active { transform: scale(0.95); box-shadow: 0 5px 15px rgba(0, 210, 211, 0.8); }

        /* ========================================= */
    /* 對戰頁面 */
    /* ========================================= */

    /* 🌌 戰場背景：鎖死高度，完美適應 Safari */
    #battle-arena { 
      position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh; 
      background: radial-gradient(circle at 50% 50%, #1c2331 0%, #0b0f19 100%) !important; 
      z-index: 2000; display: none; flex-direction: column; 
      justify-content: space-between; align-items: center; 
      padding: max(2vh, env(safe-area-inset-top)) 15px max(2vh, env(safe-area-inset-bottom));
      box-sizing: border-box; overflow: hidden; 
    }

    #battle-info-container { height: 90px; display: flex; flex-direction: column; align-items: center; justify-content: center; }

    /* 🚀 控制面板佈局 */
    .player-zone { position: relative; padding-bottom: 120px; width: 100%; display: flex; flex-direction: column; align-items: center; }
    
    #battle-controls { 
      position: absolute; bottom: 10px; left: 0; right: 0; width: 100%;
      display: flex; flex-direction: column; align-items: center; justify-content: flex-end; 
      z-index: 50; visibility: hidden; gap: 15px; 
    }

    /* 👊 技能重擊按鈕 */
    #skill-btn {
      background: linear-gradient(135deg, #f39c12, #e74c3c); color: white; 
      border: 2px solid #f1c40f; border-radius: 20px;
      padding: 8px 25px; font-size: 16px; font-weight: 900; 
      box-shadow: 0 5px 15px rgba(231, 76, 60, 0.5); cursor: pointer;
      transition: all 0.3s; animation: float-btn 2s infinite ease-in-out; white-space: nowrap;
    }
    #skill-btn:active { transform: scale(0.9); }
    @keyframes float-btn { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(231, 76, 60, 0.8); } }

    /* 🎤 錄音按鈕本體 */
    #battle-record-btn {
      width: 75px; height: 75px; border-radius: 50%; font-size: 30px; cursor: pointer;
      background: linear-gradient(145deg, #2d3436, #1e272b); border: 3px solid #0fb9b1; color: white; outline: none;
      box-shadow: 0 10px 20px rgba(0,0,0,0.5), inset 0 2px 5px rgba(255,255,255,0.1); transition: all 0.2s;
      display: flex; justify-content: center; align-items: center; flex-shrink: 0;
    }
    
    #battle-record-btn.active { transform: scale(0.9); animation: manaCharge 0.5s infinite alternate; border-color: #26de81; }
    @keyframes manaCharge { 0% { box-shadow: 0 0 10px #0fb9b1, 0 0 20px #0fb9b1; } 100% { box-shadow: 0 0 30px #26de81, 0 0 60px #26de81; } }
    
    #battle-record-btn.ult-active { transform: scale(0.9); animation: ultManaCharge 0.5s infinite alternate; border-color: #fff; }
    @keyframes ultManaCharge { 0% { box-shadow: 0 0 20px #f1c40f, 0 0 30px #f1c40f; } 100% { box-shadow: 0 0 50px #f39c12, 0 0 80px #fff; } }

    /* 🎴 實體卡片設計 */
    .arena-section { z-index: 10; width: 100%; display: flex; flex-direction: column; align-items: center; }
    .card-entity {
      height: 20vh; min-height: 120px; max-height: 180px; 
      aspect-ratio: 2816 / 1271; width: auto; max-width: 95vw; 
      background-size: cover; background-position: center center; background-repeat: no-repeat;
      border-radius: 12px; border: 3px solid #576574; 
      box-shadow: 0 10px 30px rgba(0,0,0,0.8), inset 0 0 15px rgba(255,255,255,0.2);
      position: relative; z-index: 5; transition: all 0.4s ease;
      /* 🚀 已經移除 overflow: hidden; 讓光球可以順利飛出卡片結界！ */
    }

    /* 🌟 一般錄音：卡片本體爆發 (青藍色) */
    .card-entity.charging-mana { border-color: #0fb9b1 !important; animation: cardChargePulse 0.5s infinite alternate; z-index: 25; }
    @keyframes cardChargePulse {
      0% { box-shadow: 0 0 15px #0fb9b1, inset 0 0 15px #0fb9b1; transform: translateY(0px); }
      100% { box-shadow: 0 0 50px #26de81, inset 0 0 25px #26de81; transform: translateY(-5px); }
    }

    /* 🌟 大招錄音：黃金卡片爆發 (金色) */
    .card-entity.ultimate-charging { border-color: #f1c40f !important; animation: ultCardCharge 0.5s infinite alternate; z-index: 25; }
    @keyframes ultCardCharge {
      0% { box-shadow: 0 0 20px #f1c40f, inset 0 0 20px #f1c40f; transform: translateY(0px); }
      100% { box-shadow: 0 0 60px #f39c12, 0 0 80px #fff, inset 0 0 40px #f39c12; transform: translateY(-5px); }
    }

    /* 🚀 全新窄版「橫向排列」資訊面板，不遮擋卡片 */
    .glass-panel {
      background: rgba(30, 39, 46, 0.8); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 15px;
      padding: 6px 15px; margin: 8px 0; /* 改為上下外距，不再是負數重疊 */
      position: relative; z-index: 20; 
      display: flex; flex-direction: row; justify-content: space-between; align-items: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5); width: 90%; max-width: 450px; 
    }

    /* 點點與文字區 */
    .rounds-container { display: flex; gap: 8px; margin: 0; }
    .round-dot { width: 14px; height: 14px; border-radius: 50%; background: #2f3542; box-shadow: inset 0 2px 4px rgba(0,0,0,0.8); border: 1px solid #57606f; transition: 0.3s; }
    .dot-me { background: #0fb9b1; box-shadow: 0 0 15px #0fb9b1, inset 0 0 5px #fff; border-color: #fff; } 
    .dot-op { background: #eb3b5a; box-shadow: 0 0 15px #eb3b5a, inset 0 0 5px #fff; border-color: #fff; } 

    /* ⚔️ 中間交戰區 */
    .stage-zone { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; margin: 1vh 0; max-height: 35vh; }
    #target-word { font-size: 8vw; text-transform: uppercase; letter-spacing: 2px; color: #f1f2f6; text-shadow: 0 0 15px rgba(255,255,255,0.5), 0px 4px 0px #576574; margin: 0 0 5px 0; text-align: center; transition: 0.3s; }
    #battle-timer-container { height: 55px; display: flex; justify-content: center; align-items: center; }
    #battle-timer { font-size: 38px; font-weight: 900; color: #f6e58d; text-shadow: 0 0 15px rgba(246, 229, 141, 0.5); margin: 0; min-height: 45px; }

    /* 🌈 大招狀態的視覺統整 */
    .ultimate-mode-bg { background: radial-gradient(circle at 50% 50%, #4a3600 0%, #0b0f19 100%) !important; }
    .ultimate-word { color: #f1c40f !important; text-shadow: 0 0 20px #f1c40f, 0 0 40px #f1c40f !important; animation: word-pulse 0.5s infinite alternate; }
    .ultimate-record-btn { background: linear-gradient(145deg, #e67e22, #f39c12) !important; border: 4px solid #fff !important; box-shadow: 0 0 30px #f1c40f, inset 0 0 15px #f1c40f !important; }
    
    /* 💬 大招文字浮出框 */
    #skill-popup {
      position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
      font-size: 28px; font-weight: 900; z-index: 3000; white-space: nowrap;
      pointer-events: none; opacity: 0; text-shadow: 0 4px 10px rgba(0,0,0,0.8);
    }
    .popup-anim { animation: skillPop 2s forwards; }
    @keyframes skillPop {
      0% { opacity: 0; transform: translate(-50%, 0px) scale(0.5); }
      15% { opacity: 1; transform: translate(-50%, -30px) scale(1.2); }
      80% { opacity: 1; transform: translate(-50%, -30px) scale(1); }
      100% { opacity: 0; transform: translate(-50%, -60px) scale(0.8); }
    }

    /* 💥 雙重金色光球 (大招成功專用：一前一後發射) */
    .blast-ultimate::before, .blast-ultimate::after {
      content: ''; position: absolute; top: 50%; left: 50%; width: 90px; height: 90px;
      background: radial-gradient(circle, #fff 0%, #f1c40f 40%, transparent 80%);
      border-radius: 50%; transform: translate(-50%, -50%) scale(0); opacity: 1; z-index: 100; pointer-events: none;
    }
    .blast-ultimate::before { animation: blast-upward 0.4s 0.2s ease-in forwards; }
    .blast-ultimate::after { animation: blast-upward 0.4s 0.4s ease-in forwards; } 
    
    /* 💥 對手的大招光球 (向下) */
    .blast-ultimate-down::before, .blast-ultimate-down::after {
      content: ''; position: absolute; top: 50%; left: 50%; width: 90px; height: 90px;
      background: radial-gradient(circle, #fff 0%, #f1c40f 40%, transparent 80%);
      border-radius: 50%; transform: translate(-50%, -50%) scale(0); opacity: 1; z-index: 100; pointer-events: none;
    }
    .blast-ultimate-down::before { animation: blast-downward 0.4s 0.2s ease-in forwards; }
    .blast-ultimate-down::after { animation: blast-downward 0.4s 0.4s ease-in forwards; } 

    .screen-flash-gold { animation: flashGold 0.6s 0.8s 2; }
    @keyframes flashGold { 0%, 100% { box-shadow: inset 0 0 0 transparent; } 50% { box-shadow: inset 0 0 150px rgba(241, 196, 15, 0.9); } }

    .neon-score {
      font-size: 38px; font-weight: 900; color: #0fb9b1;
      text-shadow: 0 0 10px rgba(15, 185, 177, 0.8), 0 0 20px rgba(15, 185, 177, 0.5), 0 0 30px #fff;
      animation: pop-up 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; display: inline-block; margin: 0;
    }
    @keyframes pop-up { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

    /* 🌟 攻擊蓄力與射擊特效 */
    .cast-me { animation: magic-cast-me 0.8s ease-out forwards; }
    @keyframes magic-cast-me { 0%, 100% { transform: scale(1); filter: brightness(1) drop-shadow(0 0 0 transparent); z-index: 1; } 40% { transform: scale(1.05); filter: brightness(1.8) drop-shadow(0 0 40px #0fb9b1); z-index: 10; } }

    /* 🌟 大招專屬：發射前金色蓄力 */
    .cast-me-ult { animation: magic-cast-ult 0.8s ease-out forwards; }
    @keyframes magic-cast-ult { 0%, 100% { transform: scale(1); filter: brightness(1) drop-shadow(0 0 0 transparent); z-index: 1; } 40% { transform: scale(1.05); filter: brightness(2) drop-shadow(0 0 40px #f1c40f); z-index: 10; } }

    .cast-op { animation: magic-cast-op 0.8s ease-out forwards; }
    @keyframes magic-cast-op { 0%, 100% { transform: scale(1); filter: brightness(1) drop-shadow(0 0 0 transparent); z-index: 1; } 40% { transform: scale(1.05); filter: brightness(1.8) drop-shadow(0 0 40px #eb3b5a); z-index: 10; } }

    .cast-op-ult { animation: magic-cast-op-ult 0.8s ease-out forwards; }
    @keyframes magic-cast-op-ult { 0%, 100% { transform: scale(1); filter: brightness(1) drop-shadow(0 0 0 transparent); z-index: 1; } 40% { transform: scale(1.05); filter: brightness(2) drop-shadow(0 0 40px #f1c40f); z-index: 10; } }

    .blast-up::after {
      content: ''; position: absolute; top: 50%; left: 50%; width: 90px; height: 90px;
      background: radial-gradient(circle, #fff 0%, #0fb9b1 40%, transparent 80%);
      border-radius: 50%; transform: translate(-50%, -50%) scale(0); opacity: 1; z-index: 100; pointer-events: none;
      animation: blast-upward 0.5s 0.3s ease-in forwards; 
    }
    @keyframes blast-upward { 0% { transform: translate(-50%, -50%) scale(1); opacity: 1; } 100% { transform: translate(-50%, -65vh) scale(3); opacity: 0; } }

    .blast-down::after {
      content: ''; position: absolute; top: 50%; left: 50%; width: 90px; height: 90px;
      background: radial-gradient(circle, #fff 0%, #eb3b5a 40%, transparent 80%);
      border-radius: 50%; transform: translate(-50%, -50%) scale(0); opacity: 1; z-index: 100; pointer-events: none;
      animation: blast-downward 0.5s 0.3s ease-in forwards; 
    }
    @keyframes blast-downward { 0% { transform: translate(-50%, -50%) scale(1); opacity: 1; } 100% { transform: translate(-50%, 65vh) scale(3); opacity: 0; } }

    /* 🩸 戰損碎裂系統 (完整保留您的精美設計！) */
    .card-entity::before { 
      content: ''; position: absolute; top:0; left:0; right:0; bottom:0; 
      border-radius: inherit; /* 🚀 加上這行：讓裂痕自動繼承卡片的 12px 圓角，就不會刺出去了！ */
      pointer-events: none; opacity: 0; transition: opacity 0.5s; z-index: 15; 
    }
    .dmg-1 { border-color: #f1c40f !important; }
    .dmg-1::before { opacity: 0.6; background: linear-gradient(35deg, transparent 49%, rgba(255,255,255,0.8) 49.5%, transparent 50%); }
    .dmg-2 { border-color: #e67e22 !important; box-shadow: inset 0 0 20px rgba(230, 126, 34, 0.5) !important; filter: saturate(0.8); }
    .dmg-2::before { opacity: 0.8; background: linear-gradient(35deg, transparent 49%, rgba(255,255,255,0.8) 49.5%, transparent 50%), linear-gradient(-55deg, transparent 49%, rgba(255,255,255,0.8) 49.5%, transparent 50%); }
    .dmg-3 { border-color: #e74c3c !important; box-shadow: inset 0 0 40px rgba(231, 76, 60, 0.6) !important; filter: saturate(0.6) contrast(1.2); }
    .dmg-3::before { opacity: 1; background: linear-gradient(35deg, transparent 49%, rgba(255,255,255,0.9) 49.5%, transparent 50%), linear-gradient(-55deg, transparent 49%, rgba(255,255,255,0.9) 49.5%, transparent 50%), linear-gradient(15deg, transparent 49%, rgba(255,255,255,0.9) 49.5%, transparent 50%); }
    .dmg-4 { border: 3px dashed #c0392b !important; box-shadow: inset 0 0 60px rgba(192, 57, 43, 0.8) !important; filter: grayscale(0.5) sepia(0.5) hue-rotate(-30deg); }
    .dmg-4::before { opacity: 1; background: linear-gradient(35deg, transparent 49%, #fff 49.5%, transparent 50%), linear-gradient(-55deg, transparent 49%, #fff 49.5%, transparent 50%), linear-gradient(15deg, transparent 49%, #fff 49.5%, transparent 50%), linear-gradient(-80deg, transparent 49%, #fff 49.5%, transparent 50%); }

    /* 🩸 受擊動畫 */
    .take-damage { animation: shakeDamage 0.5s 0.8s ease-in-out; }
    @keyframes shakeDamage { 0%, 100% { transform: translate(0, 0) rotate(0deg); } 20% { transform: translate(-15px, 15px) rotate(-4deg); } 40% { transform: translate(15px, -15px) rotate(4deg); } 60% { transform: translate(-10px, -5px) rotate(-2deg); } 80% { transform: translate(10px, 5px) rotate(2deg); } }

    .screen-flash-cyan { animation: flashCyan 0.5s 0.8s 2; }
    @keyframes flashCyan { 0%, 100% { box-shadow: inset 0 0 0 transparent; } 50% { box-shadow: inset 0 0 150px rgba(15, 185, 177, 0.9); } }
    .screen-flash-red { animation: flashRed 0.5s 0.8s 2; }
    @keyframes flashRed { 0%, 100% { box-shadow: inset 0 0 0 transparent; } 50% { box-shadow: inset 0 0 150px rgba(235, 59, 90, 0.9); } }

    /* 🔥 終極爆炸消失 */
    .loser-shatter { animation: shatter-destroy 1.2s 0.8s ease-out forwards; }
    @keyframes shatter-destroy {
      0% { transform: scale(1); filter: brightness(1); opacity: 1; }
      10% { transform: scale(1.2); filter: brightness(3) drop-shadow(0 0 50px #fff); } 
      25% { transform: scale(1.1) skewX(15deg); filter: brightness(2) drop-shadow(0 0 80px #ff4757); opacity: 1; } 
      40% { transform: scale(0.8) rotate(-10deg) translateY(20px); filter: grayscale(0.5) blur(2px); opacity: 0.8; } 
      100% { transform: scale(0.2) rotate(45deg) translateY(300px); filter: blur(20px); opacity: 0; } 
    }

    /* 🏆 最終勝利的耀眼光芒 */
    .winner-glory { animation: glory-shine 1.5s ease-in-out infinite alternate !important; border: 4px solid #f1c40f !important; z-index: 30 !important; }
    @keyframes glory-shine {
      0% { box-shadow: 0 0 20px #f1c40f, inset 0 0 20px #f1c40f; transform: translateY(0); filter: brightness(1.2); }
      100% { box-shadow: 0 0 60px #f1c40f, 0 0 100px #f1c40f, inset 0 0 40px #f1c40f; transform: translateY(-10px); filter: brightness(1.5); }
    }

    /* ========================================= */
    /* 💎 頂級 3D 全息英雄結算 (Cinematic Live 2D Fusion) */
    /* ========================================= */
    #impact-overlay { 
      display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
      background: rgba(10, 15, 20, 0); backdrop-filter: blur(0px); -webkit-backdrop-filter: blur(0px);
      z-index: 9999; flex-direction: column; justify-content: center; align-items: center; color: white; 
      transition: all 0.5s ease; overflow: hidden;
      perspective: 1200px; /* 🚀 啟動 3D 視角 */
    }
    #impact-overlay.active { display: flex; background: rgba(5, 10, 15, 0.85); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); }
    #impact-overlay.fade-out { opacity: 0; backdrop-filter: blur(0px); -webkit-backdrop-filter: blur(0px); }

    /* 🛡️ 3D 全息投影卡片舞台 */
    #impact-stand-stage {
      position: relative; width: 90vw; height: 75vh; max-width: 500px;
      background: rgba(255, 255, 255, 0.1); /* 稍微提亮背板 */
      border-radius: 25px; 
      box-shadow: 
        20px 30px 50px rgba(0,0,0,0.8), 
        inset 3px 3px 5px rgba(255,255,255,0.4), 
        inset -3px -3px 5px rgba(0,0,0,0.3), 
        0 0 0 1px rgba(255,255,255,0.2); 
      overflow: hidden; z-index: 1; 
      display: flex; flex-direction: column; align-items: center; justify-content: space-between; padding: 40px 0;
      transform-style: preserve-3d;
      
      background-size: cover; background-repeat: no-repeat; background-position: center top;
      transform: translate(150%, 100%) scale(0.5); opacity: 0;
      /* 🚀 已經將 mask-image 刪除，立繪絕對不會再變黑了！ */
    }
    
    /* 🚀 我方單局勝利 (Win)：滑入與緩飄 */
    .theme-win.active #impact-stand-stage { animation: card-enter-win 3s linear forwards; }
    .theme-win.fade-out #impact-stand-stage { animation: card-exit-win 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards; }

    @keyframes card-enter-win {
      0% { transform: translate(100%, 100%) rotateZ(-25deg) rotateY(30deg) rotateX(20deg) scale(0.6); opacity: 0; filter: brightness(2.5) blur(10px); animation-timing-function: cubic-bezier(0.1, 0.9, 0.2, 1); }
      25% { transform: translate(2%, 2%) rotateZ(-12deg) rotateY(5deg) rotateX(2deg) scale(1.02); opacity: 1; filter: brightness(1.1) blur(0px); animation-timing-function: linear; }
      100% { transform: translate(-5%, -5%) rotateZ(-15deg) rotateY(0deg) rotateX(0deg) scale(1.05); filter: brightness(1.1) blur(0px); opacity: 1; }
    }
    @keyframes card-exit-win {
      0% { transform: translate(-5%, -5%) rotateZ(-15deg) rotateY(0deg) rotateX(0deg) scale(1.05); opacity: 1; }
      100% { transform: translate(-150%, -100%) rotateZ(-30deg) rotateY(-20deg) rotateX(-20deg) scale(0.5); opacity: 0; filter: brightness(2) blur(10px); }
    }

    /* 🚀 對手單局勝利 (Lose)：滑入與緩飄 */
    .theme-lose.active #impact-stand-stage { animation: card-enter-lose 3s linear forwards; }
    .theme-lose.fade-out #impact-stand-stage { animation: card-exit-lose 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards; }

    @keyframes card-enter-lose {
      0% { transform: translate(-100%, -100%) rotateZ(15deg) rotateY(-30deg) rotateX(-20deg) scale(0.6); opacity: 0; filter: brightness(2.5) blur(10px); animation-timing-function: cubic-bezier(0.1, 0.9, 0.2, 1); }
      25% { transform: translate(-2%, -2%) rotateZ(-8deg) rotateY(-5deg) rotateX(-2deg) scale(1.02); opacity: 1; filter: brightness(1.1) blur(0px); animation-timing-function: linear; }
      100% { transform: translate(5%, 5%) rotateZ(-10deg) rotateY(0deg) rotateX(0deg) scale(1.05); filter: brightness(1.1) blur(0px); opacity: 1; }
    }
    @keyframes card-exit-lose {
      0% { transform: translate(5%, 5%) rotateZ(-10deg) rotateY(0deg) rotateX(0deg) scale(1.05); opacity: 1; }
      100% { transform: translate(150%, 100%) rotateZ(5deg) rotateY(20deg) rotateX(20deg) scale(0.5); opacity: 0; filter: brightness(2) blur(10px); }
    }

    /* 👑 最終決戰 (Final Match)：神級 3D 翻轉進場 */
    .is-final.active #impact-stand-stage {
      animation: final-card-enter 3s linear forwards !important;
      box-shadow: 0 0 60px rgba(241, 196, 15, 0.5), inset 0 0 30px rgba(255,255,255,0.6);
      border: 3px solid rgba(241, 196, 15, 0.8);
    }
    .is-final.fade-out #impact-stand-stage {
      animation: final-card-exit 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards !important;
    }

    @keyframes final-card-enter {
      0% { transform: scale(0) rotateY(720deg) rotateZ(10deg); opacity: 0; filter: brightness(3) blur(20px); animation-timing-function: cubic-bezier(0.1, 0.9, 0.2, 1); }
      25% { transform: scale(1.05) rotateY(0deg) rotateZ(0deg); opacity: 1; filter: brightness(1.15) blur(0px); animation-timing-function: linear; }
      100% { transform: scale(1.1) rotateY(5deg) rotateZ(-2deg); filter: brightness(1.15) blur(0px); opacity: 1; }
    }
    @keyframes final-card-exit {
      0% { transform: scale(1.1) rotateY(5deg) rotateZ(-2deg); opacity: 1; }
      100% { transform: translateY(-100%) scale(1.5) rotateX(45deg); opacity: 0; filter: brightness(3) blur(15px); }
    }

    /* ✨ 掃過立繪的流光特效 */
    #impact-stand-stage::after {
      content: ''; position: absolute; top: 0; left: -150%; width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), rgba(0,210,211,0.2), transparent);
      transform: skewX(-25deg); z-index: 5; pointer-events: none;
    }
    .active #impact-stand-stage::after { animation: light-sweep 1.2s 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
    @keyframes light-sweep { 0% { left: -150%; } 100% { left: 150%; } }

    /* 內容層：反向扭曲 */
    #impact-content { 
      position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; 
      width: 100%; height: 100%; justify-content: space-between;
      transform: skewX(-5deg); 
    }

    #impact-subtitle { font-size: 16px; color: #f1f2f6; letter-spacing: 8px; font-weight: bold; margin: 0; text-transform: uppercase; opacity: 0; transform: translateY(-20px); text-shadow: 0 2px 10px #000; }
    .active #impact-subtitle { animation: fade-down 0.5s 0.5s forwards; }
    @keyframes fade-down { to { opacity: 1; transform: translateY(0); } }
    
    /* ☄️ 狂暴砸字 */
    #impact-result { 
      font-size: 80px; font-weight: 900; letter-spacing: 15px; margin: -20px 0 0 0; text-transform: uppercase; 
      opacity: 0; transform: scale(3) rotate(-10deg); 
    }
    .active #impact-result { animation: text-slam 0.5s 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    @keyframes text-slam {
      0% { opacity: 0; transform: scale(3) rotate(-10deg) translateY(-20px); filter: blur(15px); letter-spacing: 40px; }
      60% { opacity: 1; transform: scale(0.9) rotate(5deg) translateY(0); filter: blur(0px); letter-spacing: 4px; }
      100% { opacity: 1; transform: scale(1) rotate(0deg); filter: blur(0px); letter-spacing: 6px; } 
    }

    /* 👑 最終決戰專屬砸字 */
    .is-final.active #impact-result { animation: final-text-slam 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards !important; }
    @keyframes final-text-slam {
      0% { opacity: 0; transform: scale(5) translateY(-50px) rotateX(90deg); filter: blur(20px); letter-spacing: 50px; }
      50% { opacity: 1; transform: scale(0.8) translateY(0) rotateX(0deg); filter: blur(0px); letter-spacing: 2px; }
      100% { opacity: 1; transform: scale(1) rotateX(0deg); letter-spacing: 10px; }
    }

    .result-win { color: #fff; text-shadow: 0 0 15px rgba(0, 210, 211, 0.8), 0 0 40px rgba(0, 210, 211, 0.6), 0 0 80px rgba(0, 210, 211, 0.4); }
    .result-lose { color: #fff; text-shadow: 0 0 15px rgba(255, 107, 107, 0.8), 0 0 40px rgba(255, 107, 107, 0.6), 0 0 80px rgba(255, 107, 107, 0.4); }
    .result-draw { color: #fff; text-shadow: 0 0 15px rgba(241, 196, 15, 0.8), 0 0 40px rgba(241, 196, 15, 0.6), 0 0 80px rgba(241, 196, 15, 0.4); }

    /* 🥊 分數版 */
    .impact-score-board {
      display: flex; align-items: center; justify-content: center; gap: 25px; 
      background: rgba(0, 0, 0, 0.6); padding: 15px 40px; border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.8);
      transform: translateY(30px); opacity: 0;
    }
    .active .impact-score-board { animation: board-snap 0.5s 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    @keyframes board-snap { to { opacity: 1; transform: translateY(0); } }

    .score-col { display: flex; flex-direction: column; align-items: center; }
    .score-number { font-size: 60px; font-weight: 900; line-height: 1; opacity: 0; transform: scale(0.3); }
    .active .score-number { animation: score-pop 0.6s 0.9s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    @keyframes score-pop { 0% { opacity: 0; transform: scale(0.3); } 70% { transform: scale(1.1); } 100% { opacity: 1; transform: scale(1); } }

    .score-label { font-size: 11px; color: #a4b0be; letter-spacing: 2px; margin-top: 5px; text-transform: uppercase; font-weight: bold; opacity: 0; }
    .active .score-label { animation: fade-up 0.5s 1.1s forwards; }

    #impact-my-score { color: #00d2d3; text-shadow: 0 0 20px rgba(0, 210, 211, 0.5); }
    #impact-op-score { color: #ff6b6b; text-shadow: 0 0 20px rgba(255, 107, 107, 0.5); }
    .score-vs { font-size: 20px; color: #576574; font-style: italic; font-weight: 900; opacity: 0; transform: scale(0); }
    .active .score-vs { animation: score-pop 0.4s 0.8s forwards; }

    /* ========================================= */
    /* 🗡️ 大招立繪切入 (Cut-in) 系統 CSS */
    /* ========================================= */
    #cutin-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh; z-index: 9000; pointer-events: none; overflow: hidden; }
    #cutin-overlay.active { display: block; }
    #cutin-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; }
    .active #cutin-bg { animation: cutinFade 1.5s forwards; }
    
    #cutin-lines {
      position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
      background: repeating-radial-gradient(circle at center, transparent 0, transparent 4px, rgba(255,255,255,0.1) 5px, rgba(255,255,255,0.1) 6px); opacity: 0;
    }
    .active #cutin-lines { animation: speedlines 0.2s linear infinite, cutinFade 1.5s forwards; }
    @keyframes speedlines { 0% { transform: scale(1); } 100% { transform: scale(1.5); } }

    #cutin-char {
      position: absolute; top: 50%; left: 100%; width: 150vw; height: 40vh; transform: translateY(-50%);
      background-size: contain; background-repeat: no-repeat; background-position: center;
    }
    .active #cutin-char { animation: charSlide 1.5s cubic-bezier(0.1, 0.8, 0.1, 1) forwards; }
    @keyframes charSlide {
      0% { left: 100%; transform: translate(0, -50%) skewX(-15deg); opacity: 0; }
      15% { left: 50%; transform: translate(-50%, -50%) skewX(0deg); opacity: 1; }
      85% { left: 45%; transform: translate(-50%, -50%) skewX(0deg); opacity: 1; }
      100% { left: -100%; transform: translate(-50%, -50%) skewX(15deg); opacity: 0; }
    }

    #cutin-text {
      position: absolute; top: 70%; left: 50%; transform: translate(-50%, -50%) scale(0);
      font-size: 45px; font-weight: 900; font-style: italic; white-space: nowrap;
    }
    .active #cutin-text { animation: textSmash 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    @keyframes textSmash {
      0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
      20% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
      80% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(1.5); opacity: 0; }
    }
    @keyframes cutinFade { 0% { opacity: 0; } 10% { opacity: 1; } 85% { opacity: 1; } 100% { opacity: 0; } }

    /* 🚀 修復：移除 hue-rotate，保留原色並加上不同顏色的強光 */
    .theme-fire #cutin-bg { background: radial-gradient(circle, #b33939 0%, #000 80%); }
    .theme-fire #cutin-text { color: #ff5252; text-shadow: 0 0 20px #ff5252, 0 5px 15px #000; }
    .theme-fire #cutin-char { filter: drop-shadow(0 0 25px #ff5252); }
    
    .theme-tech #cutin-bg { background: radial-gradient(circle, #0652DD 0%, #000 80%); }
    .theme-tech #cutin-text { color: #00d2d3; text-shadow: 0 0 20px #00d2d3, 0 5px 15px #000; }
    .theme-tech #cutin-char { filter: drop-shadow(0 0 25px #00d2d3); }
    
    .theme-magic #cutin-bg { background: radial-gradient(circle, #10ac84 0%, #000 80%); }
    .theme-magic #cutin-text { color: #1dd1a1; text-shadow: 0 0 20px #1dd1a1, 0 5px 15px #000; }
    .theme-magic #cutin-char { filter: drop-shadow(0 0 25px #1dd1a1); }
  </style>
</head>
<body>

<div id="cutin-overlay">
  <div id="cutin-bg"></div>
  <div id="cutin-lines"></div>
  <div id="cutin-char"></div>
  <div id="cutin-text">SKILL ACTIVATED</div>
</div>

<div class="card" id="main-card">
  <div id="progress-container" class="progress-bar" style="display:none;"><div id="progress-fill" class="progress-fill"></div></div>
  <div id="setup-zone">
    <h2 id="title-text" style="color:var(--primary-blue);">🎙️ 瑪麗安口說挑戰</h2>
    <p id="info-text">正在開啟麥克風...</p>
    <button class="btn" style="background:var(--primary-blue); font-size: 22px; padding: 18px 40px; border-bottom: 4px solid #003366;" id="start-btn" style="display:none;">開始挑戰</button>
  </div>
  <div id="studio" style="display:none;">
    <p style="color:var(--primary-blue); font-weight:bold;">第 <span id="idx-display">1</span> / <span id="total-display">0</span> 題</p>
    <div style="display: flex; align-items: center; justify-content: center; margin: 15px 0;">
      <h1 id="word-display" style="font-size: 46px; color:#0d47a1; margin: 0; text-shadow: 1px 1px 0 #fff;">載入中...</h1>
      <button id="play-btn" class="btn-play">🔊</button>
    </div>
    <div id="zh-display"></div>
    <button type="button" id="record-btn" oncontextmenu="return false;">🎤</button>
    <p id="status" style="font-weight:bold; color:#636e72;">按住錄音，放開打分</p>
    <div id="feedback" style="font-size: 26px; font-weight: 800; color: var(--marian-green); margin-top: 10px;"></div>
    <div style="margin-top: 30px; display:flex; justify-content:center;">
      <button class="btn btn-nav" id="prev-btn">◀ 上一題</button>
      <button class="btn btn-nav" id="next-btn">下一題 ▶</button>
      <button class="btn btn-nav" id="back-summary-btn" style="display:none; background:var(--marian-green); border-bottom:4px solid #1e8449;">返回結算頁</button>
    </div>
  </div>
  <div id="summary" style="display:none;">
    <h2 id="summary-title" style="color:var(--primary-blue); margin-bottom:5px;">學習總結</h2>
    <div id="score-zone">
      <p style="margin:0; color:#636e72;">平均分數</p>
      <div style="font-size: 64px; font-weight: 900; color:var(--marian-red);" id="total-avg">0</div>
      <p id="reward-hint" style="font-size: 18px; font-weight: bold; padding: 10px; border-radius: 10px;"></p>
    </div>
    <table id="word-list"></table>
    <button class="btn btn-finish" id="submit-btn" disabled>完成挑戰並領獎</button>
    <p id="lock-msg" style="color:var(--marian-red); font-size:14px; margin-top:10px; font-weight:bold;"></p>
  </div>
</div>

<div id="battle-portal-overlay" style="display:none;">
  
  <div class="portal-timer-modern">00:<span id="portal-countdown">60</span></div>

  <div class="portal-clash-container">
    
    <div id="portal-op-card" class="portal-card op-card">
      <div class="portal-name-tag" id="portal-op-name">OPPONENT</div>
    </div>

    <div class="portal-vs-spark">VS</div>

    <div id="portal-my-card" class="portal-card my-card">
      <div class="portal-name-tag" id="portal-my-name">YOU</div>
    </div>
    
  </div>

  <button id="portal-enter-btn" class="btn-cyber portal-btn-hidden" onclick="portalJump()">進入戰場</button>
</div>

<div id="battle-arena">
  <div id="skill-popup"></div>
  
  <div class="arena-section opponent-zone">
    <div class="glass-panel" style="margin-bottom: 5px;">
      <div style="display:flex; align-items:center; gap:8px;">
        <span style="font-size:11px; color:#a4b0be; font-weight:bold; letter-spacing:1px;">OPPONENT</span>
        <span id="op-name" style="color:#eb3b5a; font-weight:900; font-size:15px;">連線中...</span>
      </div>
      <div id="op-rounds" class="rounds-container" style="margin:0;"></div>
    </div>
    <div id="op-card" class="card-entity"></div>
  </div>

  <div class="arena-section stage-zone">
    <div style="text-align: center; width: 100%;">
      <div id="round-num" style="color:#a4b0be; font-size: 14px; font-weight:bold; margin-bottom:5px;">第 1 局 / 先得 5 分獲勝</div>
      <h1 id="target-word" style="margin-bottom: 5px;">準備中...</h1>
      
      <div id="battle-timer-container">
        <div id="battle-timer">60</div>
      </div>
      
      <div id="battle-info" style="color:#a4b0be; font-size:14px; margin-top:5px;">正在等待雙方就緒...</div>
    </div>
  </div>

  <div class="arena-section player-zone">
    <div class="glass-panel" style="margin-bottom: 5px;">
      <div id="my-rounds" class="rounds-container" style="margin:0;"></div>
      <div style="display:flex; align-items:center; gap:8px;">
        <span id="my-name" style="color:#0fb9b1; font-weight:900; font-size:15px;"></span>
        <span style="font-size:11px; color:#a4b0be; font-weight:bold; letter-spacing:1px;">YOU</span>
      </div>
    </div>
    <div id="my-card" class="card-entity"></div>
    
    <div id="battle-controls" style="visibility: hidden;">
      <button id="skill-btn" onclick="activateSkill()">👊 技能重擊 (1/1)</button>
      <button id="battle-record-btn" oncontextmenu="return false;">🎤</button>
    </div>
  </div>
</div>

<div id="impact-overlay">
  <div id="impact-stand-stage">
    <div id="impact-content">
      
      <div style="margin-top: 20px; text-align: center;">
        <p id="impact-subtitle">ROUND RESULT</p>
        <h1 id="impact-result">WIN</h1>
      </div>
      
      <div class="impact-score-board" style="margin-bottom: 20px;">
        <div class="score-col">
          <span id="impact-my-score" class="score-number">0</span>
          <span class="score-label">YOU</span>
        </div>
        <div class="score-vs">VS</div>
        <div class="score-col">
          <span id="impact-op-score" class="score-number">0</span>
          <span class="score-label">OPPONENT</span>
        </div>
      </div>
      
    </div>
  </div>
</div>

<script>
  const GAS_URL = "https://script.google.com/macros/s/AKfycbyWm-WnRO5h3dliEPR36Cq1hCf5DgM4GIgJqXVUREclhtYOHjxq9DptApmQPkU5p5Ys/exec";
  const params = new URLSearchParams(window.location.search);
  const STUDENT_ID = params.get('id') || "S001";
  const TARGET_UNIT = params.get('unit') || "";
  const MODE = params.get('mode') || "challenge";
  const ROOM_ID = params.get('roomId');

  let stream, mediaRecorder, chunks = [], quizData = [], scores = [], currentIndex = 0, isReReading = false;
  let audioContext, analyser, dataArray, source, gradingInterval;
  let maxVolume = 0;
  
  let hasUsedSkill = false; 
  let isUltimateMode = false; 

  let battleQuizArr = [], currentBattleRound = 0;
  let readyTimer = null, currentLimitTimer = null, waitOpTimer = null, syncTimer = null; 
  let myTotalWins = 0, opTotalWins = 0;
  let roundSubmitted = false, isChecking = false, opponentWaitTimer = null;

  function normalizeStr(val) { if (!val) return ""; return String(val).replace(/(%20|\s)+/ig, "").toUpperCase(); }

  function activateSkill() {
    if (hasUsedSkill) return;
    hasUsedSkill = true;
    isUltimateMode = true;
    document.getElementById('skill-btn').style.display = 'none';
    document.getElementById('battle-arena').classList.add('ultimate-mode-bg');
    document.getElementById('target-word').classList.add('ultimate-word');
    const rb = document.getElementById('battle-record-btn');
    rb.classList.add('ultimate-record-btn');
    rb.innerHTML = "👊";
  }

  const originalOnload = async () => {
    if(MODE === 'review') document.getElementById('title-text').innerText = "📖 自由練習模式";
    try {
      stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      audioContext = new (window.AudioContext || window.webkitAudioContext)();
      analyser = audioContext.createAnalyser();
      source = audioContext.createMediaStreamSource(stream);
      source.connect(analyser);
      analyser.fftSize = 256;
      dataArray = new Uint8Array(analyser.frequencyBinCount);
      document.getElementById('info-text').innerText = "麥克風已就緒";
      document.getElementById('start-btn').style.display = 'inline-block';
    } catch (e) { alert("請開啟麥克風權限"); }
  };

  window.onload = async () => {
    if (MODE === 'battle' && ROOM_ID) {
      document.getElementById('main-card').style.display = 'none';
      document.getElementById('impact-overlay').classList.remove('active');
      try {
        stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioContext.createAnalyser();
        source = audioContext.createMediaStreamSource(stream);
        source.connect(analyser);
        showPortal();
      } catch(err) { alert("請開啟麥克風權限才能對戰！"); }
    } else {
      await originalOnload();
    }
  };
  
  function showPortal() {
    const portal = document.getElementById('battle-portal-overlay');
    portal.style.display = 'flex';
    let pCount = 60;
    
    const pTimer = setInterval(() => {
      pCount--;
      document.getElementById('portal-countdown').innerText = pCount;
      if(pCount <= 0) { clearInterval(pTimer); location.reload(); }
    }, 1000);

    fetch(`${GAS_URL}?action=get_battle_status&roomId=${ROOM_ID}&t=${new Date().getTime()}`)
      .then(res => res.json()).then(data => {
        const isMeHost = (normalizeStr(STUDENT_ID) === normalizeStr(data.hostId));

        // 判定名稱
        const myName = isMeHost ? data.hostName : (data.guestName || "挑戰者");
        const opName = isMeHost ? (data.guestName || "等待對手...") : data.hostName;

        // 判定圖片
        const myImgUrl = isMeHost ? data.hostImg : data.guestImg;
        const opImgUrl = isMeHost ? data.guestImg : data.hostImg;

        // 填入姓名版
        document.getElementById('portal-my-name').innerText = myName;
        document.getElementById('portal-op-name').innerText = opName;

        // 填入背景卡片
        if(myImgUrl) document.getElementById('portal-my-card').style.backgroundImage = `url('${myImgUrl}')`;
        if(opImgUrl) document.getElementById('portal-op-card').style.backgroundImage = `url('${opImgUrl}')`;

        // 🚀 資料載入完畢，觸發史詩級對撞動畫！
        document.getElementById('portal-my-card').classList.add('clash-in-my');
        document.getElementById('portal-op-card').classList.add('clash-in-op');
        document.querySelector('.portal-vs-spark').classList.add('spark-active');

        // 秀出帥氣的進入戰場按鈕
        const enterBtn = document.getElementById('portal-enter-btn');
        enterBtn.classList.remove('portal-btn-hidden');
        enterBtn.classList.add('portal-btn-show');

        // 綁定跳轉功能
        window.portalJump = () => {
          clearInterval(pTimer);
          portal.style.display = 'none';
          document.getElementById('battle-arena').style.display = 'flex';
          setTimeout(() => { document.getElementById('battle-arena').classList.add('battle-ready'); }, 100);
          fetchBattleDataAndStart(ROOM_ID);
        };
      }).catch(err => {
        console.error("Portal Error:", err);
        // 如果連線失敗的備用按鈕顯示
        const enterBtn = document.getElementById('portal-enter-btn');
        enterBtn.innerText = "強制進入";
        enterBtn.classList.remove('portal-btn-hidden');
        enterBtn.classList.add('portal-btn-show');
        
        window.portalJump = () => {
          clearInterval(pTimer);
          portal.style.display = 'none';
          document.getElementById('battle-arena').style.display = 'flex';
          fetchBattleDataAndStart(ROOM_ID);
        };
      });
  }

  function renderWord() {
    const current = quizData[currentIndex];
    document.getElementById('idx-display').innerText = currentIndex + 1;
    document.getElementById('word-display').innerText = current.en;
    document.getElementById('zh-display').innerText = current.zh;
    document.getElementById('feedback').innerText = scores[currentIndex] !== null ? "得分：" + scores[currentIndex] : "";
    document.getElementById('record-btn').style.display = 'block';
    document.getElementById('progress-fill').style.width = (((currentIndex + 1) / quizData.length) * 100) + "%";
    if (isReReading) {
      document.getElementById('prev-btn').style.display = 'none';
      document.getElementById('next-btn').style.display = 'none';
      document.getElementById('back-summary-btn').style.display = 'inline-block';
    } else {
      document.getElementById('prev-btn').style.display = 'inline-block';
      document.getElementById('next-btn').style.display = 'inline-block';
      document.getElementById('back-summary-btn').style.display = 'none';
      document.getElementById('prev-btn').disabled = currentIndex === 0;
      document.getElementById('next-btn').innerText = currentIndex === quizData.length - 1 ? "查看結算" : "下一題 ▶";
    }
  }

  let isGrading = false; 
  let tooQuietFlag = false; 

  const rb = document.getElementById('record-btn');
  if(rb) {
    rb.onpointerdown = (e) => {
      if(isGrading) return;
      e.preventDefault(); 
      document.getElementById('feedback').innerHTML = ""; 
      maxVolume = 0; chunks = []; tooQuietFlag = false;
      
      mediaRecorder = new MediaRecorder(stream);
      mediaRecorder.ondataavailable = ev => chunks.push(ev.data);
      
      mediaRecorder.onstop = () => {
        if (tooQuietFlag) {
          isGrading = false;
          rb.style.opacity = "1";
          return; 
        }
        isGrading = true;
        rb.style.opacity = "0.5";
        
        if (gradingInterval) clearInterval(gradingInterval);
        let dots = 0;
        gradingInterval = setInterval(() => { 
          dots = (dots + 1) % 4; 
          document.getElementById('status').innerText = "老師評分中" + ".".repeat(dots); 
        }, 400);

        const reader = new FileReader();
        reader.readAsDataURL(new Blob(chunks, { type: 'audio/webm' }));
        reader.onloadend = () => {
          const base64 = reader.result.split(',')[1];
          fetch(`${GAS_URL}?action=evaluate_speech&word=${encodeURIComponent(quizData[currentIndex].en)}`, { method: 'POST', body: base64 })
            .then(res => res.json()).then(data => {
              clearInterval(gradingInterval);
              scores[currentIndex] = data.score;
              if(!window.feedbacks) window.feedbacks = [];
              window.feedbacks[currentIndex] = data.feedback;
              document.getElementById('feedback').innerHTML = `得分：${data.score}<br><small>${data.feedback}</small>`;
              document.getElementById('status').innerText = "評分完成！";
              isGrading = false;
              rb.style.opacity = "1";
            }).catch(() => {
              clearInterval(gradingInterval);
              document.getElementById('status').innerText = "連線超時，請重新錄音";
              isGrading = false;
              rb.style.opacity = "1";
            });
        };
      };

      mediaRecorder.start(); 
      rb.classList.add('active');
      document.getElementById('status').innerText = "正在錄音中...";
      const checkVol = () => { if (mediaRecorder.state === "recording") { analyser.getByteFrequencyData(dataArray); let v = 0; for (let i = 0; i < dataArray.length; i++) v += dataArray[i]; if ((v / dataArray.length) > maxVolume) maxVolume = (v / dataArray.length); requestAnimationFrame(checkVol); } }; checkVol();
    };

    rb.onpointerup = () => {
      if (!mediaRecorder || mediaRecorder.state !== "recording") return;
      rb.classList.remove('active');
      if (maxVolume < 30) { 
        tooQuietFlag = true; 
        document.getElementById('status').innerText = "太小聲了，再大聲點！";
        mediaRecorder.stop();
      } else {
        mediaRecorder.stop();
      }
    };
  }

  document.getElementById('play-btn').onclick = () => { window.speechSynthesis.cancel(); const msg = new SpeechSynthesisUtterance(quizData[currentIndex].en); msg.lang = 'en-US'; window.speechSynthesis.speak(msg); };
  document.getElementById('prev-btn').onclick = () => { if(currentIndex > 0){ currentIndex--; renderWord(); } };
  document.getElementById('next-btn').onclick = () => { if (currentIndex < quizData.length - 1) { currentIndex++; renderWord(); } else { showSummary(); } };
  document.getElementById('back-summary-btn').onclick = () => { isReReading = false; showSummary(); };

  function showSummary() {
    document.getElementById('studio').style.display = 'none';
    document.getElementById('summary').style.display = 'block';
    let sum = 0, count = 0;
    const list = document.getElementById('word-list');
    list.innerHTML = "";

    quizData.forEach((item, i) => {
      let s = scores[i] || 0;
      let f = (window.feedbacks && window.feedbacks[i]) ? window.feedbacks[i] : "尚未錄音";
      sum += s; count++;
      list.innerHTML += `<tr><td><b style="color:#0d47a1">${item.en}</b><br><span style="color:#7f8c8d; font-size:14px">${item.zh}</span><br><p style="margin:5px 0; font-size:13px; color:#e67e22;">💡 ${f}</p><button class="btn-re" onclick="reRead(${i})">🔄 重唸</button></td><td><span class="score-badge">${s} 分</span></td></tr>`;
    });

    const avg = count > 0 ? Math.round(sum / count) : 0;
    document.getElementById('total-avg').innerText = avg;

    const submitBtn = document.getElementById('submit-btn');
    const lockMsg = document.getElementById('lock-msg');
    const rewardHint = document.getElementById('reward-hint');

    if (MODE === 'review') {
      submitBtn.removeAttribute('disabled');
      submitBtn.style.backgroundColor = "var(--marian-green)";
      submitBtn.innerText = "完成練習";
    } else {
      if (avg >= 70) {
        submitBtn.removeAttribute('disabled');
        submitBtn.disabled = false;
        submitBtn.style.opacity = "1";
        submitBtn.style.pointerEvents = "auto";
        submitBtn.style.backgroundColor = "#27ae60"; 
        lockMsg.innerText = "";
        let reward = avg >= 90 ? 50 : (avg >= 80 ? 30 : 10);
        rewardHint.innerText = `🎁 可獲得：${reward} 點`;
      } else {
        submitBtn.setAttribute('disabled', 'true');
        submitBtn.style.backgroundColor = "#636e72"; 
        lockMsg.innerText = "❌ 平均需達 70 分才能領獎";
        rewardHint.innerText = "";
      }
    }
    submitBtn.onclick = handleClaimReward;
  }

  function handleClaimReward() {
    const btn = document.getElementById('submit-btn');
    const avg = parseInt(document.getElementById('total-avg').innerText);
    
    btn.innerText = "正在儲存中...";
    btn.style.pointerEvents = "none";
    btn.style.backgroundColor = "#95a5a6";

    const finalUrl = `${GAS_URL}?id=${STUDENT_ID}&action=add_score&score=${avg}&mode=${MODE}`;
    fetch(finalUrl, { mode: 'no-cors' })
      .then(() => { 
        alert(MODE === 'review' ? "👍 練習辛苦了！" : "🎉 挑戰完成！"); 
        window.location.href = `${GAS_URL}?id=${STUDENT_ID}`; 
      }).catch(err => {
        console.log("Fetch 失敗，啟動備案...", err);
        const img = new Image();
        img.src = finalUrl;
        setTimeout(() => {
          alert("🎉 挑戰完成！");
          window.location.href = `${GAS_URL}?id=${STUDENT_ID}`;
        }, 1000);
      });
  }
  
  function reRead(i) { currentIndex = i; isReReading = true; document.getElementById('summary').style.display = 'none'; document.getElementById('studio').style.display = 'block'; renderWord(); }
  document.getElementById('submit-btn').onclick = () => {
    const avg = parseInt(document.getElementById('total-avg').innerText);
    fetch(`${GAS_URL}?id=${STUDENT_ID}&action=add_score&score=${avg}&mode=${MODE}`)
      .then(() => { 
        alert(MODE === 'review' ? "👍 練習辛苦了！" : "🎉 挑戰完成！"); 
        window.location.href = `${GAS_URL}?id=${STUDENT_ID}`; 
      });
  };

  // =======================================================
  // ⚔️ 對戰室外掛引擎
  // =======================================================
  function fetchBattleDataAndStart(roomId) {
    fetch(`${GAS_URL}?action=get_battle_status&roomId=${roomId}&t=${new Date().getTime()}`)
      .then(res => res.json()).then(data => {
        if(data.status === "NotFound") { alert("房間失效"); window.location.href = `${GAS_URL}?id=${STUDENT_ID}`; return; }
        battleQuizArr = data.quiz; 
        initArena(roomId);
      });
  }

  function initArena(roomId) {
    currentBattleRound = 0;
    document.getElementById('target-word').innerText = "戰場同步中...";
    document.getElementById('battle-timer').innerText = "60";
    document.getElementById('round-num').innerText = "規則：先得 5 分者勝";
    document.getElementById('battle-info').innerText = "正在等待雙方就緒...";
    
    document.getElementById('battle-controls').style.visibility = 'hidden';
    updateArenaUI(roomId, true);

    fetch(`${GAS_URL}?action=arena_ready&id=${STUDENT_ID}&roomId=${roomId}&t=${new Date().getTime()}`)
      .then(() => {
        let waitCount = 60;
        if(syncTimer) clearInterval(syncTimer);
        syncTimer = setInterval(() => {
          waitCount--;
          document.getElementById('battle-timer').innerText = waitCount;
          
          fetch(`${GAS_URL}?action=get_battle_status&roomId=${roomId}&t=${new Date().getTime()}`)
            .then(res => res.json()).then(data => {
              if (data.hostScores && data.guestScores && data.hostScores.length > 0 && data.guestScores.length > 0) {
                clearInterval(syncTimer);
                startRoundCountdown(roomId);
              }
              if (data.status === "Canceled") { clearInterval(syncTimer); alert("對戰取消"); location.reload(); }
            });

          if (waitCount <= 0) { clearInterval(syncTimer); alert("等待超時"); location.reload(); }
        }, 2000);
      });
  }

  function updateArenaUI(roomId, isInit = false) {
    fetch(`${GAS_URL}?action=get_battle_status&roomId=${roomId}&t=${new Date().getTime()}`)
      .then(res => res.json()).then(data => {
        const isMeHost = (normalizeStr(STUDENT_ID) === normalizeStr(data.hostId));
        document.getElementById('my-name').innerText = isMeHost ? data.hostName : (data.guestName || "挑戰者");
        document.getElementById('op-name').innerText = isMeHost ? (data.guestName || "對手") : data.hostName;

        window.myTheme = isMeHost ? data.hostTheme : data.guestTheme;
        window.opTheme = isMeHost ? data.guestTheme : data.hostTheme;

        const myCard = document.getElementById('my-card');
        const opCard = document.getElementById('op-card');
        
        if (isMeHost) {
            if(data.hostImg) myCard.style.backgroundImage = `url('${data.hostImg}')`;
            if(data.guestImg) opCard.style.backgroundImage = `url('${data.guestImg}')`;
        } else {
            if(data.guestImg) myCard.style.backgroundImage = `url('${data.guestImg}')`;
            if(data.hostImg) opCard.style.backgroundImage = `url('${data.hostImg}')`;
        }

        document.getElementById('battle-arena').classList.add('battle-ready');

        const hS = data.hostScores.filter(s => s !== -1);
        const gS = data.guestScores.filter(s => s !== -1);
        myTotalWins = 0; opTotalWins = 0;
        const commonLen = Math.min(hS.length, gS.length);
        for(let i=0; i < commonLen; i++) { 
           if(hS[i] > gS[i]) isMeHost ? myTotalWins++ : opTotalWins++; 
           else if(gS[i] > hS[i]) isMeHost ? opTotalWins++ : myTotalWins++; 
        }
        document.getElementById('my-rounds').innerHTML = renderDots(myTotalWins, true);
        document.getElementById('op-rounds').innerHTML = renderDots(opTotalWins, false);
      });
  }

  function renderDots(wins, isMe) {
    let html = ''; const winClass = isMe ? 'dot-me' : 'dot-op';
    for(let i=0; i<5; i++) { html += `<div class="round-dot ${i < wins ? winClass : ''}"></div>`; } 
    return html;
  }

  function startRoundCountdown(roomId) {
    if(readyTimer) clearInterval(readyTimer);
    if(currentLimitTimer) clearInterval(currentLimitTimer);
    if(waitOpTimer) clearInterval(waitOpTimer);
    
    if (currentBattleRound >= 10) { 
       setTimeout(() => { showImpactOverlay(myTotalWins, opTotalWins, true); setTimeout(() => window.location.href = `${GAS_URL}?id=${STUDENT_ID}`, 5000); }, 1000);
       return; 
    }
    
    let count = 3; roundSubmitted = false;
    
    const myCard = document.getElementById('my-card');
    const opCard = document.getElementById('op-card');
    const arenaBg = document.getElementById('battle-arena');
    const allAnims = ['cast-me', 'cast-op', 'blast-up', 'blast-down', 'blast-ultimate', 'loser-shatter', 'take-damage', 'screen-flash-red', 'screen-flash-cyan', 'screen-flash-gold', 'winner-glory'];
    if(myCard) myCard.classList.remove(...allAnims);
    if(opCard) opCard.classList.remove(...allAnims);
    if(arenaBg) arenaBg.classList.remove('screen-flash-red', 'screen-flash-cyan', 'screen-flash-gold');

    isUltimateMode = false;
    arenaBg.classList.remove('ultimate-mode-bg');
    document.getElementById('target-word').classList.remove('ultimate-word');
    const rb = document.getElementById('battle-record-btn');
    rb.classList.remove('ultimate-record-btn');
    rb.innerHTML = "🎤";

    const skillBtn = document.getElementById('skill-btn');
    if (skillBtn) skillBtn.style.display = hasUsedSkill ? 'none' : 'block';

    document.getElementById('round-num').innerText = `第 ${currentBattleRound + 1} 局 / 先得 5 分獲勝`;
    document.getElementById('target-word').innerText = "READY?";
    document.getElementById('battle-timer').innerText = "";
    document.getElementById('battle-controls').style.visibility = 'hidden';
    
    readyTimer = setInterval(() => {
      document.getElementById('battle-timer').innerText = count;
      count--;
      if (count < 0) {
        clearInterval(readyTimer);
        document.getElementById('target-word').innerText = battleQuizArr[currentBattleRound].en;
        document.getElementById('battle-timer').innerText = "";
        document.getElementById('battle-controls').style.visibility = 'visible';
        document.getElementById('battle-info').innerText = "限時 10 秒發動攻擊！";
        startRecordingBattle(roomId);
      }
    }, 1000);
  }

  function startRecordingBattle(roomId) {
    let limit = 10;
    document.getElementById('battle-timer').innerText = limit;
    if(currentLimitTimer) clearInterval(currentLimitTimer);
    currentLimitTimer = setInterval(() => {
      limit--;
      if (limit > 0) document.getElementById('battle-timer').innerText = limit;
      else {
        clearInterval(currentLimitTimer);
        if (!roundSubmitted) { roundSubmitted = true; if (mediaRecorder && mediaRecorder.state === "recording") mediaRecorder.stop(); submitBattleScore(roomId, 0); }
      }
    }, 1000);
  }

  const battleBtn = document.getElementById('battle-record-btn');
  if(battleBtn) {
    battleBtn.onpointerdown = (e) => {
      if (roundSubmitted) return;
      e.preventDefault(); maxVolume = 0; chunks = [];
      mediaRecorder = new MediaRecorder(stream);
      mediaRecorder.ondataavailable = ev => chunks.push(ev.data);
      mediaRecorder.start(); 
      
      const myCard = document.getElementById('my-card');
      if (isUltimateMode) {
          battleBtn.classList.add('ult-active');
          if(myCard) myCard.classList.add('ultimate-charging');
      } else {
          battleBtn.classList.add('active');
          if(myCard) myCard.classList.add('charging-mana');
      }

      const check = () => { if (mediaRecorder && mediaRecorder.state === "recording") { analyser.getByteFrequencyData(dataArray); let v = 0; for(let i=0; i<dataArray.length; i++) v += dataArray[i]; if((v/dataArray.length) > maxVolume) maxVolume = v/dataArray.length; requestAnimationFrame(check); } }; check();
    };

    battleBtn.onpointerup = () => {
      if (roundSubmitted || !mediaRecorder || mediaRecorder.state !== "recording") return;
      roundSubmitted = true; clearInterval(currentLimitTimer);
      mediaRecorder.stop(); 
      
      battleBtn.classList.remove('active', 'ult-active');
      const myCard = document.getElementById('my-card');
      if (myCard) {
          myCard.classList.remove('charging-mana', 'ultimate-charging');
      }

      mediaRecorder.onstop = () => {
        const r = new FileReader(); r.readAsDataURL(new Blob(chunks, { type: 'audio/webm' }));
        r.onloadend = () => {
          fetch(`${GAS_URL}?action=evaluate_speech_battle&word=${encodeURIComponent(battleQuizArr[currentBattleRound].en)}`, { method: 'POST', body: r.result.split(',')[1] })
            .then(res => res.json()).then(data => submitBattleScore(ROOM_ID, data.score)).catch(() => submitBattleScore(ROOM_ID, 0));
        };
      };
    };
  }

  // 🗡️ 大招動畫播放器 (接收後端主題，如果沒有就隨機)
  function playCutinAnimation(avatarUrl, isMyUlt) {
      const overlay = document.getElementById('cutin-overlay');
      const char = document.getElementById('cutin-char');
      
      char.style.backgroundImage = avatarUrl;
      
      let theme = isMyUlt ? window.myTheme : window.opTheme;
      if (!theme) {
          const themes = ['theme-fire', 'theme-tech', 'theme-magic'];
          theme = themes[Math.floor(Math.random() * themes.length)];
      }
      
      overlay.className = theme; 
      overlay.classList.add('active');

      setTimeout(() => {
          overlay.classList.remove('active');
      }, 1500);
  }

  function submitBattleScore(roomId, score) {
    if (currentLimitTimer) clearInterval(currentLimitTimer);
    
    document.getElementById('battle-controls').style.visibility = 'hidden';

    const myCard = document.getElementById('my-card');
    if(myCard) myCard.classList.remove('charging-mana', 'ultimate-charging');
    const bBtn = document.getElementById('battle-record-btn');
    if(bBtn) bBtn.classList.remove('active', 'ult-active');

    // 🚀 大招機制判斷
    let finalScore = score;
    let delayTime = 0; 

    if (isUltimateMode) {
        finalScore = score + 1000; 
        delayTime = 1500; 
    }

    setTimeout(() => {
        document.getElementById('battle-timer').innerHTML = `<span class="neon-score">得分：${score}</span>`;
        document.getElementById('battle-info').innerText = "等待對手...";
    }, 0); 

    fetch(`${GAS_URL}?action=submit_battle_score&id=${STUDENT_ID}&roomId=${roomId}&score=${finalScore}&t=${new Date().getTime()}`)
      .then(() => { 
        if(waitOpTimer) clearInterval(waitOpTimer); 
        waitOpTimer = setInterval(() => checkBoth(roomId), 2000); 
      });
  }

  function updateCardDamage(cardElement, damageLevel) {
    if(!cardElement) return;
    cardElement.classList.remove('dmg-1', 'dmg-2', 'dmg-3', 'dmg-4');
    if(damageLevel === 1) cardElement.classList.add('dmg-1');
    if(damageLevel === 2) cardElement.classList.add('dmg-2');
    if(damageLevel === 3) cardElement.classList.add('dmg-3');
    if(damageLevel >= 4) cardElement.classList.add('dmg-4');
  }

  function showSkillPopup(text, color) {
      const popup = document.getElementById('skill-popup');
      if(!popup) return;
      popup.innerText = text;
      popup.style.color = color;
      popup.style.textShadow = `0 4px 10px rgba(0,0,0,0.8), 0 0 20px ${color}`;
      popup.classList.remove('popup-anim');
      void popup.offsetWidth; 
      popup.classList.add('popup-anim');
  }

  // 🛡️ [未改動原邏輯] 僅在括號內新增 myImgUrl, opImgUrl
  function triggerBattleAnimations(myNum, opNum, isFinal, myTotalWins, opTotalWins, isMyUlt, isOpUlt, myImgUrl, opImgUrl) {
    const myCard = document.getElementById('my-card'); 
    const opCard = document.getElementById('op-card');
    const arenaBg = document.getElementById('battle-arena');

    const animations = ['cast-me', 'cast-me-ult', 'cast-op', 'cast-op-ult', 'blast-up', 'blast-down', 'blast-ultimate', 'blast-ultimate-down', 'loser-shatter', 'take-damage', 'screen-flash-red', 'screen-flash-cyan', 'screen-flash-gold', 'winner-glory'];
    if(myCard) myCard.classList.remove(...animations); 
    if(opCard) opCard.classList.remove(...animations);
    if(arenaBg) arenaBg.classList.remove('screen-flash-red', 'screen-flash-cyan', 'screen-flash-gold');
    void myCard.offsetWidth; void opCard.offsetWidth;

    let delayBeforeAttack = 0;
    if (myNum > opNum && isMyUlt) {
        playCutinAnimation(myCard.style.backgroundImage, true);
        delayBeforeAttack = 1500; 
    } else if (opNum > myNum && isOpUlt) {
        playCutinAnimation(opCard.style.backgroundImage, false);
        delayBeforeAttack = 1500;
    }

    setTimeout(() => {
        if (myNum > opNum) { 
          if(myCard) {
            if (isMyUlt) {
                myCard.classList.add('cast-me-ult', 'blast-ultimate'); 
                if(arenaBg) arenaBg.classList.add('screen-flash-gold');
                showSkillPopup("👊 技能重擊 +2 燈！", "#f1c40f");
            } else {
                myCard.classList.add('cast-me', 'blast-up'); 
                if(arenaBg) arenaBg.classList.add('screen-flash-cyan'); 
            }
            if(isFinal) setTimeout(() => myCard.classList.add('winner-glory'), 800);
          }
          if(opCard) opCard.classList.add(isFinal ? 'loser-shatter' : 'take-damage'); 
        }
        else if (myNum < opNum) { 
          if (isMyUlt) showSkillPopup("❌ 技能被打斷...", "#e74c3c");
          if(opCard) {
            if (isOpUlt) {
                opCard.classList.add('cast-op-ult', 'blast-ultimate-down'); 
                if(arenaBg) arenaBg.classList.add('screen-flash-gold');
                showSkillPopup("⚠️ 對手發動技能重擊！", "#e74c3c");
            } else {
                opCard.classList.add('cast-op', 'blast-down'); 
                if(arenaBg) arenaBg.classList.add('screen-flash-red'); 
            }
            if(isFinal) setTimeout(() => opCard.classList.add('winner-glory'), 800);
          }
          if(myCard) myCard.classList.add(isFinal ? 'loser-shatter' : 'take-damage');
        }
        else {
          if (isMyUlt) showSkillPopup("⚠️ 技能被抵銷 (平手)", "#f39c12");
        }

        updateCardDamage(myCard, opTotalWins);
        updateCardDamage(opCard, myTotalWins);

        setTimeout(() => {
          // 🚀 [唯一更動]：把圖片參數傳遞給顯示畫面的函數
          showImpactOverlay(myNum, opNum, isFinal, myImgUrl, opImgUrl);
        }, 1600); 

    }, delayBeforeAttack); 
  }

  // 2. 檢查雙方分數 (已修改總展示時間)
  function checkBoth(roomId) {
    if(isChecking) return; isChecking = true;
    fetch(`${GAS_URL}?action=get_battle_status&roomId=${roomId}&t=${new Date().getTime()}`)
      .then(res => res.json()).then(data => {
        const hS = data.hostScores.filter(s => s !== -1);
        const gS = data.guestScores.filter(s => s !== -1);

        if (hS.length > currentBattleRound && gS.length > currentBattleRound) {
          clearInterval(waitOpTimer);
          
          const isMeHost = (normalizeStr(STUDENT_ID) === normalizeStr(data.hostId));
          const rawMyS = isMeHost ? hS[currentBattleRound] : gS[currentBattleRound];
          const rawOpS = isMeHost ? gS[currentBattleRound] : hS[currentBattleRound];
          
          const myImgUrl = isMeHost ? data.hostImg : data.guestImg;
          const opImgUrl = isMeHost ? data.guestImg : data.hostImg;

          const myUltThisRound = rawMyS > 500;
          const opUltThisRound = rawOpS > 500;

          const myS = myUltThisRound ? rawMyS - 1000 : rawMyS;
          const opS = opUltThisRound ? rawOpS - 1000 : rawOpS;
        
          myTotalWins = 0; opTotalWins = 0;
          for(let i=0; i <= currentBattleRound; i++) {
              let rawM = isMeHost ? hS[i] : gS[i];
              let rawO = isMeHost ? gS[i] : hS[i];
              let isMU = rawM > 500;
              let isOU = rawO > 500;
              let finalM = isMU ? rawM - 1000 : rawM;
              let finalO = isOU ? rawO - 1000 : rawO;
              if(finalM > finalO) myTotalWins += (isMU ? 2 : 1);
              else if(finalO > finalM) opTotalWins += (isOU ? 2 : 1);
          }

          document.getElementById('my-rounds').innerHTML = renderDots(myTotalWins, true);
          document.getElementById('op-rounds').innerHTML = renderDots(opTotalWins, false);

          const isFinal = (myTotalWins >= 5 || opTotalWins >= 5 || currentBattleRound >= 9);
        
          // ... 前面的代碼保持不變 ...
          triggerBattleAnimations(myS, opS, isFinal, myTotalWins, opTotalWins, myUltThisRound, opUltThisRound, myImgUrl, opImgUrl);
        
          let delayBeforeAttack = ( (myS > opS && myUltThisRound) || (opS > myS && opUltThisRound) ) ? 1500 : 0;
          
          // 🚀 縮短展示時間：攻擊前置 + 光球動畫(1600) + 展示(2800ms) = 完美銜接
          // 動畫全長 3s，我們在 2.8s 時切換退場，卡片就不會停下來發呆！
          let totalWaitTime = delayBeforeAttack + 1600 + 2800; 

          setTimeout(() => {
              const overlay = document.getElementById('impact-overlay');
              // 🚀 觸發帥氣的飛出退場動畫！
              overlay.classList.add('fade-out');
              
              // 等 0.6 秒滑出動畫播完後，再跳轉或切換下一局
              setTimeout(() => {
                  overlay.classList.remove('active', 'fade-out'); 
                  if (isFinal) { window.location.href = `${GAS_URL}?id=${STUDENT_ID}`; } 
                  else { currentBattleRound++; startRoundCountdown(roomId); }
              }, 600);
          }, totalWaitTime);
        }
        isChecking = false;
      }).catch(() => isChecking = false);
  }

  // 🚀 重新打造的顯示畫面函數，支援最終決戰 (Final Match) 的神級展現
  function showImpactOverlay(myNum, opNum, isFinal, myImgUrl, opImgUrl) {
    const o = document.getElementById('impact-overlay');
    const r = document.getElementById('impact-result'); 
    const sub = document.getElementById('impact-subtitle');
    const standStage = document.getElementById('impact-stand-stage'); 

    // 清除舊狀態
    r.className = '';
    // 🚀 清除所有的 class，確保乾淨啟動
    o.classList.remove('fade-out', 'active', 'theme-win', 'theme-lose', 'is-final'); 
    standStage.style.backgroundImage = 'none';
    void o.offsetWidth; // 強制重繪

    // 填入分數
    document.getElementById('impact-my-score').innerText = myNum;
    document.getElementById('impact-op-score').innerText = opNum;
    sub.innerText = isFinal ? "FINAL MATCH RESULT" : "ROUND RESULT";
    
    // 👑 如果是拿到 5 分的最終決戰，加上專屬的 is-final 標籤！
    if (isFinal) {
        o.classList.add('is-final');
    }

    // 判定勝負與霸氣背景展現
    if (myNum > opNum) { 
      r.innerText = isFinal ? "VICTORY" : "WIN"; 
      r.classList.add('result-win');
      o.classList.add('theme-win'); // 觸發我方勝利動畫方向
      if (myImgUrl) standStage.style.backgroundImage = `url('${myImgUrl}')`; 
    }
    else if (myNum < opNum) { 
      r.innerText = isFinal ? "DEFEAT" : "LOSE"; 
      r.classList.add('result-lose');
      o.classList.add('theme-lose'); // 觸發對手勝利動畫方向
      if (opImgUrl) standStage.style.backgroundImage = `url('${opImgUrl}')`; 
    }
    else { 
      r.innerText = "DRAW"; 
      r.classList.add('result-draw');
      o.classList.add('theme-win'); 
    }
    
    o.classList.add('active'); 
  }

  

  let nfcBuffer = "";
  document.addEventListener('keydown', function(e) {
    if (!isNaN(e.key)) {
      nfcBuffer += e.key;
    }
    if (e.key === 'Enter') {
      if (nfcBuffer.length > 3) { 
        console.log("偵測到學生刷卡，準備強制跳轉：" + nfcBuffer);
        const gatekeeperUrl = "https://script.google.com/macros/s/AKfycbyWm-WnRO5h3dliEPR36Cq1hCf5DgM4GIgJqXVUREclhtYOHjxq9DptApmQPkU5p5Ys/exec";
        window.location.href = gatekeeperUrl + "?cardId=" + nfcBuffer;
      }
      nfcBuffer = ""; 
    }
  });

  let idleTimer;
  const resetIdleTimer = () => {
    clearTimeout(idleTimer);
    idleTimer = setTimeout(() => {
      window.location.href = "https://script.google.com/macros/s/AKfycbyWm-WnRO5h3dliEPR36Cq1hCf5DgM4GIgJqXVUREclhtYOHjxq9DptApmQPkU5p5Ys/exec";
    }, 180000);
  };
  document.addEventListener('touchstart', resetIdleTimer);
  document.addEventListener('mousedown', resetIdleTimer);
  resetIdleTimer();
</script>
