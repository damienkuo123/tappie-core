  // 綁定錄音解鎖邏輯 (🚀 拔除本地音量阻礙)
  function bindVoiceLock(index) {
      const btn = document.getElementById(`lock-btn-${index}`);
      const status = document.getElementById(`lock-status-${index}`);
      const cardData = gachaCardsData[index];

      btn.onpointerdown = (e) => {
          if (isGachaRecording || cardData.flipped) return;
          e.preventDefault();
          
          if (audioContext && audioContext.state === 'suspended') audioContext.resume();

          isGachaRecording = true;
          // 🚀 直接共用主程式的全局變數，最穩定！
          chunks = [];
          
          btn.classList.add('recording');
          status.innerText = "聆聽中...";
          status.style.color = "#eb3b5a";

          mediaRecorder = new MediaRecorder(stream);
          mediaRecorder.ondataavailable = ev => chunks.push(ev.data);
          mediaRecorder.start();
      };

      btn.onpointerup = () => {
          if (!isGachaRecording) return;
          isGachaRecording = false;
          btn.classList.remove('recording');

          if (mediaRecorder && mediaRecorder.state === "recording") {
              mediaRecorder.stop();
          }

          status.innerText = "驗證密語中...";
          status.style.color = "#00d2d3";

          mediaRecorder.onstop = () => {
              // 🚀 如果完全沒收到音訊檔
              if (chunks.length === 0) {
                  status.innerText = "未收到聲音，請再試一次";
                  status.style.color = "#e74c3c";
                  return;
              }

              const r = new FileReader();
              r.readAsDataURL(new Blob(chunks, { type: 'audio/webm' }));
              r.onloadend = () => {
                  fetch(`${GAS_URL}?action=evaluate_speech&word=${encodeURIComponent(cardData.word)}`, { method: 'POST', body: r.result.split(',')[1] })
                  .then(res => res.json()).then(data => {
                      if (data.score >= 50) {
                          status.innerText = "封印解除！";
                          status.style.color = "#26de81";
                          triggerReveal(index); 
                      } else {
                          status.innerText = "密語錯誤，請重唸！";
                          status.style.color = "#e74c3c";
                      }
                  }).catch(() => {
                      status.innerText = "封印解除！(連線優待)";
                      triggerReveal(index);
                  });
              };
          };
      };
  }

              } else {

                  prizeToAdd.realLabel = characterAssets[charId] ? characterAssets[charId].name : prizeToAdd.label;
                  window.wonAvatars.push(charId); // 記錄下來，防止這局再抽到
              }
          } else {

              window.wonPoints += prizeToAdd.value; 
              prizeToAdd.realLabel = prizeToAdd.label;

          gachaWonItems.push(prizeToAdd);

        // 🚀 將結算好的總點數與新角色送給後端
        const avatarsParam = window.wonAvatars.length > 0 ? `&avatars=${window.wonAvatars.join(',')}` : '';
        const finalUrl = `${GAS_URL}?action=claim_gacha&id=${STUDENT_ID}&roomId=${ROOM_ID}&winnerId=${STUDENT_ID}&addPoints=${window.wonPoints}${avatarsParam}`;
        
        fetch(finalUrl, { mode: 'no-cors' }).then(() => {
            window.location.href = `${GAS_URL}?id=${STUDENT_ID}`;
        }).catch(() => {
            window.location.href = `${GAS_URL}?id=${STUDENT_ID}`;
        });
    };
  }
  // =======================================================
  // 🌈 頂級 3D 互動閃卡引擎 (追蹤手指與滑鼠)
  // =======================================================
  function initInteractiveHoloCards() {
      // 🚀 一次抓取「Portal 畫面」和「對戰畫面」的所有卡片！
      const cards = document.querySelectorAll('.portal-card, .card-entity');
      
      cards.forEach(card => {
          if(!card) return;
          
          if(!card.querySelector('.holo-layer')) {
              const holo = document.createElement('div');
              holo.className = 'holo-layer';
              card.appendChild(holo);
          }
          const holoLayer = card.querySelector('.holo-layer');

          const handleInteract = (e) => {
              if(card.classList.contains('blast-up') || card.classList.contains('take-damage') || card.classList.contains('loser-shatter') || card.classList.contains('blast-ultimate')) return;

              const rect = card.getBoundingClientRect();
              const clientX = e.touches ? e.touches[0].clientX : e.clientX;
              const clientY = e.touches ? e.touches[0].clientY : e.clientY;
              const x = clientX - rect.left;
              const y = clientY - rect.top;
              const centerX = rect.width / 2;
              const centerY = rect.height / 2;
              
              const rotateX = ((y - centerY) / centerY) * -15; 
              const rotateY = ((x - centerX) / centerX) * 15;
              
              card.style.transition = 'transform 0.1s ease-out';
              card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.05, 1.05, 1.05)`;
              
              const bgX = (x / rect.width) * 100;
              const bgY = (y / rect.height) * 100;
              holoLayer.style.backgroundPosition = `${bgX}% ${bgY}%`;
              holoLayer.style.opacity = '1'; 
          };

          const handleRelease = () => {
              card.style.transition = 'transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
              card.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)`;
              holoLayer.style.opacity = '0'; 
          };

          card.addEventListener('mousemove', handleInteract);
          card.addEventListener('mouseleave', handleRelease);
          card.addEventListener('touchmove', handleInteract, {passive: true});
          card.addEventListener('touchend', handleRelease);
      });
  }
</script>
