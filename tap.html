<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tappie 嗶卡登入中...</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #f8f9fa;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: #333;
    }
    .loader {
      text-align: center;
    }
    .spinner {
      font-size: 40px;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin { 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="loader">
    <div class="spinner">🪄</div>
    <h2>讀取卡片中...</h2>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const uid = urlParams.get('uid'); 

    // 🚀 核心大絕招：去系統記憶區檢查，這台手機有沒有登入過管理員？
    const adminAuth = localStorage.getItem('tappie_admin_key');

    if (uid) {
      if (adminAuth) {
          // 👨‍🏫 如果有鑰匙，代表是老師的手機感應的，瞬間帶回中控台加扣分！
          window.location.replace(`/admin.html?id=${uid}`);
      } else {
          // 🧑‍🎓 如果沒鑰匙，代表是家長/學生的手機感應的，帶去前台主頁！
          window.location.replace(`/dashboard.html?id=${uid}`);
      }
    } else {
      document.body.innerHTML = "<h2>❌ 無效的卡片，請洽詢櫃檯老師。</h2>";
    }
  </script>
</body>
</html>
