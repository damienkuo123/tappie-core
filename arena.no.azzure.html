<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
  <title>瑪麗安口說挑戰室</title>
  <style>
    :root {
      /* 🚀 關鍵修復 1：把今日挑戰的專屬顏色加回來！沒有這些，按鈕會全部隱形破圖！ */
      --primary-blue: #0066cc; 
      --marian-yellow: #ff9900; 
      --marian-red: #d63031; 
      --marian-green: #27ae60; 
      --dark-gray: #2d3436;

      /* 🌟 抽卡系統與戰場的 3D 特效變數 (維持原樣) */
      --bg-color: #1a1e29;
      --gold: #f1c40f;

      --grain: url("https://cdn.jsdelivr.net/gh/damienkuo123/marian-app@main/assets/grain.webp");
      --glitter: url("https://cdn.jsdelivr.net/gh/damienkuo123/marian-app@main/assets/glitter.png");
      --foil: url("https://cdn.jsdelivr.net/gh/damienkuo123/marian-app@main/assets/illusion.png");
      --trainer-foil: url("https://cdn.jsdelivr.net/gh/damienkuo123/marian-app@main/assets/trainerbg.png");
      --cosmos-bottom: url("https://cdn.jsdelivr.net/gh/damienkuo123/marian-app@main/assets/cosmos-bottom.png");
      --cosmos-mid: url("https://cdn.jsdelivr.net/gh/damienkuo123/marian-app@main/assets/cosmos-middle-trans.png");
      --cosmos-top: url("https://cdn.jsdelivr.net/gh/damienkuo123/marian-app@main/assets/cosmos-top-trans.png");

      --space: 5%;
      --angle: 133deg;
      --imgsize: 33%;
      
      --card-aspect: 0.718;
      --card-radius: 4.55% / 3.5%;
      --card-edge: hsl(47, 100%, 78%);
      --card-back: hsl(205, 100%, 25%);
      --card-glow: hsl(175, 100%, 90%);

      /* 霓虹光譜 (完全還原) */
      --sunpillar-1: hsl(2, 100%, 73%);
      --sunpillar-2: hsl(53, 100%, 69%);
      --sunpillar-3: hsl(93, 100%, 69%);
      --sunpillar-4: hsl(176, 100%, 76%);
      --sunpillar-5: hsl(228, 100%, 74%);
      --sunpillar-6: hsl(283, 100%, 73%);
      
      --sunpillar-clr-1: var(--sunpillar-1);
      --sunpillar-clr-2: var(--sunpillar-2);
      --sunpillar-clr-3: var(--sunpillar-3);
      --sunpillar-clr-4: var(--sunpillar-4);
      --sunpillar-clr-5: var(--sunpillar-5);
      --sunpillar-clr-6: var(--sunpillar-6);
    }
    body { font-family: -apple-system, sans-serif; text-align: center; padding: 20px; background: #eaeff2; margin: 0; user-select: none; -webkit-user-select: none; -webkit-touch-callout: none; }
    .main-panel { background: white; padding: 25px; border-radius: 28px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); max-width: 400px; margin: 10px auto; border: 1px solid #ddd; }
    #record-btn { background: var(--marian-red); width: 110px; height: 110px; border-radius: 50%; border: 8px solid white; font-size: 45px; box-shadow: 0 6px 15px rgba(214, 48, 49, 0.4); margin: 20px auto; cursor: pointer; display: none; outline: none; }
    #record-btn.active { transform: scale(0.95); background: #333; animation: pulse 1s infinite; }
    @keyframes pulse { 0% { box-shadow: 0 0 0 0px rgba(214, 48, 49, 0.4); } 100% { box-shadow: 0 0 0 20px rgba(214, 48, 49, 0); } }
    .btn-play { background: var(--primary-blue); width: 45px; height: 45px; border-radius: 50%; border: none; color: white; font-size: 20px; cursor: pointer; margin-left: 10px; vertical-align: middle; box-shadow: 0 3px 6px rgba(0,0,0,0.1); }
    .btn { padding: 12px 25px; border-radius: 12px; font-weight: bold; border: none; cursor: pointer; color: white; margin: 5px; box-shadow: 0 4px 0 rgba(0,0,0,0.2); }
    .btn-nav { background: #4b6584; border-bottom: 4px solid #2c3e50; }
    .btn-nav:disabled { background: #ccc; border-bottom: none; }
    .btn-finish { width: 100%; font-size: 22px; padding: 20px; margin-top: 20px; border-bottom: 5px solid rgba(0,0,0,0.2); transition: 0.3s; }
    .btn-finish:disabled { background: #636e72 !important; cursor: not-allowed; border-bottom: none; opacity: 0.7; }
    .progress-bar { width: 100%; background: #dfe6e9; height: 12px; border-radius: 6px; margin-bottom: 20px; overflow: hidden; border: 1px solid #ccc; }
    .progress-fill { background: var(--primary-blue); height: 100%; width: 0%; transition: 0.5s; }
    table { width: 100%; border-collapse: collapse; margin-top: 15px; background: #fff; border-radius: 10px; overflow: hidden; }
    td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
    .score-badge { float: right; font-weight: bold; color: var(--primary-blue); font-size: 18px; }
    .btn-re { background: var(--marian-red); font-size: 13px; padding: 6px 12px; border-radius: 8px; color: white; border: none; cursor: pointer; font-weight: bold; }
    #zh-display { font-size: 20px; color: #7f8c8d; margin: -10px 0 20px 0; font-weight: bold; }

    /* ========================================= */
    /* 🚀 傳送門：頂級 3D 全息對峙 Loading 畫面 (終極隔離防擋版) */
    /* ========================================= */
    #battle-portal-overlay {
      /* 🚀 使用 dvh (動態視窗高度)，確保在 Safari 工具列展開時也不會被遮擋 */
      position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh; 
      background: rgba(5, 10, 15, 0.95); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
      z-index: 9999; flex-direction: column; align-items: center; justify-content: center; /* 改為 center，統一佈局 */
      padding: 0; box-sizing: border-box; overflow: hidden;
      perspective: 1200px;
    }

    /* 頂部倒數計時與提示容器 (絕對定位於上方) */
    .portal-timer-modern {
      position: absolute; top: max(40px, env(safe-area-inset-top)); left: 50%; transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 20; width: 100%;
    }
    .portal-hint {
      font-size: 14px; font-weight: bold; color: #a4b0be; letter-spacing: 2px;
      margin-bottom: 8px; text-transform: uppercase; text-shadow: 0 2px 5px rgba(0,0,0,0.8);
    }
    .portal-timer-numbers {
      font-size: 24px; font-weight: 900; color: #f1c40f; text-shadow: 0 0 15px rgba(241,196,15,0.8);
      letter-spacing: 8px;
    }

    /* 對戰卡片對峙區 (🚀 移除 preserve-3d，強制使用 z-index 防止 3D 穿模！) */
    .portal-clash-container {
      position: relative; width: 100%; max-width: 500px; height: 60vh; max-height: 600px;
      margin: 15px auto; 
      /* 🚀 絕對關鍵：不能加 preserve-3d，讓 z-index 發揮絕對壓制力 */
    }

    /* ========================================= */
    /* 🚀 頂級全息卡牌架構 (從 Lobby 完美移植) */
    /* ========================================= */
    .portal-card-wrapper {
      position: absolute; 
      width: 55vw; max-width: 280px; 
      aspect-ratio: var(--card-aspect);
      perspective: 1000px; opacity: 0;
    }

    /* 🚀 我方卡片：從左上角強勢壓入 */
    #portal-my-wrapper { top: 0; left: 2%; z-index: 5; }

    /* 🚀 對手卡片：在右下角沉穩迎擊 */
    #portal-op-wrapper { bottom: 0; right: 2%; z-index: 2; }

    /* 🚀 動態進場：加入 Z 軸深度，加強遠近透視感！ */
    .clash-in-my { animation: slide-in-my 1.2s cubic-bezier(0.1, 0.9, 0.2, 1) forwards; }
    @keyframes slide-in-my {
      0% { transform: translate3d(-30vw, -50px, -200px) rotateY(45deg) rotateZ(-20deg) scale(0.8); opacity: 0; filter: brightness(2) blur(10px); }
      100% { transform: translate3d(5%, 5%, 0px) rotateY(15deg) rotateZ(-8deg) scale(1.05); opacity: 1; filter: brightness(1) blur(0px); } 
    }

    .clash-in-op { animation: slide-in-op 1.2s cubic-bezier(0.1, 0.9, 0.2, 1) forwards; }
    @keyframes slide-in-op {
      0% { transform: translate3d(30vw, 50px, -500px) rotateY(-45deg) rotateZ(20deg) scale(0.8); opacity: 0; filter: brightness(2) blur(10px); }
      /* 🚀 對手卡片被推向深淵！(translateZ -100px) 營造極強的空間感 */
      100% { transform: translate3d(-5%, -5%, -100px) rotateY(-15deg) rotateZ(8deg) scale(0.95); opacity: 1; filter: brightness(0.8) blur(0px); } 
    }
    
    /* ✨ VS 疊在正中央防護罩 */
    .portal-vs-spark {
      /* 確保 VS 漂浮在兩張卡片之間 */
      position: absolute; top: 48%; left: 50%; transform: translate3d(-50%, -50%, 100px) scale(0);
      width: 140px; height: 140px;
      display: flex; justify-content: center; align-items: center;
      font-size: 55px; font-weight: 900; font-style: italic; color: #fff;
      background: radial-gradient(circle, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.6) 40%, rgba(0,0,0,0) 70%);
      text-shadow: 0 0 10px #000, 0 0 20px #f39c12, 0 0 40px #f1c40f, 0 0 80px #e67e22;
      z-index: 20; opacity: 0; letter-spacing: 2px; pointer-events: none;
    }
    .spark-active { animation: portal-vs-pop 0.6s 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    @keyframes portal-vs-pop {
      0% { transform: translate3d(-50%, -50%, 100px) scale(3); opacity: 0; filter: blur(10px); }
      100% { transform: translate3d(-50%, -50%, 100px) scale(1); opacity: 1; filter: blur(0px); }
    }

    /* ✨ VS 疊在正中央防護罩 (確保壓在所有卡片之上) */
    .portal-vs-spark {
      position: absolute; top: 48%; left: 50%; transform: translate(-50%, -50%) scale(0);
      width: 140px; height: 140px;
      display: flex; justify-content: center; align-items: center;
      font-size: 55px; font-weight: 900; font-style: italic; color: #fff;
      background: radial-gradient(circle, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.6) 40%, rgba(0,0,0,0) 70%);
      text-shadow: 0 0 10px #000, 0 0 20px #f39c12, 0 0 40px #f1c40f, 0 0 80px #e67e22;
      z-index: 20; opacity: 0; letter-spacing: 2px; pointer-events: none;
    }
    
    .card {
      width: 100%; height: 100%; position: relative;
      transform: translate3d(0px, 0px, 0.01px);
      transform-style: preserve-3d;
      --pointer-x: 50%; --pointer-y: 50%;
      --pointer-from-center: 0.5; /* 預設給一點靜態反光 */
      --pointer-from-top: 0.5; --pointer-from-left: 0.5;
      --rotate-x: 0deg; --rotate-y: 0deg;
      --card-opacity: 1; --card-scale: 1; --translate-x: 0px; --translate-y: 0px;
      --card-radius: 4.55% / 3.5%;
      border-radius: var(--card-radius);
    }

    .card__translater, .card__rotator { width: 100%; height: 100%; display: grid; perspective: 600px; transform-origin: center; transform-style: preserve-3d; }
    .card__translater { transform: translate3d(var(--translate-x), var(--translate-y), 0.1px) scale(var(--card-scale)); }
    .card__rotator { transform: rotateY(var(--rotate-x)) rotateX(var(--rotate-y)); box-shadow: 0px 10px 30px rgba(0,0,0,0.8); border-radius: var(--card-radius); }
    /* 🚀 讓卡片的正反面變成 Grid 容器，並強制所有圖層擠在同一個平面 (grid-area: 1/1) */
    .card__front, .gacha-front, .gacha-back { 
      display: grid !important; grid-template-columns: 1fr; grid-template-rows: 1fr; 
      width: 100%; height: 100%; border-radius: var(--card-radius); transform-style: preserve-3d; 
    }
    
    /* 🚀 移除會破壞 mix-blend-mode 的 transform-style！讓光澤圖層能完美疊加發光 */
    .card__bg, .card__shine, .card__glare, .unlock-ui, .prize-content-ui { 
      grid-area: 1/1; width: 100%; height: 100%; border-radius: var(--card-radius); box-sizing: border-box; overflow: hidden;
    }
    /* 只有 UI 層需要 Z 軸深度來浮起文字 */
    .unlock-ui, .prize-content-ui { transform-style: preserve-3d; }
    
    /* 視覺層不可阻擋滑鼠 */
    .card__bg, .card__shine, .card__glare { pointer-events: none; }

    .card__front { transform: translate3d(0px, 0px, 0.01px); }
    .card__bg { background-size: cover; background-position: center; border: 2px solid transparent; transform: translateZ(0px); z-index: 1; }

    /* 原版基礎眩光 (N卡的微光) */
    .card__glare {
      transform: translateZ(1.41px); overflow: hidden; z-index: 3;
      background-image: radial-gradient(farthest-corner circle at var(--pointer-x) var(--pointer-y), hsla(0, 0%, 100%, 0.8) 10%, hsla(0, 0%, 100%, 0.65) 20%, hsla(0, 0%, 0%, 0.5) 90%);
      opacity: calc(var(--pointer-from-center) * 0.8); mix-blend-mode: overlay;
    }

    /* 🚀 遺失的關鍵靈魂：光澤圖層本體宣告 (沒有這個，SR 和 R 的星空與雷射永遠長不出來！) */
    .card__shine {
      display: grid; transform: translateZ(1px); overflow: hidden; z-index: 4;
      background: transparent; background-size: cover; background-position: center;
      filter: brightness(.85) contrast(2.75) saturate(.65); mix-blend-mode: color-dodge;
    }
    .card__shine:before, .card__shine:after { grid-area: 1/1; border-radius: var(--card-radius); content: ""; display: block; }
    .card__shine:before { transform: translateZ(1px); }
    .card__shine:after { transform: translateZ(1.2px); }


    /* 🚀 讓【全域所有畫面】的卡片都能吃到 Mask 與星空特效！ (完全解除場域限制) */
    .card.masked .card__shine, .card.masked .card__shine:before, .card.masked .card__shine:after {
      -webkit-mask-image: linear-gradient(white, white), var(--mask) !important;
      -webkit-mask-composite: destination-out !important;
      mask-image: linear-gradient(white, white), var(--mask) !important;
      mask-composite: exclude !important;
      -webkit-mask-size: cover !important; mask-size: cover !important;
      -webkit-mask-position: center center !important; mask-position: center center !important;
    }

    /* 姓名條：移到卡片外部的最上方 */
    .portal-name-tag {
      position: absolute; bottom: -20px; left: 50%; transform: translateX(-50%);
      font-size: 16px; color: #fff; font-weight: 900; letter-spacing: 4px; text-transform: uppercase;
      background: rgba(0, 0, 0, 0.7); padding: 8px 20px; border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.15); box-shadow: 0 10px 20px rgba(0,0,0,0.6);
      backdrop-filter: blur(8px); text-shadow: 0 0 10px rgba(255,255,255,0.5); z-index: 50; white-space: nowrap;
      pointer-events: none; /* 🚀 關鍵：讓滑鼠能直接穿透名字條，絕不干擾卡片中央的旋轉感應！ */
    }

    /* =======================================================
       🎨 100% 滿血還原：全域特效宣告 + 原版 3D 厚度回歸！
       ======================================================= */

    /* 🚀 重新啟動 3D 引擎 (保留 Z 軸深度，讓星空跟雷射浮起來！) */
    .card__rotator * { transform-style: preserve-3d; }
    
    .card__front { 
      display: grid !important; grid-template-columns: 1fr; grid-template-rows: 1fr; 
      width: 100%; height: 100%; border-radius: var(--card-radius); 
      transform-style: preserve-3d !important; 
      transform: translate3d(0px, 0px, 0.01px);
    }
    
    .card__bg, .card__shine, .card__glare { 
      grid-area: 1/1; width: 100%; height: 100%; border-radius: var(--card-radius); box-sizing: border-box; 
      /* 移除 overflow: hidden 以免破壞 3D，改靠 border-radius 與 mask 裁切 */
      pointer-events: none;
      transform-style: preserve-3d !important;
    }

    .card__bg { background-size: cover; background-position: center; border: 2px solid transparent; transform: translateZ(0px); z-index: 1; }

    /* 原版基礎眩光 (恢復 Z 軸 1.41px) */
    .card__glare {
      transform: translateZ(1.41px); z-index: 3;
      background-image: radial-gradient(farthest-corner circle at var(--pointer-x) var(--pointer-y), hsla(0, 0%, 100%, 0.8) 10%, hsla(0, 0%, 100%, 0.65) 20%, hsla(0, 0%, 0%, 0.5) 90%);
      opacity: calc(var(--pointer-from-center) * 0.8); mix-blend-mode: overlay;
    }

    /* 光澤圖層本體宣告 (恢復 3D Z軸深度 1px) */
    .card__shine {
      display: grid; transform: translateZ(1px); z-index: 4; transform-style: preserve-3d;
      background: transparent; background-size: cover; background-position: center;
      filter: brightness(.85) contrast(2.75) saturate(.65); mix-blend-mode: color-dodge;
    }
    .card__shine:before, .card__shine:after { grid-area: 1/1; border-radius: var(--card-radius); content: ""; display: block !important; }
    .card__shine:before { transform: translateZ(1.2px); }
    .card__shine:after { transform: translateZ(1.6px); }

    /* 🚀 你的進化版 Masking (絕對強制挖空) */
    .card.masked .card__shine, .card.masked .card__shine:before, .card.masked .card__shine:after {
      -webkit-mask-image: linear-gradient(white, white), var(--mask) !important;
      -webkit-mask-composite: destination-out !important;
      mask-image: linear-gradient(white, white), var(--mask) !important;
      mask-composite: exclude !important;
      -webkit-mask-size: cover !important; mask-size: cover !important;
      -webkit-mask-position: center center !important; mask-position: center center !important;
    }

    /* 🔵【R卡：Cosmos 星空】 */
    .card[data-rarity="R"] .card__shine {
      --space: 4%;
      background-image: var(--cosmos-bottom), repeating-linear-gradient(82deg, hsl(53, 65%, 60%) calc(var(--space)*1), hsl(93, 56%, 50%) calc(var(--space)*2), hsl(176, 54%, 49%) calc(var(--space)*3), hsl(228, 59%, 55%) calc(var(--space)*4), hsl(283, 60%, 55%) calc(var(--space)*5), hsl(326, 59%, 51%) calc(var(--space)*6), hsl(326, 59%, 51%) calc(var(--space)*7), hsl(283, 60%, 55%) calc(var(--space)*8), hsl(228, 59%, 55%) calc(var(--space)*9), hsl(176, 54%, 49%) calc(var(--space)*10), hsl(93, 56%, 50%) calc(var(--space)*11), hsl(53, 65%, 60%) calc(var(--space)*12) ), radial-gradient(farthest-corner circle at var(--pointer-x) var(--pointer-y), hsla(180, 100%, 89%, 0.5) 5%, hsla(180, 14%, 57%, 0.3) 40%, hsl(0, 0%, 0%) 130% ) !important;
      background-blend-mode: color-burn, multiply !important; background-position: center, calc(10% + (var(--pointer-from-left)*80%)) calc(10% + (var(--pointer-from-top)*80%)), center !important;
      background-size: cover, 400% 900%, cover !important; filter: brightness(1) contrast(1) saturate(.8) !important; mix-blend-mode: color-dodge !important; opacity: 1 !important;
    }
    .card[data-rarity="R"] .card__shine:before {
      content: "" !important; display: block !important;
      background-image: var(--cosmos-mid), repeating-linear-gradient(82deg, hsl(53, 65%, 60%) calc(var(--space)*1), hsl(93, 56%, 50%) calc(var(--space)*2), hsl(176, 54%, 49%) calc(var(--space)*3), hsl(228, 59%, 55%) calc(var(--space)*4), hsl(283, 60%, 55%) calc(var(--space)*5), hsl(326, 59%, 51%) calc(var(--space)*6), hsl(326, 59%, 51%) calc(var(--space)*7), hsl(283, 60%, 55%) calc(var(--space)*8), hsl(228, 59%, 55%) calc(var(--space)*9), hsl(176, 54%, 49%) calc(var(--space)*10), hsl(93, 56%, 50%) calc(var(--space)*11), hsl(53, 65%, 60%) calc(var(--space)*12) ) !important;
      background-blend-mode: lighten, multiply !important; background-position: center, calc(15% + (var(--pointer-from-left)*70%)) calc(15% + (var(--pointer-from-top)*70%)), center !important;
      background-size: cover, 400% 900%, cover !important; filter: brightness(1.25) contrast(1.75) saturate(.8) !important; mix-blend-mode: overlay !important;
    }
    .card[data-rarity="R"] .card__shine:after {
      content: "" !important; display: block !important;
      background-image: var(--cosmos-top), repeating-linear-gradient(82deg, hsl(53, 65%, 60%) calc(var(--space)*1), hsl(93, 56%, 50%) calc(var(--space)*2), hsl(176, 54%, 49%) calc(var(--space)*3), hsl(228, 59%, 55%) calc(var(--space)*4), hsl(283, 60%, 55%) calc(var(--space)*5), hsl(326, 59%, 51%) calc(var(--space)*6), hsl(326, 59%, 51%) calc(var(--space)*7), hsl(283, 60%, 55%) calc(var(--space)*8), hsl(228, 59%, 55%) calc(var(--space)*9), hsl(176, 54%, 49%) calc(var(--space)*10), hsl(93, 56%, 50%) calc(var(--space)*11), hsl(53, 65%, 60%) calc(var(--space)*12) ) !important;
      background-blend-mode: multiply, multiply !important; background-position: center, calc(20% + (var(--pointer-from-left)*60%)) calc(20% + (var(--pointer-from-top)*60%)), center !important;
      background-size: cover, 400% 900%, cover !important; filter: brightness(1.25) contrast(1.75) saturate(.8) !important; mix-blend-mode: multiply !important;
    }
    .card[data-rarity="R"] .card__bg { border-color: #3498db !important; box-shadow: inset 0 0 10px rgba(52, 152, 219, 0.5) !important; }

    /* 🟣【SR卡：Trainer Full Art】 */
    .card[data-rarity="SR"] .card__shine {
      --imgsize: 33%; mix-blend-mode: color-dodge !important; opacity: 1 !important;
    }
    .card[data-rarity="SR"] .card__shine, .card[data-rarity="SR"] .card__shine:after {
      background-image: var(--trainer-foil) !important; background-size: var(--imgsize) !important;
      filter: brightness(calc((var(--pointer-from-center)*0.05) + .6)) contrast(1.5) saturate(1.2) !important;
    }

      0%, 100% { transform: translate(0,0) rotate(0deg); filter: brightness(1) drop-shadow(0 0 0px red); } 
      20% { transform: translate(-10px, 10px) rotate(-3deg); filter: brightness(2) drop-shadow(0 0 40px red); } 
      40% { transform: translate(10px, -10px) rotate(3deg); filter: brightness(2) drop-shadow(0 0 40px red); } 
      60% { transform: translate(-8px, -8px) rotate(-2deg); filter: brightness(1.5) drop-shadow(0 0 20px red); } 
      80% { transform: translate(8px, 8px) rotate(2deg); filter: brightness(1.5) drop-shadow(0 0 20px red); } 
    }

    .card.winner-glory .card__rotator { animation: glory-shine 1.5s ease-in-out infinite alternate !important; border: 4px solid #f1c40f !important; z-index: 30 !important; }
    @keyframes glory-shine { 0% { box-shadow: 0 0 20px #f1c40f, inset 0 0 20px #f1c40f; transform: translateY(0); filter: brightness(1.2); } 100% { box-shadow: 0 0 60px #f1c40f, 0 0 100px #f1c40f, inset 0 0 40px #f1c40f; transform: translateY(-10px); filter: brightness(1.5); } }

    /* 螢幕閃爍 */
    .screen-flash-cyan { animation: flashCyan 0.5s 0.3s 2; }
    @keyframes flashCyan { 0%, 100% { box-shadow: inset 0 0 0 transparent; } 50% { box-shadow: inset 0 0 150px rgba(15, 185, 177, 0.9); } }
    .screen-flash-red { animation: flashRed 0.5s 0.3s 2; }
