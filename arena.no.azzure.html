      focusedCardIndex = index;
      
      // 🚀 在最外層加上 focus-mode，在專屬替身上加上 has-focus
      document.getElementById('gacha-overlay').classList.add('focus-mode');
      document.getElementById(`wrapper-${index}`).classList.add('has-focus');
      document.getElementById(`gacha-card-${index}`).classList.add('focused');
  }

  function cancelFocus() {
      if (focusedCardIndex === -1) return;
      
      // 🚀 移除所有的 focus 狀態
      document.getElementById(`gacha-card-${focusedCardIndex}`).classList.remove('focused');
      document.getElementById(`wrapper-${focusedCardIndex}`).classList.remove('has-focus');
      document.getElementById('gacha-overlay').classList.remove('focus-mode');
      document.getElementById(`lock-status-${focusedCardIndex}`).innerText = "長按發音解鎖";
      focusedCardIndex = -1;
  }

  // 綁定錄音解鎖邏輯 (🚀 拔除本地音量阻礙)
  function bindVoiceLock(index) {
      const btn = document.getElementById(`lock-btn-${index}`);
      const status = document.getElementById(`lock-status-${index}`);
      const cardData = gachaCardsData[index];

      btn.onpointerdown = (e) => {
          // 🚀 防呆：次數用盡或是已翻開，都不可再按錄音解鎖
          if (isGachaRecording || cardData.flipped || gachaPicksLeft <= 0) return;
          e.preventDefault();
          
          if (audioContext && audioContext.state === 'suspended') audioContext.resume();

          isGachaRecording = true;
          // 🚀 直接共用主程式的全局變數，最穩定！
          chunks = [];
          
          btn.classList.add('recording');
          status.innerText = "聆聽中...";
          status.style.color = "#eb3b5a";

          mediaRecorder = new MediaRecorder(stream);
          mediaRecorder.ondataavailable = ev => chunks.push(ev.data);
          mediaRecorder.start();
      };

      btn.onpointerup = () => {
          if (!isGachaRecording) return;
          isGachaRecording = false;
          btn.classList.remove('recording');

          if (mediaRecorder && mediaRecorder.state === "recording") {
              mediaRecorder.stop();
          }

          status.innerText = "驗證密語中...";
          status.style.color = "#00d2d3";

          mediaRecorder.onstop = () => {
              // 🚀 如果完全沒收到音訊檔
              if (chunks.length === 0) {
                  status.innerText = "未收到聲音，請再試一次";
                  status.style.color = "#e74c3c";
                  return;
              }

              const r = new FileReader();
              r.readAsDataURL(new Blob(chunks, { type: 'audio/webm' }));
              r.onloadend = () => {
                  fetch(`${GAS_URL}?action=evaluate_speech&word=${encodeURIComponent(cardData.word)}`, { method: 'POST', body: r.result.split(',')[1] })
                  .then(res => res.json()).then(data => {
                      if (data.score >= 50) {
                          status.innerText = "封印解除！";
                          status.style.color = "#26de81";
                          triggerReveal(index); 
                      } else {
                          status.innerText = "密語錯誤，請重唸！";
                          status.style.color = "#e74c3c";
                      }
                  }).catch(() => {
                      status.innerText = "封印解除！(連線優待)";
                      triggerReveal(index);
                  });
              };
          };
      };
  }

  // 🚀 觸發封印碎裂與翻開動畫
  function triggerReveal(index) {
      const cardEl = document.getElementById(`gacha-card-${index}`);
      const cardRoot = cardEl.querySelector('.card'); // 抓取 3D 根元素
      const prizeInfo = gachaCardsData[index].prize;
      
      cardEl.classList.add(prizeInfo.glow);
      
      // 🚀 翻轉前先隱藏解鎖按鈕，讓畫面變乾淨
      const unlockUi = cardEl.querySelector('.unlock-ui');
      if (unlockUi) unlockUi.style.display = 'none';
      
      setTimeout(() => {
          gachaCardsData[index].flipped = true;
          cardEl.classList.add('flipped');
          
          // 🚀 注意：我把一開始的 cancelFocus() 移除了！
          // 翻面後，卡片會維持巨大化，讓玩家慢慢欣賞！玩家只要點擊旁邊的暗色背景就會自動收合。

          let prizeRarity = 'N';
          if (prizeInfo.class === 'prize-R') prizeRarity = 'R';
          if (prizeInfo.class === 'prize-SR') prizeRarity = 'SR';
          if (prizeInfo.class === 'prize-SSR') prizeRarity = 'SSR';
          if (cardRoot) cardRoot.setAttribute('data-rarity', prizeRarity);
          
          let prizeToAdd = { ...prizeInfo }; 
          
          // 🚀 關鍵修復：如果是角色卡，翻開瞬間替卡片掛上專屬的 Mask 遮罩！
          if (prizeToAdd.type === 'avatar' && characterAssets[prizeToAdd.value] && characterAssets[prizeToAdd.value].mask) {
              cardRoot.classList.add('masked');
              cardRoot.style.setProperty('--mask', `url('${characterAssets[prizeToAdd.value].mask}')`);
          } else {
              cardRoot.classList.remove('masked');
              cardRoot.style.removeProperty('--mask');
          }
          
          if (prizeToAdd.type === 'avatar') {
              const charId = prizeToAdd.value;
              const alreadyOwnedInAccount = (window.myUnlockedAvatars || []).includes(charId);
              const alreadyGotInThisGacha = window.wonAvatars.includes(charId);
              
              if (alreadyOwnedInAccount || alreadyGotInThisGacha) {
                  const charName = characterAssets[charId] ? characterAssets[charId].name : prizeToAdd.label;
                  prizeToAdd.realLabel = `(重複) ${charName} → 轉為 300 點`; 
                  window.wonPoints += 300; 
              } else {
                  prizeToAdd.realLabel = characterAssets[charId] ? characterAssets[charId].name : prizeToAdd.label;
                  window.wonAvatars.push(charId); 
              }
          } else {
              window.wonPoints += prizeToAdd.value; 
              prizeToAdd.realLabel = prizeToAdd.label;
          }
          
          gachaWonItems.push(prizeToAdd);
          gachaPicksLeft--;
          document.getElementById('picks-left').innerText = gachaPicksLeft;

          if (gachaPicksLeft <= 0) {
              isGachaResolving = true;
              document.getElementById('gacha-subtitle').innerHTML = "<span style='color:#e74c3c'>次數已用盡！</span>";
              
              // 🚀 延遲顯示結算畫面，讓玩家有時間慢慢看最後一張爆出來的神卡
              setTimeout(() => {
                  const allCards = document.querySelectorAll('.gacha-card');
                  gachaCardsData.forEach((c, i) => {
                      if (!c.flipped) allCards[i].classList.add('flipped', 'missed');
                  });
                  // 欣賞 2.5 秒後，自動收起卡片並叫出結算面板
                  setTimeout(() => {
                      cancelFocus();
                      showGachaSummary();
                  }, 2500);
              }, 1000);
          } else {
              // 🚀 如果不是最後一抽，翻開欣賞 1.5 秒後自動收合！(這樣就不會卡死了)
              setTimeout(() => {
                  if (focusedCardIndex === index) cancelFocus();
              }, 1500);
          }
      }, 1000); 
  }

  // 顯示戰利品並發送 GAS
  function showGachaSummary() {
    const listEl = document.getElementById('gacha-won-list');
    let html = "";

    // 顯示所有抽到的獎項真名 (含重複提示)
    gachaWonItems.forEach(item => {
        html += `<div style="font-size: 14px; line-height: 1.6; font-weight: bold;">${item.realLabel}</div>`;
    });

    listEl.innerHTML = html;
    document.getElementById('gacha-summary-popup').classList.add('show');

    const claimBtn = document.getElementById('gacha-claim-btn');
    claimBtn.onclick = () => {
        claimBtn.innerText = "發放獎勵中...";
        claimBtn.style.pointerEvents = "none";
        
        // 🚀 將結算好的總點數與新角色送給後端
        const avatarsParam = window.wonAvatars.length > 0 ? `&avatars=${window.wonAvatars.join(',')}` : '';
        const finalUrl = `${GAS_URL}?action=claim_gacha&id=${STUDENT_ID}&roomId=${ROOM_ID}&winnerId=${STUDENT_ID}&addPoints=${window.wonPoints}${avatarsParam}`;
        
        // 成功發送獎勵後，跳轉回對戰大廳
        fetch(finalUrl, { mode: 'no-cors' }).then(() => {
            window.location.href = `https://damienkuo123.github.io/marian-app/lobby.html?id=${STUDENT_ID}`;
        }).catch(() => {
            window.location.href = `https://damienkuo123.github.io/marian-app/lobby.html?id=${STUDENT_ID}`;
        });
    };
  }
  // =======================================================
  // 🌈 頂級 3D 互動閃卡引擎 (全場域適配版)
  // =======================================================
  function initInteractiveHoloCards() {
      // 🚀 加入 .gacha-card .card，讓盲盒也能感應滑鼠與陀螺儀！
      const cards = document.querySelectorAll('#portal-my-card, #portal-op-card, #my-card, #op-card, #impact-card, .gacha-card .card');
      
      cards.forEach(card => {
          // 🚀 致命修復：必須用 querySelectorAll 抓出正面與背面的「所有」特效圖層！
          const targetLayers = [card, ...card.querySelectorAll('.card__shine'), ...card.querySelectorAll('.card__glare')];
          let bounds;
          let ticking = false;

          function updateCard(x, y) {
              const leftX = x / bounds.width;
              const topY = y / bounds.height;
              const center = { x: leftX - 0.5, y: topY - 0.5 };
              const distance = Math.sqrt(center.x**2 + center.y**2);

              const pointerX = `${leftX * 100}%`;
              const pointerY = `${topY * 100}%`;
              const pointerFromCenter = Math.min(Math.max(distance * 2, 0), 1);

              card.style.setProperty('--rotate-x', `${center.y * -20}deg`); 
              card.style.setProperty('--rotate-y', `${center.x * 20}deg`);
              
              // 🚀 讓所有圖層都吃到滑鼠參數
              targetLayers.forEach(layer => {
                  if(layer) {
                      layer.style.setProperty('--pointer-x', pointerX);
                      layer.style.setProperty('--pointer-y', pointerY);
                      layer.style.setProperty('--pointer-from-center', pointerFromCenter);
                      layer.style.setProperty('--pointer-from-top', topY);
                      layer.style.setProperty('--pointer-from-left', leftX);
                  }
              });
              ticking = false;
          }
          
          function rotateToMouse(e) {
              if (!bounds) bounds = card.getBoundingClientRect();
              const clientX = e.touches ? e.touches[0].clientX : e.clientX;
              const clientY = e.touches ? e.touches[0].clientY : e.clientY;
              const mouseX = clientX - bounds.left;
              const mouseY = clientY - bounds.top;
              
              if (!ticking) {
                  requestAnimationFrame(() => updateCard(mouseX, mouseY));
                  ticking = true;
              }
          }

          function resetTilt() {
              card.style.transition = "transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275)";
              card.style.setProperty('--rotate-x', '0deg');
              card.style.setProperty('--rotate-y', '0deg');
              
              // 🚀 同步更新：這裡也要用 targetLayers 來重置所有圖層
              targetLayers.forEach(layer => {
                  if(layer) {
                      layer.style.setProperty('--pointer-from-center', '0.5'); 
                      layer.style.setProperty('--pointer-x', '50%');
                      layer.style.setProperty('--pointer-y', '50%');
                  }
              });
              setTimeout(() => { card.style.transition = "none"; }, 500);
          }

          function startInteraction() {
              bounds = card.getBoundingClientRect(); 
              card.style.transition = "none"; 
          }

          card.addEventListener('pointerenter', startInteraction);
          card.addEventListener('pointermove', rotateToMouse);
          card.addEventListener('pointerleave', resetTilt);
          
          card.addEventListener('touchstart', startInteraction, {passive: true});
          card.addEventListener('touchmove', rotateToMouse, {passive: true});
          card.addEventListener('touchend', resetTilt);
      });
  }
