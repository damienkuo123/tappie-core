    .screen-flash-gold { animation: flashGold 0.6s 0.3s 2; }
    @keyframes flashGold { 0%, 100% { box-shadow: inset 0 0 0 transparent; } 50% { box-shadow: inset 0 0 150px rgba(241, 196, 15, 0.9); } }

    /* ========================================= */
    /* 💎 頂級 3D 全息英雄結算 */
    /* ========================================= */
    #impact-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(10, 15, 20, 0); backdrop-filter: blur(0px); -webkit-backdrop-filter: blur(0px); z-index: 9999; flex-direction: column; justify-content: center; align-items: center; color: white; transition: all 0.5s ease; overflow: hidden; perspective: 1200px; }
    #impact-overlay.active { display: flex; background: rgba(5, 10, 15, 0.85); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); }
    #impact-overlay.fade-out { opacity: 0; backdrop-filter: blur(0px); -webkit-backdrop-filter: blur(0px); }

    /* 🚀 修復結算底座：加上深色半透明背景，防止背後的文字和動畫穿透上來 */
    #impact-stand-stage {
      position: relative; width: 100vw; height: 85vh; max-width: 500px;
      background: rgba(5, 9, 20, 0.8); /* 加上深色背景 */
      z-index: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
      transform-style: preserve-3d; transform: translate(150%, 100%) scale(0.5); opacity: 0;
    }
    
    /* 🚀 結算卡片霸氣最大化 */
    .impact-card-wrapper { width: 85vw; max-width: 400px; aspect-ratio: var(--card-aspect); perspective: 1000px; margin: 15px 0; z-index: 10; }

    .theme-win.active #impact-stand-stage { animation: card-enter-win 3s linear forwards; }
    .theme-win.fade-out #impact-stand-stage { animation: card-exit-win 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
    @keyframes card-enter-win {
      0% { transform: translate(100%, 100%) rotateZ(-25deg) rotateY(30deg) rotateX(20deg) scale(0.6); opacity: 0; filter: brightness(2.5) blur(10px); animation-timing-function: cubic-bezier(0.1, 0.9, 0.2, 1); }
      25% { transform: translate(0, 0) rotateZ(-12deg) rotateY(5deg) rotateX(2deg) scale(1.02); opacity: 1; filter: brightness(1.1) blur(0px); animation-timing-function: linear; }
      100% { transform: translate(0, 0) rotateZ(-15deg) rotateY(0deg) rotateX(0deg) scale(1.05); filter: brightness(1.1) blur(0px); opacity: 1; }
    }
    @keyframes card-exit-win {
      0% { transform: translate(0, 0) rotateZ(-15deg) rotateY(0deg) rotateX(0deg) scale(1.05); opacity: 1; }
      100% { transform: translate(-150%, -100%) rotateZ(-30deg) rotateY(-20deg) rotateX(-20deg) scale(0.5); opacity: 0; filter: brightness(2) blur(10px); }
    }

    .theme-lose.active #impact-stand-stage { animation: card-enter-lose 3s linear forwards; }
    .theme-lose.fade-out #impact-stand-stage { animation: card-exit-lose 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
    @keyframes card-enter-lose {
      0% { transform: translate(-100%, -100%) rotateZ(15deg) rotateY(-30deg) rotateX(-20deg) scale(0.6); opacity: 0; filter: brightness(2.5) blur(10px); animation-timing-function: cubic-bezier(0.1, 0.9, 0.2, 1); }
      25% { transform: translate(0, 0) rotateZ(-8deg) rotateY(-5deg) rotateX(-2deg) scale(1.02); opacity: 1; filter: brightness(1.1) blur(0px); animation-timing-function: linear; }
      100% { transform: translate(0, 0) rotateZ(-10deg) rotateY(0deg) rotateX(0deg) scale(1.05); filter: brightness(1.1) blur(0px); opacity: 1; }
    }
    @keyframes card-exit-lose {
      0% { transform: translate(0, 0) rotateZ(-10deg) rotateY(0deg) rotateX(0deg) scale(1.05); opacity: 1; }
      100% { transform: translate(150%, 100%) rotateZ(5deg) rotateY(20deg) rotateX(20deg) scale(0.5); opacity: 0; filter: brightness(2) blur(10px); }
    }

    .is-final.active #impact-stand-stage { animation: final-card-enter 3s linear forwards !important; }
    .is-final.fade-out #impact-stand-stage { animation: final-card-exit 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards !important; }
    @keyframes final-card-enter {
      0% { transform: scale(0) rotateY(720deg) rotateZ(10deg); opacity: 0; filter: brightness(3) blur(20px); animation-timing-function: cubic-bezier(0.1, 0.9, 0.2, 1); }
      25% { transform: scale(1.1) rotateY(0deg) rotateZ(0deg); opacity: 1; filter: brightness(1.15) blur(0px); animation-timing-function: linear; }
      100% { transform: scale(1.15) rotateY(5deg) rotateZ(-2deg); filter: brightness(1.15) blur(0px); opacity: 1; }
    }
    @keyframes final-card-exit {
      0% { transform: scale(1.15) rotateY(5deg) rotateZ(-2deg); opacity: 1; }
      100% { transform: translateY(-100%) scale(1.5) rotateX(45deg); opacity: 0; filter: brightness(3) blur(15px); }
    }

    #impact-subtitle { font-size: 16px; color: #f1f2f6; letter-spacing: 8px; font-weight: bold; margin: 0; text-transform: uppercase; opacity: 0; transform: translateY(-20px); text-shadow: 0 2px 10px #000; }
    .active #impact-subtitle { animation: fade-down 0.5s 0.5s forwards; }
    @keyframes fade-down { to { opacity: 1; transform: translateY(0); } }
    
    #impact-result { font-size: 80px; font-weight: 900; letter-spacing: 15px; margin: -20px 0 0 0; text-transform: uppercase; opacity: 0; transform: scale(3) rotate(-10deg); }
    .active #impact-result { animation: text-slam 0.5s 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    @keyframes text-slam {
      0% { opacity: 0; transform: scale(3) rotate(-10deg) translateY(-20px); filter: blur(15px); letter-spacing: 40px; }
      60% { opacity: 1; transform: scale(0.9) rotate(5deg) translateY(0); filter: blur(0px); letter-spacing: 4px; }
      100% { opacity: 1; transform: scale(1) rotate(0deg); filter: blur(0px); letter-spacing: 6px; } 
    }

    .is-final.active #impact-result { animation: final-text-slam 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards !important; }
    @keyframes final-text-slam {
      0% { opacity: 0; transform: scale(5) translateY(-50px) rotateX(90deg); filter: blur(20px); letter-spacing: 50px; }
      50% { opacity: 1; transform: scale(0.8) translateY(0) rotateX(0deg); filter: blur(0px); letter-spacing: 2px; }
      100% { opacity: 1; transform: scale(1) rotateX(0deg); letter-spacing: 10px; }
    }

    .result-win { color: #fff; text-shadow: 0 0 15px rgba(0, 210, 211, 0.8), 0 0 40px rgba(0, 210, 211, 0.6), 0 0 80px rgba(0, 210, 211, 0.4); }
    .result-lose { color: #fff; text-shadow: 0 0 15px rgba(255, 107, 107, 0.8), 0 0 40px rgba(255, 107, 107, 0.6), 0 0 80px rgba(255, 107, 107, 0.4); }
    .result-draw { color: #fff; text-shadow: 0 0 15px rgba(241, 196, 15, 0.8), 0 0 40px rgba(241, 196, 15, 0.6), 0 0 80px rgba(241, 196, 15, 0.4); }

    .impact-score-board {
      display: flex; align-items: center; justify-content: center; gap: 25px; 
      background: rgba(0, 0, 0, 0.6); padding: 15px 40px; border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.8);
      transform: translateY(30px); opacity: 0;
    }
    .active .impact-score-board { animation: board-snap 0.5s 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    @keyframes board-snap { to { opacity: 1; transform: translateY(0); } }
    .score-col { display: flex; flex-direction: column; align-items: center; }
    .score-number { font-size: 60px; font-weight: 900; line-height: 1; opacity: 0; transform: scale(0.3); }
    .active .score-number { animation: score-pop 0.6s 0.9s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    @keyframes score-pop { 0% { opacity: 0; transform: scale(0.3); } 70% { transform: scale(1.1); } 100% { opacity: 1; transform: scale(1); } }
    .score-label { font-size: 11px; color: #a4b0be; letter-spacing: 2px; margin-top: 5px; text-transform: uppercase; font-weight: bold; opacity: 0; }
    .active .score-label { animation: fade-up 0.5s 1.1s forwards; }
    #impact-my-score { color: #00d2d3; text-shadow: 0 0 20px rgba(0, 210, 211, 0.5); }
    #impact-op-score { color: #ff6b6b; text-shadow: 0 0 20px rgba(255, 107, 107, 0.5); }
    .score-vs { font-size: 20px; color: #576574; font-style: italic; font-weight: 900; opacity: 0; transform: scale(0); }
    .active .score-vs { animation: score-pop 0.4s 0.8s forwards; }

    /* ========================================= */
    /* 💬 大招立繪切入 (Cut-in) 系統 CSS */
    /* ========================================= */
    #cutin-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh; z-index: 9000; pointer-events: none; overflow: hidden; }
    #cutin-overlay.active { display: block; }
    #cutin-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; }
    .active #cutin-bg { animation: cutinFade 1.5s forwards; }
    #cutin-lines { position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: repeating-radial-gradient(circle at center, transparent 0, transparent 4px, rgba(255,255,255,0.1) 5px, rgba(255,255,255,0.1) 6px); opacity: 0; }
    .active #cutin-lines { animation: speedlines 0.2s linear infinite, cutinFade 1.5s forwards; }
    @keyframes speedlines { 0% { transform: scale(1); } 100% { transform: scale(1.5); } }
    #cutin-char { position: absolute; top: 50%; left: 100%; transform: translate(0, -50%); display: flex; justify-content: center; align-items: center; }
    .active #cutin-char { animation: charSlide 1.5s cubic-bezier(0.1, 0.8, 0.1, 1) forwards; }
    @keyframes charSlide { 0% { left: 100%; transform: translate(0, -50%) skewX(-15deg); opacity: 0; } 15% { left: 50%; transform: translate(-50%, -50%) skewX(0deg); opacity: 1; } 85% { left: 45%; transform: translate(-50%, -50%) skewX(0deg); opacity: 1; } 100% { left: -100%; transform: translate(-50%, -50%) skewX(15deg); opacity: 0; } }
    #cutin-text { position: absolute; top: 70%; left: 50%; transform: translate(-50%, -50%) scale(0); font-size: 45px; font-weight: 900; font-style: italic; white-space: nowrap; }
    .active #cutin-text { animation: textSmash 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    @keyframes textSmash { 0% { transform: translate(-50%, -50%) scale(0); opacity: 0; } 20% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; } 80% { transform: translate(-50%, -50%) scale(1); opacity: 1; } 100% { transform: translate(-50%, -50%) scale(1.5); opacity: 0; } }
    @keyframes cutinFade { 0% { opacity: 0; } 10% { opacity: 1; } 85% { opacity: 1; } 100% { opacity: 0; } }
    .theme-fire #cutin-bg { background: radial-gradient(circle, #b33939 0%, #000 80%); } .theme-fire #cutin-text { color: #ff5252; text-shadow: 0 0 20px #ff5252, 0 5px 15px #000; } .theme-fire #cutin-char { filter: drop-shadow(0 0 25px #ff5252); }
    .theme-tech #cutin-bg { background: radial-gradient(circle, #0652DD 0%, #000 80%); } .theme-tech #cutin-text { color: #00d2d3; text-shadow: 0 0 20px #00d2d3, 0 5px 15px #000; } .theme-tech #cutin-char { filter: drop-shadow(0 0 25px #00d2d3); }
    .theme-magic #cutin-bg { background: radial-gradient(circle, #10ac84 0%, #000 80%); } .theme-magic #cutin-text { color: #1dd1a1; text-shadow: 0 0 20px #1dd1a1, 0 5px 15px #000; } .theme-magic #cutin-char { filter: drop-shadow(0 0 25px #1dd1a1); }

    /* ========================================= */
    /* 🎁 史詩級全息盲盒抽獎系統 (聲控解鎖版) */
    /* ========================================= */
    #gacha-overlay {
      display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh;
      background: radial-gradient(circle at 50% 30%, #162233 0%, #050914 80%);
      z-index: 10000; flex-direction: column; align-items: center; justify-content: center;
      padding: max(40px, env(safe-area-inset-top)) 15px max(40px, env(safe-area-inset-bottom));
      box-sizing: border-box; overflow: hidden; color: white; perspective: 1500px;
    }
    #gacha-overlay::before {
      content: ''; position: absolute; bottom: -20%; left: -50%; width: 200%; height: 60%;
      background: linear-gradient(to top, rgba(0, 210, 211, 0.15) 0%, transparent 80%), repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(0, 210, 211, 0.05) 41px, rgba(0, 210, 211, 0.05) 42px), repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(0, 210, 211, 0.05) 41px, rgba(0, 210, 211, 0.05) 42px);
      transform: rotateX(70deg); z-index: 0; pointer-events: none; box-shadow: inset 0 50px 100px #050914;
    }
    #gacha-overlay.active { display: flex; animation: fadeIn 0.5s ease forwards; }

    #gacha-header { text-align: center; margin-bottom: 2vh; z-index: 10; transition: opacity 0.3s; }
    #gacha-title { font-size: 32px; font-weight: 900; font-style: italic; color: #fff; text-shadow: 0 0 15px #00d2d3, 0 0 30px #00d2d3, 0 4px 0px #0fb9b1; margin: 0 0 10px 0; letter-spacing: 4px; text-transform: uppercase; }
    #gacha-subtitle { font-size: 15px; color: #dcdde1; letter-spacing: 2px; font-weight: bold; background: rgba(0,0,0,0.5); padding: 8px 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
    #picks-left { color: #f1c40f; font-size: 24px; font-weight: 900; text-shadow: 0 0 10px #f1c40f; margin: 0 5px; }

    /* 抽獎卡片網格：🚀 移除 rotateX 避免破壞 fixed 置中 */
    .gacha-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; width: 100%; max-width: 600px; z-index: 10; }
    
    /* 🚀 手機版自適應排版：維持 3 排 (高度只有 2 列，絕不超出螢幕！) */
    @media (max-width: 600px) {
      .gacha-grid { gap: 8px; }
      
      /* 稍微縮小標題，爭取垂直空間 */
      #gacha-title { font-size: 24px; margin-bottom: 5px; }
      #gacha-subtitle { font-size: 13px; padding: 4px 15px; }
      
      /* 🚀 關鍵：只極致縮小「還沒被點開放大」的卡片內容，避免撐破卡片！ */
      .gacha-card:not(.focused) .unlock-hint { font-size: 10px; margin-bottom: 2px; }
      .gacha-card:not(.focused) .unlock-word { font-size: 14px; margin-bottom: 6px; letter-spacing: 0; }
      .gacha-card:not(.focused) .voice-lock-btn { width: 35px; height: 35px; font-size: 16px; border-width: 2px; margin-bottom: 6px; }
      .gacha-card:not(.focused) .voice-status { font-size: 10px; margin-top: 0; }
    }
    
    /* 🚀 解決進場瞬間看到獎品的 Bug：還沒翻開前，強制隱藏背面 */
    .gacha-card:not(.flipped) .gacha-back { visibility: hidden; }
    
    /* 🚀 隱形關閉背景 */
    #gacha-close-backdrop { display: none; position: absolute; top: 0; left: 0; width: 100vw; height: 100dvh; z-index: 500; cursor: pointer; }
    #gacha-overlay.focus-mode #gacha-close-backdrop { display: block; }
    
    /* 🚀 破除結界 1：聚焦模式下，網格圖層拉高，但設定 pointer-events: none 讓點擊「穿透」過去打中背景！ */
    #gacha-overlay.focus-mode .gacha-grid { transform: none !important; z-index: 600; pointer-events: none; }
    
    /* 只模糊「沒有被選中」的替身 */
    #gacha-overlay.focus-mode .gacha-card-wrapper:not(.has-focus) { opacity: 0.2; filter: blur(6px); transition: all 0.5s; }

    /* 卡片佔位符替身 */
    .gacha-card-wrapper { position: relative; aspect-ratio: 5/7; width: 100%; perspective: 1000px; }
    
    /* 🚀 破除結界 2：唯獨「被聚焦」的卡片替身，恢復 pointer-events: auto 變成實體，這樣麥克風就能被點到了！ */
    #gacha-overlay.focus-mode .gacha-card-wrapper.has-focus { perspective: none !important; z-index: 1000; pointer-events: auto; }

    /* 🃏 讓抽獎卡片完美銜接 3D 引擎 */
    .gacha-card { position: absolute; top: 0; left: 0; width: 100%; height: 100%; cursor: pointer; z-index: 1; } /* 🚀 拔除 transition: all 解決亂飛的動畫 */
    
    .gacha-card .card { --flip-y: 0deg; width: 100%; height: 100%; }
    .gacha-card .card__rotator { 
      transform: rotateY(calc(var(--rotate-x) + var(--flip-y))) rotateX(var(--rotate-y)); 
      transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .gacha-card.flipped .card { --flip-y: 180deg; }
    .gacha-card.missed .card { --flip-y: 180deg; }
    .gacha-card.missed .card__translater { transform: scale(0.95); filter: grayscale(0.9) brightness(0.4); transition: 0.8s; }

    /* 🚀 畫廊展示模式：用 keyframes 完美彈出置中，取代原本亂飛的位移 */
    .gacha-card.focused { 
      position: fixed !important; top: 50% !important; left: 50% !important; 
      width: 85vw !important; max-width: 360px !important; 
      height: auto !important; aspect-ratio: 5/7 !important; 
      z-index: 9999 !important; cursor: default; 
      box-shadow: 0 30px 80px rgba(0,0,0,0.9), 0 0 50px rgba(0,210,211,0.3) !important;
      animation: gallery-pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards !important;
    }
    @keyframes gallery-pop {
      0% { transform: translate(-50%, -50%) scale(0.3); opacity: 0; }
      100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    }

    /* 正反面容器獨立，去除干擾的 flex */
    .gacha-front, .gacha-back { 
      position: absolute; inset: 0; transform-style: preserve-3d; backface-visibility: hidden; border-radius: var(--card-radius);
    }
    .gacha-front { transform: rotateY(0deg) translateZ(0.01px); }
    /* 移除干擾的 border，將顏色與邊框全權交給內部的 .card__bg 負責 */
    .gacha-back { transform: rotateY(180deg) translateZ(0.01px); }

    /* 盲盒魔法陣移入 bg 層，防止蓋住 3D 光芒 */
    .gacha-front .card__bg { background: linear-gradient(145deg, #1e272b 0%, #0b0f19 100%); border: 2px solid rgba(0, 210, 211, 0.3); border-radius: var(--card-radius); }
    .gacha-front .card__bg::before { 
      content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; 
      background: conic-gradient(from 0deg, transparent, rgba(0, 210, 211, 0.3), transparent, rgba(155, 89, 182, 0.3), transparent); 
      animation: spin-hologram 4s linear infinite; pointer-events: none; opacity: 0.5; z-index: 2;
    }
    @keyframes spin-hologram { 100% { transform: rotate(360deg); } }
    
    /* 🚀 將 UI 層變成 flex，保證裡面的文字和按鈕完美置中 */
    /* 🚀 解鎖 UI 完美置中 */
    .unlock-ui { display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 20; }
    
    /* 🚀 區分點數與角色卡的 UI 排版 */
    .prize-content-ui {
      display: flex; flex-direction: column; align-items: center; z-index: 20; width: 100%; height: 100%; box-sizing: border-box;
    }
    
    /* 點數卡：巨大化、置中 */
    .prize-content-ui.points-ui { justify-content: center; }
    .prize-content-ui.points-ui .prize-value { font-size: 45px !important; text-shadow: 0 0 20px rgba(0,0,0,0.8), 0 0 10px rgba(255,255,255,0.4); margin-bottom: 5px; }
    .prize-content-ui.points-ui .prize-label { font-size: 16px; letter-spacing: 4px; }
    
    /* 角色卡：推到底部，加上半透明黑底保護文字清晰度 */
    .prize-content-ui.avatar-ui { justify-content: flex-end; padding-bottom: 20px; }
    .prize-content-ui.avatar-ui .prize-label { font-size: 14px; background: rgba(0,0,0,0.8); padding: 6px 15px; border-radius: 15px; text-shadow: 0 2px 5px #000; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }

    /* 🚀 盲盒封面專屬的「錫箔反光特效」(讓尚未翻開的盒子也閃閃發光) */
    .gacha-front .card__glare {
      opacity: calc(var(--pointer-from-center) * 0.8) !important;
      background-image: radial-gradient(farthest-corner circle at var(--pointer-x) var(--pointer-y), hsla(0, 0%, 100%, 0.8) 10%, hsla(0, 0%, 100%, 0.4) 30%, hsla(0, 0%, 0%, 0.6) 90%) !important;
      mix-blend-mode: overlay !important;
    }
    
    /* 解鎖 UI 的浮現動畫 */
    .unlock-ui { opacity: 0; transform: scale(0.8) translateZ(30px); transition: all 0.5s; pointer-events: none; visibility: hidden; }
    .gacha-card.focused .unlock-ui { opacity: 1; transform: scale(1) translateZ(30px); pointer-events: auto; visibility: visible; }
    .gacha-card.focused .gacha-front .card__bg::before { opacity: 0.1; }

    .unlock-hint { font-size: 14px; color: #a4b0be; letter-spacing: 2px; margin-bottom: 10px; }
    .unlock-word { font-size: 40px; font-weight: 900; color: #00d2d3; text-shadow: 0 0 20px rgba(0,210,211,0.8); margin-bottom: 25px; letter-spacing: 2px; text-transform: uppercase; }
    
    .voice-lock-btn { width: 80px; height: 80px; border-radius: 50%; background: rgba(0,0,0,0.6); border: 3px solid #0fb9b1; color: #fff; font-size: 35px; display: flex; justify-content: center; align-items: center; cursor: pointer; box-shadow: 0 0 20px rgba(15,185,177,0.5); transition: all 0.2s; -webkit-touch-callout: none; user-select: none; margin-bottom: 10px; }
    .voice-lock-btn.recording { transform: scale(0.9); background: #eb3b5a; border-color: #ff7675; box-shadow: 0 0 30px #eb3b5a, 0 0 60px #eb3b5a; animation: pulse-record 0.5s infinite alternate; }
    @keyframes pulse-record { to { box-shadow: 0 0 15px #eb3b5a; } }
    .voice-status { font-size: 14px; color: #f1c40f; margin-top: 10px; font-weight: bold; }

    /* 💥 封印碎裂與稀有度光芒特效 */
    .gacha-front::after { content: ''; position: absolute; top:0; left:0; right:0; bottom:0; pointer-events: none; opacity: 0; z-index: 15; background-size: cover; mix-blend-mode: overlay; transition: opacity 0.5s; }
    
    /* 白光 (<=10) */
    .crack-white .gacha-front { border-color: #fff !important; box-shadow: inset 0 0 30px #fff, 0 0 50px #fff !important; animation: shatterShake 0.6s ease-in-out; }
    .crack-white .gacha-front::after { opacity: 1; background: linear-gradient(45deg, transparent 48%, #fff 49%, transparent 51%); }
    /* 藍光 (11-30) */
    .crack-blue .gacha-front { border-color: #0984e3 !important; box-shadow: inset 0 0 50px #0984e3, 0 0 80px #0984e3 !important; animation: shatterShake 0.8s ease-in-out; }
    .crack-blue .gacha-front::after { opacity: 1; background: linear-gradient(45deg, transparent 48%, #fff 49%, transparent 51%), linear-gradient(-45deg, transparent 48%, #fff 49%, transparent 51%); }
    /* 紫光 (31-200) */
    .crack-purple .gacha-front { border-color: #9b59b6 !important; box-shadow: inset 0 0 80px #9b59b6, 0 0 120px #9b59b6 !important; animation: shatterShake 1s ease-in-out; }
    .crack-purple .gacha-front::after { opacity: 1; background: linear-gradient(45deg, transparent 48%, #fff 49%, transparent 51%), linear-gradient(-45deg, transparent 48%, #fff 49%, transparent 51%), linear-gradient(15deg, transparent 48%, #fff 49%, transparent 51%); }
    /* 金光 (>200 或 角色) */
    .crack-gold .gacha-front { border-color: #f1c40f !important; box-shadow: inset 0 0 100px #f1c40f, 0 0 150px #f1c40f, 0 0 200px #fff !important; animation: shatterShake 1.2s ease-in-out; filter: brightness(1.5); }
    .crack-gold .gacha-front::after { opacity: 1; background: linear-gradient(45deg, transparent 48%, #fff 49%, transparent 51%), linear-gradient(-45deg, transparent 48%, #fff 49%, transparent 51%), linear-gradient(15deg, transparent 48%, #fff 49%, transparent 51%), linear-gradient(-75deg, transparent 48%, #fff 49%, transparent 51%); }

    @keyframes shatterShake { 0%, 100% { transform: translate(0,0) rotate(0deg); } 20% { transform: translate(-3px, 3px) rotate(-1deg); } 40% { transform: translate(3px, -3px) rotate(1deg); } 60% { transform: translate(-2px, -2px) rotate(-1deg); } 80% { transform: translate(2px, 2px) rotate(1deg); } }

    /* 💎 卡面 (翻開後的獎品) */
    .prize-value { font-size: 28px; font-weight: 900; z-index: 2; margin-bottom: 5px; text-shadow: 0 2px 10px #000; }
    .prize-label { font-size: 11px; font-weight: bold; letter-spacing: 2px; z-index: 2; text-shadow: 0 2px 5px #000; background: rgba(0,0,0,0.7); padding: 4px 8px; border-radius: 8px; backdrop-filter: blur(5px); }
    
    /* 🚀 對齊最新設定的稀有度色彩 */
    .prize-N { color: #fff; text-shadow: 0 0 10px #fff; border-color: #fff; }
    .prize-R { color: #0984e3; text-shadow: 0 0 15px #0984e3; box-shadow: inset 0 0 30px rgba(9,132,227,0.4); border-color: #0984e3; }
    .prize-SR { color: #9b59b6; text-shadow: 0 0 20px #9b59b6; box-shadow: inset 0 0 50px rgba(155,89,182,0.5); border-color: #9b59b6; }
    .prize-SSR { color: #f1c40f; text-shadow: 0 0 20px #f1c40f, 0 0 40px #f1c40f; box-shadow: inset 0 0 60px rgba(241,196,15,0.6); border-color: #f1c40f; }

    /* 🏆 結算彈窗 */
    #gacha-summary-popup {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
      background: rgba(10, 15, 20, 0.95); border: 2px solid #f1c40f; border-radius: 25px;
      padding: 40px; text-align: center; width: 85%; max-width: 400px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.8), 0 0 50px rgba(241, 196, 15, 0.3);
      z-index: 200; opacity: 0; pointer-events: none; transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      backdrop-filter: blur(20px);
    }
    #gacha-summary-popup.show { transform: translate(-50%, -50%) scale(1); opacity: 1; pointer-events: auto; }
    #gacha-won-list { margin: 25px 0; font-size: 24px; font-weight: bold; color: #f1c40f; line-height: 2; letter-spacing: 2px; }
    .btn-claim { background: linear-gradient(135deg, #f39c12, #e67e22); color: white; border: none; padding: 15px 40px; font-size: 18px; font-weight: 900; border-radius: 30px; letter-spacing: 4px; box-shadow: 0 10px 20px rgba(243,156,18,0.4); cursor: pointer; transition: 0.3s; width: 100%; }
    .btn-claim:active { transform: scale(0.95); }
    
    /* 🚀 戰場專屬：深色全息載入畫面 */
    #loading-screen {
      position: fixed; inset: 0; background: rgba(5, 9, 20, 0.98); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      z-index: 99999; 
      display: none; /* 🔴 關鍵修改 1：預設隱藏，不要干擾單人模式 */
      flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .spinner {
      width: 55px; height: 55px; border: 4px solid rgba(255, 215, 0, 0.1);
      border-top: 4px solid var(--gold); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 25px;
      box-shadow: 0 0 15px rgba(241, 196, 15, 0.3);
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    /* =======================================================
       🚀 平板與大螢幕自動適應 (Responsive Design)
       ======================================================= */
    @media (min-width: 768px) {
      /* ----------------------------------
         1. 傳送門 (Portal) 畫面放大
         ---------------------------------- */
      .portal-clash-container { max-width: 700px; height: 65vh; max-height: 800px; }
      .portal-card-wrapper { max-width: 380px; }
      .portal-vs-spark { width: 180px; height: 180px; font-size: 70px; }
      .btn-cyber { bottom: 80px; font-size: 24px; padding: 22px 60px; border-radius: 40px; }

      /* ----------------------------------
         2. 戰鬥室 (Arena) 畫面放大 (精準校正版)
         ---------------------------------- */
      .arena-card-wrapper { 
        max-width: 320px; /* 從 420px 縮減，保留大氣感但不擋畫面 */
      }
      
      /* 🚀 對手卡片：再往上推一點，縮小比例，營造遠景深度 */
      .op-container { 
        top: -12vh; 
        transform: translateX(-50%) scale(0.7) translateZ(-200px); 
      }
      @keyframes recoilOpAnim {
        0%, 100% { transform: translateX(-50%) scale(0.7) translateZ(-200px); }
        20% { transform: translateX(-50%) scale(0.65) translateZ(-250px) rotateX(-15deg) translateY(-30px); }
      }
      
      /* 🚀 我方卡片：往下壓，稍微縮小比例，讓出中間空間 */
      .my-container { 
        bottom: 0vh; 
        transform: translateX(-50%) scale(0.9) translateZ(50px); 
      }
      @keyframes recoilMyAnim {
        0%, 100% { transform: translateX(-50%) scale(0.9) translateZ(50px); }
        20% { transform: translateX(-50%) scale(0.85) translateZ(0px) rotateX(15deg) translateY(30px); }
      }
      
      /* 🚀 中央題目區：精準定位在兩張卡片中間的空白處 */
      .arena-stage-center { top: 35vh; }
      #target-word { font-size: 6vw; padding: 0 60px; } /* 字體稍微收斂，避免太長折行擋住 */
      #battle-timer { font-size: 50px; }
      
      /* 控制按鈕維持好按的大尺寸 */
      #battle-controls { bottom: 10vh; }
      #battle-record-btn { width: 130px; height: 130px; font-size: 60px; border-width: 6px; }
      #skill-btn { font-size: 22px; padding: 15px 45px; border-radius: 25px; }

      /* ----------------------------------
         3. 結算畫面 (Impact Overlay) 放大
         ---------------------------------- */
      .impact-card-wrapper { max-width: 480px; }
      #impact-result { font-size: 120px; }
      .score-number { font-size: 80px; }
      .impact-score-board { padding: 25px 60px; }

      /* ===================================================
         🚀 新增：4. 盲盒抽獎系統 (Gacha) 放大
         =================================================== */
      .gacha-grid { max-width: 850px; gap: 30px; }
      #gacha-title { font-size: 46px; letter-spacing: 8px; margin-bottom: 20px; }
      #gacha-subtitle { font-size: 20px; padding: 12px 30px; }
      #picks-left { font-size: 32px; }
      
      /* 抽獎語音解鎖按鈕放大 */
      .voice-lock-btn { width: 120px; height: 120px; font-size: 55px; border-width: 5px; }
      .unlock-word { font-size: 55px; margin-bottom: 35px; }
      .unlock-hint { font-size: 18px; }
      .voice-status { font-size: 18px; margin-top: 15px; }
      
      /* 被點開欣賞的卡片霸氣化 */
      .gacha-card.focused { max-width: 480px !important; }
      
      /* 抽獎結算彈窗放大 */
      #gacha-summary-popup { max-width: 600px; padding: 50px; border-radius: 35px; }
      #gacha-won-list { font-size: 22px; margin: 35px 0; }
      .btn-claim { font-size: 24px; padding: 20px 50px; }

      /* ===================================================
         🚀 新增：5. 今日挑戰/自由練習 (Main Panel) 放大
         =================================================== */
      .main-panel { max-width: 650px; padding: 50px; border-radius: 40px; margin-top: 10vh; }
      #title-text { font-size: 32px; }
      #word-display { font-size: 64px !important; }
      #zh-display { font-size: 26px; margin-bottom: 30px; }
      
      /* 錄音麥克風放大，讓小朋友超好按！ */
      #record-btn { width: 160px; height: 160px; font-size: 70px; border-width: 10px; margin: 40px auto; }
      #status { font-size: 20px; }
      #feedback { font-size: 32px !important; margin-top: 20px; }
      
      /* 底部切換按鈕放大 */
      .btn { font-size: 20px; padding: 18px 35px; border-radius: 16px; }
      .btn-play { width: 60px; height: 60px; font-size: 30px; margin-left: 20px; }
      
      /* 總結畫面放大 */
      #total-avg { font-size: 100px !important; margin: 20px 0; }
      td { font-size: 22px; padding: 20px; }
      .score-badge { font-size: 26px; }
      .btn-re { font-size: 18px; padding: 10px 20px; }
      .btn-finish { font-size: 26px; padding: 25px; border-radius: 20px; margin-top: 30px; }
    }
    
  </style>
</head>
<body>
  
<div id="loading-screen">
    <div class="spinner"></div>
    <h3 style="color: var(--gold); letter-spacing: 4px; font-weight: 900; text-shadow: 0 2px 10px rgba(0,0,0,0.8); margin: 0;">戰場連線中...</h3>
  </div>

<script>
    (function() {
      const urlParams = new URLSearchParams(window.location.search);
      // 如果網址帶有 mode=battle，或是帶有 roomId (代表是對戰或突發事件)
      if (urlParams.get('mode') === 'battle' || urlParams.get('roomId')) {
        document.getElementById('loading-screen').style.display = 'flex';
      }
    })();
  </script>
  
<div id="cutin-overlay">
  <div id="cutin-bg"></div>
  <div id="cutin-lines"></div>
  <div id="cutin-char">
    <div class="arena-card-wrapper">
      <div id="cutin-card" class="card" data-rarity="N">
        <div class="card__translater"><div class="card__rotator"><div class="card__front">
          <div id="cutin-card-bg" class="card__bg"></div>
          <div class="card__shine"></div><div class="card__glare"></div>
        </div></div></div>
      </div>
    </div>
  </div>
  <div id="cutin-text">技能重擊</div>
</div>

<div class="main-panel" id="main-card">
  <div id="progress-container" class="progress-bar" style="display:none;"><div id="progress-fill" class="progress-fill"></div></div>
  <div id="setup-zone">
    <h2 id="title-text" style="color:var(--primary-blue);">🎙️ 瑪麗安口說挑戰</h2>
    <p id="info-text">正在開啟麥克風...</p>
    <button class="btn" style="background:var(--primary-blue); font-size: 22px; padding: 18px 40px; border-bottom: 4px solid #003366;" id="start-btn" style="display:none;">開始挑戰</button>
  </div>
  <div id="studio" style="display:none;">
    <p style="color:var(--primary-blue); font-weight:bold;">第 <span id="idx-display">1</span> / <span id="total-display">0</span> 題</p>
    <div style="display: flex; align-items: center; justify-content: center; margin: 15px 0;">
      <h1 id="word-display" style="font-size: 46px; color:#0d47a1; margin: 0; text-shadow: 1px 1px 0 #fff;">載入中...</h1>
      <button id="play-btn" class="btn-play">🔊</button>
    </div>
    <div id="zh-display"></div>
    <button type="button" id="record-btn" oncontextmenu="return false;">🎤</button>
    <p id="status" style="font-weight:bold; color:#636e72;">按住錄音，放開打分</p>
    <div id="feedback" style="font-size: 26px; font-weight: 800; color: var(--marian-green); margin-top: 10px;"></div>
    <div style="margin-top: 30px; display:flex; justify-content:center;">
      <button class="btn btn-nav" id="prev-btn">◀ 上一題</button>
      <button class="btn btn-nav" id="next-btn">下一題 ▶</button>
      <button class="btn btn-nav" id="back-summary-btn" style="display:none; background:var(--marian-green); border-bottom:4px solid #1e8449;">返回結算頁</button>
    </div>
  </div>
  <div id="summary" style="display:none;">
    <h2 id="summary-title" style="color:var(--primary-blue); margin-bottom:5px;">學習總結</h2>
    <div id="score-zone">
      <p style="margin:0; color:#636e72;">平均分數</p>
      <div style="font-size: 64px; font-weight: 900; color:var(--marian-red);" id="total-avg">0</div>
      <p id="reward-hint" style="font-size: 18px; font-weight: bold; padding: 10px; border-radius: 10px;"></p>
    </div>
    <table id="word-list"></table>
    <button class="btn btn-finish" id="submit-btn" disabled>完成挑戰並領獎</button>
    <p id="lock-msg" style="color:var(--marian-red); font-size:14px; margin-top:10px; font-weight:bold;"></p>
  </div>
</div>

<div id="battle-portal-overlay" style="display:none;">
  
  <div class="portal-timer-modern">
    <span class="portal-hint">請於倒數前點擊按鈕</span>
    <span class="portal-timer-numbers">00:<span id="portal-countdown">60</span></span>
  </div>

  <div class="portal-clash-container">
    
    <div id="portal-my-wrapper" class="portal-card-wrapper">
      <div id="portal-my-card" class="card" data-rarity="SSR">
        <div class="card__translater">
          <div class="card__rotator">
            <div class="card__front">
              <div id="portal-my-bg" class="card__bg"></div>
              <div class="card__shine"></div>
              <div class="card__glare"></div>
            </div>
          </div>
        </div>
      </div>
      <div class="portal-name-tag" id="portal-my-name">YOU</div>
    </div>

    <div class="portal-vs-spark">VS</div>

    <div id="portal-op-wrapper" class="portal-card-wrapper">
      <div id="portal-op-card" class="card" data-rarity="SSR">
        <div class="card__translater">
          <div class="card__rotator">
            <div class="card__front">
              <div id="portal-op-bg" class="card__bg"></div>
              <div class="card__shine"></div>
              <div class="card__glare"></div>
            </div>
          </div>
        </div>
      </div>
      <div class="portal-name-tag" id="portal-op-name">OPPONENT</div>
    </div>
    
  </div>

  <button id="portal-enter-btn" class="btn-cyber portal-btn-hidden" onclick="portalJump()">進入戰場</button>
</div>

<div id="battle-arena">
  <div id="skill-popup"></div>
  
  <div class="vertical-score-track">
    <div id="op-rounds" class="score-section op-score"></div>
    <div class="score-divider"></div>
    <div id="my-rounds" class="score-section my-score"></div>
  </div>

  <div class="vertical-round-track">
    <div id="round-num">第 1 局 / 先得 5 分獲勝</div>
  </div>

  <div class="arena-player-container op-container">
    <div class="glass-panel op-name-panel" style="margin-bottom: 16px; padding: 10px 25px; border: 2px solid rgba(255,255,255,0.2);">
      <div style="display:flex; align-items:center; gap:12px;">
        <span style="font-size:16px; color:#a4b0be; font-weight:900; letter-spacing:2px;">OPPONENT</span>
        <span id="op-name" style="color:#eb3b5a; font-weight:900; font-size:18px; text-shadow: 0 0 10px rgba(235,59,90,0.6);">連線中...</span>
      </div>
    </div>
    
    <div class="arena-card-wrapper">
      <div id="op-card" class="card" data-rarity="N">
        <div class="card__translater"><div class="card__rotator"><div class="card__front">
          <div id="op-card-bg" class="card__bg"></div>
          <div class="card__shine"></div><div class="card__glare"></div>
        </div></div></div>
      </div>
    </div>
  </div> <div class="arena-stage-center">
    <h1 id="target-word" style="margin: 5px 0;">準備中...</h1>
    <div id="battle-timer-container">
      <div id="battle-timer">60</div>
    </div>
    <div id="battle-info" style="color:#a4b0be; font-size:13px; margin-top:5px;">正在等待雙方就緒...</div>
  </div>

  <div class="arena-player-container my-container">
    <div class="arena-card-wrapper">
      <div id="my-card" class="card" data-rarity="N">
        <div class="card__translater"><div class="card__rotator"><div class="card__front">
          <div id="my-card-bg" class="card__bg"></div>
          <div class="card__shine"></div><div class="card__glare"></div>
        </div></div></div>
      </div>
    </div>
  </div> <div id="battle-controls" style="visibility: hidden;">
    <button id="skill-btn" onclick="activateSkill()">👊 技能重擊 (1/1)</button>
    <button id="battle-record-btn" oncontextmenu="return false;">🎤</button>
  </div>
</div>

<div id="impact-overlay">
  <div id="impact-stand-stage">
    
    <div style="margin-top: 20px; text-align: center; z-index: 20;">
      <p id="impact-subtitle">ROUND RESULT</p>
      <h1 id="impact-result">WIN</h1>
    </div>

    <div class="impact-card-wrapper">
      <div id="impact-card" class="card" data-rarity="N">
        <div class="card__translater"><div class="card__rotator"><div class="card__front">
          <div id="impact-card-bg" class="card__bg"></div>
          <div class="card__shine"></div><div class="card__glare"></div>
        </div></div></div>
      </div>
    </div>
    
    <div class="impact-score-board" style="margin-bottom: 20px; z-index: 20;">
      <div class="score-col">
        <span id="impact-my-score" class="score-number">0</span>
        <span class="score-label">YOU</span>
      </div>
      <div class="score-vs">VS</div>
      <div class="score-col">
        <span id="impact-op-score" class="score-number">0</span>
        <span class="score-label">OPPONENT</span>
      </div>
    </div>
    
  </div>
</div>
  
<div id="gacha-overlay">
  
  <div id="gacha-close-backdrop" onclick="cancelFocus()"></div>
  <div id="gacha-header">
    <h2 id="gacha-title">🎉 戰鬥勝利 🎉</h2>
    <p id="gacha-subtitle">剩餘開啟次數：<span id="picks-left">0</span> 次</p>
  </div>

  <div class="gacha-grid" id="gacha-board">
    </div>

  <div id="gacha-summary-popup">
    <h2 style="color: #00d2d3; margin-top: 0; letter-spacing: 2px;">獲得戰利品</h2>
    <div id="gacha-won-list">
      </div>
    <button class="btn-claim" id="gacha-claim-btn">領取並返回</button>
  </div>
</div>

<script>
  const GAS_URL = "https://script.google.com/macros/s/AKfycbyWm-WnRO5h3dliEPR36Cq1hCf5DgM4GIgJqXVUREclhtYOHjxq9DptApmQPkU5p5Ys/exec";
  const params = new URLSearchParams(window.location.search);
  const STUDENT_ID = params.get('id') || "S001";
  const TARGET_UNIT = params.get('unit') || "";
  
  // 🚀 判斷是否為突發事件 (直接用上面宣告好的 params 來抓就好，效能更好)
  const isEventMode = params.get('isEvent') === 'true';
  
  // 🚀 這是你設定的活動 Boss，絕對不能少！
  const EVENT_AVATAR = params.get('eventAvatar') || 'A006'; 
  
  // 🚀 關鍵修復：如果是突發事件，強制給予 'battle' 模式；若不是，就讀取原本的 mode，都沒讀到才去 'challenge'
  const MODE = isEventMode ? 'battle' : (params.get('mode') || "challenge");
  
  const ROOM_ID = params.get('roomId');

  let stream, mediaRecorder, chunks = [], quizData = [], scores = [], currentIndex = 0, isReReading = false;
  let audioContext, analyser, dataArray, source, gradingInterval;
  let maxVolume = 0;
  
  let hasUsedSkill = false; 
  let isUltimateMode = false; 

  let battleQuizArr = [], currentBattleRound = 0;
  let readyTimer = null, currentLimitTimer = null, waitOpTimer = null, syncTimer = null; 
  let myTotalWins = 0, opTotalWins = 0;
  let roundSubmitted = false, isChecking = false, opponentWaitTimer = null;

  // 🚀 隱藏載入畫面的共用函數
  function hideLoadingScreen() {
    const loader = document.getElementById('loading-screen');
    // 🔴 關鍵修改 3：檢查 display 是不是 flex (代表是對戰模式有開啟它)
    if (loader && loader.style.display === 'flex') {
      loader.style.opacity = '0';
      setTimeout(() => loader.style.display = 'none', 600);
    }
  }
  
  function normalizeStr(val) { if (!val) return ""; return String(val).replace(/(%20|\s)+/ig, "").toUpperCase(); }

  function activateSkill() {
    if (hasUsedSkill) return;
    hasUsedSkill = true;
    isUltimateMode = true;
    document.getElementById('skill-btn').style.display = 'none';
    document.getElementById('battle-arena').classList.add('ultimate-mode-bg');
    document.getElementById('target-word').classList.add('ultimate-word');
    const rb = document.getElementById('battle-record-btn');
    rb.classList.add('ultimate-record-btn');
    rb.innerHTML = "👊";
  }

  const originalOnload = async () => {
    if(MODE === 'review') document.getElementById('title-text').innerText = "📖 自由練習模式";
    try {
      stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      audioContext = new (window.AudioContext || window.webkitAudioContext)();
      analyser = audioContext.createAnalyser();
      source = audioContext.createMediaStreamSource(stream);
      source.connect(analyser);
      analyser.fftSize = 256;
      dataArray = new Uint8Array(analyser.frequencyBinCount);
      document.getElementById('info-text').innerText = "麥克風已就緒";
      document.getElementById('start-btn').style.display = 'inline-block';
    } catch (e) { alert("請開啟麥克風權限"); }
    hideLoadingScreen();
  };

  // 🚀 補回遺失的「開始挑戰」按鈕點擊事件！(原汁原味恢復)
  document.getElementById('start-btn').onclick = () => {
    document.getElementById('info-text').innerText = "正在載入題目...";
    fetch(`${GAS_URL}?id=${STUDENT_ID}&action=get_data&unit=${encodeURIComponent(TARGET_UNIT)}`)
      .then(res => res.json()).then(data => {
        if (!data.words || data.words.length === 0) { alert("題目為空"); return; }
        quizData = data.words; scores = new Array(quizData.length).fill(null);
        document.getElementById('total-display').innerText = quizData.length;
        document.getElementById('setup-zone').style.display = 'none';
        document.getElementById('progress-container').style.display = 'block';
        document.getElementById('studio').style.display = 'block';
        renderWord();
      }).catch(err => { alert("連線失敗！"); });
  };

  window.onload = async () => {
    // 🚀 開發者測試外掛：直接進入高階 AI 抽獎畫面
    if (MODE === 'test_gacha') {
        document.getElementById('main-card').style.display = 'none';
        document.getElementById('battle-portal-overlay').style.display = 'none';
        document.getElementById('battle-arena').style.display = 'none';
        document.body.style.background = '#050914'; 
        
        battleQuizArr = [{en: "APPLE"}, {en: "MAGIC"}, {en: "HERO"}];
        
        try {
            // 1. 開啟麥克風權限
            stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioContext.createAnalyser();
            source = audioContext.createMediaStreamSource(stream);
            source.connect(analyser);
            analyser.fftSize = 256;
            dataArray = new Uint8Array(analyser.frequencyBinCount);

            // 🚀 2. 動態去後端查你「現在」的圖鑑與真實擁有的角色！
            document.getElementById('gacha-title').innerText = "連線讀取中..."; 
            
            // 🚀 關鍵修復：改用 get_lobby_data，一次把圖鑑跟個人解鎖進度都抓回來！
            let res = await fetch(`${GAS_URL}?action=get_lobby_data&id=${STUDENT_ID}`);
            let data = await res.json();
            
            // 寫入圖鑑，並啟動動態獎池引擎！
            window.characterAssets = data.assets || {};
            characterAssets = window.characterAssets;
            buildDynamicPrizePool();
            
            // 寫入真實擁有的角色
            if (data.profile && data.profile.unlocked) {
                window.myUnlockedAvatars = data.profile.unlocked.split(',').map(s => s.trim()).filter(s => s !== "");
            } else {
                window.myUnlockedAvatars = [];
            }
            console.log("測試模式啟動！真實擁有角色：", window.myUnlockedAvatars);
            console.log("動態獎池生成：", PRIZE_POOL);
            
            document.getElementById('gacha-title').innerText = "🎉 戰鬥勝利 🎉"; // 恢復標題

        } catch(e) {
            console.log("API 請求或麥克風失敗", e);
            window.myUnlockedAvatars = ['A001']; // 萬一斷線的備用防呆
            buildDynamicPrizePool(); // 就算斷線，也要建一個基礎點數獎池避免當機
        }
        
        initGacha("高階Ai");
        setTimeout(() => { initInteractiveHoloCards(); }, 500);
        return; // 終止後續載入
    }

    // --- 原本的正常載入邏輯 ---
    // ... (以下維持不變) ...

    if (MODE === 'battle' && ROOM_ID) {
      document.getElementById('main-card').style.display = 'none';
      document.getElementById('impact-overlay').classList.remove('active');
      try {
        stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioContext.createAnalyser();
        source = audioContext.createMediaStreamSource(stream);
        source.connect(analyser);
        analyser.fftSize = 256;
        dataArray = new Uint8Array(analyser.frequencyBinCount);
        
        // 🚀 載入戰場前，先偷抓全服大廳的角色圖鑑資料！
        fetch(`${GAS_URL}?action=get_lobby_data&id=${STUDENT_ID}`)
          .then(res => res.json())
          .then(data => {
            window.characterAssets = data.assets || {}; // 存入全域變數
            
            // 🚀 關鍵修復：同步給抽獎系統的變數，並啟動獎池引擎！
            characterAssets = window.characterAssets;   
            buildDynamicPrizePool();                    

            showPortal();
            hideLoadingScreen();
          }).catch(err => {
            console.log("圖鑑載入失敗，使用預設", err);
            buildDynamicPrizePool();
            showPortal();
            hideLoadingScreen(); // 失敗時也要解開畫面
          });
      } catch(err) { alert("請開啟麥克風權限才能對戰！"); }
    } else {
      await originalOnload();
    }
  };
  
  // 🚀 傳送門：全息對峙 Loading 畫面邏輯
  function showPortal() {
    const portal = document.getElementById('battle-portal-overlay');
    
    // 強制重繪與套用 3D 視角
    portal.className = '';
    void portal.offsetWidth; 
    portal.style.display = 'flex';
    
    let pCount = 60;
    
    // 啟動頂部倒數計時
    const pTimer = setInterval(() => {
      pCount--;
      document.getElementById('portal-countdown').innerText = pCount;
      if(pCount <= 0) { 
          clearInterval(pTimer); 
          if (window.portalJump) window.portalJump(); 
      }
    }, 1000);

    // 向後端抓取對戰對手資料
    fetch(`${GAS_URL}?action=get_battle_status&roomId=${ROOM_ID}&t=${new Date().getTime()}`)
      .then(res => res.json())
      .then(data => {
        const isMeHost = (normalizeStr(STUDENT_ID) === normalizeStr(data.hostId));

        // 判定雙方圖片與名稱 (🚀 對手變數改成 let 才能被覆蓋)
        const myImgUrl = isMeHost ? data.hostImg : data.guestImg;
        let opImgUrl = isMeHost ? data.guestImg : data.hostImg;
        const myName = isMeHost ? data.hostName : (data.guestName || STUDENT_ID);
        let opName = isMeHost ? (data.guestName || "挑戰者") : data.hostName;

        const finalMyRarity = isMeHost ? (data.hostRarity || 'N') : (data.guestRarity || 'N');
        let finalOpRarity = isMeHost ? (data.guestRarity || 'N') : (data.hostRarity || 'N');
        const finalMyMask = isMeHost ? (data.hostMask || '') : (data.guestMask || '');
        let finalOpMask = isMeHost ? (data.guestMask || '') : (data.hostMask || '');

        // 🚀 核心攔截：如果是突發事件，直接把上面的對手變數強制換成 Boss！
        if (isEventMode && EVENT_AVATAR && window.characterAssets && window.characterAssets[EVENT_AVATAR]) {
            const boss = window.characterAssets[EVENT_AVATAR];
            opName = `[活動] ${boss.name}`;
            opImgUrl = boss.img;
            finalOpRarity = boss.rarity || 'SSR';
            finalOpMask = boss.mask || '';
        }

        console.log("【偵測】我方 Rarity:", finalMyRarity, "對手 Rarity:", finalOpRarity);

        // 🚀 強制寫入我方特效
        const myCardEl = document.getElementById('portal-my-card');
        myCardEl.setAttribute('data-rarity', finalMyRarity);
        if (finalMyMask) {
            myCardEl.classList.add('masked');
            myCardEl.style.setProperty('--mask', finalMyMask.includes('url(') ? finalMyMask : `url('${finalMyMask}')`);
        } else {
            myCardEl.classList.remove('masked');
        }

        // 🚀 強制寫入對手特效
        const opCardEl = document.getElementById('portal-op-card');
        opCardEl.setAttribute('data-rarity', finalOpRarity);
        if (finalOpMask) {
            opCardEl.classList.add('masked');
            opCardEl.style.setProperty('--mask', finalOpMask.includes('url(') ? finalOpMask : `url('${finalOpMask}')`);
        } else {
            opCardEl.classList.remove('masked');
        }

        // 填入卡片背景圖與姓名 Tag
        if(myImgUrl) document.getElementById('portal-my-bg').style.backgroundImage = `url('${myImgUrl}')`;
        if(opImgUrl) document.getElementById('portal-op-bg').style.backgroundImage = `url('${opImgUrl}')`;
        document.getElementById('portal-my-name').innerText = myName;
        document.getElementById('portal-op-name').innerText = opName;

        // 🚀 資料載入完畢，觸發史詩級「卡牌滑入對峙」動畫！
        const myWrapper = document.getElementById('portal-my-wrapper');
        const opWrapper = document.getElementById('portal-op-wrapper');
        const vsSpark = document.querySelector('.portal-vs-spark');
        
        myWrapper.classList.remove('clash-in-my');
        opWrapper.classList.remove('clash-in-op');
        vsSpark.classList.remove('spark-active');
        void portal.offsetWidth; 

        myWrapper.classList.add('clash-in-my');
        opWrapper.classList.add('clash-in-op');
        vsSpark.classList.add('spark-active');

        // 秀出底部帥氣質感的「進入戰場」毛玻璃按鈕
        const enterBtn = document.getElementById('portal-enter-btn');
        enterBtn.classList.remove('portal-btn-hidden');
        enterBtn.classList.add('portal-btn-show');

        // 綁定「點擊進入戰場」的跳轉功能
        window.portalJump = () => {
          clearInterval(pTimer);
          portal.style.display = 'none';
          document.getElementById('battle-arena').style.display = 'flex';
          setTimeout(() => { document.getElementById('battle-arena').classList.add('battle-ready'); }, 100);
          fetchBattleDataAndStart(ROOM_ID);
        };
        // 🚀 加上這行：資料載入完畢後，啟動閃卡互動引擎！
        setTimeout(() => { initInteractiveHoloCards(); }, 500);
      })
      .catch(err => {
        console.error("Portal Error:", err);
        // 如果網路連線失敗，備用的顯示機制
        const enterBtn = document.getElementById('portal-enter-btn');
        enterBtn.innerText = "強制進入";
        enterBtn.classList.remove('portal-btn-hidden');
        enterBtn.classList.add('portal-btn-show');
        
        window.portalJump = () => {
          clearInterval(pTimer);
          portal.style.display = 'none';
          document.getElementById('battle-arena').style.display = 'flex';
          fetchBattleDataAndStart(ROOM_ID);
        };
      });
  }

  function renderWord() {
    const current = quizData[currentIndex];
    document.getElementById('idx-display').innerText = currentIndex + 1;
    document.getElementById('word-display').innerText = current.en;
    document.getElementById('zh-display').innerText = current.zh;
    document.getElementById('feedback').innerText = scores[currentIndex] !== null ? "得分：" + scores[currentIndex] : "";
    document.getElementById('record-btn').style.display = 'block';
    
    // 🚀 就是缺了這行！切換題目時，把狀態文字重置回預設提示
    document.getElementById('status').innerText = "按住錄音，放開打分";
    document.getElementById('status').style.color = "#636e72"; // 順便把顏色變回原本的低調灰

    document.getElementById('progress-fill').style.width = (((currentIndex + 1) / quizData.length) * 100) + "%";
    if (isReReading) {
      document.getElementById('prev-btn').style.display = 'none';
      document.getElementById('next-btn').style.display = 'none';
      document.getElementById('back-summary-btn').style.display = 'inline-block';
    } else {
      document.getElementById('prev-btn').style.display = 'inline-block';
      document.getElementById('next-btn').style.display = 'inline-block';
      document.getElementById('back-summary-btn').style.display = 'none';
      document.getElementById('prev-btn').disabled = currentIndex === 0;
      document.getElementById('next-btn').innerText = currentIndex === quizData.length - 1 ? "查看結算" : "下一題 ▶";
    }
  }

  let isGrading = false; 
  let tooQuietFlag = false; 

  const rb = document.getElementById('record-btn');
  if(rb) {
    rb.onpointerdown = (e) => {
      if(isGrading) return;
      e.preventDefault(); 
      document.getElementById('feedback').innerHTML = ""; 
      maxVolume = 0; chunks = []; tooQuietFlag = false;
      
      mediaRecorder = new MediaRecorder(stream);
      mediaRecorder.ondataavailable = ev => chunks.push(ev.data);
      
      mediaRecorder.onstop = () => {
        if (tooQuietFlag) {
          isGrading = false;
          rb.style.opacity = "1";
          return; 
        }
        isGrading = true;
        rb.style.opacity = "0.5";
        
        // 🔒 1. 錄音一結束，立刻鎖死上下題按鈕！
        document.getElementById('prev-btn').disabled = true;
        document.getElementById('next-btn').disabled = true;
        document.getElementById('back-summary-btn').disabled = true;

        if (gradingInterval) clearInterval(gradingInterval);
        let dots = 0;
        gradingInterval = setInterval(() => { 
          dots = (dots + 1) % 4; 
          document.getElementById('status').innerText = "老師評分中" + ".".repeat(dots); 
        }, 400);

        const reader = new FileReader();
        reader.readAsDataURL(new Blob(chunks, { type: 'audio/webm' }));
        reader.onloadend = () => {
          const base64 = reader.result.split(',')[1];
          fetch(`${GAS_URL}?action=evaluate_speech&word=${encodeURIComponent(quizData[currentIndex].en)}`, { method: 'POST', body: base64 })
            .then(res => res.json()).then(data => {
              clearInterval(gradingInterval);
              scores[currentIndex] = data.score;
              if(!window.feedbacks) window.feedbacks = [];
              window.feedbacks[currentIndex] = data.feedback;
              document.getElementById('feedback').innerHTML = `得分：${data.score}<br><small>${data.feedback}</small>`;
              document.getElementById('status').innerText = "評分完成！";
              isGrading = false;
              rb.style.opacity = "1";
              
              // 🔓 2. 【分數真的回來了】才解開上下題按鈕封印！
              document.getElementById('prev-btn').disabled = currentIndex === 0;
              document.getElementById('next-btn').disabled = false;
              document.getElementById('back-summary-btn').disabled = false;
              
            }).catch(() => {
              clearInterval(gradingInterval);
              document.getElementById('status').innerText = "連線超時，請重新錄音";
              isGrading = false;
              rb.style.opacity = "1";
              
              // 🔓 3. 【連線發生錯誤】也要解開按鈕以免卡死！
              document.getElementById('prev-btn').disabled = currentIndex === 0;
              document.getElementById('next-btn').disabled = false;
              document.getElementById('back-summary-btn').disabled = false;
            });
        };
      };

      mediaRecorder.start(); 
      rb.classList.add('active');
      document.getElementById('status').innerText = "正在錄音中...";
      const checkVol = () => { if (mediaRecorder.state === "recording") { analyser.getByteFrequencyData(dataArray); let v = 0; for (let i = 0; i < dataArray.length; i++) v += dataArray[i]; if ((v / dataArray.length) > maxVolume) maxVolume = (v / dataArray.length); requestAnimationFrame(checkVol); } }; checkVol();
    };

    rb.onpointerup = () => {
      if (!mediaRecorder || mediaRecorder.state !== "recording") return;
      rb.classList.remove('active');
      if (maxVolume < 30) { 
        tooQuietFlag = true; 
        document.getElementById('status').innerText = "太小聲了，再大聲點！";
        mediaRecorder.stop();
      } else {
        mediaRecorder.stop();
      }
    };
  }


  document.getElementById('play-btn').onclick = () => { window.speechSynthesis.cancel(); const msg = new SpeechSynthesisUtterance(quizData[currentIndex].en); msg.lang = 'en-US'; window.speechSynthesis.speak(msg); };
  document.getElementById('prev-btn').onclick = () => { if(currentIndex > 0){ currentIndex--; renderWord(); } };
  document.getElementById('next-btn').onclick = () => { if (currentIndex < quizData.length - 1) { currentIndex++; renderWord(); } else { showSummary(); } };
  document.getElementById('back-summary-btn').onclick = () => { isReReading = false; showSummary(); };

  function showSummary() {
    document.getElementById('studio').style.display = 'none';
    document.getElementById('summary').style.display = 'block';
    let sum = 0, count = 0;
    const list = document.getElementById('word-list');
    list.innerHTML = "";

    quizData.forEach((item, i) => {
      let s = scores[i] || 0;
      let f = (window.feedbacks && window.feedbacks[i]) ? window.feedbacks[i] : "尚未錄音";
      sum += s; count++;
      list.innerHTML += `<tr><td><b style="color:#0d47a1">${item.en}</b><br><span style="color:#7f8c8d; font-size:14px">${item.zh}</span><br><p style="margin:5px 0; font-size:13px; color:#e67e22;">💡 ${f}</p><button class="btn-re" onclick="reRead(${i})">🔄 重唸</button></td><td><span class="score-badge">${s} 分</span></td></tr>`;
    });

    const avg = count > 0 ? Math.round(sum / count) : 0;
    document.getElementById('total-avg').innerText = avg;

    const submitBtn = document.getElementById('submit-btn');
    const lockMsg = document.getElementById('lock-msg');
    const rewardHint = document.getElementById('reward-hint');

    if (MODE === 'review') {
      submitBtn.removeAttribute('disabled');
      submitBtn.style.backgroundColor = "var(--marian-green)";
      submitBtn.innerText = "完成練習";
    } else {
      if (avg >= 70) {
        submitBtn.removeAttribute('disabled');
        submitBtn.disabled = false;
        submitBtn.style.opacity = "1";
        submitBtn.style.pointerEvents = "auto";
        submitBtn.style.backgroundColor = "#27ae60"; 
        lockMsg.innerText = "";
        let reward = avg >= 90 ? 50 : (avg >= 80 ? 30 : 10);
        rewardHint.innerText = `🎁 可獲得：${reward} 點`;
      } else {
        submitBtn.setAttribute('disabled', 'true');
        submitBtn.style.backgroundColor = "#636e72"; 
        lockMsg.innerText = "❌ 平均需達 70 分才能領獎";
        rewardHint.innerText = "";
      }
    }
    submitBtn.onclick = handleClaimReward;
  }

  function handleClaimReward() {
    const btn = document.getElementById('submit-btn');
    const avg = parseInt(document.getElementById('total-avg').innerText);
    
    btn.innerText = "正在儲存中...";
    btn.style.pointerEvents = "none";
    btn.style.backgroundColor = "#95a5a6";

    // 🚀 1. 核心實作：打包這次練習的所有單字、分數與 AI 評語 (Detail_JSON)
    let detailArr = [];
    quizData.forEach((item, i) => {
      detailArr.push({
        word: item.en,
        score: scores[i] || 0,
        feedback: (window.feedbacks && window.feedbacks[i]) ? window.feedbacks[i] : "尚未錄音"
      });
    });
    const detailJSON = JSON.stringify(detailArr);

    // 🚀 2. 將 details 參數轉碼後，加入 URL 一併傳給後端 GAS
    const finalUrl = `${GAS_URL}?id=${STUDENT_ID}&action=add_score&score=${avg}&mode=${MODE}&details=${encodeURIComponent(detailJSON)}`;
    
    fetch(finalUrl, { mode: 'no-cors' })
      .then(() => { 
        alert(MODE === 'review' ? "👍 練習辛苦了！" : "🎉 挑戰完成！"); 
        // 建議直接導回 GitHub Pages 的大廳/主頁，體驗會比導回 GAS 網址更絲滑
        window.location.href = `https://damienkuo123.github.io/marian-app/dashboard.html?id=${STUDENT_ID}`; 
      }).catch(err => {
        console.log("Fetch 失敗，啟動備案...", err);
        const img = new Image();
        img.src = finalUrl;
        setTimeout(() => {
          alert("🎉 挑戰完成！");
          window.location.href = `https://damienkuo123.github.io/marian-app/dashboard.html?id=${STUDENT_ID}`;
        }, 1000);
      });
  }
  
  function reRead(i) { 
      currentIndex = i; 
      isReReading = true; 
      document.getElementById('summary').style.display = 'none'; 
      document.getElementById('studio').style.display = 'block'; 
      renderWord(); 
  }

  // =======================================================

        battleQuizArr = data.quiz;

  function initArena(roomId) {
    currentBattleRound = 0;
    document.getElementById('target-word').innerText = "戰場同步中...";
    document.getElementById('battle-timer').innerText = "60";
    document.getElementById('round-num').innerText = "規則：先得 5 分者勝";
    document.getElementById('battle-info').innerText = "正在等待雙方就緒...";
    
    document.getElementById('battle-controls').style.visibility = 'hidden';
    updateArenaUI(roomId, true);

    fetch(`${GAS_URL}?action=arena_ready&id=${STUDENT_ID}&roomId=${roomId}&t=${new Date().getTime()}`)
      .then(() => {
        let waitCount = 60;
        if(syncTimer) clearInterval(syncTimer);
        syncTimer = setInterval(() => {
          waitCount--;
          document.getElementById('battle-timer').innerText = waitCount;
          
          fetch(`${GAS_URL}?action=get_battle_status&roomId=${roomId}&t=${new Date().getTime()}`)
            .then(res => res.json()).then(data => {
              if (data.hostScores && data.guestScores && data.hostScores.length > 0 && data.guestScores.length > 0) {
                clearInterval(syncTimer);
                startRoundCountdown(roomId);
              }
              if (data.status === "Canceled") { clearInterval(syncTimer); alert("對戰取消"); location.reload(); }
            });

          if (waitCount <= 0) { clearInterval(syncTimer); alert("等待超時"); location.reload(); }
        }, 2000);
      });
  }

  function updateArenaUI(roomId, isInit = false) {
    fetch(`${GAS_URL}?action=get_battle_status&roomId=${roomId}&t=${new Date().getTime()}`)
      .then(res => res.json()).then(data => {
        const isMeHost = (normalizeStr(STUDENT_ID) === normalizeStr(data.hostId));
        const myNameEl = document.getElementById('my-name');
        if (myNameEl) myNameEl.innerText = isMeHost ? data.hostName : (data.guestName || "挑戰者");

        window.myTheme = isMeHost ? data.hostTheme : data.guestTheme;
        window.opTheme = isMeHost ? data.guestTheme : data.hostTheme;

        // 取得雙方圖片網址 (🚀 對手變數改成 let 才能被覆蓋)
        const myImgUrl = isMeHost ? data.hostImg : data.guestImg;
        let opImgUrl = isMeHost ? data.guestImg : data.hostImg;

        // 取得雙方 Rarity 和 Mask
        const finalMyRarity = isMeHost ? (data.hostRarity || 'N') : (data.guestRarity || 'N');
        let finalOpRarity = isMeHost ? (data.guestRarity || 'N') : (data.hostRarity || 'N');
        const finalMyMask = isMeHost ? (data.hostMask || '') : (data.guestMask || '');
        let finalOpMask = isMeHost ? (data.guestMask || '') : (data.hostMask || '');

        let finalOpName = isMeHost ? (data.guestName || "對手") : data.hostName;

        // 🚀 核心攔截：如果是活動模式，強制把上面取得的對手資料覆蓋為「活動 Boss」！
        if (isEventMode && EVENT_AVATAR && window.characterAssets && window.characterAssets[EVENT_AVATAR]) {
            const boss = window.characterAssets[EVENT_AVATAR];
            finalOpName = `[活動] ${boss.name}`;
            opImgUrl = boss.img; 
            finalOpRarity = boss.rarity || 'SSR'; 
            finalOpMask = boss.mask || ''; 
        }

        document.getElementById('op-name').innerText = finalOpName;

        // 存為全域變數供結算畫面使用
        window.currentMyRarity = finalMyRarity; window.currentMyMask = finalMyMask;
        window.currentOpRarity = finalOpRarity; window.currentOpMask = finalOpMask;

        // 🚀 寫入我方戰場卡片 (套用 3D 結構的背景)
        const myCardEl = document.getElementById('my-card');
        const myCardBg = document.getElementById('my-card-bg');
        if (myCardBg && myImgUrl) myCardBg.style.backgroundImage = `url('${myImgUrl}')`;
        myCardEl.setAttribute('data-rarity', finalMyRarity);
        if (finalMyMask) {
            myCardEl.classList.add('masked');
            myCardEl.style.setProperty('--mask', finalMyMask.includes('url(') ? finalMyMask : `url('${finalMyMask}')`);
        } else { myCardEl.classList.remove('masked'); }
        
        // 🚀 寫入對手戰場卡片
        const opCardEl = document.getElementById('op-card');
        const opCardBg = document.getElementById('op-card-bg');
        if (opCardBg && opImgUrl) opCardBg.style.backgroundImage = `url('${opImgUrl}')`;
        opCardEl.setAttribute('data-rarity', finalOpRarity);
        if (finalOpMask) {
            opCardEl.classList.add('masked');
            opCardEl.style.setProperty('--mask', finalOpMask.includes('url(') ? finalOpMask : `url('${finalOpMask}')`);
        } else { opCardEl.classList.remove('masked'); }

        document.getElementById('battle-arena').classList.add('battle-ready');

        // 更新圓點分數
        const hS = data.hostScores.filter(s => s !== -1);
        const gS = data.guestScores.filter(s => s !== -1);
        myTotalWins = 0; opTotalWins = 0;
        const commonLen = Math.min(hS.length, gS.length);
        for(let i=0; i < commonLen; i++) { 
           if(hS[i] > gS[i]) isMeHost ? myTotalWins++ : opTotalWins++; 
           else if(gS[i] > hS[i]) isMeHost ? opTotalWins++ : myTotalWins++; 
        }
        document.getElementById('my-rounds').innerHTML = renderDots(myTotalWins, true);
        document.getElementById('op-rounds').innerHTML = renderDots(opTotalWins, false);

        // 啟動互動引擎 (把場上所有的 card 都掃描一次)
        setTimeout(() => { initInteractiveHoloCards(); }, 500);
      });
  }

    for(let i=0; i<5; i++) { html += `<div class="round-dot ${i < wins ? winClass : ''}"></div>`; } 
    return html;
  }

          document.getElementById('battle-timer').innerText = limit;

        clearInterval(currentLimitTimer);

            roundSubmitted = true;

            document.getElementById('battle-controls').style.visibility = 'hidden';

        }
      }

      e.preventDefault(); maxVolume = 0; chunks = [];

    };

    battleBtn.onpointerup = () => {
      if (roundSubmitted || !mediaRecorder || mediaRecorder.state !== "recording") return;
      roundSubmitted = true; clearInterval(currentLimitTimer);
      mediaRecorder.stop(); 
      
      battleBtn.classList.remove('active', 'ult-active');

      document.getElementById('battle-timer').innerText = "評分中...";
      document.getElementById('battle-info').innerText = "AI 正在分析您的發音...";

      const gradingAnim = setInterval(() => { 
        dots = (dots + 1) % 4; 
        document.getElementById('battle-timer').innerText = "評分中" + ".".repeat(dots); 
      }, 400);

      mediaRecorder.onstop = () => {
        const r = new FileReader(); r.readAsDataURL(new Blob(chunks, { type: 'audio/webm' }));
        r.onloadend = () => {
          fetch(`${GAS_URL}?action=evaluate_speech_battle&word=${encodeURIComponent(battleQuizArr[currentBattleRound].en)}`, { method: 'POST', body: r.result.split(',')[1] })
            .then(res => res.json()).then(data => {

            }).catch(() => {
                clearInterval(gradingAnim);
                submitBattleScore(ROOM_ID, 0);
            });

    // 🚀 加上這兩行！只要手指滑出按鈕或被系統打斷，強制觸發放開邏輯，瞬間熄火！
    battleBtn.onpointerleave = battleBtn.onpointerup;
    battleBtn.onpointercancel = battleBtn.onpointerup;
  }

  // 🚀 特效調度器：掛載絕對光球，避免殘留
  function triggerBattleAnimations(myNum, opNum, isFinal, myTotalWins, opTotalWins, isMyUlt, isOpUlt, myImgUrl, opImgUrl) {
    const myCard = document.getElementById('my-card'); 
    const opCard = document.getElementById('op-card');
    const arenaBg = document.getElementById('battle-arena');

    // 清除舊動畫狀態
    const animations = ['charging-mana', 'ultimate-charging', 'winner-glory', 'loser-shatter', 'take-damage'];
    if(myCard) myCard.classList.remove(...animations); 
    if(opCard) opCard.classList.remove(...animations);
    if(arenaBg) arenaBg.classList.remove('screen-flash-red', 'screen-flash-cyan', 'screen-flash-gold');
    void myCard.offsetWidth; void opCard.offsetWidth;

    let delayBeforeAttack = 0;
    if (myNum > opNum && isMyUlt) {
        playCutinAnimation(`url('${myImgUrl}')`, true);
        delayBeforeAttack = 1500; 
    } else if (opNum > myNum && isOpUlt) {
        playCutinAnimation(`url('${opImgUrl}')`, false);
        delayBeforeAttack = 1500;
    }

    setTimeout(() => {
        const myContainer = myCard.closest('.my-container');
        const opContainer = opCard.closest('.op-container');

        // 🚀 動態生成掛在 arena 上的物理光球
        function createBlast(type, delay = 0) {
           setTimeout(() => {
             const blast = document.createElement('div');
             blast.className = `blast-particle ${type}`;
             arenaBg.appendChild(blast);
             setTimeout(() => blast.remove(), 1000); // 播完自毀
           }, delay);
        }

        if (myNum > opNum) { 
          if(myCard) {
            if(myContainer) myContainer.classList.add('recoil-my'); 
            if (isMyUlt) {
                myCard.classList.add('ultimate-charging'); 
                createBlast('blast-ult-my', 100); createBlast('blast-ult-my', 300);
                if(arenaBg) arenaBg.classList.add('screen-flash-gold');
            } else {
                myCard.classList.add('charging-mana'); 
                createBlast('blast-my', 100);
                if(arenaBg) arenaBg.classList.add('screen-flash-cyan'); 
            }
            if(isFinal) setTimeout(() => myCard.classList.add('winner-glory'), 800);
          }
          if(opCard) opCard.classList.add(isFinal ? 'loser-shatter' : 'take-damage'); 
        }
        else if (myNum < opNum) { 
          if(opCard) {
            if(opContainer) opContainer.classList.add('recoil-op'); 
            if (isOpUlt) {
                opCard.classList.add('ultimate-charging'); 
                createBlast('blast-ult-op', 100); createBlast('blast-ult-op', 300);
                if(arenaBg) arenaBg.classList.add('screen-flash-gold');
            } else {
                opCard.classList.add('charging-mana'); 
                createBlast('blast-op', 100);
                if(arenaBg) arenaBg.classList.add('screen-flash-red'); 
            }
            if(isFinal) setTimeout(() => opCard.classList.add('winner-glory'), 800);
          }
          if(myCard) myCard.classList.add(isFinal ? 'loser-shatter' : 'take-damage');
        }

        updateCardDamage(myCard, opTotalWins);
        updateCardDamage(opCard, myTotalWins);

        // 🚀 如果是最後一局 (isFinal)，多等 0.8 秒，讓卡片徹底碎裂掉出螢幕後，結算畫面才彈出！
        let impactDelay = isFinal ? 2400 : 1600;

        setTimeout(() => {
          // 清除光球與後座力殘留
          if(myCard) myCard.classList.remove('charging-mana', 'ultimate-charging');
          if(opCard) opCard.classList.remove('charging-mana', 'ultimate-charging');
          if(myContainer) myContainer.classList.remove('recoil-my');
          if(opContainer) opContainer.classList.remove('recoil-op');
          
          showImpactOverlay(myNum, opNum, isFinal, myImgUrl, opImgUrl);
        }, 1600); 

    }, delayBeforeAttack); 
  }

  // 2. 檢查雙方分數 (修復括號錯誤與整合抽獎系統)
  function checkBoth(roomId) {
    if(isChecking) return; isChecking = true;
    fetch(`${GAS_URL}?action=get_battle_status&roomId=${roomId}&t=${new Date().getTime()}`)
      .then(res => res.json()).then(data => {
        const hS = data.hostScores.filter(s => s !== -1);
        const gS = data.guestScores.filter(s => s !== -1);

        if (hS.length > currentBattleRound && gS.length > currentBattleRound) {
          clearInterval(waitOpTimer);
          
          const isMeHost = (normalizeStr(STUDENT_ID) === normalizeStr(data.hostId));
          const rawMyS = isMeHost ? hS[currentBattleRound] : gS[currentBattleRound];
          const rawOpS = isMeHost ? gS[currentBattleRound] : hS[currentBattleRound];
          
          const myImgUrl = isMeHost ? data.hostImg : data.guestImg;
          let opImgUrl = isMeHost ? data.guestImg : data.hostImg;

          // 🚀 核心攔截：把結算畫面與大招切入畫面的圖片也強制換成 Boss！
          if (isEventMode && EVENT_AVATAR && window.characterAssets && window.characterAssets[EVENT_AVATAR]) {
              opImgUrl = window.characterAssets[EVENT_AVATAR].img;
          }

          const myUltThisRound = rawMyS > 500;
          const opUltThisRound = rawOpS > 500;

          const myS = myUltThisRound ? rawMyS - 1000 : rawMyS;
          const opS = opUltThisRound ? rawOpS - 1000 : rawOpS;
        
          myTotalWins = 0; opTotalWins = 0;
          for(let i=0; i <= currentBattleRound; i++) {
              let rawM = isMeHost ? hS[i] : gS[i];

  function buildDynamicPrizePool() {
      // 1. 保留原本固定的「點數獎池」
      let pool = [

          { type: 'points', value: 150, label: '150 點', class: 'prize-SR', glow: 'crack-purple', weight: 0.3 },
          { type: 'points', value: 500, label: '500 點', class: 'prize-SSR', glow: 'crack-gold', weight: 0.1 },
          { type: 'points', value: 888, label: '888 點', class: 'prize-SSR', glow: 'crack-gold', weight: 0.1 }
      ];

      // 2. 從全域圖鑑中，篩選出第 J 欄 (Category) 為「一般」的角色
      let normalAvatars = Object.entries(characterAssets).filter(([id, char]) => char.category === '一般');

      // 3. 統計各稀有度的卡片數量，用來平分機率
      let counts = { 'N': 0, 'R': 0, 'SR': 0, 'SSR': 0 };
      normalAvatars.forEach(([id, char]) => {
          if (counts[char.rarity] !== undefined) counts[char.rarity]++;
      });

      // 4. 設定各稀有度的「總機率權重」(你的完美設計)
      const totalWeights = { 'N': 2, 'R': 0.8, 'SR': 0.2, 'SSR': 0.1 };

      // 5. 將「一般」角色動態加入獎池，自動計算平分權重與開卡特效
      normalAvatars.forEach(([id, char]) => {
          let r = char.rarity;
          // 計算單張卡片的專屬權重 (總權重 ÷ 該稀有度總數量)
          let weight = (counts[r] > 0) ? (totalWeights[r] / counts[r]) : 0;
          
          // 自動套用你指定的開卡光芒特效
          let glowClass = 'crack-white';
          if (r === 'SR') glowClass = 'crack-purple';
          if (r === 'SSR') glowClass = 'crack-gold';

          pool.push({
              type: 'avatar',
              value: id,
              label: r,
              class: `prize-${r}`,
              glow: glowClass,
              weight: weight
          });
      });

      PRIZE_POOL = pool; // 寫入正式獎池
      console.log("🎲 動態獎池生成完畢！目前獎池總數：", PRIZE_POOL.length);
  }

  // 1. 先抽盲盒稀有度
  function getBoxRarity() {
    let r = Math.random() * 100;
    if (r < 96) return 'N';
    if (r < 98.5) return 'R';
    if (r < 99.5) return 'SR';
    return 'SSR';
  }

  // 2. 根據盲盒稀有度，過濾獎池並抽獎
  function drawPrizeByBox(boxRarity) {
    let pool = [];
    if (boxRarity === 'N') pool = PRIZE_POOL; // N箱可抽所有
    else if (boxRarity === 'R') pool = PRIZE_POOL.filter(p => p.class !== 'prize-N'); // R箱保底 R 以上
    else if (boxRarity === 'SR') pool = PRIZE_POOL.filter(p => p.class === 'prize-SR' || p.class === 'prize-SSR'); // SR箱保底 SR 以上
    else if (boxRarity === 'SSR') pool = PRIZE_POOL.filter(p => p.class === 'prize-SSR'); // SSR箱保底 SSR

    let totalWeight = pool.reduce((sum, item) => sum + item.weight, 0);
    let random = Math.random() * totalWeight;
    for (let item of pool) {
      if (random < item.weight) return item;
      random -= item.weight;
    }
    return pool[0];
  }

  function drawPrize() {
    let totalWeight = PRIZE_POOL.reduce((sum, item) => sum + item.weight, 0);
    let random = Math.random() * totalWeight;
    for (let item of PRIZE_POOL) {
      if (random < item.weight) return item;
      random -= item.weight;
    }
    return PRIZE_POOL[0];
  }
