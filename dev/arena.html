  function initArena(roomId) {
    currentBattleRound = 0;
    document.getElementById('target-word').innerText = "戰場同步中...";
    document.getElementById('battle-timer').innerText = "60";
    document.getElementById('round-num').innerText = "規則：先得 5 分者勝";
    document.getElementById('battle-info').innerText = "正在等待雙方就緒...";
    
    document.getElementById('battle-controls').style.visibility = 'hidden';
    updateArenaUI(roomId, true);

    fetch(`${GAS_URL}?action=arena_ready&id=${STUDENT_ID}&roomId=${roomId}&t=${new Date().getTime()}`)
      .then(() => {
        let waitCount = 60;
        if(syncTimer) clearInterval(syncTimer);
        syncTimer = setInterval(() => {
          waitCount--;
          document.getElementById('battle-timer').innerText = waitCount;
          
          fetch(`${GAS_URL}?action=get_battle_status&roomId=${roomId}&t=${new Date().getTime()}`)
            .then(res => res.json()).then(data => {
              if (data.hostScores && data.guestScores && data.hostScores.length > 0 && data.guestScores.length > 0) {
                clearInterval(syncTimer);
                startRoundCountdown(roomId);
              }
              if (data.status === "Canceled") { clearInterval(syncTimer); alert("對戰取消"); location.reload(); }
            });

          if (waitCount <= 0) { clearInterval(syncTimer); alert("等待超時"); location.reload(); }
        }, 2000);
      });
  }

  function updateArenaUI(roomId, isInit = false) {
    fetch(`${GAS_URL}?action=get_battle_status&roomId=${roomId}&t=${new Date().getTime()}`)
      .then(res => res.json()).then(data => {
        const isMeHost = (normalizeStr(STUDENT_ID) === normalizeStr(data.hostId));
        const myNameEl = document.getElementById('my-name');
        if (myNameEl) myNameEl.innerText = isMeHost ? data.hostName : (data.guestName || "挑戰者");

        window.myTheme = isMeHost ? data.hostTheme : data.guestTheme;
        window.opTheme = isMeHost ? data.guestTheme : data.hostTheme;

        // 取得雙方圖片網址 (🚀 對手變數改成 let 才能被覆蓋)
        const myImgUrl = isMeHost ? data.hostImg : data.guestImg;
        let opImgUrl = isMeHost ? data.guestImg : data.hostImg;

        // 取得雙方 Rarity 和 Mask
        const finalMyRarity = isMeHost ? (data.hostRarity || 'N') : (data.guestRarity || 'N');
        let finalOpRarity = isMeHost ? (data.guestRarity || 'N') : (data.hostRarity || 'N');
        const finalMyMask = isMeHost ? (data.hostMask || '') : (data.guestMask || '');
        let finalOpMask = isMeHost ? (data.guestMask || '') : (data.hostMask || '');

        let finalOpName = isMeHost ? (data.guestName || "對手") : data.hostName;

        // 🚀 核心攔截：如果是活動模式，強制把上面取得的對手資料覆蓋為「活動 Boss」！
        if (isEventMode && EVENT_AVATAR && window.characterAssets && window.characterAssets[EVENT_AVATAR]) {
            const boss = window.characterAssets[EVENT_AVATAR];
            finalOpName = `[活動] ${boss.name}`;
            opImgUrl = boss.img; 
            finalOpRarity = boss.rarity || 'SSR'; 
            finalOpMask = boss.mask || ''; 
        }

        document.getElementById('op-name').innerText = finalOpName;

        // 存為全域變數供結算畫面使用
        window.currentMyRarity = finalMyRarity; window.currentMyMask = finalMyMask;
        window.currentOpRarity = finalOpRarity; window.currentOpMask = finalOpMask;

        // 🚀 寫入我方戰場卡片 (套用 3D 結構的背景)
        const myCardEl = document.getElementById('my-card');
        const myCardBg = document.getElementById('my-card-bg');
        if (myCardBg && myImgUrl) myCardBg.style.backgroundImage = `url('${myImgUrl}')`;
        myCardEl.setAttribute('data-rarity', finalMyRarity);
        if (finalMyMask) {
            myCardEl.classList.add('masked');
            myCardEl.style.setProperty('--mask', finalMyMask.includes('url(') ? finalMyMask : `url('${finalMyMask}')`);
        } else { myCardEl.classList.remove('masked'); }
        
        // 🚀 寫入對手戰場卡片
        const opCardEl = document.getElementById('op-card');
        const opCardBg = document.getElementById('op-card-bg');
        if (opCardBg && opImgUrl) opCardBg.style.backgroundImage = `url('${opImgUrl}')`;
        opCardEl.setAttribute('data-rarity', finalOpRarity);
        if (finalOpMask) {
            opCardEl.classList.add('masked');
            opCardEl.style.setProperty('--mask', finalOpMask.includes('url(') ? finalOpMask : `url('${finalOpMask}')`);
        } else { opCardEl.classList.remove('masked'); }

        document.getElementById('battle-arena').classList.add('battle-ready');

        // 更新圓點分數
        const hS = data.hostScores.filter(s => s !== -1);
        const gS = data.guestScores.filter(s => s !== -1);
        myTotalWins = 0; opTotalWins = 0;
        const commonLen = Math.min(hS.length, gS.length);
        for(let i=0; i < commonLen; i++) { 
           if(hS[i] > gS[i]) isMeHost ? myTotalWins++ : opTotalWins++; 
           else if(gS[i] > hS[i]) isMeHost ? opTotalWins++ : myTotalWins++; 
        }
        document.getElementById('my-rounds').innerHTML = renderDots(myTotalWins, true);
        document.getElementById('op-rounds').innerHTML = renderDots(opTotalWins, false);

        // 啟動互動引擎 (把場上所有的 card 都掃描一次)
        setTimeout(() => { initInteractiveHoloCards(); }, 500);
      });
  }

  function renderDots(wins, isMe) {

    for(let i=0; i<5; i++) { html += `<div class="round-dot ${i < wins ? winClass : ''}"></div>`; } 
    return html;
  }

                const recognizer = new SpeechSDK.SpeechRecognizer(speechConfig, audioConfig);
                pronConfig.applyTo(recognizer);

                recognizer.recognizeOnceAsync(
                    (result) => {
                        if (result.reason === SpeechSDK.ResultReason.RecognizedSpeech) {
                            const pronResult = SpeechSDK.PronunciationAssessmentResult.fromResult(result);
                            let accScore = pronResult.accuracyScore || 0;
                            let compScore = pronResult.completenessScore || 0;
                            let fluScore = pronResult.fluencyScore || 0;
                            
                            let baseScore = (accScore * 0.5) + (compScore * 0.3) + (fluScore * 0.2);
                            let missingCount = 0, brokenCount = 0, dynamicPhonemePenalty = 0;

                            if (pronResult.detailResult && pronResult.detailResult.Words) {
                                pronResult.detailResult.Words.forEach(w => {
                                    let wAssess = w.PronunciationAssessment || {};
                                    let wScore = wAssess.AccuracyScore !== undefined ? wAssess.AccuracyScore : 0;
                                    let errType = wAssess.ErrorType || "";
                                    
                                    if (errType === "Omission" || wScore === 0 || !w.Phonemes || w.Phonemes.length === 0) {
                                        missingCount++;
                                    } else if (wScore > 0 && wScore < 50) {
                                        brokenCount++; 
                                    } else if (w.Phonemes) {
                                        w.Phonemes.forEach(p => {
                                            let pAssess = p.PronunciationAssessment || {};
                                            let pScore = pAssess.AccuracyScore !== undefined ? pAssess.AccuracyScore : 0;
                                            let baseP = 2.0; 
                                            if (pScore >= 95) dynamicPhonemePenalty += 0;       
                                            else if (pScore >= 90) dynamicPhonemePenalty += baseP * 1.0; 
                                            else if (pScore >= 85) dynamicPhonemePenalty += baseP * 1.3; 
                                            else if (pScore >= 80) dynamicPhonemePenalty += baseP * 1.5; 
                                            else if (pScore >= 75) dynamicPhonemePenalty += baseP * 1.7; 
                                            else if (pScore >= 70) dynamicPhonemePenalty += baseP * 1.9; 
                                            else if (pScore >= 65) dynamicPhonemePenalty += baseP * 2.1; 
                                            else if (pScore >= 60) dynamicPhonemePenalty += baseP * 2.3; 
                                            else dynamicPhonemePenalty += baseP * 3.0;
                                        });
                                    }
                                });
                            }

                            let penalty = (missingCount * 15) + (brokenCount * 10) + dynamicPhonemePenalty;
                            if (fluScore < 50) penalty += 15; else if (fluScore < 75) penalty += 6;
                            
                            let strictScore = Math.max(0, Math.min(100, Math.round(baseScore - penalty)));
                            if (strictScore % 5 === 0 && strictScore !== 0 && strictScore !== 100) {
                                strictScore += (Math.random() > 0.5 ? 1 : -1); 
                            }
                            
                            document.getElementById('battle-info').innerText = "✅ 判定完成！";
                            submitBattleScore(ROOM_ID, strictScore);
                        } else {
                            document.getElementById('battle-info').innerText = "❌ 發音含糊或無關";
                            submitBattleScore(ROOM_ID, 0);
                        }
                        recognizer.close();
                    },
                    (err) => {
                        document.getElementById('battle-info').innerText = "🚨 引擎連線錯誤";
                        submitBattleScore(ROOM_ID, 0);
                        recognizer.close();
                    }
                );
            } catch(err) {
                console.error(err);
                document.getElementById('battle-info').innerText = "🚨 音檔轉碼失敗";
                submitBattleScore(ROOM_ID, 0);
            }
        };
        battleRecorder.stop();
    };

    battleBtn.onpointerdown = startBattleRecord;
    battleBtn.onpointerup = stopBattleRecord;
    battleBtn.onpointerout = stopBattleRecord;
    battleBtn.onpointercancel = stopBattleRecord;
  }

  // 🚀 特效調度器：掛載絕對光球，避免殘留
  function triggerBattleAnimations(myNum, opNum, isFinal, myTotalWins, opTotalWins, isMyUlt, isOpUlt, myImgUrl, opImgUrl) {
    const myCard = document.getElementById('my-card'); 
    const opCard = document.getElementById('op-card');
    const arenaBg = document.getElementById('battle-arena');

    // 清除舊動畫狀態
    const animations = ['charging-mana', 'ultimate-charging', 'winner-glory', 'loser-shatter', 'take-damage'];
    if(myCard) myCard.classList.remove(...animations); 
    if(opCard) opCard.classList.remove(...animations);
    if(arenaBg) arenaBg.classList.remove('screen-flash-red', 'screen-flash-cyan', 'screen-flash-gold');
    void myCard.offsetWidth; void opCard.offsetWidth;

    let delayBeforeAttack = 0;
    if (myNum > opNum && isMyUlt) {
        playCutinAnimation(`url('${myImgUrl}')`, true);
        delayBeforeAttack = 1500; 
    } else if (opNum > myNum && isOpUlt) {
        playCutinAnimation(`url('${opImgUrl}')`, false);
        delayBeforeAttack = 1500;
    }

    setTimeout(() => {
        const myContainer = myCard.closest('.my-container');
        const opContainer = opCard.closest('.op-container');

        // 🚀 動態生成掛在 arena 上的物理光球
        function createBlast(type, delay = 0) {
           setTimeout(() => {
             const blast = document.createElement('div');
             blast.className = `blast-particle ${type}`;
             arenaBg.appendChild(blast);
             setTimeout(() => blast.remove(), 1000); // 播完自毀
           }, delay);
        }

        if (myNum > opNum) { 
          if(myCard) {
            if(myContainer) myContainer.classList.add('recoil-my'); 
            if (isMyUlt) {
                myCard.classList.add('ultimate-charging'); 
                createBlast('blast-ult-my', 100); createBlast('blast-ult-my', 300);
                if(arenaBg) arenaBg.classList.add('screen-flash-gold');
            } else {
                myCard.classList.add('charging-mana'); 
                createBlast('blast-my', 100);
                if(arenaBg) arenaBg.classList.add('screen-flash-cyan'); 
            }
            if(isFinal) setTimeout(() => myCard.classList.add('winner-glory'), 800);
          }
          if(opCard) opCard.classList.add(isFinal ? 'loser-shatter' : 'take-damage'); 
        }
        else if (myNum < opNum) { 
          if(opCard) {
            if(opContainer) opContainer.classList.add('recoil-op'); 
            if (isOpUlt) {
                opCard.classList.add('ultimate-charging'); 
                createBlast('blast-ult-op', 100); createBlast('blast-ult-op', 300);
                if(arenaBg) arenaBg.classList.add('screen-flash-gold');
            } else {
                opCard.classList.add('charging-mana'); 
                createBlast('blast-op', 100);
                if(arenaBg) arenaBg.classList.add('screen-flash-red'); 
            }
            if(isFinal) setTimeout(() => opCard.classList.add('winner-glory'), 800);
          }
          if(myCard) myCard.classList.add(isFinal ? 'loser-shatter' : 'take-damage');
        }

        updateCardDamage(myCard, opTotalWins);
        updateCardDamage(opCard, myTotalWins);

        // 🚀 如果是最後一局 (isFinal)，多等 0.8 秒，讓卡片徹底碎裂掉出螢幕後，結算畫面才彈出！
        let impactDelay = isFinal ? 2400 : 1600;

        setTimeout(() => {
          // 清除光球與後座力殘留
          if(myCard) myCard.classList.remove('charging-mana', 'ultimate-charging');
          if(opCard) opCard.classList.remove('charging-mana', 'ultimate-charging');
          if(myContainer) myContainer.classList.remove('recoil-my');
          if(opContainer) opContainer.classList.remove('recoil-op');
          
          showImpactOverlay(myNum, opNum, isFinal, myImgUrl, opImgUrl);
        }, 1600); 

    }, delayBeforeAttack); 
  }

  // 2. 檢查雙方分數 (修復括號錯誤與整合抽獎系統)
  function checkBoth(roomId) {
    if(isChecking) return; isChecking = true;
    fetch(`${GAS_URL}?action=get_battle_status&roomId=${roomId}&t=${new Date().getTime()}`)
      .then(res => res.json()).then(data => {
        const hS = data.hostScores.filter(s => s !== -1);
        const gS = data.guestScores.filter(s => s !== -1);

        if (hS.length > currentBattleRound && gS.length > currentBattleRound) {
          clearInterval(waitOpTimer);
          
          const isMeHost = (normalizeStr(STUDENT_ID) === normalizeStr(data.hostId));
          const rawMyS = isMeHost ? hS[currentBattleRound] : gS[currentBattleRound];
          const rawOpS = isMeHost ? gS[currentBattleRound] : hS[currentBattleRound];
          
          const myImgUrl = isMeHost ? data.hostImg : data.guestImg;
          let opImgUrl = isMeHost ? data.guestImg : data.hostImg;

          // 🚀 核心攔截：把結算畫面與大招切入畫面的圖片也強制換成 Boss！
          if (isEventMode && EVENT_AVATAR && window.characterAssets && window.characterAssets[EVENT_AVATAR]) {
              opImgUrl = window.characterAssets[EVENT_AVATAR].img;
          }

          const myUltThisRound = rawMyS > 500;
          const opUltThisRound = rawOpS > 500;

          const myS = myUltThisRound ? rawMyS - 1000 : rawMyS;
          const opS = opUltThisRound ? rawOpS - 1000 : rawOpS;
        
          myTotalWins = 0; opTotalWins = 0;
          for(let i=0; i <= currentBattleRound; i++) {
              let rawM = isMeHost ? hS[i] : gS[i];
              let rawO = isMeHost ? gS[i] : hS[i];
              let isMU = rawM > 500;
              let isOU = rawO > 500;
              let finalM = isMU ? rawM - 1000 : rawM;
              let finalO = isOU ? rawO - 1000 : rawO;
              if(finalM > finalO) myTotalWins += (isMU ? 2 : 1);
              else if(finalO > finalM) opTotalWins += (isOU ? 2 : 1);
          }

          document.getElementById('my-rounds').innerHTML = renderDots(myTotalWins, true);
          document.getElementById('op-rounds').innerHTML = renderDots(opTotalWins, false);

          const isFinal = (myTotalWins >= 5 || opTotalWins >= 5 || currentBattleRound >= 9);
        
          triggerBattleAnimations(myS, opS, isFinal, myTotalWins, opTotalWins, myUltThisRound, opUltThisRound, myImgUrl, opImgUrl);
        
          let delayBeforeAttack = ( (myS > opS && myUltThisRound) || (opS > myS && opUltThisRound) ) ? 1500 : 0;
          
          // 🚀 同步修正：如果這一局有人拿到 5 分，總等待時間要加上碎裂動畫的時間差
          let baseAnimTime = isFinal ? 2400 : 1600;
          let totalWaitTime = delayBeforeAttack + baseAnimTime + 2800;

          setTimeout(() => {
              const overlay = document.getElementById('impact-overlay');
              // 🚀 觸發帥氣的飛出退場動畫
              overlay.classList.add('fade-out');
              
              setTimeout(() => {
                  overlay.classList.remove('active', 'fade-out'); 
                  
                  if (isFinal) { 
                      // 🚀 攔截點：判斷是我方獲勝還是對手獲勝
                      if (myTotalWins > opTotalWins) {
                          // 我方獲勝！啟動盲盒抽獎系統 (傳入對手名稱以決定抽卡次數)
                          const opponentName = document.getElementById('op-name').innerText;
                          initGacha(opponentName);
                      } else {
                          // 我方敗北... 摸摸鼻子回大廳
                          alert("挑戰失敗，再接再厲！");
                          window.location.href = `https://damienkuo123.github.io/marian-app/lobby.html?id=${STUDENT_ID}`;
                      }
                  } 
                  else { 
                      currentBattleRound++; 
                      startRoundCountdown(roomId); 
                  }
              }, 600); // 退場動畫時間 0.6 秒
          }, totalWaitTime);
        }
        isChecking = false;
      }).catch(() => isChecking = false);
  }

  // 🚀 新增：全自動動態獎池引擎 (自動讀取 Google Sheet 數據)
  function buildDynamicPrizePool() {
      // 1. 保留原本固定的「點數獎池」
      let pool = [
          { type: 'points', value: 0, label: '0 點', class: 'prize-N', glow: 'crack-white', weight: 40 },

          { type: 'points', value: 30, label: '30 點', class: 'prize-R', glow: 'crack-white', weight: 3 },
          { type: 'points', value: 50, label: '50 點', class: 'prize-R', glow: 'crack-white', weight: 2 },
          { type: 'points', value: 70, label: '70 點', class: 'prize-SR', glow: 'crack-purple', weight: 1 },
          { type: 'points', value: 90, label: '90 點', class: 'prize-SR', glow: 'crack-purple', weight: 0.5 },
          { type: 'points', value: 150, label: '150 點', class: 'prize-SR', glow: 'crack-purple', weight: 0.3 },
          { type: 'points', value: 500, label: '500 點', class: 'prize-SSR', glow: 'crack-gold', weight: 0.1 },
          { type: 'points', value: 888, label: '888 點', class: 'prize-SSR', glow: 'crack-gold', weight: 0.1 }
      ];

      // 2. 從全域圖鑑中，篩選出第 J 欄 (Category) 為「一般」的角色
      let normalAvatars = Object.entries(characterAssets).filter(([id, char]) => char.category === '一般');

      // 3. 統計各稀有度的卡片數量，用來平分機率
      let counts = { 'N': 0, 'R': 0, 'SR': 0, 'SSR': 0 };
      normalAvatars.forEach(([id, char]) => {
          if (counts[char.rarity] !== undefined) counts[char.rarity]++;
      });

      // 4. 設定各稀有度的「總機率權重」(你的完美設計)
      const totalWeights = { 'N': 2, 'R': 0.8, 'SR': 0.2, 'SSR': 0.1 };

      // 5. 將「一般」角色動態加入獎池，自動計算平分權重與開卡特效
      normalAvatars.forEach(([id, char]) => {
          let r = char.rarity;
          // 計算單張卡片的專屬權重 (總權重 ÷ 該稀有度總數量)
          let weight = (counts[r] > 0) ? (totalWeights[r] / counts[r]) : 0;
          
          // 自動套用你指定的開卡光芒特效
          let glowClass = 'crack-white';
          if (r === 'SR') glowClass = 'crack-purple';
          if (r === 'SSR') glowClass = 'crack-gold';

          pool.push({
              type: 'avatar',
              value: id,
              label: r,
              class: `prize-${r}`,
              glow: glowClass,
              weight: weight
          });
      });

      PRIZE_POOL = pool; // 寫入正式獎池
      console.log("🎲 動態獎池生成完畢！目前獎池總數：", PRIZE_POOL.length);
  }

  // 1. 先抽盲盒稀有度
  function getBoxRarity() {
    let r = Math.random() * 100;
    if (r < 97) return 'N';

    if (r < 99.5) return 'SR';
    return 'SSR';
  }

  // 2. 根據盲盒稀有度，過濾獎池並抽獎
  function drawPrizeByBox(boxRarity) {
    let pool = [];
    if (boxRarity === 'N') pool = PRIZE_POOL; // N箱可抽所有
    else if (boxRarity === 'R') pool = PRIZE_POOL.filter(p => p.class !== 'prize-N'); // R箱保底 R 以上
    else if (boxRarity === 'SR') pool = PRIZE_POOL.filter(p => p.class === 'prize-SR' || p.class === 'prize-SSR'); // SR箱保底 SR 以上
    else if (boxRarity === 'SSR') pool = PRIZE_POOL.filter(p => p.class === 'prize-SSR'); // SSR箱保底 SSR

    let totalWeight = pool.reduce((sum, item) => sum + item.weight, 0);
    let random = Math.random() * totalWeight;
    for (let item of pool) {
      if (random < item.weight) return item;
      random -= item.weight;
    }
    return pool[0];
  }

  function drawPrize() {
    let totalWeight = PRIZE_POOL.reduce((sum, item) => sum + item.weight, 0);
    let random = Math.random() * totalWeight;
    for (let item of PRIZE_POOL) {
      if (random < item.weight) return item;
      random -= item.weight;
    }
    return PRIZE_POOL[0];
  }

  function bindVoiceLock(index) {
      const btn = document.getElementById(`lock-btn-${index}`);
      const status = document.getElementById(`lock-status-${index}`);
      const cardData = gachaCardsData[index];
      let gachaRecorder;
      let gachaChunks = [];

      // 🚀 按下錄音
      btn.onpointerdown = (e) => {
          e.stopPropagation();
          if (isGachaRecording || cardData.flipped || gachaPicksLeft <= 0) return;
          e.preventDefault();

          if (!globalMicStream) { alert("麥克風未授權！"); return; }
          
          if (!sysAudioCtx) sysAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
          if (sysAudioCtx.state === 'suspended') sysAudioCtx.resume();

          isGachaRecording = true;
          gachaChunks = [];
          btn.classList.add('recording');
          status.innerText = "🔴 錄音中... (放開判定)";
          status.style.color = "#eb3b5a";

          gachaRecorder = new MediaRecorder(globalMicStream);
          gachaRecorder.ondataavailable = ev => { if(ev.data.size > 0) gachaChunks.push(ev.data); };
          gachaRecorder.start();
      };

      // 🚀 放開判定
      btn.onpointerup = async (e) => {
          if (!isGachaRecording || !gachaRecorder || gachaRecorder.state !== "recording") return;
          e.preventDefault();
          isGachaRecording = false;
          btn.classList.remove('recording');
          btn.style.pointerEvents = "none"; // 判定中暫時封印

          status.innerText = "⚙️ 封裝音檔中...";
          status.style.color = "#f1c40f";

          gachaRecorder.onstop = async () => {
              const rawBlob = new Blob(gachaChunks);
              if (gachaChunks.length === 0 || rawBlob.size < 500) {
                  status.innerText = "錄音太短，請長按";
                  status.style.color = "#e74c3c";
                  btn.style.pointerEvents = "auto";
                  return;
              }

              try {
                  const wavFile = await createWavFileFromBlob(rawBlob);
                  status.innerText = "🔵 驗證密語中...";
                  status.style.color = "#3498db";

                  const speechConfig = SpeechSDK.SpeechConfig.fromAuthorizationToken(azureAuthToken, azureRegionCode);
                  speechConfig.speechRecognitionLanguage = "en-US";
                  const audioConfig = SpeechSDK.AudioConfig.fromWavFileInput(wavFile);
                  const pronConfig = new SpeechSDK.PronunciationAssessmentConfig(
                      cardData.word, SpeechSDK.PronunciationAssessmentGradingSystem.HundredMark,
                      SpeechSDK.PronunciationAssessmentGranularity.Phoneme, true
                  );

                  const recognizer = new SpeechSDK.SpeechRecognizer(speechConfig, audioConfig);
                  pronConfig.applyTo(recognizer);

                  recognizer.recognizeOnceAsync((result) => {
                      btn.style.pointerEvents = "auto";
                      if (result.reason === SpeechSDK.ResultReason.RecognizedSpeech) {
                          const pronResult = SpeechSDK.PronunciationAssessmentResult.fromResult(result);
                          if ((pronResult.accuracyScore || 0) >= 70) {
                              status.innerText = "封印解除！";
                              status.style.color = "#26de81";
                              triggerReveal(index);
                          } else {
                              status.innerText = "密語不夠準確，請重唸";
                              status.style.color = "#e74c3c";
                          }
                      } else {
                          status.innerText = "未辨識到密語";
                          status.style.color = "#e74c3c";
                      }
                      recognizer.close();
                  });
              } catch(err) {
                  status.innerText = "判定失敗，請重試";
                  btn.style.pointerEvents = "auto";
              }
          };
          gachaRecorder.stop();
      };
      
      // 🚀 離開按鈕也視同放開
      btn.onpointercancel = btn.onpointerleave = btn.onpointerup;
  }

          if (prizeInfo.class === 'prize-SR') prizeRarity = 'SR';
          if (prizeInfo.class === 'prize-SSR') prizeRarity = 'SSR';

          let prizeToAdd = { ...prizeInfo }; 
          
          // 🚀 關鍵修復：如果是角色卡，翻開瞬間替卡片掛上專屬的 Mask 遮罩！
          if (prizeToAdd.type === 'avatar' && characterAssets[prizeToAdd.value] && characterAssets[prizeToAdd.value].mask) {
              cardRoot.classList.add('masked');
              cardRoot.style.setProperty('--mask', `url('${characterAssets[prizeToAdd.value].mask}')`);
          } else {
              cardRoot.classList.remove('masked');
              cardRoot.style.removeProperty('--mask');
          }
          
          if (prizeToAdd.type === 'avatar') {
              const charId = prizeToAdd.value;
              const alreadyOwnedInAccount = (window.myUnlockedAvatars || []).includes(charId);
              const alreadyGotInThisGacha = window.wonAvatars.includes(charId);
              
              if (alreadyOwnedInAccount || alreadyGotInThisGacha) {
                  const charName = characterAssets[charId] ? characterAssets[charId].name : prizeToAdd.label;
                  prizeToAdd.realLabel = `(重複) ${charName} → 轉為 300 點`;

                  prizeToAdd.realLabel = characterAssets[charId] ? characterAssets[charId].name : prizeToAdd.label;
                  window.wonAvatars.push(charId);

          } else {

  // =======================================================
  // 🌈 頂級 3D 互動閃卡引擎 (全場域適配版)
  // =======================================================
  function initInteractiveHoloCards() {
      // 🚀 加入 .gacha-card .card，讓盲盒也能感應滑鼠與陀螺儀！
      const cards = document.querySelectorAll('#portal-my-card, #portal-op-card, #my-card, #op-card, #impact-card, .gacha-card .card');
      
      cards.forEach(card => {
          // 🚀 致命修復：必須用 querySelectorAll 抓出正面與背面的「所有」特效圖層！
          const targetLayers = [card, ...card.querySelectorAll('.card__shine'), ...card.querySelectorAll('.card__glare')];
          let bounds;
          let ticking = false;

          function updateCard(x, y) {
              const leftX = x / bounds.width;
              const topY = y / bounds.height;
              const center = { x: leftX - 0.5, y: topY - 0.5 };
              const distance = Math.sqrt(center.x**2 + center.y**2);

              const pointerX = `${leftX * 100}%`;
              const pointerY = `${topY * 100}%`;
              const pointerFromCenter = Math.min(Math.max(distance * 2, 0), 1);

              card.style.setProperty('--rotate-x', `${center.y * -20}deg`); 
              card.style.setProperty('--rotate-y', `${center.x * 20}deg`);
              
              // 🚀 讓所有圖層都吃到滑鼠參數
              targetLayers.forEach(layer => {
                  if(layer) {
                      layer.style.setProperty('--pointer-x', pointerX);
                      layer.style.setProperty('--pointer-y', pointerY);
                      layer.style.setProperty('--pointer-from-center', pointerFromCenter);
                      layer.style.setProperty('--pointer-from-top', topY);
                      layer.style.setProperty('--pointer-from-left', leftX);
                  }
              });
              ticking = false;
          }
          
          function rotateToMouse(e) {
              if (!bounds) bounds = card.getBoundingClientRect();
              const clientX = e.touches ? e.touches[0].clientX : e.clientX;
              const clientY = e.touches ? e.touches[0].clientY : e.clientY;
              const mouseX = clientX - bounds.left;
              const mouseY = clientY - bounds.top;
              
              if (!ticking) {
                  requestAnimationFrame(() => updateCard(mouseX, mouseY));
                  ticking = true;
              }
          }

          function resetTilt() {
              card.style.transition = "transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275)";
              card.style.setProperty('--rotate-x', '0deg');
              card.style.setProperty('--rotate-y', '0deg');
              
              // 🚀 同步更新：這裡也要用 targetLayers 來重置所有圖層
              targetLayers.forEach(layer => {
                  if(layer) {
                      layer.style.setProperty('--pointer-from-center', '0.5'); 
                      layer.style.setProperty('--pointer-x', '50%');
                      layer.style.setProperty('--pointer-y', '50%');
                  }
              });
              setTimeout(() => { card.style.transition = "none"; }, 500);
          }

          function startInteraction() {
              bounds = card.getBoundingClientRect(); 
              card.style.transition = "none"; 
          }

          card.addEventListener('pointerenter', startInteraction);
          card.addEventListener('pointermove', rotateToMouse);
          card.addEventListener('pointerleave', resetTilt);
          
          card.addEventListener('touchstart', startInteraction, {passive: true});
          card.addEventListener('touchmove', rotateToMouse, {passive: true});
          card.addEventListener('touchend', resetTilt);
      });
  }


  /* -------------------------------------------------------
   🚀 瑪麗安小幫手核心控制區

  async function showPhonicHelper(word, localKey, displayLabel) {

      const chunkText = displayLabel.toLowerCase();
      const fullText = word.toLowerCase();
  
      title.innerText = "引導發音示範"; 
      title.style.fontSize = "22px";
  
      if (!document.getElementById('ring-anim-style')) {

          document.head.appendChild(style);
      }
  
      instruction.innerHTML = `
          <div style="margin: 20px 0; font-size: 38px; font-weight: 900; color: #dfe6e9; letter-spacing: 2px; word-break: break-word; line-height: 1.3;">

              <span id="k-2" style="transition: all 0.15s; display: inline-block;">${chunkText}<span style="color:#b2bec3; font-size: 24px;">...</span> </span>
              <span id="k-3" style="transition: all 0.15s; display: inline-block; margin-top: 10px;">${fullText}</span>
          </div>
          <div style="font-size: 14px; color: #d63031; background: #fff5f5; padding: 12px 15px; border-radius: 12px; display: inline-flex; align-items: center; gap: 10px; border: 2px dashed #ffcccc;">
              <span style="font-size: 24px; animation: ringbell 2s infinite;">🔔</span>
              <span style="font-weight: bold; text-align: left; line-height: 1.4;">聽不到聲音嗎？<br>請確認手機是否關閉<span style="text-decoration: underline;">靜音開關</span>，並調高音量喔！</span>
          </div>
      `;
  
      // 🚀 綁定重聽按鈕點擊事件
      replayBtn.onclick = () => {
          // 給一點點擊縮放的回饋感
          replayBtn.style.transform = "scale(0.92)";
          setTimeout(() => replayBtn.style.transform = "scale(1)", 150);
          // 呼叫播放引擎再唸一次
          playModularAudio(localKey, word);
      };
  
      overlay.style.display = 'flex';
      playModularAudio(localKey, word); // 第一次打開自動唸
  }
  
    // 💡 KTV 導讀序列引擎 (小燈泡專用)
  function playModularAudio(localKey, fullWord) {
      const k1 = document.getElementById('k-1');
      const k2 = document.getElementById('k-2');
      const k3 = document.getElementById('k-3');
  
      (async () => {
          // 1. 本地音標 (GitHub MP3，2.0倍放大)
          await playPhonicLocal(localKey, 2.0, k1, "var(--marian-yellow)");

          await new Promise(r => setTimeout(r, 400)); 
          
          // 2. 雲端單字 (Azure API + 快取，1.8倍放大)
          await speakWordCloudCached(fullWord, 1.8, k3, "var(--primary-blue)");

  // 3. 關閉視窗

  /* =======================================================
   🚀 瑪麗安專屬：企業級語音引擎 (記憶體快取 + 擴大機)
   ======================================================= */
  let audioCtx = null;
  const audioBufferCache = new Map(); // 🧠 核心：全域記憶體，存過就不再花錢！
  
  function playAudioBuffer(buffer, gainValue, targetEl, activeColor) {
      const source = audioCtx.createBufferSource();
      source.buffer = buffer;
      
      const gainNode = audioCtx.createGain();
      gainNode.gain.setValueAtTime(gainValue, audioCtx.currentTime); 
      
      source.connect(gainNode);
      gainNode.connect(audioCtx.destination);
      
      if (targetEl) {
          targetEl.style.color = activeColor;
          targetEl.style.transform = "scale(1.15)";
      }
  
      source.start(0);
  
      return new Promise(resolve => {
          source.onended = () => {
              if (targetEl) {
                  targetEl.style.color = "#dfe6e9";
                  targetEl.style.transform = "scale(1)";
              }
              resolve();
          };
      });
  }
  
  // 雲端單字發音引擎：有快取用快取，沒快取才花錢問 Azure
  async function speakWordCloudCached(word, gainValue, targetEl, activeColor) {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') await audioCtx.resume();
      window.speechSynthesis.cancel(); // 關閉本地語音防干擾
  
      const cacheKey = word.toLowerCase();
  
      // 🌟 1. 【防冤大頭機制】：如果在記憶體找到了，直接播
      if (audioBufferCache.has(cacheKey)) {
          await playAudioBuffer(audioBufferCache.get(cacheKey), gainValue, targetEl, activeColor);
          return;
      }
  
      // 🌟 2. 【去 Azure 拿聲音】：只有第一次會進來
      return new Promise((resolve, reject) => {
          if (!azureAuthToken || typeof SpeechSDK === 'undefined') {
              fallbackLocalTTS(word, targetEl, activeColor, resolve);
              return;
          }
  
          try {
              const speechConfig = SpeechSDK.SpeechConfig.fromAuthorizationToken(azureAuthToken, azureRegionCode);
              speechConfig.speechSynthesisVoiceName = "en-US-JennyNeural"; 
              speechConfig.speechSynthesisOutputFormat = SpeechSDK.SpeechSynthesisOutputFormat.Riff24Khz16BitMonoPcm;
  
              const synthesizer = new SpeechSDK.SpeechSynthesizer(speechConfig, null); 
              const ssml = `<speak version='1.0' xml:lang='en-US'><voice name='en-US-JennyNeural'><prosody rate='-10%'>${word}</prosody></voice></speak>`;
  
              synthesizer.speakSsmlAsync(ssml, async (result) => {
                  synthesizer.close();
                  if (result.audioData) {
                      try {
                          const audioBuffer = await audioCtx.decodeAudioData(result.audioData);
                          audioBufferCache.set(cacheKey, audioBuffer); // 🧠 存入快取
                          await playAudioBuffer(audioBuffer, gainValue, targetEl, activeColor);
                          resolve();
                      } catch (e) { fallbackLocalTTS(word, targetEl, activeColor, resolve); }
                  } else {
                      fallbackLocalTTS(word, targetEl, activeColor, resolve);
                  }
              }, (error) => {
                  synthesizer.close();
                  fallbackLocalTTS(word, targetEl, activeColor, resolve);
              });
          } catch (e) { fallbackLocalTTS(word, targetEl, activeColor, resolve); }
      });
  }
  
  function fallbackLocalTTS(word, targetEl, activeColor, resolve) {
      if (targetEl) { targetEl.style.color = activeColor; targetEl.style.transform = "scale(1.15)"; }
      const fallback = new SpeechSynthesisUtterance(word);
      fallback.lang = 'en-US';
      fallback.onend = () => {
          if (targetEl) { targetEl.style.color = "#dfe6e9"; targetEl.style.transform = "scale(1)"; }
          resolve();
      };
      window.speechSynthesis.speak(fallback);
  }
  
  // 💡 播放音標 (GitHub MP3 專用)
  async function playPhonicLocal(localKey, gainValue, targetEl, activeColor) {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') await audioCtx.resume();
      
      try {
          const response = await fetch(`audio/${localKey}.mp3`);
          if (!response.ok) throw new Error("Audio 404");
          const arrayBuffer = await response.arrayBuffer();
          const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
          await playAudioBuffer(audioBuffer, gainValue, targetEl, activeColor);
      } catch(e) { console.warn("音標播放失敗"); }
  }
