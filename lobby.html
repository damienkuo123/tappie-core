<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>瑪麗安傳說大廳</title>
  <style>
    :root {
      --bg-color: #1a1e29;
      --gold: #f1c40f;
    }
    body, html {
      margin: 0; padding: 0; width: 100%; height: 100%;
      background: var(--bg-color); font-family: -apple-system, sans-serif;
      color: white; overflow: hidden;
      /* 充滿科技感的暗色網格背景 */
      background-image: 
        radial-gradient(circle at 50% 50%, #2c3e50 0%, #0a0e17 100%),
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 100% 100%, 30px 30px, 30px 30px;
      background-blend-mode: overlay;
    }

    /* 🔝 頂部資訊列 */
    header {
      padding: max(20px, env(safe-area-inset-top)) 20px 10px;
      display: flex; justify-content: space-between; align-items: center;
      background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
      z-index: 100; position: relative;
    }
    .user-info h2 { margin: 0; font-size: 14px; color: #a4b0be; letter-spacing: 2px; }
    .user-points { font-size: 26px; font-weight: 900; color: #00d2d3; text-shadow: 0 0 15px rgba(0,210,211,0.6); }

    /* 🏷️ 動態標籤與角色名稱區 */
    .hero-info-zone {
      text-align: center; margin-top: 15px; min-height: 80px; z-index: 10; position: relative;
    }
    .badges { display: flex; justify-content: center; gap: 8px; margin-bottom: 8px; }
    .badge {
      padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 900; letter-spacing: 1px;
      border: 1px solid rgba(255,255,255,0.2); backdrop-filter: blur(5px);
    }
    /* 稀有度對應顏色 */
    .badge.rarity-N { color: #bdc3c7; border-color: #bdc3c7; background: rgba(189,195,199,0.1); }
    .badge.rarity-R { color: #3498db; border-color: #3498db; background: rgba(52,152,219,0.1); }
    .badge.rarity-SR { color: #9b59b6; border-color: #9b59b6; background: rgba(155,89,182,0.1); }
    .badge.rarity-SSR { color: var(--gold); border-color: var(--gold); background: rgba(241,196,15,0.15); box-shadow: 0 0 15px rgba(241,196,15,0.4); }
    .badge.category { color: #2ecc71; border-color: #2ecc71; background: rgba(46,204,113,0.1); }
    
    .hero-name { font-size: 36px; font-weight: 900; letter-spacing: 4px; margin: 0; text-shadow: 0 4px 10px rgba(0,0,0,0.8); transition: 0.3s; }

    /* 🖼️ 第一區：Cover Flow 畫廊 */
    .gallery-container {
      position: relative; width: 100%; height: 50vh; margin-top: 10px;
      display: flex; align-items: center; justify-content: center;
    }
    
    /* 🎯 中央裝備掃描框 */
    .center-target-box {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 270px; height: 380px; /* 貼合寶可夢卡牌比例 0.718 */
      border: 2px dashed rgba(255, 255, 255, 0.3); border-radius: 20px;
      pointer-events: none; z-index: 0; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .center-target-box::after {
      content: 'EQUIP SLOT'; position: absolute; bottom: -30px; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.3); font-size: 14px; font-weight: bold; letter-spacing: 4px; transition: 0.3s;
    }
    .center-target-box.is-equipped { border: 2px solid var(--gold); box-shadow: 0 0 30px rgba(241,196,15,0.4), inset 0 0 20px rgba(241,196,15,0.2); }
    .center-target-box.is-equipped::after { content: 'EQUIPPED'; color: var(--gold); text-shadow: 0 0 10px var(--gold); }

    /* ➡️ 橫向滾動軌道 */
    .carousel-track {
      display: flex; gap: 50px; overflow-x: auto; width: 100%; height: 100%; 
      padding: 0 calc(50vw - 135px); /* 保證第一張跟最後一張能置中 */
      scroll-snap-type: x mandatory; scrollbar-width: none; -webkit-overflow-scrolling: touch;
      align-items: center; z-index: 5; perspective: 1200px;
    }
    .carousel-track::-webkit-scrollbar { display: none; }

    /* =======================================================
       🌟 核心解密：Poke-Holo 3D 結構 (base.css)
       ======================================================= */
    .holo-card-wrapper {
      scroll-snap-align: center; flex-shrink: 0;
      width: 270px; height: 376px; perspective: 1200px;
    }
    
    .holo-card {
      width: 100%; height: 100%; position: relative; border-radius: 4.55% / 3.5%;
      transform-style: preserve-3d; transition: transform 0.1s ease-out;
      box-shadow: 0 20px 40px rgba(0,0,0,0.8); cursor: grab;
      
      /* 這些變數會被 JS 即時覆寫 */
      --pointer-x: 50%; --pointer-y: 50%;
      --pointer-from-center: 0;
      --rotate-x: 0deg; --rotate-y: 0deg;
      --card-opacity: 1;
      
      transform: rotateX(var(--rotate-x)) rotateY(var(--rotate-y)) scale3d(1, 1, 1);
    }
    .holo-card:active { cursor: grabbing; }

    /* 卡面底圖 */
    .card__bg {
      position: absolute; inset: 0; border-radius: inherit; background-size: cover; background-position: center;
      border: 2px solid #576574; z-index: 1; transform: translateZ(0px);
    }

    /* 基礎眩光層 (模擬卡套反光) */
    .card__glare {
      position: absolute; inset: 0; border-radius: inherit; z-index: 3; pointer-events: none; overflow: hidden;
      transform: translateZ(1.41px);
      background-image: radial-gradient(
        farthest-corner circle at var(--pointer-x) var(--pointer-y),
        hsla(0, 0%, 100%, 0.8) 10%, hsla(0, 0%, 100%, 0.65) 20%, hsla(0, 0%, 0%, 0.5) 90%
      );
      mix-blend-mode: overlay; opacity: calc(var(--pointer-from-center) * 0.8);
    }

    /* 閃光層外框 */
    .card__shine {
      position: absolute; inset: 0; border-radius: inherit; z-index: 4; pointer-events: none; overflow: hidden;
      transform: translateZ(2px);
    }

    /* =======================================================
       💎 稀有度特效層 (融合 cosmos, trainer, v-full-art)
       ======================================================= */
    
    /* 1️⃣ 【N卡：普通】僅保留 base.css 的立體感與基本反光，無特殊光澤 */

    /* 2️⃣ 【R卡：Cosmos Holo 宇宙碎鑽】 */
    .holo-card[data-rarity="R"] .card__shine {
      background-image: 
        radial-gradient(farthest-corner circle at var(--pointer-x) var(--pointer-y), hsla(0,0%,100%,0.8) 0%, transparent 40%),
        repeating-linear-gradient(45deg, transparent, rgba(0, 212, 255, 0.4) 10%, rgba(255, 0, 128, 0.4) 20%, transparent 30%);
      background-size: 200% 200%; background-position: var(--pointer-x) var(--pointer-y);
      mix-blend-mode: color-dodge; filter: brightness(1.25) contrast(1.75) saturate(0.8);
      opacity: calc(var(--pointer-from-center) * 0.8);
    }
    .holo-card[data-rarity="R"] .card__bg { border-color: #3498db; }

    /* 3️⃣ 【SR卡：Trainer Full Art 金屬幻光】 */
    .holo-card[data-rarity="SR"] .card__shine {
      background-image: radial-gradient(farthest-corner circle at var(--pointer-x) var(--pointer-y), hsl(0, 0%, 100%) 0%, hsla(0, 0%, 0%, 0) 80%);
      mix-blend-mode: screen; 
      filter: brightness(calc((var(--pointer-from-center)*0.4) + 0.85)) contrast(2) saturate(0.5);
      opacity: 0.8;
    }
    .holo-card[data-rarity="SR"] .card__bg { border-color: #9b59b6; box-shadow: inset 0 0 15px rgba(155,89,182,0.4); }

    /* 4️⃣ 【SSR卡：V-Full Art 七彩霓虹雷射】 */
    .holo-card[data-rarity="SSR"] .card__shine {
      --space: 5%;
      background-image:
        repeating-linear-gradient( 0deg, 
          hsl(2, 100%, 73%) calc(var(--space)*1), hsl(53, 100%, 69%) calc(var(--space)*2), hsl(93, 100%, 69%) calc(var(--space)*3), 
          hsl(176, 100%, 76%) calc(var(--space)*4), hsl(228, 100%, 74%) calc(var(--space)*5), hsl(283, 100%, 73%) calc(var(--space)*6), 
          hsl(2, 100%, 73%) calc(var(--space)*7) 
        );
      background-size: 100% 400%; background-position: center calc(var(--pointer-y) * -1);
      mix-blend-mode: color-dodge; 
      filter: brightness(calc((var(--pointer-from-center)*0.3) + 0.4)) contrast(2.5) saturate(1.5);
      opacity: calc(var(--pointer-from-center) * 1);
    }
    .holo-card[data-rarity="SSR"] .card__bg { border: 2px solid var(--gold); box-shadow: inset 0 0 30px rgba(241,196,15,0.6); }

    /* 🔘 底部按鈕區 */
    .action-zone {
      position: absolute; bottom: max(40px, env(safe-area-inset-bottom)); left: 0; width: 100%;
      display: flex; flex-direction: column; align-items: center; gap: 15px; z-index: 50;
    }
    
    .btn-equip {
      background: linear-gradient(135deg, #27ae60, #1e8449); color: white; border: none;
      padding: 16px 60px; font-size: 20px; font-weight: 900; border-radius: 30px; letter-spacing: 4px;
      box-shadow: 0 10px 20px rgba(39, 174, 96, 0.4); cursor: pointer; transition: 0.3s;
    }
    .btn-equip:active { transform: scale(0.95); }
    .btn-equip.is-equipped { background: #576574; box-shadow: none; cursor: default; }
    
    .btn-shop {
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); color: white;
      padding: 10px 25px; border-radius: 20px; font-size: 14px; font-weight: bold; cursor: pointer; backdrop-filter: blur(5px); transition: 0.3s;
    }
    .btn-shop:hover { background: rgba(255,255,255,0.2); border-color: var(--gold); color: var(--gold); }

    /* 提示訊息 */
    #toast {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      background: var(--gold); color: #000; padding: 12px 30px; border-radius: 20px;
      font-weight: 900; font-size: 16px; opacity: 0; pointer-events: none; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 1000; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
    }
  </style>
</head>
<body>

  <div id="toast">裝備成功！</div>

  <header>
    <div class="user-info">
      <h2 id="header-name">連線中...</h2>
      <div class="user-points" id="header-points">0 PTS</div>
    </div>
    <button class="btn-shop" onclick="alert('進入 Phase 3：商店開發中！')">🛒 兌換角色</button>
  </header>

  <div class="hero-info-zone">
    <div class="badges">
      <div id="badge-rarity" class="badge rarity-N">讀取中</div>
      <div id="badge-category" class="badge category">讀取中</div>
    </div>
    <h1 id="hero-name" class="hero-name">讀取中...</h1>
  </div>

  <div class="gallery-container">
    <div id="target-box" class="center-target-box"></div>
    <div class="carousel-track" id="carousel">
      </div>
  </div>

  <div class="action-zone">
    <button id="equip-btn" class="btn-equip" onclick="equipCurrentCharacter()">裝備此角色</button>
  </div>

  <script>
    // ⚠️ 這裡填寫你的 GAS 部署網址
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyWm-WnRO5h3dliEPR36Cq1hCf5DgM4GIgJqXVUREclhtYOHjxq9DptApmQPkU5p5Ys/exec";
    const params = new URLSearchParams(window.location.search);
    const STUDENT_ID = params.get('id') || "S001";

    // 🚀 資料庫：全息卡牌資產 (加入 rarity 與 category)
    const characterAssets = {
      'A001': { name: '新手劍士', img: 'https://raw.githubusercontent.com/damienkuo123/marian-app/refs/heads/main/assets/Hero_01.webp', rarity: 'N', category: '一般' }, 
      'A002': { name: '艾多 Aldo', img: 'https://raw.githubusercontent.com/damienkuo123/marian-app/refs/heads/main/assets/Aldo.webp', rarity: 'R', category: '一般' },
      'A003': { name: '菲利克斯 Felix', img: 'https://raw.githubusercontent.com/damienkuo123/marian-app/refs/heads/main/assets/Felix.webp', rarity: 'SR', category: '限定' },
      'A004': { name: '咕嚕 Glou-Glou', img: 'https://raw.githubusercontent.com/damienkuo123/marian-app/refs/heads/main/assets/Glou-Glou.webp', rarity: 'SSR', category: '活動' }
    };

    let userUnlocked = [];
    let userEquipped = "";
    let currentCenteredId = ""; 

    // 1. 初始化：跟後端要資料 (包含點數、已解鎖、已裝備)
    async function initLobby() {
      try {
        const res = await fetch(`${GAS_URL}?action=get_profile&id=${STUDENT_ID}`);
        const data = await res.json();
        
        document.getElementById('header-name').innerText = STUDENT_ID;
        document.getElementById('header-points').innerText = `${data.points || 1500} PTS`;

        // 確保不會產生空字串的元素
        userUnlocked = (data.unlocked || "A001").split(',').map(s => s.trim()).filter(s => s !== "");
        userEquipped = data.equipped || "A001"; 
        
        renderCarousel();
      } catch (e) {
        console.error(e);
        // 如果斷線，防呆提供預設資料展示
        userUnlocked = ["A001", "A002", "A003", "A004"];
        userEquipped = "A001";
        renderCarousel();
      }
    }

    // 2. 渲染 Cover Flow 畫廊
    function renderCarousel() {
      const carousel = document.getElementById('carousel');
      carousel.innerHTML = "";

      userUnlocked.forEach(id => {
        if (!characterAssets[id]) return;
        const char = characterAssets[id];
        
        const wrapper = document.createElement('div');
        wrapper.className = 'holo-card-wrapper';
        wrapper.setAttribute('data-id', id);
        
        // 植入 Poke-Holo 神級結構
        wrapper.innerHTML = `
          <div class="holo-card" data-rarity="${char.rarity}">
            <div class="card__bg" style="background-image: url('${char.img}')"></div>
            <div class="card__glare"></div>
            <div class="card__shine"></div>
          </div>
        `;
        carousel.appendChild(wrapper);
      });

      initHoloEngine(); // 綁定手指 3D 追蹤
      initScrollSpy();  // 綁定中央觀測器
      
      // 自動捲動到已裝備的角色
      setTimeout(() => {
        const equippedWrapper = document.querySelector(`.holo-card-wrapper[data-id="${userEquipped}"]`);
        if (equippedWrapper) {
          equippedWrapper.scrollIntoView({ behavior: 'smooth', inline: 'center' });
        }
      }, 300);
    }

    // 3. 交集觀察器：誰滑到了正中央？
    function initScrollSpy() {
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            const id = entry.target.getAttribute('data-id');
            updateCenterInfo(id);
          }
        });
      }, {
        root: document.getElementById('carousel'),
        rootMargin: '0px -50% 0px -50%', // 嚴格判定正中央
        threshold: 0
      });

      document.querySelectorAll('.holo-card-wrapper').forEach(card => observer.observe(card));
    }

    // 4. 更新上方標籤與按鈕 (極致順暢，無 API 負擔)
    function updateCenterInfo(id) {
      currentCenteredId = id;
      const char = characterAssets[id];
      if(!char) return;

      document.getElementById('hero-name').innerText = char.name;
      
      const rBadge = document.getElementById('badge-rarity');
      rBadge.className = `badge rarity-${char.rarity}`;
      rBadge.innerText = char.rarity;

      document.getElementById('badge-category').innerText = char.category;

      const btn = document.getElementById('equip-btn');
      const targetBox = document.getElementById('target-box');
      
      if (id === userEquipped) {
        btn.innerText = "✅ 裝備中";
        btn.className = "btn-equip is-equipped";
        targetBox.classList.add('is-equipped');
      } else {
        btn.innerText = "裝備此角色";
        btn.className = "btn-equip";
        targetBox.classList.remove('is-equipped');
      }
    }

    // 5. 按下按鈕，才真正傳 API 存檔
    function equipCurrentCharacter() {
      if (currentCenteredId === userEquipped) return;
      
      const btn = document.getElementById('equip-btn');
      btn.innerText = "連線中...";
      btn.classList.add('is-equipped');

      fetch(`${GAS_URL}?action=equip_avatar&id=${STUDENT_ID}&avatarId=${currentCenteredId}`)
        .then(res => res.json())
        .then(data => {
          if(data.success) {
            userEquipped = currentCenteredId;
            updateCenterInfo(currentCenteredId); 
            showToast("裝備成功！");
          }
        }).catch(() => {
          // 如果斷線，照樣在前端假裝成功，維持體驗
          userEquipped = currentCenteredId;
          updateCenterInfo(currentCenteredId);
          showToast("裝備成功！(離線模式)");
        });
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.innerText = msg;
      t.style.opacity = 1; t.style.transform = 'translate(-50%, 0)';
      setTimeout(() => { t.style.opacity = 0; t.style.transform = 'translate(-50%, -20px)'; }, 2000);
    }

    // =======================================================
    // 🌈 Poke-Holo 純粹 3D 互動引擎 (滑鼠/手指追蹤)
    // =======================================================
    function initHoloEngine() {
      document.querySelectorAll('.holo-card').forEach(card => {
        let bounds;
        
        function rotateToMouse(e) {
          const clientX = e.touches ? e.touches[0].clientX : e.clientX;
          const clientY = e.touches ? e.touches[0].clientY : e.clientY;
          
          if (!bounds) bounds = card.getBoundingClientRect();
          
          const mouseX = clientX - bounds.left;
          const mouseY = clientY - bounds.top;
          const leftX = mouseX / bounds.width;
          const topY = mouseY / bounds.height;
          const center = { x: leftX - 0.5, y: topY - 0.5 };
          // 計算距中心點的距離 (用來控制反光強弱)
          const distance = Math.sqrt(center.x**2 + center.y**2);

          card.style.setProperty('--pointer-x', `${leftX * 100}%`);
          card.style.setProperty('--pointer-y', `${topY * 100}%`);
          card.style.setProperty('--pointer-from-center', clamp(distance * 2, 0, 1));
          card.style.setProperty('--rotate-x', `${center.y * -20}deg`);
          card.style.setProperty('--rotate-y', `${center.x * 20}deg`);
        }

        card.addEventListener('pointerenter', () => { bounds = card.getBoundingClientRect(); card.style.transition = "none"; });
        card.addEventListener('pointermove', rotateToMouse);
        card.addEventListener('pointerleave', () => {
          card.style.transition = "transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275)";
          card.style.setProperty('--rotate-x', '0deg');
          card.style.setProperty('--rotate-y', '0deg');
          card.style.setProperty('--pointer-from-center', '0');
        });
        
        // 手機觸控支援
        card.addEventListener('touchstart', (e) => { bounds = card.getBoundingClientRect(); card.style.transition = "none"; }, {passive: true});
        card.addEventListener('touchmove', rotateToMouse, {passive: true});
        card.addEventListener('touchend', () => {
          card.style.transition = "transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275)";
          card.style.setProperty('--rotate-x', '0deg');
          card.style.setProperty('--rotate-y', '0deg');
          card.style.setProperty('--pointer-from-center', '0');
        });
      });
    }

    function clamp(val, min, max) { return Math.min(Math.max(val, min), max); }
  </script>
</body>
</html>
