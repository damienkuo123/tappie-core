  <style>
    /* =======================================================
       🚀 原始對接：100% 保留您的完美特效變數
       ======================================================= */
    :root {
      --bg-color: #0b0f19; /* 更深邃的曜石黑底色 */
      --gold: #f1c40f;

      --grain: url("/assets/grain.webp");
      --glitter: url("/assets/glitter.png");
      --foil: url("/assets/illusion.png");
      --trainer-foil: url("/assets/trainerbg.png");
      --cosmos-bottom: url("/assets/cosmos-bottom.png");
      --cosmos-mid: url("/assets/cosmos-middle-trans.png");
      --cosmos-top: url("/assets/cosmos-top-trans.png");

      --space: 5%;
      --angle: 133deg;
      --imgsize: 33%;
      
      --card-aspect: 0.718;
      --card-radius: 4.55% / 3.5%;
      --card-edge: hsl(47, 100%, 78%);
      --card-back: hsl(205, 100%, 25%);
      --card-glow: hsl(175, 100%, 90%);

      /* 霓虹光譜 (完全還原) */
      --sunpillar-1: hsl(2, 100%, 73%);
      --sunpillar-2: hsl(53, 100%, 69%);
      --sunpillar-3: hsl(93, 100%, 69%);
      --sunpillar-4: hsl(176, 100%, 76%);
      --sunpillar-5: hsl(228, 100%, 74%);
      --sunpillar-6: hsl(283, 100%, 73%);
      
      --sunpillar-clr-1: var(--sunpillar-1);
      --sunpillar-clr-2: var(--sunpillar-2);
      --sunpillar-clr-3: var(--sunpillar-3);
      --sunpillar-clr-4: var(--sunpillar-4);
      --sunpillar-clr-5: var(--sunpillar-5);
      --sunpillar-clr-6: var(--sunpillar-6);
      
      /* 🌟 Dark VisionOS 深色毛玻璃變數 */
      --glass-dark-bg: rgba(20, 25, 35, 0.45);
      --glass-dark-border: rgba(255, 255, 255, 0.15);
      --glass-dark-shadow: 0 25px 45px rgba(0, 0, 0, 0.4), inset 0 1px 1px rgba(255, 255, 255, 0.08);
    }

    body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg-color); font-family: -apple-system, sans-serif; color: white; overflow: hidden; position: relative; }
    
    /* ✨ 深色動態環境光暈 (暗黑星雲效果) */
    .ambient-orb { position: fixed; border-radius: 50%; filter: blur(80px); z-index: 0; opacity: 0.4; animation: floatOrb 15s infinite alternate ease-in-out; pointer-events: none; }
    .orb-1 { width: 400px; height: 400px; background: #0066cc; top: -10%; left: -20%; }
    .orb-2 { width: 500px; height: 500px; background: #8e44ad; bottom: -10%; right: -20%; animation-delay: -5s; }
    .orb-3 { width: 300px; height: 300px; background: #f39c12; top: 40%; left: 40%; animation-duration: 20s; opacity: 0.2; }
    @keyframes floatOrb { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(40px, -40px) scale(1.2); } }

    /* 🌟 共用深色毛玻璃面板 */
    .glass-panel-dark {
      background: var(--glass-dark-bg); backdrop-filter: blur(30px) saturate(150%); -webkit-backdrop-filter: blur(30px) saturate(150%);
      border: 1px solid var(--glass-dark-border); box-shadow: var(--glass-dark-shadow);
      border-radius: 28px; box-sizing: border-box; overflow: hidden;
    }

    /* =======================================================
       👤 頂部大廳 UI (重構為懸浮面板)
       ======================================================= */
    header { padding: max(20px, env(safe-area-inset-top)) 25px 15px; display: flex; justify-content: space-between; align-items: center; z-index: 100; position: relative; }
    .user-info { display: flex; flex-direction: column; gap: 4px; }
    .user-info h2 { margin: 0; font-size: 13px; color: #a4b0be; letter-spacing: 2px; text-transform: uppercase; font-weight: 900; }
    .user-points { font-size: 26px; font-weight: 900; color: #00d2d3; text-shadow: 0 0 20px rgba(0,210,211,0.6); line-height: 1; }
    
    .btn-shop { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 12px 24px; border-radius: 20px; font-size: 14px; font-weight: 900; cursor: pointer; backdrop-filter: blur(10px); box-shadow: 0 8px 15px rgba(0,0,0,0.2); transition: 0.3s; letter-spacing: 1px; display: flex; align-items: center; gap: 6px; }
    .btn-shop:active { transform: scale(0.95); background: rgba(255,255,255,0.15); }

    .hero-info-zone { text-align: center; margin-top: 15px; min-height: 80px; z-index: 10; position: relative; }
    .badges { display: flex; justify-content: center; gap: 10px; margin-bottom: 10px; }
    .badge { padding: 6px 16px; border-radius: 20px; font-size: 12px; font-weight: 900; letter-spacing: 1px; border: 1px solid rgba(255,255,255,0.15); backdrop-filter: blur(10px); box-shadow: 0 4px 10px rgba(0,0,0,0.2); text-transform: uppercase; }
    .badge.rarity-N { color: #bdc3c7; background: rgba(189,195,199,0.1); }
    .badge.rarity-R { color: #3498db; background: rgba(52,152,219,0.1); border-color: rgba(52,152,219,0.4); }
    .badge.rarity-SR { color: #9b59b6; background: rgba(155,89,182,0.1); border-color: rgba(155,89,182,0.4); }
    .badge.rarity-SSR { color: var(--gold); background: rgba(241,196,15,0.15); border-color: var(--gold); box-shadow: 0 0 15px rgba(241,196,15,0.3); }
    .badge.rarity-UR { color: #ff9ff3; background: rgba(255,159,243,0.15); border-color: #ff9ff3; box-shadow: 0 0 20px rgba(255,159,243,0.4); }
    .badge.category { color: #2ecc71; background: rgba(46,204,113,0.1); border-color: rgba(46,204,113,0.4); }
    .hero-name { font-size: 36px; font-weight: 900; letter-spacing: 5px; margin: 0; text-shadow: 0 4px 15px rgba(0,0,0,0.8), 0 0 30px rgba(255,255,255,0.1); }

    /* =======================================================
       🚀 優化：裝備槽與畫廊 (全息投影質感)
       ======================================================= */
    .gallery-container { position: relative; width: 100%; flex: 1; min-height: 380px; display: flex; align-items: center; justify-content: center; z-index: 10; margin-top: 10px; }
    
    .center-target-box { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 280px; height: 388px; border: 2px dashed rgba(255, 255, 255, 0.2); border-radius: 25px; pointer-events: none; z-index: 0; transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1); background: rgba(0,0,0,0.15); backdrop-filter: blur(5px); }
    .center-target-box::after { content: 'EQUIP SLOT'; position: absolute; bottom: -35px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.3); font-size: 13px; font-weight: 900; letter-spacing: 5px; transition: 0.3s; }
    .center-target-box.is-equipped { border: 2px solid var(--gold); background: rgba(241,196,15,0.05); box-shadow: 0 0 30px rgba(241,196,15,0.3), inset 0 0 20px rgba(241,196,15,0.1); }
    .center-target-box.is-equipped::after { content: 'EQUIPPED'; color: var(--gold); text-shadow: 0 0 15px var(--gold); }

    .carousel-track { display: flex; gap: 40px; overflow-x: auto; width: 100%; padding: 40px calc(50vw - 125px); scroll-snap-type: x mandatory; scrollbar-width: none; -webkit-overflow-scrolling: touch; align-items: center; z-index: 5; perspective: 1000px; }
    .carousel-track::-webkit-scrollbar { display: none; }
    
    .holo-card-wrapper { position: relative; scroll-snap-align: center; flex-shrink: 0; width: 250px; height: 348px; cursor: pointer; transition: 0.3s; border-radius: 4.55%/3.5%; }
    .holo-card-wrapper:active { transform: scale(0.96); }
    .tap-to-view { position: absolute; bottom: -20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); padding: 8px 20px; border-radius: 20px; font-size: 11px; font-weight: 900; letter-spacing: 2px; color: var(--gold); border: 1px solid rgba(241,196,15,0.5); pointer-events: none; white-space: nowrap; box-shadow: 0 8px 15px rgba(0,0,0,0.6); z-index: 10; backdrop-filter: blur(10px); }

    /* =======================================================
       ✨ 100% 滿血還原：原汁原味 Poke-Holo Base + 3D 結構
       ======================================================= */
    #showcase-modal {
      position: fixed; inset: 0;
      background: rgba(5, 9, 15, 0.95); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
      z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }
    #showcase-modal.active { opacity: 1; pointer-events: auto; }
    .close-btn { position: absolute; top: max(20px, env(safe-area-inset-top)); right: 20px; width: 44px; height: 44px; border-radius: 50%; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; font-size: 22px; display: flex; justify-content: center; align-items: center; cursor: pointer; z-index: 100; backdrop-filter: blur(10px); transition: 0.3s; }
    .close-btn:active { transform: scale(0.9); background: rgba(255,255,255,0.2); }

    .showcase-wrapper { width: 85vw; max-width: 400px; aspect-ratio: var(--card-aspect); perspective: 800px; }
    
    .card {
      width: 100%; height: 100%; position: relative;
      transform: translate3d(0px, 0px, 0.01px);
      transform-style: preserve-3d;
      --pointer-x: 50%; --pointer-y: 50%;
      --pointer-from-center: 0; --pointer-from-top: 0.5; --pointer-from-left: 0.5;
      --rotate-x: 0deg; --rotate-y: 0deg;
      --card-opacity: 1; --card-scale: 1; --translate-x: 0px; --translate-y: 0px;
    }

    .card__translater, .card__rotator { width: 100%; height: 100%; display: grid; perspective: 600px; transform-origin: center; transform-style: preserve-3d; }
    .card__translater { transform: translate3d(var(--translate-x), var(--translate-y), 0.1px) scale(var(--card-scale)); }
    .card__rotator { transform: rotateY(var(--rotate-x)) rotateX(var(--rotate-y)); box-shadow: 0px 20px 40px -5px rgba(0,0,0,0.8), 0 2px 15px -5px black; border-radius: var(--card-radius); }
    
    /* 🚀 重新啟動 3D 引擎 (保留 Z 軸深度，讓星空跟雷射浮起來！) */
    .card__rotator * { transform-style: preserve-3d; }
    
    .card__front { 
      display: grid !important; grid-template-columns: 1fr; grid-template-rows: 1fr; 
      width: 100%; height: 100%; border-radius: var(--card-radius); 
      transform-style: preserve-3d !important; 
      transform: translate3d(0px, 0px, 0.01px);
    }
    
    .card__bg, .card__shine, .card__glare { 
      grid-area: 1/1; width: 100%; height: 100%; border-radius: var(--card-radius); box-sizing: border-box; 
      pointer-events: none; transform-style: preserve-3d !important;
    }

    .card__bg { background-size: cover; background-position: center; border: 2px solid transparent; transform: translateZ(0px); z-index: 1; }

    /* 原版基礎眩光 (恢復 Z 軸 1.41px) */
    .card__glare {
      transform: translateZ(1.41px); z-index: 3;
      background-image: radial-gradient(farthest-corner circle at var(--pointer-x) var(--pointer-y), hsla(0, 0%, 100%, 0.8) 10%, hsla(0, 0%, 100%, 0.65) 20%, hsla(0, 0%, 0%, 0.5) 90%);
      opacity: calc(var(--pointer-from-center) * 0.8); mix-blend-mode: overlay;
    }

    /* 光澤圖層本體宣告 (恢復 3D Z軸深度 1px) */
    .card__shine {
      display: grid; transform: translateZ(1px); z-index: 4; transform-style: preserve-3d;
      background: transparent; background-size: cover; background-position: center;
      filter: brightness(.85) contrast(2.75) saturate(.65); mix-blend-mode: color-dodge;
    }
    .card__shine:before, .card__shine:after { grid-area: 1/1; border-radius: var(--card-radius); content: ""; display: block !important; }
    .card__shine:before { transform: translateZ(1.2px); }
    .card__shine:after { transform: translateZ(1.6px); }

    /* 🚀 你的進化版 Masking (絕對強制挖空) */
    .card.masked .card__shine, .card.masked .card__shine:before, .card.masked .card__shine:after {
      -webkit-mask-image: linear-gradient(white, white), var(--mask) !important;
      -webkit-mask-composite: destination-out !important;
      mask-image: linear-gradient(white, white), var(--mask) !important;
      mask-composite: exclude !important;
      -webkit-mask-size: cover !important; mask-size: cover !important;
      -webkit-mask-position: center center !important; mask-position: center center !important;
    }

    /* 🔵【R卡：Cosmos 星空】 */
    .card[data-rarity="R"] .card__shine {
      --space: 4%;
      background-image: var(--cosmos-bottom), repeating-linear-gradient(82deg, hsl(53, 65%, 60%) calc(var(--space)*1), hsl(93, 56%, 50%) calc(var(--space)*2), hsl(176, 54%, 49%) calc(var(--space)*3), hsl(228, 59%, 55%) calc(var(--space)*4), hsl(283, 60%, 55%) calc(var(--space)*5), hsl(326, 59%, 51%) calc(var(--space)*6), hsl(326, 59%, 51%) calc(var(--space)*7), hsl(283, 60%, 55%) calc(var(--space)*8), hsl(228, 59%, 55%) calc(var(--space)*9), hsl(176, 54%, 49%) calc(var(--space)*10), hsl(93, 56%, 50%) calc(var(--space)*11), hsl(53, 65%, 60%) calc(var(--space)*12) ), radial-gradient(farthest-corner circle at var(--pointer-x) var(--pointer-y), hsla(180, 100%, 89%, 0.5) 5%, hsla(180, 14%, 57%, 0.3) 40%, hsl(0, 0%, 0%) 130% ) !important;
      background-blend-mode: color-burn, multiply !important; background-position: center, calc(10% + (var(--pointer-from-left)*80%)) calc(10% + (var(--pointer-from-top)*80%)), center !important;
      background-size: cover, 400% 900%, cover !important; filter: brightness(1) contrast(1) saturate(.8) !important; mix-blend-mode: color-dodge !important; opacity: 1 !important;
    }
    .card[data-rarity="R"] .card__shine:before {
      content: "" !important; display: block !important;
      background-image: var(--cosmos-mid), repeating-linear-gradient(82deg, hsl(53, 65%, 60%) calc(var(--space)*1), hsl(93, 56%, 50%) calc(var(--space)*2), hsl(176, 54%, 49%) calc(var(--space)*3), hsl(228, 59%, 55%) calc(var(--space)*4), hsl(283, 60%, 55%) calc(var(--space)*5), hsl(326, 59%, 51%) calc(var(--space)*6), hsl(326, 59%, 51%) calc(var(--space)*7), hsl(283, 60%, 55%) calc(var(--space)*8), hsl(228, 59%, 55%) calc(var(--space)*9), hsl(176, 54%, 49%) calc(var(--space)*10), hsl(93, 56%, 50%) calc(var(--space)*11), hsl(53, 65%, 60%) calc(var(--space)*12) ) !important;
      background-blend-mode: lighten, multiply !important; background-position: center, calc(15% + (var(--pointer-from-left)*70%)) calc(15% + (var(--pointer-from-top)*70%)), center !important;
      background-size: cover, 400% 900%, cover !important; filter: brightness(1.25) contrast(1.75) saturate(.8) !important; mix-blend-mode: overlay !important;
    }
    .card[data-rarity="R"] .card__shine:after {
      content: "" !important; display: block !important;
      background-image: var(--cosmos-top), repeating-linear-gradient(82deg, hsl(53, 65%, 60%) calc(var(--space)*1), hsl(93, 56%, 50%) calc(var(--space)*2), hsl(176, 54%, 49%) calc(var(--space)*3), hsl(228, 59%, 55%) calc(var(--space)*4), hsl(283, 60%, 55%) calc(var(--space)*5), hsl(326, 59%, 51%) calc(var(--space)*6), hsl(326, 59%, 51%) calc(var(--space)*7), hsl(283, 60%, 55%) calc(var(--space)*8), hsl(228, 59%, 55%) calc(var(--space)*9), hsl(176, 54%, 49%) calc(var(--space)*10), hsl(93, 56%, 50%) calc(var(--space)*11), hsl(53, 65%, 60%) calc(var(--space)*12) ) !important;
      background-blend-mode: multiply, multiply !important; background-position: center, calc(20% + (var(--pointer-from-left)*60%)) calc(20% + (var(--pointer-from-top)*60%)), center !important;
      background-size: cover, 400% 900%, cover !important; filter: brightness(1.25) contrast(1.75) saturate(.8) !important; mix-blend-mode: multiply !important;
    }
    .card[data-rarity="R"] .card__bg { border-color: #3498db !important; box-shadow: inset 0 0 10px rgba(52, 152, 219, 0.5) !important; }

    /* 🟣【SR卡：Trainer Full Art】 */
    .card[data-rarity="SR"] .card__shine {
      --imgsize: 33%; mix-blend-mode: color-dodge !important; opacity: 1 !important;
    }
    .card[data-rarity="SR"] .card__shine, .card[data-rarity="SR"] .card__shine:after {
      background-image: var(--trainer-foil) !important; background-size: var(--imgsize) !important;
      filter: brightness(calc((var(--pointer-from-center)*0.05) + .6)) contrast(1.5) saturate(1.2) !important;
    }
    .card[data-rarity="SR"] .card__shine:before {
      content: "" !important; display: block !important;
      background-image: radial-gradient(farthest-corner circle at var(--pointer-x) var(--pointer-y), hsl(0, 0%, 100%) 0%, hsla(0, 0%, 0%, 0) 80%) !important;
      mix-blend-mode: screen !important; opacity: 0.5 !important;
    }
    .card[data-rarity="SR"] .card__glare {
      opacity: calc(var(--card-opacity) * .75) !important; mix-blend-mode: multiply !important; filter: brightness(1.5) contrast(1.4) saturate(1) !important; background-size: 170% 170% !important;
    }
    .card[data-rarity="SR"] .card__bg { border-color: #bdc3c7 !important; box-shadow: inset 0 0 10px rgba(189, 195, 199, 0.5) !important; }

    /* 🟡【SSR卡：V-Full Art】 */
    .card[data-rarity="SSR"] .card__shine, .card[data-rarity="SSR"] .card__shine:after {
      background-blend-mode: exclusion, hue, hard-light !important;
      filter: brightness(calc((var(--pointer-from-center)*.3) + .35)) contrast(2) saturate(1.5) !important;
    }
    .card[data-rarity="SSR"] .card__shine:before { display: none !important; }
    .card[data-rarity="SSR"] .card__shine:after { content: "" !important; display: block !important; filter: brightness(calc((var(--pointer-from-center)*.5) + .8)) contrast(1.6) saturate(1.4) !important; }
    
    .card[data-rarity="SSR"] .card__shine {
      opacity: 1 !important;
      background-image: var(--foil), repeating-linear-gradient( 0deg, var(--sunpillar-clr-1) calc(var(--space)*1), var(--sunpillar-clr-2) calc(var(--space)*2), var(--sunpillar-clr-3) calc(var(--space)*3), var(--sunpillar-clr-4) calc(var(--space)*4), var(--sunpillar-clr-5) calc(var(--space)*5), var(--sunpillar-clr-6) calc(var(--space)*6), var(--sunpillar-clr-1) calc(var(--space)*7) ), repeating-linear-gradient( var(--angle), #0e152e 0%, hsl(180, 10%, 60%) 3.8%, hsl(180, 29%, 66%) 4.5%, hsl(180, 10%, 60%) 5.2%, #0e152e 10% , #0e152e 12% ), radial-gradient( farthest-corner circle at var(--pointer-x) var(--pointer-y), hsla(0, 0%, 0%, 0.1) 12%, hsla(0, 0%, 0%, 0.15) 20%, hsla(0, 0%, 0%, 0.25) 120% ) !important;
      background-position: center center, 0% var(--pointer-y), calc( var(--pointer-x) + (var(--pointer-y)*0.2) ) var(--pointer-y), var(--pointer-x) var(--pointer-y) !important;
      background-blend-mode: soft-light, hue, hard-light !important; background-size: var(--imgsize), 200% 700%, 300% 100%, 200% 100% !important;
    }
    .card[data-rarity="SSR"] .card__shine:after {
      background-position: center center, 0% var(--pointer-y), calc( (var(--pointer-x) + (var(--pointer-y)*0.2)) * -1) calc( var(--pointer-y) * -1), var(--pointer-x) var(--pointer-y) !important;
      background-size: var(--imgsize), 200% 400%, 195% 100%, 200% 100% !important;
      filter: brightness(calc((var(--pointer-from-center)*.4) + .8)) contrast(1.5) saturate(1.25) !important; mix-blend-mode: exclusion !important;
    }
    .card[data-rarity="SSR"] .card__glare {
      background-image: radial-gradient(farthest-corner circle at var(--pointer-x) var(--pointer-y), hsl(0, 0%, 75%) 5%, hsl(200, 5%, 35%) 60%, hsl(320, 40%, 10%) 150%) !important;
      background-size: 120% 150% !important; background-position: center center !important; mix-blend-mode: hard-light !important; filter: brightness(1) contrast(1.2) saturate(1) !important; opacity: calc(var(--card-opacity) * .75 ) !important;
    }
    .card[data-rarity="SSR"] .card__bg { border-color: var(--gold) !important; box-shadow: inset 0 0 15px rgba(241,196,15,0.5) !important; }

    /* 🌈【UR卡：Rainbow Secret Holo 彩虹隱藏亮面】(特效拉滿新增！) */
    .card[data-rarity="UR"] .card__shine {
      --r-clr-1: hsl(0, 57%, 37%); --r-clr-2: hsl(40, 53%, 39%); --r-clr-3: hsl(90, 60%, 35%);
      --r-clr-4: hsl(180, 60%, 35%); --r-clr-5: hsl(180, 60%, 35%); --r-clr-6: hsl(210, 57%, 39%);
      --r-clr-7: hsl(280, 55%, 31%);

        linear-gradient(-45deg, var(--r-clr-1), var(--r-clr-5)),
        var(--glitter),
        linear-gradient( -30deg, 
          var(--r-clr-1), var(--r-clr-2), var(--r-clr-3), var(--r-clr-4), var(--r-clr-5), var(--r-clr-6), var(--r-clr-7),

        ) !important;
      background-blend-mode: soft-light !important;
      background-size: 100% 100%, 30% 30%, 400% 400% !important;
      background-position: center center, center center, var(--pointer-x) var(--pointer-y) !important;

  <script>
    // ⚠️ 請替換為你真實的 GAS 網址
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwK3b9vyc9g0w_nloyltFNJNc2C8iaSxEKqH6KU3OPUJpgzP9Zz7ZUpWt-xpb5uqT4F/exec";
    
    const params = new URLSearchParams(window.location.search);
    const STUDENT_ID = params.get('id') || "S001";

    // =======================================================
    // 🚀 瑪麗安專屬：全域雲端語音中心 (Azure Neural TTS + 快取擴大機)
    // =======================================================
    let azureAuthToken = "";
    let azureRegionCode = "";
    
    function fetchAzureToken() {
        fetch(`${GAS_URL}?action=get_azure_token`)
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    azureAuthToken = data.token;
                    azureRegionCode = data.region;
                }
            }).catch(err => console.warn("Token 取得失敗"));
    }
    fetchAzureToken(); // 網頁載入立刻拿鑰匙

    let audioCtx = null;
    const audioBufferCache = new Map();

    function playAudioBuffer(buffer, gainValue) {
        const source = audioCtx.createBufferSource();
        source.buffer = buffer;
        const gainNode = audioCtx.createGain();
        gainNode.gain.setValueAtTime(gainValue, audioCtx.currentTime); 
        source.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        source.start(0);
    }

    async function speakWordCloudCached(word, gainValue) {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') await audioCtx.resume();
        
        const cacheKey = word.toLowerCase();

        // 🌟 快取命中：免費且零延遲
        if (audioBufferCache.has(cacheKey)) {
            playAudioBuffer(audioBufferCache.get(cacheKey), gainValue);
            return;
        }

        return new Promise((resolve) => {
            if (!azureAuthToken || typeof SpeechSDK === 'undefined') {
                fallbackLocalTTS(word, resolve);
                return;
            }
            try {
                const speechConfig = SpeechSDK.SpeechConfig.fromAuthorizationToken(azureAuthToken, azureRegionCode);
                speechConfig.speechSynthesisVoiceName = "en-US-JennyNeural"; 
                speechConfig.speechSynthesisOutputFormat = SpeechSDK.SpeechSynthesisOutputFormat.Riff24Khz16BitMonoPcm;

                const synthesizer = new SpeechSDK.SpeechSynthesizer(speechConfig, null); 
                
                // 🚀 防呆：把單字裡的特殊符號轉義，避免微軟 SSML 引擎崩潰
                const safeXmlWord = word.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                const ssml = `<speak version='1.0' xml:lang='en-US'><voice name='en-US-JennyNeural'><prosody rate='-10%'>${safeXmlWord}</prosody></voice></speak>`;

                synthesizer.speakSsmlAsync(ssml, (result) => {
                    synthesizer.close();
                    if (result.audioData) {
                        // 🚀 蘋果相容性修復：使用 callback 寫法，保證舊版 iOS Safari 也不會死機
                        audioCtx.decodeAudioData(result.audioData, (audioBuffer) => {
                            audioBufferCache.set(cacheKey, audioBuffer);
                            playAudioBuffer(audioBuffer, gainValue);
                            resolve();
                        }, (err) => {
                            fallbackLocalTTS(word, resolve);
                        });
                    } else { fallbackLocalTTS(word, resolve); }
                }, () => { synthesizer.close(); fallbackLocalTTS(word, resolve); });
            } catch (e) { fallbackLocalTTS(word, resolve); }
        });
    }

    function fallbackLocalTTS(word, resolve) {
        // 🚀 蘋果防卡死修復：延遲 50ms 再呼叫原生語音，避免 iOS 佇列崩潰
        window.speechSynthesis.cancel();
        setTimeout(() => {
            const fallback = new SpeechSynthesisUtterance(word);
            fallback.lang = 'en-US';
            fallback.onend = () => { if(resolve) resolve(); };
            fallback.onerror = () => { if(resolve) resolve(); }; 
            window.speechSynthesis.speak(fallback);
        }, 50);
    }

    let characterAssets = {}; 
    let userUnlocked = [];
    let userEquipped = "";
    let currentCenteredId = ""; 

    let lobbyRefreshTimer = null;
    let battleStatusTimer = null;
    let aiTimerInterval = null;
    let currentRoomId = null;
    let roomExpireTimer = null;
    const GITHUB_APP_URL = "/";

    async function initLobby() {
      try {
        const res = await fetch(`${GAS_URL}?action=get_lobby_data&id=${STUDENT_ID}`);
        const data = await res.json();
        
        characterAssets = data.assets;
        document.getElementById('header-name').innerText = data.profile.name || STUDENT_ID;
        document.getElementById('header-points').innerText = `${data.profile.points} PTS`;
        userUnlocked = (data.profile.unlocked || "A001").split(',').map(s => s.trim()).filter(s => s !== "");
        userEquipped = data.profile.equipped || "A001"; 

        const rarityWeight = { 'UR': 5, 'SSR': 4, 'SR': 3, 'R': 2, 'N': 1 };
        userUnlocked.sort((a, b) => {
          const wA = characterAssets[a] ? (rarityWeight[characterAssets[a].rarity] || 0) : 0;
          const wB = characterAssets[b] ? (rarityWeight[characterAssets[b].rarity] || 0) : 0;
          return wB - wA; 
        });

        renderCarousel();
        checkEventStatus();
      } catch (e) {
        console.error("載入失敗：", e);
        document.getElementById('hero-name').innerText = "⚠️ 離線預設模式";
        characterAssets = {
          'A001': { name: 'Marian 瑪麗安', img: '/assets/Marian%20%E7%91%AA%E9%BA%97%E5%AE%89.webp', rarity: 'N', category: '一般' }, 
        };
        userUnlocked = ["A001"];
        userEquipped = "A001";
        renderCarousel();
      }
    }

    function createStaticCardHTML(char) {
      let maskString = "";
      if (char.mask) {
        maskString = char.mask.includes('url(') ? char.mask : `url('${char.mask}')`;
      }
      let maskStyle = char.mask ? `style="--mask: ${maskString};"` : "";
      let maskedClass = char.mask ? "masked" : "";
      return `
        <div class="card static-card ${maskedClass}" data-rarity="${char.rarity}" ${maskStyle}>
          <div class="card__translater">
            <div class="card__rotator">
              <div class="card__front">
                <div class="card__bg" style="background-image: url('${char.img}')"></div>
                <div class="card__shine"></div>
                <div class="card__glare"></div>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function renderCarousel() {
      const carousel = document.getElementById('carousel');
      carousel.innerHTML = "";

      userUnlocked.forEach(id => {
        if (!characterAssets[id]) return;
        const char = characterAssets[id];
        const wrapper = document.createElement('div');
        wrapper.className = 'holo-card-wrapper';
        wrapper.setAttribute('data-id', id);
        
        wrapper.innerHTML = createStaticCardHTML(char) + `<div class="tap-to-view">🔍 點擊全螢幕賞玩</div>`;
        wrapper.onclick = () => openShowcase(id);
        carousel.appendChild(wrapper);
      });

      initScrollSpy();
      setTimeout(() => {
        const equippedWrapper = document.querySelector(`.holo-card-wrapper[data-id="${userEquipped}"]`);
        // 🚀 修復 1：加入 block: 'nearest' 確保只有水平置中，不會引發垂直方向的推擠！
        if (equippedWrapper) equippedWrapper.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
      }, 300);
    }

    function initScrollSpy() {
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => { if (entry.isIntersecting) updateCenterInfo(entry.target.getAttribute('data-id')); });
      }, { root: document.getElementById('carousel'), rootMargin: '0px -50% 0px -50%', threshold: 0 });
      document.querySelectorAll('.holo-card-wrapper').forEach(card => observer.observe(card));
    }

    function updateCenterInfo(id) {
      currentCenteredId = id;
      const char = characterAssets[id];
      if(!char) return;

      document.getElementById('hero-name').innerText = char.name;
      const rBadge = document.getElementById('badge-rarity');
      rBadge.className = `badge rarity-${char.rarity}`;
      rBadge.innerText = char.rarity;
      document.getElementById('badge-category').innerText = char.category;

      const btn = document.getElementById('equip-btn');
      const targetBox = document.getElementById('target-box');
      if (id === userEquipped) {
        btn.innerText = "✅ 已裝備";
        btn.className = "btn-equip is-equipped";
        targetBox.classList.add('is-equipped');
      } else {
        btn.innerText = "裝備此角色";
        btn.className = "btn-equip";
        targetBox.classList.remove('is-equipped');
      }
    }

    function equipCurrentCharacter() {
      if (currentCenteredId === userEquipped) return;
      const btn = document.getElementById('equip-btn');
      btn.innerText = "連線中...";
      btn.classList.add('is-equipped');

      fetch(`${GAS_URL}?action=equip_avatar&id=${STUDENT_ID}&avatarId=${currentCenteredId}`)
        .then(res => res.json()).then(data => {
          if(data.success) {
            userEquipped = currentCenteredId;
            updateCenterInfo(currentCenteredId); 
            showToast("裝備成功！");
          }
        }).catch(() => {
          userEquipped = currentCenteredId;
          updateCenterInfo(currentCenteredId);
          showToast("裝備成功！(離線模式)");
        });
    }

    // =======================================================
    // 🛒 商店分區與限定邏輯
    // =======================================================
    function openShop() {
      renderShop();
      document.getElementById('shop-modal').classList.add('active');
    }

    function closeShop() { document.getElementById('shop-modal').classList.remove('active'); }

    function renderShop() {
      const container = document.getElementById('shop-grid-container');
      container.innerHTML = "";
      
      const rarities = ['UR', 'SSR', 'SR', 'R', 'N'];
      const now = new Date();

      rarities.forEach(rarity => {
        const items = Object.entries(characterAssets).filter(([id, char]) => {
          if (char.rarity !== rarity) return false;
          
          if (char.category === "限定") {
            if (char.endTime) {
              const end = new Date(char.endTime);
              if (now > end) return false; 
            }
          }
          return true;
        });

        if (items.length === 0) return;

        const titleEl = document.createElement('h3');
        titleEl.className = `shop-rarity-title title-${rarity}`;
        titleEl.innerText = `${rarity}`;
        container.appendChild(titleEl);

        const grid = document.createElement('div');
        grid.className = 'shop-grid';

        items.forEach(([id, char]) => {
          const isOwned = userUnlocked.includes(id);
          const isLimited = (char.category === "限定");
          const isEvent = (char.category === "活動"); 
          const cost = char.cost || 500; 

          const cardEl = document.createElement('div');
          cardEl.className = 'shop-card-wrapper' + (isOwned ? ' owned' : '');
          
          let limitedBadgeHtml = "";
          if (isLimited) limitedBadgeHtml = `<div class="shop-limited-badge">⏳ 限時販售</div>`;
          if (isEvent) limitedBadgeHtml = `<div class="shop-limited-badge" style="background: linear-gradient(135deg, #8e44ad, #9b59b6);">✨ 活動專屬</div>`;

          let btnHtml = "";
          if (isOwned) {
              btnHtml = `<button class="btn-buy" disabled>已擁有</button>`;
          } else if (isEvent) {
              btnHtml = `<button class="btn-buy" disabled style="background: rgba(142,68,173,0.3); color: #fff; opacity: 1; border: 1px solid rgba(142,68,173,0.5); box-shadow: none;">活動限定</button>`;
          } else {

    function initModalHoloEngine() {
      let bounds;
      let ticking = false;

      function updateCard(x, y) {
        const leftX = x / bounds.width;
        const topY = y / bounds.height;
        const center = { x: leftX - 0.5, y: topY - 0.5 };
        const distance = Math.sqrt(center.x**2 + center.y**2);

        modalCard.style.setProperty('--pointer-x', `${leftX * 100}%`);
        modalCard.style.setProperty('--pointer-y', `${topY * 100}%`);
        modalCard.style.setProperty('--pointer-from-center', clamp(distance * 2, 0, 1));
        modalCard.style.setProperty('--pointer-from-top', topY);
        modalCard.style.setProperty('--pointer-from-left', leftX);
        
        modalCard.style.setProperty('--rotate-x', `${center.y * -20}deg`); 
        modalCard.style.setProperty('--rotate-y', `${center.x * 20}deg`);
        ticking = false;
      }
      
      function rotateToMouse(e) {
        if (!bounds) bounds = modalCard.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        const mouseX = clientX - bounds.left;
        const mouseY = clientY - bounds.top;
        
        if (!ticking) {
          requestAnimationFrame(() => updateCard(mouseX, mouseY));
          ticking = true;
        }
      }

      function resetTilt() {
        modalCard.style.transition = "transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275)";
        modalCard.style.setProperty('--rotate-x', '0deg');
        modalCard.style.setProperty('--rotate-y', '0deg');
        modalCard.style.setProperty('--pointer-from-center', '0');
        modalCard.style.setProperty('--pointer-x', '50%');
        modalCard.style.setProperty('--pointer-y', '50%');
        setTimeout(() => { modalCard.style.transition = "none"; }, 500);
      }

      function startInteraction() {
        bounds = modalCard.getBoundingClientRect(); 
        modalCard.style.transition = "none"; 
      }

      modalCard.addEventListener('pointerenter', startInteraction);
      modalCard.addEventListener('pointermove', rotateToMouse);
      modalCard.addEventListener('pointerleave', resetTilt);
      
      modalCard.addEventListener('touchstart', startInteraction, {passive: true});
      modalCard.addEventListener('touchmove', rotateToMouse, {passive: true});
      modalCard.addEventListener('touchend', resetTilt);
    }

    function clamp(val, min, max) { return Math.min(Math.max(val, min), max); }
    function showToast(msg) { const t = document.getElementById('toast'); t.innerText = msg; t.style.opacity = 1; t.style.transform = 'translate(-50%, 0)'; setTimeout(() => { t.style.opacity = 0; t.style.transform = 'translate(-50%, -20px)'; }, 2000); }

      fetch(`${GAS_URL}?action=get_lobby&id=${STUDENT_ID}&t=${new Date().getTime()}`)

        .then(data => {
          const container = document.getElementById('pvp-room-list');

            container.innerHTML = `

    // 🎨 渲染綠色電池槽
    function renderStaminaUI() {
        if (!globalUserStatus) return;
        const container = document.getElementById('stamina-slots');
        
        let hasStamina = false;

        if (globalUserStatus.battleLimit === "VIP") {
            container.innerHTML = `<span style="color:#f1c40f; font-weight:900; font-size:14px; text-shadow:0 0 10px rgba(241,196,15,0.6); letter-spacing:1px;">♾️ 無限體力</span>`;
            hasStamina = true;
        } else {
            const limit = globalUserStatus.battleLimit;
            const remain = Math.max(0, limit - globalUserStatus.battleCount);
            hasStamina = (remain > 0);
            
            let html = '';
            for (let i = 0; i < limit; i++) {
                if (i < remain) {
                    html += `<div class="stamina-slot active"></div>`; // 有電
                } else {
                    html += `<div class="stamina-slot empty"></div>`;  // 沒電
                }
            }
            container.innerHTML = html;
        }
        
        // 🚀 將「體力狀態」和「語音狀態」一起傳給按鈕更新器
        updateBattleButtons(hasStamina, globalUserStatus.canPlay);

            alert(`⚠️ 今日語音練習已達上限 (${globalUserStatus.count}/${globalUserStatus.limit}次)\n請讓喉嚨休息一下，明天再來挑戰吧！`);
            return false;
        }

        // 2. 接著檢查體力
        if (!globalUserStatus.canPlayBattle) {
            alert(`🔋 體力已耗盡！\n今日對戰次數已達上限 (${globalUserStatus.battleLimit} 場)。\n可以先去首頁「自由練習」鍛鍊實力，明天再來挑戰吧！`);
            return false;
        }

        return true;
    }

    function loadAvailableClasses() {
      const selector = document.getElementById('dynamic-difficulty-selector');
      const levelInput = document.getElementById('pvp-level');
      
      // 🚀 加上 &id=${STUDENT_ID}
      fetch(`${GAS_URL}?action=get_available_classes&id=${STUDENT_ID}`)
        .then(res => res.json())
        .then(data => {
          if (data.status === 'success' && data.classes && data.classes.length > 0) {
            selector.innerHTML = ""; // 清空載入中字樣
            
            // 🚀 核心過濾邏輯：排除掉字串中包含 "EVENT" (不分大小寫) 的代碼
            const validClasses = data.classes.filter(c => !String(c).toUpperCase().includes("EVENT"));
            
            if (validClasses.length === 0) {
               selector.innerHTML = `<div style="color: #e74c3c; font-size: 14px; font-weight: bold; padding: 20px;">⚠️ 目前無開放戰場</div>`;
               return;
            }

            // 動態生成按鈕
            validClasses.forEach((classCode, index) => {
              const btn = document.createElement('div');
              // 第一個按鈕預設為 active
              btn.className = `diff-btn ${index === 0 ? 'active' : ''}`; 
              btn.innerText = classCode;
              btn.onclick = function() { selectDifficulty(this, classCode); };
              selector.appendChild(btn);
            });
            
            // 將隱藏輸入框的值設為第一個有效的班級代碼
            levelInput.value = validClasses[0]; 

          } else {
            selector.innerHTML = `<div style="color: #e74c3c; font-size: 14px; font-weight: bold; padding: 20px;">⚠️ 無法取得戰場資料</div>`;
          }
        })
        .catch(err => {
          console.error("戰場資料載入失敗:", err);
          selector.innerHTML = `<div style="color: #e74c3c; font-size: 14px; font-weight: bold; padding: 20px;">🚨 連線失敗，請重試</div>`;
        });
    }

    }

    function openEventVocab() {
        const listEl = document.getElementById('vocab-list');
        listEl.innerHTML = "";
        
        if (currentEventWords.length === 0) {
            listEl.innerHTML = "<div style='text-align:center; color:#bdc3c7; padding: 20px;'>暫無題庫資料</div>";
        } else {
            currentEventWords.forEach(word => {
                // 🚀 加上單引號防護罩，避免 don't 這種字把按鈕搞壞
                const safeWord = word.en.replace(/'/g, "\\'"); 
                
                listEl.innerHTML += `
                    <div class="vocab-row">
                        <div>
                            <div class="vocab-en">${word.en}</div>
                            <div class="vocab-zh">${word.zh}</div>
                        </div>
                        <button class="vocab-play" onclick="playEventWord(this, '${safeWord}')">🔊</button>
                    </div>
                `;
            });
        }
        document.getElementById('vocab-modal').classList.add('active');
    }

    function closeEventVocab() {
        document.getElementById('vocab-modal').classList.remove('active');
    }

    function playEventWord(btn, text) {
        // 1. 動畫視覺回饋
        if (btn) {
            btn.style.transform = "scale(0.85)";
            setTimeout(() => btn.style.transform = "scale(1)", 150);
        }

        // 2. 溫馨提醒：每次按下去，都會浮現提示，避免家長以為壞掉
        showToast("🔊 請確認手機側邊沒有開啟靜音喔！");

        // 3. 同步硬解鎖 Web Audio 引擎
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();

        // 4. 清理字串，發送至雲端擴大機
        const cleanText = text.replace(/\\/g, '');
        speakWordCloudCached(cleanText, 1.8);
    }

    function startEvent(eventClassCode, eventAvatarId) {
      if (!checkBattleLimits()) return; // 👈 改名
      const eventBanner = document.querySelector('.event-banner');
      if (eventBanner) eventBanner.style.pointerEvents = 'none';

      if(aiTimerInterval) return;

      // 🚀 核心防禦：要去打 Boss 了，炸掉自己開的 1v1 房間！
      if (currentRoomId) {
          fetch(`${GAS_URL}?action=cancel_battle&id=${STUDENT_ID}&roomId=${currentRoomId}`);
          currentRoomId = null;
          // 順便把 UI 上的按鈕恢復原狀
          const createBtn = document.getElementById('create-room-btn');
          if (createBtn) {
              createBtn.innerText = "開啟 1v1 戰場";
              createBtn.style.filter = "none"; 
              createBtn.onclick = () => createBattleRoom();
          }
      }

      const overlay = document.getElementById('ai-countdown-overlay');
      overlay.style.display = 'flex';

      let count = 5;
      const aiTimerEl = document.getElementById('ai-timer');
      const aiMsgEl = document.getElementById('ai-msg');

      aiTimerEl.innerText = count;
      aiMsgEl.innerText = `連線至 突發事件...`;

      aiTimerInterval = setInterval(() => {
        count--;
        aiTimerEl.innerText = count;
        
        if(count <= 0) {
          clearInterval(aiTimerInterval);
          aiTimerInterval = null;
          aiMsgEl.innerText = "🚀 傳送中...";

          // 🚀 讓 Boss 擁有獨立的難度代號，不再跟高階 Ai 共用數值！
          const eventLevel = "活動Boss"; 
          const url = `${GAS_URL}?action=create_ai_battle&id=${STUDENT_ID}&classId=${eventClassCode}&level=${eventLevel}`;

          fetch(url)
            .then(res => res.json())
            .then(data => {
              if (data.roomId) {
                window.location.href = `arena.html?roomId=${data.roomId}&id=${STUDENT_ID}&isEvent=true&eventAvatar=${eventAvatarId}`;
              } else {
                alert("活動載入失敗，請稍後再試！");
                cancelAiChallenge(); 
                if (eventBanner) eventBanner.style.pointerEvents = 'auto';
              }
            })
            .catch(err => {
              alert("網路錯誤，無法連線至活動！");
              cancelAiChallenge(); 
              if (eventBanner) eventBanner.style.pointerEvents = 'auto';
            });
        }
      }, 1000);
    }

    // 🚀 靜置自動登出
    let idleTimer;
    const resetIdleTimer = () => { clearTimeout(idleTimer); idleTimer = setTimeout(() => { window.location.href = "index.html"; }, 180000); };
    document.addEventListener('touchstart', resetIdleTimer); document.addEventListener('mousedown', resetIdleTimer); resetIdleTimer();

    // =======================================================
    // 🚀 升級 3：Tappie「無痕換人攔截器」：SaaS 萬能網址萃取版
    // =======================================================
    (function() {
      let rawBuffer = ""; let lastPress = Date.now();
      
      // 動態建立無痕掃描輸入框，100% 確保不干擾正常操作
      const focusHunter = document.createElement('input');
      focusHunter.type = "text"; 
      
      // 🚀 核心防護：明確告訴平板/手機「絕對不要彈出虛擬小鍵盤」！
      focusHunter.setAttribute('inputmode', 'none'); 

      focusHunter.style.position = "fixed";
      focusHunter.style.top = "-500px"; 
      focusHunter.style.opacity = "0";
      document.body.appendChild(focusHunter);

      setInterval(() => { 
        const active = document.activeElement;
        // 如果畫面上有彈窗或輸入框，不要搶 Focus
        if (active.tagName !== 'INPUT' && active.tagName !== 'TEXTAREA' && !document.querySelector('.modal')) { 
          focusHunter.focus(); 
        }
      }, 1000);

      focusHunter.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            e.preventDefault(); // 🚀 防護：防止瀏覽器以為你要跳轉網址
        }

        const now = Date.now();
        // 讀卡機極快，超過 100ms 視為手動干擾，清空
        if (now - lastPress > 100 && e.key !== 'Enter') rawBuffer = ""; 
        lastPress = now;

        if (e.key.length === 1) rawBuffer += e.key;

        // 🚀 核心修復：拔除長度限制，全權交給 Enter 鍵來結算！
        if (e.key === 'Enter') {
          let inputStr = rawBuffer.trim();
          rawBuffer = ""; // 瞬間清空
          focusHunter.value = "";
          
          if (inputStr.length < 4) return;

          // 🚀 萬能萃取器：把網址裡的 uid 或 id 挖出來
          let extractedUid = null;
          if (inputStr.includes("uid=")) {
              extractedUid = inputStr.split("uid=")[1].split("&")[0];
          } else if (inputStr.includes("id=")) {
              extractedUid = inputStr.split("id=")[1].split("&")[0];
          }

          const adminAuth = localStorage.getItem('tappie_admin_key'); // 讀取新鑰匙

          if (extractedUid) {
              // 🚀 逃走前炸房！
              if (currentRoomId) fetch(`${GAS_URL}?action=cancel_battle&id=${STUDENT_ID}&roomId=${currentRoomId}`);
              
              // 🌟 狀況 A：這是新版 tap 網址卡，已經內含 UID，直接光速跳轉！
              if (adminAuth) {
                  window.location.replace(`admin.html?id=${extractedUid}`);
              } else {
                  window.location.href = `dashboard.html?id=${extractedUid}`;
              }
          } else {
              // 🌟 狀況 B：這是舊版純數字卡，需要連線去問 GAS 大腦
              const loader = document.createElement('div');
              // 保持 Lobby 的暗黑風格 Loading
              loader.style = "position:fixed;inset: 0; width: 100vw; height: 100dvh;background:radial-gradient(circle at center, rgba(10, 15, 25, 0.95) 0%, rgba(5, 9, 15, 0.98) 100%);z-index:999999;display:flex;flex-direction:column;align-items:center;justify-content:center;color:white;backdrop-filter:blur(25px); -webkit-backdrop-filter:blur(25px); font-family:sans-serif; transition:opacity 0.3s;";
              loader.id = "swap-loader";
              loader.innerHTML = `
                <h2 style="color:#ffd700; font-size: 26px; font-weight: 900; margin: 0 0 10px 0; letter-spacing: 2px;">🔄 身分驗證中</h2>
                <p style="color:#a4b0be; font-size: 14px; margin: 0 0 40px 0;">數位系統資料對接，請稍候...</p>
                <div style="position:relative; width:80px; height:80px; display:flex; align-items:center; justify-content:center;">
                  <div style="position:absolute; width:100%; height:100%; border-radius:50%; border:4px solid #ffd700; border-top-color: transparent; animation:spin 1s linear infinite;"></div>
                  <div style="font-size:30px; animation:blink 1.5s infinite;">🪪</div>
                </div>
                <style>
                  @keyframes spin { to { transform: rotate(360deg); } }
                  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
                </style>
              `;
              document.body.appendChild(loader);

              fetch(`${GAS_URL}?action=verify_card&cardId=${encodeURIComponent(inputStr)}`)
                .then(res => res.json())
                .then(data => {
                  if (data.success) { 
                      // 🚀 逃走前炸房！
                      if (currentRoomId) fetch(`${GAS_URL}?action=cancel_battle&id=${STUDENT_ID}&roomId=${currentRoomId}`);
                      
                      if (adminAuth) {
                          window.location.replace(`admin.html?id=${data.uid}`);
                      } else {
                          window.location.href = `dashboard.html?id=${data.uid}`;
                      }
                  } 
                  else { 
                      alert("❌ 查無此卡！請確認是否拿錯卡片。"); 
                      document.body.removeChild(loader); 
                  }
                })
                .catch(err => { 
                    alert("⚠️ 網路異常，無法切換學生。"); 
                    document.body.removeChild(loader); 
                });
          }
        }
      });
    })();
    
  </script>
</body>
</html>
